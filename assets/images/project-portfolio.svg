<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#C4B5FD;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="glowGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="200" fill="url(#bgGrad2)" rx="12"/>
  
  <!-- 装饰光晕 -->
  <ellipse cx="350" cy="50" rx="100" ry="50" fill="url(#glowGrad2)"/>
  <ellipse cx="50" cy="180" rx="100" ry="50" fill="url(#glowGrad2)"/>
  
  <!-- 名片卡片 -->
  <g transform="translate(100, 40)" filter="url(#shadow)">
    <rect x="0" y="0" width="200" height="120" rx="8" fill="white"/>
    <!-- 头像 -->
    <circle cx="35" cy="35" r="20" fill="#8B7EC8"/>
    <text x="35" y="42" text-anchor="middle" fill="white" font-size="18" font-weight="bold">周</text>
    <!-- 名字 -->
    <text x="70" y="30" fill="#333" font-size="16" font-weight="600">周世杰</text>
    <text x="70" y="50" fill="#888" font-size="11">个人数字名片</text>
    <!-- 分割线 -->
    <line x1="20" y1="70" x2="180" y2="70" stroke="#eee" stroke-width="1"/>
    <!-- 信息 -->
    <text x="20" y="90" fill="#666" font-size="10">📧 邮箱</text>
    <text x="20" y="108" fill="#666" font-size="10">💻 前端开发</text>
  </g>
  
  <!-- 标题文字 -->
  <text x="200" y="185" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500">Personal Digital Card</text>
</svg>
