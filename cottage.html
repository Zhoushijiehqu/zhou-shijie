<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="author" content="周世杰 (ZHOU SHIJIE)">
  <meta name="copyright" content="© 2026 周世杰. 代码 MIT, 创意 CC-BY-NC 4.0.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="3D游戏小屋 - 探索温馨的游戏小屋，点击家具进入游戏">
  <title>3D游戏小屋 · 游戏小屋</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,400..700&family=Manrope:wght@300..800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/base.css">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#d4ab6a">

  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        document.documentElement.setAttribute('data-theme', saved === 'light' ? 'light' : 'dark');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Manrope', -apple-system, sans-serif; }
    body { background: #1a1510; }

    #cottage-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
      touch-action: none;
    }

    /* 顶部 HUD */
    .cottage-hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: linear-gradient(180deg, rgba(26,21,16,0.6) 0%, transparent 100%);
      pointer-events: none;
    }
    .cottage-hud > * { pointer-events: auto; }

    .cottage-title {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 600;
      color: #f5e6c8;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      letter-spacing: 0.02em;
    }
    .cottage-title .sub {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: rgba(245,230,200,0.6);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .hud-btns { display: flex; gap: 10px; align-items: center; }
    .hud-btn {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid rgba(245,230,200,0.25);
      border-radius: 20px;
      background: rgba(26,21,16,0.7);
      color: #f5e6c8;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .hud-btn:hover {
      border-color: rgba(245,230,200,0.5);
      background: rgba(60,50,40,0.8);
      transform: translateY(-1px);
    }
    .hud-btn.star-badge {
      background: rgba(212,171,106,0.2);
      border-color: rgba(212,171,106,0.5);
      color: #d4ab6a;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid rgba(245,230,200,0.25);
      border-radius: 20px;
      background: rgba(26,21,16,0.7);
      color: #f5e6c8;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .back-btn:hover {
      border-color: rgba(245,230,200,0.5);
      transform: translateX(-2px);
    }

    /* 悬浮标签 */
    .hover-label {
      position: fixed;
      z-index: 40;
      pointer-events: none;
      padding: 6px 14px;
      background: rgba(26,21,16,0.85);
      border: 1px solid rgba(212,171,106,0.5);
      border-radius: 16px;
      font-size: 13px;
      font-weight: 600;
      color: #f5e6c8;
      white-space: nowrap;
      transform: translate(-50%, -100%);
      margin-top: -12px;
      opacity: 0;
      transition: opacity 0.2s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .hover-label.show { opacity: 1; }
    .hover-label .tag {
      display: inline-block;
      margin-right: 6px;
      font-size: 16px;
    }

    /* 底部提示 */
    .bottom-tip {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 40;
      padding: 10px 20px;
      background: rgba(26,21,16,0.7);
      border: 1px solid rgba(245,230,200,0.2);
      border-radius: 24px;
      font-size: 12px;
      color: rgba(245,230,200,0.7);
      pointer-events: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      letter-spacing: 0.05em;
    }

    /* 弹窗面板 */
    .modal-mask {
      position: fixed; inset: 0;
      z-index: 100;
      background: rgba(8, 10, 20, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-mask.show { display: flex; animation: modalFade 0.3s ease; }
    @keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: linear-gradient(135deg, #2a2118 0%, #1f1810 100%);
      border: 1px solid rgba(212,171,106,0.25);
      border-radius: 16px;
      padding: 28px 24px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      animation: modalIn 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal h2 {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 600;
      color: #f5e6c8;
      margin-bottom: 8px;
      text-align: center;
    }
    .modal .game-icon {
      font-size: 48px;
      text-align: center;
      margin-bottom: 12px;
    }
    .modal .desc {
      font-size: 13px;
      color: rgba(245,230,200,0.65);
      line-height: 1.7;
      text-align: center;
      margin-bottom: 20px;
    }
    .modal .btn-row {
      display: flex;
      gap: 10px;
    }
    .modal .btn {
      flex: 1;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 10px;
      border: 1px solid rgba(212,171,106,0.3);
      background: transparent;
      color: #f5e6c8;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .modal .btn:hover {
      border-color: rgba(212,171,106,0.6);
      background: rgba(212,171,106,0.1);
    }
    .modal .btn.primary {
      background: #d4ab6a;
      color: #1a1510;
      border-color: #d4ab6a;
    }
    .modal .btn.primary:hover {
      background: #e0bb7a;
    }

    /* 任务面板 */
    .tasks-panel {
      max-width: 420px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .tasks-panel h2 {
      text-align: left;
      margin-bottom: 4px;
    }
    .tasks-panel .subtitle {
      font-size: 12px;
      color: rgba(245,230,200,0.5);
      margin-bottom: 16px;
      letter-spacing: 0.05em;
    }
    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(245,230,200,0.1);
      border-radius: 10px;
      margin-bottom: 8px;
    }
    .task-item.done {
      border-color: rgba(212,171,106,0.4);
      background: rgba(212,171,106,0.08);
    }
    .task-item .task-icon { font-size: 24px; flex-shrink: 0; }
    .task-item .task-info { flex: 1; min-width: 0; }
    .task-item .task-name {
      font-size: 13px;
      font-weight: 600;
      color: #f5e6c8;
      margin-bottom: 4px;
    }
    .task-item .task-progress {
      height: 4px;
      background: rgba(245,230,200,0.15);
      border-radius: 2px;
      overflow: hidden;
    }
    .task-item .task-progress .fill {
      height: 100%;
      background: linear-gradient(90deg, #d4ab6a, #f5e6c8);
      border-radius: 2px;
      transition: width 0.3s;
    }
    .task-item .task-reward {
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 700;
      color: #d4ab6a;
      text-align: right;
    }
    .task-item .claim-btn {
      flex-shrink: 0;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      background: #d4ab6a;
      color: #1a1510;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .task-item .claim-btn:hover { background: #e0bb7a; transform: scale(1.05); }
    .task-item .claim-btn:disabled {
      background: rgba(245,230,200,0.2);
      color: rgba(245,230,200,0.4);
      cursor: not-allowed;
      transform: none;
    }

    .tasks-stars-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      background: rgba(212,171,106,0.1);
      border: 1px solid rgba(212,171,106,0.25);
      border-radius: 10px;
      margin-bottom: 14px;
    }
    .tasks-stars-row .label { font-size: 13px; color: rgba(245,230,200,0.7); }
    .tasks-stars-row .val {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 700;
      color: #d4ab6a;
    }

    /* 商城面板 */
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .shop-item {
      padding: 14px 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(245,230,200,0.1);
      border-radius: 10px;
      text-align: center;
      transition: all 0.2s;
    }
    .shop-item:hover {
      border-color: rgba(212,171,106,0.4);
      background: rgba(212,171,106,0.06);
    }
    .shop-item.owned {
      border-color: rgba(212,171,106,0.5);
    }
    .shop-item .shop-icon { font-size: 32px; margin-bottom: 6px; }
    .shop-item .shop-name {
      font-size: 13px;
      font-weight: 600;
      color: #f5e6c8;
      margin-bottom: 4px;
    }
    .shop-item .shop-price {
      font-size: 12px;
      font-weight: 700;
      color: #d4ab6a;
      margin-bottom: 8px;
    }
    .shop-item .shop-buy {
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 700;
      border: none;
      border-radius: 6px;
      background: #d4ab6a;
      color: #1a1510;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .shop-item .shop-buy:hover:not(:disabled) { background: #e0bb7a; }
    .shop-item .shop-buy:disabled {
      background: rgba(245,230,200,0.2);
      color: rgba(245,230,200,0.4);
      cursor: not-allowed;
    }
    .shop-item .shop-preview {
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid rgba(212,171,106,0.5);
      border-radius: 6px;
      background: transparent;
      color: #d4ab6a;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      margin-top: 4px;
    }
    .shop-item .shop-preview:hover { background: rgba(212,171,106,0.15); }
    .shop-item .owned-label {
      font-size: 11px;
      color: rgba(212,171,106,0.8);
      font-weight: 600;
    }

    /* Tab 切换 */
    .modal-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 14px;
      background: rgba(255,255,255,0.04);
      padding: 4px;
      border-radius: 10px;
    }
    .modal-tab {
      flex: 1;
      padding: 8px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      background: transparent;
      color: rgba(245,230,200,0.5);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      font-family: inherit;
    }
    .modal-tab.active {
      background: rgba(212,171,106,0.2);
      color: #f5e6c8;
    }

    /* 加载提示 */
    .loading-screen {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #1a1510;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.5s;
    }
    .loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loading-icon {
      font-size: 48px;
      animation: bounce 1s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .loading-text {
      font-size: 14px;
      color: rgba(245,230,200,0.6);
      letter-spacing: 0.2em;
    }

    @media (max-width: 600px) {
      .cottage-title { font-size: 16px; }
      .cottage-title .sub { display: none; }
      .hud-btn { padding: 7px 12px; font-size: 12px; }
      .bottom-tip { font-size: 11px; padding: 8px 14px; }
    }

    /* 第一人称模式 */
    .fp-toggle-btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 25, 20, 0.85);
      color: #f5e6c8;
      border: 1px solid rgba(245, 230, 200, 0.2);
      border-radius: 20px;
      padding: 10px 20px;
      font-size: 13px;
      cursor: pointer;
      z-index: 100;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
    }
    .fp-toggle-btn:hover {
      background: rgba(60, 50, 40, 0.9);
      transform: translateX(-50%) translateY(-2px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .fp-toggle-btn.active {
      background: rgba(100, 80, 50, 0.9);
      border-color: rgba(245, 200, 100, 0.4);
    }
    .daynight-btn {
      position: fixed;
      bottom: 20px;
      left: calc(50% + 100px);
      background: rgba(30, 25, 20, 0.85);
      color: #f5e6c8;
      border: 1px solid rgba(245, 230, 200, 0.2);
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 13px;
      cursor: pointer;
      z-index: 100;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
    }
    .daynight-btn:hover {
      background: rgba(60, 50, 40, 0.9);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .daynight-btn.night {
      background: rgba(40, 50, 80, 0.9);
      border-color: rgba(150, 180, 255, 0.3);
    }
    .bgm-btn {
      position: fixed;
      bottom: 20px;
      left: calc(50% - 100px);
      background: rgba(30, 25, 20, 0.85);
      color: #f5e6c8;
      border: 1px solid rgba(245, 230, 200, 0.2);
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 13px;
      cursor: pointer;
      z-index: 100;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
    }
    .bgm-btn:hover {
      background: rgba(60, 50, 40, 0.9);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .bgm-btn.playing {
      background: rgba(60, 50, 70, 0.9);
      border-color: rgba(180, 150, 220, 0.4);
    }
    .ambient-btn {
      position: fixed;
      bottom: 20px;
      left: calc(50% + 110px);
      background: rgba(30, 25, 20, 0.85);
      color: #f5e6c8;
      border: 1px solid rgba(245, 230, 200, 0.2);
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 13px;
      cursor: pointer;
      z-index: 100;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
    }
    .ambient-btn:hover {
      background: rgba(60, 50, 40, 0.9);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .ambient-btn.active {
      background: rgba(50, 70, 60, 0.9);
      border-color: rgba(100, 200, 150, 0.4);
    }
    .fp-controls-hint {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 25, 20, 0.8);
      color: rgba(245, 230, 200, 0.7);
      border-radius: 12px;
      padding: 8px 16px;
      font-size: 12px;
      z-index: 99;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      backdrop-filter: blur(8px);
    }
    .fp-controls-hint.show {
      opacity: 1;
    }
    .fp-controls-hint kbd {
      display: inline-block;
      background: rgba(245, 230, 200, 0.15);
      border: 1px solid rgba(245, 230, 200, 0.2);
      border-radius: 4px;
      padding: 2px 6px;
      margin: 0 2px;
      font-family: monospace;
      font-size: 11px;
      color: #f5e6c8;
    }
    .fp-crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 6px;
      height: 6px;
      margin: -3px 0 0 -3px;
      background: rgba(245, 230, 200, 0.6);
      border-radius: 50%;
      z-index: 98;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .fp-crosshair.show {
      opacity: 1;
    }

    /* 天气按钮 */
    .weather-btn, .settings-btn {
      position: fixed;
      bottom: 20px;
      background: rgba(30, 25, 20, 0.85);
      color: #f5e6c8;
      border: 1px solid rgba(245, 230, 200, 0.2);
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 13px;
      cursor: pointer;
      z-index: 100;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
    }
    .weather-btn { left: calc(50% + 220px); }
    .settings-btn { left: calc(50% + 330px); }
    .weather-btn:hover, .settings-btn:hover {
      background: rgba(60, 50, 40, 0.9);
      transform: translateY(-2px);
    }
    .weather-btn.rainy { background: rgba(50, 60, 80, 0.9); border-color: rgba(100, 150, 220, 0.4); }

    /* 小地图 */
    .minimap-container {
      position: fixed;
      top: 60px;
      right: 20px;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .minimap-container.show { opacity: 0.85; }
    #minimapCanvas {
      border-radius: 8px;
      border: 1px solid rgba(245, 230, 200, 0.3);
      background: rgba(26, 21, 16, 0.7);
    }
    .compass {
      position: absolute;
      top: -20px;
      right: 0;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #f5e6c8;
    }
    .compass-n { position: absolute; top: -2px; font-weight: bold; font-size: 10px; }
    .compass-arrow { font-size: 14px; color: #d4ab6a; transition: transform 0.1s; }

    /* 设置面板 */
    .settings-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: rgba(30, 25, 20, 0.95);
      border: 1px solid rgba(245, 230, 200, 0.2);
      border-radius: 16px;
      z-index: 200;
      width: 340px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s;
      backdrop-filter: blur(20px);
    }
    .settings-panel.show {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }
    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(245, 230, 200, 0.1);
      color: #f5e6c8;
      font-size: 16px;
      font-weight: 600;
    }
    .settings-close {
      background: none;
      border: none;
      color: #f5e6c8;
      font-size: 18px;
      cursor: pointer;
      opacity: 0.6;
    }
    .settings-close:hover { opacity: 1; }
    .settings-body { padding: 16px 20px; }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      color: #f5e6c8;
      font-size: 13px;
    }
    .setting-row label { min-width: 80px; }
    .setting-row input[type="range"] { width: 160px; accent-color: #d4ab6a; }
    .setting-row select {
      background: rgba(60, 50, 40, 0.8);
      color: #f5e6c8;
      border: 1px solid rgba(245, 230, 200, 0.2);

    /* 宠物猫提示 */

  </style>
</head>

  <!-- 游戏介绍弹窗 -->

  <!-- 加载屏幕 -->

  </div>

  <script src="assets/js/three.min.js"></script>
  <script src="assets/js/OrbitControls.js"></script>
  <script src="assets/js/game-utils.js"></script>

  <script>
  (function () {
    // ============ 游戏数据（与 profile.js 保持一致） ============
    const GAMES = [
      { slug: 'snake',   name: '贪吃蛇',         icon: '🐍', file: 'games/snake.html',   desc: '经典贪吃蛇，方向键操控。含限时/穿墙/双人模式。', color: 0x4ade80 },
      { slug: 'mine',    name: '扫雷',           icon: '💣', file: 'games/mine.html',    desc: '经典扫雷，含初级/中级/高级与自定义难度。',       color: 0xf87171 },
      { slug: 'puzzle',  name: '解谜剧场',       icon: '字', file: 'games/puzzle.html',  desc: '21 道汉字交互谜题，拖拽组合文字破解关卡。',     color: 0xc084fc },
      { slug: 'memory',  name: '记忆拼图',       icon: '🧩', file: 'games/memory.html',  desc: '记忆图片 3 秒后碎片打乱，拖回正确位置。',       color: 0x60a5fa },
      { slug: 'prism',   name: '光影棱镜',       icon: '💎', file: 'games/prism.html',   desc: '30 关光学解谜，引导光束击中彩色靶点。',         color: 0x22d3ee },
      { slug: 'sonic',   name: '声波盲境',       icon: '📡', file: 'games/sonic.html',   desc: '漆黑迷宫中发射声波探路，找到金色终点。',        color: 0xfacc15 },
      { slug: 'gravity', name: '引力弹弓',       icon: '🚀', file: 'games/gravity.html', desc: '利用行星引力场弹弓变轨，将探测器送达目标。',    color: 0xa78bfa },
      { slug: 'eco',     name: '微型生态瓶',     icon: '🌱', file: 'games/eco.html',     desc: '投放藻类/浮游/小鱼，维持食物链平衡。',          color: 0x4ade80 },
      { slug: 'rhythm',  name: '节奏线条',       icon: '🎵', file: 'games/rhythm.html',  desc: '音乐驱动的视觉创作，点击/滑动/长按生成图案。',  color: 0xf472b6 },
      { slug: 'cube2048',name: '3D折叠魔方',     icon: '🧊', file: 'games/cube2048.html',desc: '立方体六面 2048，跨面滑动合并数字。',           color: 0xfb923c }
    ];

    // ============ Three.js 场景 ============
    const canvas = document.getElementById('cottage-canvas');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1510);
    scene.fog = new THREE.Fog(0x1a1510, 12, 25);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5.5, 13);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.enablePan = false;
    controls.minDistance = 5;
    controls.maxDistance = 22;
    controls.minPolarAngle = 0.3;
    controls.maxPolarAngle = Math.PI / 2.1;
    controls.target.set(0, 1.8, 0);

    // ============ 程序化纹理生成 ============
    // 生成木地板纹理
    function generateWoodTexture() {
      var canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      var ctx = canvas.getContext('2d');

      // 基底色
      ctx.fillStyle = '#8b6342';
      ctx.fillRect(0, 0, 256, 256);

      // 木板条
      var plankH = 32;
      for (var py = 0; py < 8; py++) {
        var y = py * plankH;
        var brightness = 120 + Math.random() * 40;
        var r = Math.floor(brightness * 0.85);
        var g = Math.floor(brightness * 0.6);
        var b = Math.floor(brightness * 0.35);
        ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
        ctx.fillRect(0, y, 256, plankH);

        // 木纹（横向波浪线，减少密度）
        for (var wy = 0; wy < plankH; wy += 6) {
          var alpha = 0.05 + Math.random() * 0.1;
          ctx.strokeStyle = 'rgba(60,35,15,' + alpha + ')';
          ctx.lineWidth = 1 + Math.random();
          ctx.beginPath();
          ctx.moveTo(0, y + wy);
          for (var x = 0; x <= 256; x += 24) {
            var offset = Math.sin(x * 0.02 + wy * 0.1 + py * 2) * 2;
            ctx.lineTo(x, y + wy + offset);
          }
          ctx.stroke();
        }

        // 节疤
        if (Math.random() > 0.4) {
          var kx = 25 + Math.random() * 206;
          var ky = y + 5 + Math.random() * (plankH - 10);
          var kr = 3 + Math.random() * 8;
          var grad = ctx.createRadialGradient(kx, ky, 0, kx, ky, kr);
          grad.addColorStop(0, 'rgba(50,25,10,0.6)');
          grad.addColorStop(0.6, 'rgba(70,40,20,0.3)');
          grad.addColorStop(1, 'rgba(90,55,30,0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(kx, ky, kr, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // 板条缝隙
      ctx.strokeStyle = 'rgba(40,20,8,0.4)';
      ctx.lineWidth = 1;
      for (var sy = 0; sy <= 256; sy += plankH) {
        ctx.beginPath();
        ctx.moveTo(0, sy);
        ctx.lineTo(256, sy);
        ctx.stroke();
      }

      var tex = new THREE.Texture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.anisotropy = 2;
      tex.needsUpdate = true;
      return tex;
    }

    // 生成墙面乳胶漆纹理
    function generateWallTexture() {
      var canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      var ctx = canvas.getContext('2d');

      // 基底色
      ctx.fillStyle = '#f0e6d2';
      ctx.fillRect(0, 0, 128, 128);

      // 极淡的不规则色块
      for (var b = 0; b < 3; b++) {
        var bx = Math.random() * 128;
        var by = Math.random() * 128;
        var br = 15 + Math.random() * 30;
        var ba = 0.02 + Math.random() * 0.03;
        var bc = Math.random() > 0.5 ? '255,250,240' : '220,200,170';
        var grad = ctx.createRadialGradient(bx, by, 0, bx, by, br);
        grad.addColorStop(0, 'rgba(' + bc + ',' + ba + ')');
        grad.addColorStop(1, 'rgba(' + bc + ',0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 128, 128);
      }

      var tex = new THREE.Texture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.anisotropy = 1;
      tex.needsUpdate = true;
      return tex;
    }

    // 生成地毯织物纹理
    function generateRugTexture() {
      var canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      var ctx = canvas.getContext('2d');

      // 基底
      ctx.fillStyle = '#9c5a3c';
      ctx.fillRect(0, 0, 128, 128);

      // 织物纹理（细密的横竖线，降低密度）
      for (var x = 0; x < 128; x += 4) {
        var alpha = 0.05 + Math.random() * 0.1;
        ctx.fillStyle = 'rgba(0,0,0,' + alpha + ')';
        ctx.fillRect(x, 0, 1, 128);
      }
      for (var y = 0; y < 128; y += 4) {
        var alpha2 = 0.03 + Math.random() * 0.08;
        ctx.fillStyle = 'rgba(255,255,255,' + alpha2 + ')';
        ctx.fillRect(0, y, 128, 1);
      }

      var tex = new THREE.Texture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.anisotropy = 1;
      tex.needsUpdate = true;
      return tex;
    }

    // 生成深色木纹纹理（家具用）
    function generateDarkWoodTexture() {
      var canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      var ctx = canvas.getContext('2d');

      ctx.fillStyle = '#5a3d2b';
      ctx.fillRect(0, 0, 128, 128);

      // 竖向木纹（降低密度）
      for (var x = 0; x < 128; x += 6) {
        var alpha = 0.05 + Math.random() * 0.12;
        ctx.strokeStyle = 'rgba(30,15,5,' + alpha + ')';
        ctx.lineWidth = 1 + Math.random() * 2;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        for (var y = 0; y <= 128; y += 12) {
          var offset = Math.sin(y * 0.03 + x * 0.05) * 2;
          ctx.lineTo(x + offset, y);
        }
        ctx.stroke();
      }

      var tex = new THREE.Texture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.anisotropy = 1;
      tex.needsUpdate = true;
      return tex;
    }

    // 预先生成所有纹理
    const woodTex = generateWoodTexture();
    const wallTex = generateWallTexture();
    const rugTex = generateRugTexture();
    const darkWoodTex = generateDarkWoodTexture();

    // ============ 灯光 ============
    // 半球光（模拟天空光+地面反射，更自然）
    const hemiLight = new THREE.HemisphereLight(0xddeeff, 0x8b7355, 0.5);
    scene.add(hemiLight);

    // 环境补光
    const ambient = new THREE.AmbientLight(0xfff5e6, 0.25);
    scene.add(ambient);

    // 主光源（暖色调吊灯，从上方照射）
    const mainLight = new THREE.PointLight(0xffe0b0, 1.0, 25, 2);
    mainLight.position.set(0, 5.2, 0);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.set(1024, 1024);
    mainLight.shadow.camera.near = 0.5;
    mainLight.shadow.camera.far = 25;
    mainLight.shadow.bias = -0.002;
    mainLight.shadow.radius = 4;
    scene.add(mainLight);

    // 辅助光1（窗户方向的冷色光，模拟窗外天光）
    const windowLight = new THREE.DirectionalLight(0xb8d4e8, 0.4);
    windowLight.position.set(6, 4, 1);
    windowLight.target.position.set(0, 1, 0);
    scene.add(windowLight);
    scene.add(windowLight.target);

    // 辅助光2（左墙反弹补光，暖色）
    const fillLight = new THREE.DirectionalLight(0xe8c8a0, 0.25);
    fillLight.position.set(-5, 3, 3);
    scene.add(fillLight);

    // 辅助点光源（后墙补光，消除暗角）
    const backLight = new THREE.PointLight(0xffd8a0, 0.3, 12, 2);
    backLight.position.set(0, 3.5, -4);
    scene.add(backLight);

    // ============ 房间 ============
    const ROOM_W = 14;
    const ROOM_H = 6;
    const ROOM_D = 10;

    // 地板（木纹纹理，更写实）
    const floorGeo = new THREE.PlaneGeometry(ROOM_W, ROOM_D);
    woodTex.repeat.set(ROOM_W / 2, ROOM_D / 2);
    const floorMat = new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.75, metalness: 0.02 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    floor.receiveShadow = true;
    scene.add(floor);

    // 踢脚线（深色木纹）
    darkWoodTex.repeat.set(1, 1);
    var skirtingMat = new THREE.MeshStandardMaterial({ map: darkWoodTex, roughness: 0.6 });
    var skirtingH = 0.12;
    // 后墙踢脚线
    var skirtingBack = new THREE.Mesh(new THREE.BoxGeometry(ROOM_W, skirtingH, 0.04), skirtingMat);
    skirtingBack.position.set(0, skirtingH / 2, -ROOM_D / 2 + 0.02);
    scene.add(skirtingBack);
    // 左墙踢脚线（避开房门，分两段）
    var doorZ = ROOM_D / 2 - 1.5; // 门靠前的位置
    var doorW = 1.2; // 门宽
    var skirtingLeft1 = new THREE.Mesh(new THREE.BoxGeometry(0.04, skirtingH, ROOM_D / 2 + doorZ - doorW / 2), skirtingMat);
    skirtingLeft1.position.set(-ROOM_W / 2 + 0.02, skirtingH / 2, -ROOM_D / 4 + doorZ / 2 - doorW / 4);
    scene.add(skirtingLeft1);
    var skirtingLeft2 = new THREE.Mesh(new THREE.BoxGeometry(0.04, skirtingH, ROOM_D / 2 - doorZ - doorW / 2), skirtingMat);
    skirtingLeft2.position.set(-ROOM_W / 2 + 0.02, skirtingH / 2, (ROOM_D / 2 + doorZ) / 2 + doorW / 4);
    scene.add(skirtingLeft2);
    // 右墙踢脚线
    var skirtingRight = new THREE.Mesh(new THREE.BoxGeometry(0.04, skirtingH, ROOM_D), skirtingMat);
    skirtingRight.position.set(ROOM_W / 2 - 0.02, skirtingH / 2, 0);
    scene.add(skirtingRight);

    // 墙壁（乳胶漆纹理）
    // 后墙
    var backWallTex = wallTex.clone();
    backWallTex.needsUpdate = true;
    backWallTex.wrapS = THREE.RepeatWrapping;
    backWallTex.wrapT = THREE.RepeatWrapping;
    backWallTex.repeat.set(ROOM_W / 3, ROOM_H / 3);
    const backWallMat = new THREE.MeshStandardMaterial({ map: backWallTex, roughness: 0.9, side: THREE.DoubleSide });
    const backWall = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_H), backWallMat);
    backWall.position.set(0, ROOM_H / 2, -ROOM_D / 2);
    backWall.receiveShadow = true;
    scene.add(backWall);
    // 左墙
    var leftWallTex = wallTex.clone();
    leftWallTex.needsUpdate = true;
    leftWallTex.wrapS = THREE.RepeatWrapping;
    leftWallTex.wrapT = THREE.RepeatWrapping;
    leftWallTex.repeat.set(ROOM_D / 3, ROOM_H / 3);
    const leftWallMat = new THREE.MeshStandardMaterial({ map: leftWallTex, roughness: 0.9, side: THREE.DoubleSide });
    const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_D, ROOM_H), leftWallMat);
    leftWall.position.set(-ROOM_W / 2, ROOM_H / 2, 0);
    leftWall.rotation.y = Math.PI / 2;
    leftWall.receiveShadow = true;
    scene.add(leftWall);

    // 房门（左墙靠前位置）
    var doorH = 2.4;
    var doorT = 0.06;
    // 门框
    var doorFrameMat = new THREE.MeshStandardMaterial({ map: darkWoodTex, roughness: 0.55 });
    var doorFrameTop = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, doorW + 0.24), doorFrameMat);
    doorFrameTop.position.set(-ROOM_W / 2 + 0.06, doorH + 0.06, doorZ);
    scene.add(doorFrameTop);
    var doorFrameLeft = new THREE.Mesh(new THREE.BoxGeometry(0.12, doorH + 0.12, 0.12), doorFrameMat);

    function generateSkyTexture() {
      var canvas = document.createElement('canvas');
      canvas.width = 256; canvas.height = 256;
      var ctx = canvas.getContext('2d');
      var grad = ctx.createLinearGradient(0, 0, 0, 256);
      grad.addColorStop(0, '#87ceeb');
      grad.addColorStop(0.4, '#b8d8f0');
      grad.addColorStop(0.7, '#e8e4d0');
      grad.addColorStop(1, '#d4c8a8');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 256, 256);
      // 云朵
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      for (var ci = 0; ci < 8; ci++) {
        var cx = Math.random() * 256;
        var cy = 20 + Math.random() * 80;
        var cr = 15 + Math.random() * 25;
        ctx.beginPath();
        ctx.arc(cx, cy, cr, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx + cr * 0.6, cy + 5, cr * 0.7, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx - cr * 0.6, cy + 3, cr * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }
      var tex = new THREE.Texture(canvas);
      tex.needsUpdate = true;
      return tex;

      // 台面

      top.position.y = 0.175;
      top.castShadow = true;
      g.add(top);

      // 魔方
      var cubeSize = 0.4;
      var cubeGroup = new THREE.Group();
      var cubeColors = [
        0xff6b6b, 0x4ecdc4, 0xffe66d,
        0x95e1d3, 0xf38181, 0xaa96da
      ];
      var cubeMat = cubeColors.map(function (c) {
        return new THREE.MeshStandardMaterial({ color: c, roughness: 0.5 });
      });

      var subCubeSize = cubeSize / 3;
      for (var x = -1; x <= 1; x++) {
        for (var y = -1; y <= 1; y++) {
          for (var z = -1; z <= 1; z++) {
            if (x === 0 && y === 0 && z === 0) continue;
            var sub = new THREE.Mesh(
              new THREE.BoxGeometry(subCubeSize * 0.9, subCubeSize * 0.9, subCubeSize * 0.9),
              cubeMat
            );
            sub.position.set(x * subCubeSize, y * subCubeSize + cubeSize + 0.2, z * subCubeSize);
            sub.castShadow = false;
            cubeGroup.add(sub);
          }
        }
      }
      g.add(cubeGroup);
      g.userData.cubeGroup = cubeGroup;

      g.userData.game = game;
      g.userData.baseY = 0;
      g.userData.hoverScale = 1.12;
      return g;
    }

    // 家具创建函数映射
    const CREATORS = [
      createArcade,      // snake
      createComputer,    // mine
      createLetterBoard, // puzzle
      createGallery,     // memory
      createCrystalStand,// prism
      createGramophone,  // sonic
      createSolarSystem, // gravity
      createEcoBottle,   // eco
      createCanvasGame,  // rhythm
      createCubeDisplay  // cube2048
    ];

    // 生成所有家具
    for (var gi = 0; gi < GAMES.length; gi++) {
      var game = GAMES[gi];
      var pos = FURNITURE_POSITIONS[gi];
      var furniture = CREATORS[gi](game);
      furniture.position.set(pos.x, 0, pos.z);
      furniture.rotation.y = pos.rotY || 0;

      // 特殊位置调整
      if (gi === 6) { // 太阳系挂在天花板（吊绳顶端贴天花板）
        furniture.position.y = ROOM_H - 0.6;
        furniture.userData.baseY = ROOM_H - 0.6;
        furniture.userData.noFloat = true; // 悬挂物件不浮动
      }
      if (gi === 7) { // 生态瓶放窗台
        furniture.position.x = ROOM_W / 2 - 0.25;
        furniture.position.z = 0;
        furniture.position.y = 1.0;
        furniture.userData.baseY = 1.0;
        furniture.userData.noFloat = true; // 贴窗台物件不浮动
      }
      if (gi === 8) { // 画布挂左墙
        furniture.position.x = -ROOM_W / 2 + 0.12;
        furniture.position.z = -1.0;
        furniture.rotation.y = Math.PI / 2;
        furniture.userData.baseY = 0;
        furniture.userData.noFloat = true; // 墙挂物件不浮动
      }
      if (gi === 2 || gi === 3) { // 字母板/相框靠后墙
        furniture.position.z = -ROOM_D / 2 + 0.1;
        furniture.userData.noFloat = true; // 墙挂物件不浮动
      }

    // 节流：仅在每帧执行一次 raycast
    var pointerDirty = false;
    var pendingClientX = 0, pendingClientY = 0;

    function onPointerMove(e) {
      if (fpMode) return;
      var clientX = e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
      var clientY = e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
      pendingClientX = clientX;
      pendingClientY = clientY;
      pointerDirty = true;
    }

    function processPointerHover() {
      if (!pointerDirty) return;
      pointerDirty = false;
      var clientX = pendingClientX, clientY = pendingClientY;
      var rect = canvas.getBoundingClientRect();
      mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      // 同时检测家具和交互物品
      var hitItem = null;
      var hitInteractable = null;

      // 先检测家具
      var furnitureIntersects = raycaster.intersectObjects(furnitureList, true);
      if (furnitureIntersects.length > 0) {
        var obj = furnitureIntersects[0].object;
        while (obj && !obj.userData.game && obj.parent) obj = obj.parent;
        if (obj && obj.userData.game) hitItem = obj;
      }

      // 再检测交互物品（如果家具没命中的话，或者取更近的）
      if (!hitItem && interactables.length > 0) {
        var intMeshes = interactables.map(function (i) { return i.mesh; });
        var intIntersects = raycaster.intersectObjects(intMeshes, true);
        if (intIntersects.length > 0) {
          var iobj = intIntersects[0].object;
          for (var ii = 0; ii < interactables.length; ii++) {
            var parent = iobj;
            while (parent && parent !== interactables[ii].mesh && parent.parent) parent = parent.parent;
            if (parent === interactables[ii].mesh) {
              hitInteractable = interactables[ii];
              break;
            }
          }
        }
      }

      if (hoveredItem !== hitItem || hoveredInteractable !== hitInteractable) {
        // 恢复上一个
        if (hoveredItem) {
          hoveredItem.scale.set(1, 1, 1);
          if (typeof hideHoverRing === 'function') hideHoverRing();
        }
        hoveredItem = hitItem;
        hoveredInteractable = hitInteractable;

        if (hoveredItem) {
          var sc = hoveredItem.userData.hoverScale || 1.1;
          hoveredItem.scale.set(sc, sc, sc);
          document.body.style.cursor = 'pointer';
          hoverTag.textContent = hoveredItem.userData.game.icon;
          hoverText.textContent = hoveredItem.userData.game.name;
          hoverLabel.classList.add('show');
          // I2: 色盲友好高亮（地面圆环）
          if (colorblindMode && typeof showHoverRing === 'function') showHoverRing(hoveredItem);
        } else if (hoveredInteractable) {
          document.body.style.cursor = 'pointer';
          hoverTag.textContent = hoveredInteractable.icon;
          var actionTxt3 = hoveredInteractable.id === 'frontDoor' ?
            (hoveredInteractable.isOpen ? '关门' : '开门') : '开关';
          hoverText.textContent = hoveredInteractable.name + ' (' + actionTxt3 + ')';
          hoverLabel.classList.add('show');
        } else {
          document.body.style.cursor = 'grab';
          hoverLabel.classList.remove('show');
        }
      }

      if (hoveredItem || hoveredInteractable) {
        hoverLabel.style.left = clientX + 'px';
        hoverLabel.style.top = clientY + 'px';
      }
    }

    function onClick(e) {
      if (fpMode) return;
      // 优先处理交互物品
      if (hoveredInteractable) {
        hoveredInteractable.toggle.call(hoveredInteractable);
        return;
      }
      if (!hoveredItem) return;
      var game = hoveredItem.userData.game;
      showGameModal(game);
    }

    });
    canvas.addEventListener('click', onClick);
    canvas.addEventListener('touchstart', function (e) { onPointerMove(e); }, { passive: true });
    canvas.addEventListener('touchmove', function (e) { onPointerMove(e); }, { passive: true });
    canvas.addEventListener('touchend', function (e) {

    // 第一人称状态
    var fpPos = new THREE.Vector3(0, 1.65, 3.5); // 初始位置（房间靠前，正对后墙）
    var fpYaw = 0; // 左右朝向（y轴旋转）
    var fpPitch = 0; // 上下俯仰
    var fpVelocityY = 0;
    var fpOnGround = true;
    var fpSpeed = 3.5; // 移动速度 m/s
    var fpJumpSpeed = 4.0;
    var fpGravity = 12.0;
    var fpBobPhase = 0; // 走路晃动
    var keys = {};
    var lastStepTime = 0; // 上次脚步声时间

    // 第一人称手模型
    var handGroup = new THREE.Group();
    handGroup.visible = false;
    // 手（简化：手掌+手指凸起）
    var handMat = new THREE.MeshStandardMaterial({ color: 0xe8c4a0, roughness: 0.7 });
    var palm = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.02), handMat);
    palm.position.set(0, 0, 0);
    handGroup.add(palm);
    // 手指（4根小圆柱）
    for (var fi = 0; fi < 4; fi++) {
      var finger = new THREE.Mesh(
        new THREE.CylinderGeometry(0.008, 0.007, 0.08, 6),
        handMat
      );
      finger.position.set(-0.024 + fi * 0.016, 0.08, 0);
      handGroup.add(finger);
    }
    // 拇指
    var thumb = new THREE.Mesh(
      new THREE.CylinderGeometry(0.01, 0.008, 0.05, 6),
      handMat
    );
    thumb.position.set(-0.05, 0.03, 0);
    thumb.rotation.z = 0.5;
    handGroup.add(thumb);
    handGroup.position.set(0.18, -0.15, -0.3); // 右下方
    camera.add(handGroup);

    // 碰撞体（墙壁 + 家具 + 装饰）
    var colliders = [];
    var doorOpen = false; // 大门状态，用于碰撞体判断

    // 初始化碰撞体
    function initColliders() {
      colliders = [];
      // 四面墙（前墙带拱门，两侧有墙）
      var wallThickness = 0.2;
      colliders.push({ minX: -ROOM_W/2, maxX: -ROOM_W/2 + wallThickness, minZ: -ROOM_D/2, maxZ: ROOM_D/2, type: 'wall' }); // 左墙
      colliders.push({ minX: ROOM_W/2 - wallThickness, maxX: ROOM_W/2, minZ: -ROOM_D/2, maxZ: ROOM_D/2, type: 'wall' }); // 右墙
      colliders.push({ minX: -ROOM_W/2, maxX: ROOM_W/2, minZ: -ROOM_D/2, maxZ: -ROOM_D/2 + wallThickness, type: 'wall' }); // 后墙
      // 前墙左段（拱门左侧）
      var archHalfW = 2.5;
      colliders.push({ minX: -ROOM_W/2, maxX: -archHalfW, minZ: ROOM_D/2 - wallThickness, maxZ: ROOM_D/2, type: 'wall' });
      // 前墙右段（拱门右侧）
      colliders.push({ minX: archHalfW, maxX: ROOM_W/2, minZ: ROOM_D/2 - wallThickness, maxZ: ROOM_D/2, type: 'wall' });

      // 走廊墙壁
      var hallHalfW = 2.5; // hallW/2
      colliders.push({ minX: -hallHalfW - wallThickness, maxX: -hallHalfW, minZ: ROOM_D/2, maxZ: ROOM_D/2 + 3, type: 'wall' }); // 走廊左墙
      colliders.push({ minX: hallHalfW, maxX: hallHalfW + wallThickness, minZ: ROOM_D/2, maxZ: ROOM_D/2 + 3, type: 'wall' }); // 走廊右墙
      colliders.push({ minX: -hallHalfW, maxX: -0.7, minZ: ROOM_D/2 + 3 - wallThickness, maxZ: ROOM_D/2 + 3, type: 'wall' }); // 走廊前墙左段
      colliders.push({ minX: 0.7, maxX: hallHalfW, minZ: ROOM_D/2 + 3 - wallThickness, maxZ: ROOM_D/2 + 3, type: 'wall' }); // 走廊前墙右段
      // 大门（关闭时阻挡，打开时可通过）
      if (!doorOpen) {
        colliders.push({ minX: -0.7, maxX: 0.7, minZ: ROOM_D/2 + 3 - wallThickness, maxZ: ROOM_D/2 + 3, type: 'wall' });
      }

      // 家具碰撞体（跳过悬挂/墙挂物件，避免2D碰撞误挡）
      furnitureList.forEach(function(f, idx) {
        if (f.userData.noFloat) return; // 悬挂/贴墙物件不参与地面碰撞
        var box = new THREE.Box3().setFromObject(f);
        // 缩小一点碰撞体，让玩家可以靠近
        var pad = 0.15;
        colliders.push({
          minX: box.min.x + pad,
          maxX: box.max.x - pad,
          minZ: box.min.z + pad,
          maxZ: box.max.z - pad,
          type: 'furniture',
          ref: f
        });
      });

      // 装饰碰撞体（书架、边桌、茶几、落地灯等大件）
      var decors = [
        // 书架
        { x: -ROOM_W/2 + 0.6, z: -ROOM_D/2 + 0.7, w: 0.9, d: 0.35 },
        // 右后边桌
        { x: ROOM_W/2 - 0.7, z: -ROOM_D/2 + 0.8, w: 0.8, d: 0.8 },
        // 左前茶几
        { x: -ROOM_W/2 + 1.2, z: ROOM_D/2 - 1.5, w: 0.6, d: 0.6 },
        // 右前落地灯
        { x: ROOM_W/2 - 1.2, z: ROOM_D/2 - 1.5, w: 0.3, d: 0.3 }
      ];
      decors.forEach(function(d) {
        colliders.push({
          minX: d.x - d.w/2,
          maxX: d.x + d.w/2,
          minZ: d.z - d.d/2,
          maxZ: d.z + d.d/2,
          type: 'decor'
        });
      });

      // P7 隔断墙碰撞体
      if (typeof partitionColliders !== 'undefined') {
        partitionColliders.forEach(function(pc) {
          colliders.push({ minX: pc.minX, maxX: pc.maxX, minZ: pc.minZ, maxZ: pc.maxZ, type: 'wall' });
        });
      }
      // P7 新家具碰撞体：橱柜、床、洗手台
      colliders.push({ minX: -6.3, maxX: -3.7, minZ: -ROOM_D/2, maxZ: -ROOM_D/2 + 0.7, type: 'furniture' }); // 橱柜
      colliders.push({ minX: 4.2, maxX: 5.8, minZ: -ROOM_D/2 + 0.2, maxZ: -ROOM_D/2 + 2.2, type: 'furniture' }); // 床
      colliders.push({ minX: 5.7, maxX: 6.3, minZ: -ROOM_D/2 + 0.2, maxZ: -ROOM_D/2 + 0.8, type: 'furniture' }); // 床头柜
      colliders.push({ minX: -ROOM_W/2, maxX: -ROOM_W/2 + 0.9, minZ: ROOM_D/2 - 0.9, maxZ: ROOM_D/2 - 0.3, type: 'furniture' }); // 洗手台
    }

    // 碰撞检测：圆形（玩家）vs AABB
    var playerRadius = 0.3;
    function checkCollision(px, pz) {
      for (var i = 0; i < colliders.length; i++) {
        var c = colliders[i];
        var closestX = Math.max(c.minX, Math.min(px, c.maxX));
        var closestZ = Math.max(c.minZ, Math.min(pz, c.maxZ));
        var dx = px - closestX;
        var dz = pz - closestZ;
        if (dx * dx + dz * dz < playerRadius * playerRadius) {
          return c;
        }
      }
      return null;
    }

    // 滑动碰撞（尝试移动，如果撞墙则沿墙滑动）
    function tryMove(dx, dz) {
      var newX = fpPos.x + dx;
      var newZ = fpPos.z + dz;

      // 先尝试完整移动
      if (!checkCollision(newX, newZ)) {
        fpPos.x = newX;
        fpPos.z = newZ;
        return;
      }

      // 只移动X
      if (!checkCollision(newX, fpPos.z)) {
        fpPos.x = newX;
        return;
      }

      // 只移动Z
      if (!checkCollision(fpPos.x, newZ)) {
        fpPos.z = newZ;
        return;
      }
    }

    // 切换第一人称/第三人称
    function toggleFPMode() {
      fpMode = !fpMode;
      // 切换视角时清除悬停状态，避免标签 transform/位置残留
      if (hoveredItem) {
        hoveredItem.scale.set(1, 1, 1);
        hoveredItem = null;
      }
      if (typeof hideHoverRing === 'function') hideHoverRing();
      hoveredInteractable = null;
      hoverLabel.classList.remove('show');
      hoverLabel.style.transform = '';
      if (fpMode && typeof advanceGuide === 'function') advanceGuide('fp');
      if (fpMode) {
        fpToggleBtn.textContent = '🏠 第三人称视角';
        fpToggleBtn.classList.add('active');
        fpControlsHint.classList.add('show');
        fpCrosshair.classList.add('show');
        bottomTip.style.display = 'none';
        controls.enabled = false;
        initColliders();
        // 重置第一人称位置到房间中央靠前
        fpPos.set(0, 1.65, 3.5);
        fpYaw = 0;
        fpPitch = 0;
        fpVelocityY = 0;
        handGroup.visible = true;
        if (minimapContainer) minimapContainer.classList.add('show');
        // D1: 移动端显示摇杆
        var mStick = document.getElementById('mobileJoystick');
        if (mStick && isMobile) mStick.style.display = 'block';
        // 显示提示3秒后淡出（E2: 若 hintAlways 开启则常驻）
        setTimeout(function() { if (!hintAlways) fpControlsHint.classList.remove('show'); }, 4000);
      } else {
        fpToggleBtn.textContent = '👟 第一人称漫游';
        fpToggleBtn.classList.remove('active');
        fpControlsHint.classList.remove('show');
        fpCrosshair.classList.remove('show');
        bottomTip.style.display = '';
        controls.enabled = true;
        handGroup.visible = false;
        if (minimapContainer) minimapContainer.classList.remove('show');
        var mStick2 = document.getElementById('mobileJoystick');
        if (mStick2) mStick2.style.display = 'none';
        document.exitPointerLock();
        // 重置相机到第三人称初始位置
        camera.position.set(0, 5.5, 13);
        controls.target.set(0, 1.8, 0);
        controls.update();
      }
    }

    fpToggleBtn.addEventListener('click', toggleFPMode);

    // 键盘输入
    document.addEventListener('keydown', function(e) {
      keys[e.code] = true;
      if (e.code === 'Escape' && fpMode) {
        toggleFPMode();
      }
    });
    document.addEventListener('keyup', function(e) {
      keys[e.code] = false;
    });

    // 鼠标视角控制（指针锁定，移动端跳过）
    canvas.addEventListener('click', function() {
      if (fpMode && !isMobile) {
        canvas.requestPointerLock();
      }
    });

    document.addEventListener('mousemove', function(e) {
      if (fpMode && !isMobile && document.pointerLockElement === canvas) {
        var sensitivity = mouseSensitivity || 0.002;
        fpYaw -= e.movementX * sensitivity;
        fpPitch -= e.movementY * sensitivity;
        // 限制俯仰角
        fpPitch = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, fpPitch));
      }
    });

    document.addEventListener('pointerlockchange', function() {
      if (fpMode && document.pointerLockElement !== canvas) {
        // 指针锁定丢失时也可以保持第一人称，只是不能转视角
      }
    });

    // 更新第一人称相机
    function updateFPCamera(delta) {
      if (!fpMode) return;

      // 重力
      fpVelocityY -= fpGravity * delta;
      fpPos.y += fpVelocityY * delta;

      // 地面检测
      if (fpPos.y < 1.65) {
        fpPos.y = 1.65;
        fpVelocityY = 0;
        fpOnGround = true;
      } else {
        fpOnGround = false;
      }

      // 跳跃
      if (keys['Space'] && fpOnGround) {
        fpVelocityY = fpJumpSpeed;
        fpOnGround = false;
      }

      // 移动方向（基于yaw朝向）
      var forward = new THREE.Vector3(-Math.sin(fpYaw), 0, -Math.cos(fpYaw));
      var right = new THREE.Vector3(Math.cos(fpYaw), 0, -Math.sin(fpYaw));

      var moveDir = new THREE.Vector3();
      if (keys['KeyW'] || keys['ArrowUp']) moveDir.add(forward);
      if (keys['KeyS'] || keys['ArrowDown']) moveDir.sub(forward);
      if (keys['KeyD'] || keys['ArrowRight']) moveDir.add(right);
      if (keys['KeyA'] || keys['ArrowLeft']) moveDir.sub(right);
      // D1: 移动端摇杆输入
      if (typeof getMobileMoveInput === 'function') {
        var mInput = getMobileMoveInput();
        if (mInput) {
          moveDir.add(forward.clone().multiplyScalar(-mInput.z));
          moveDir.add(right.clone().multiplyScalar(mInput.x));
        }
      }

      var isMoving = moveDir.lengthSq() > 0;
      if (isMoving) {
        moveDir.normalize();
        var speed = keys['ShiftLeft'] || keys['ShiftRight'] ? fpSpeed * 1.6 : fpSpeed;
        var dx = moveDir.x * speed * delta;
        var dz = moveDir.z * speed * delta;
        tryMove(dx, dz);

        // 走路晃动
        fpBobPhase += delta * speed * 1.5;
      } else {
        // 站立时逐渐恢复
        fpBobPhase *= 0.9;
      }

      // 设置相机位置（加入走路上下晃动，fpBobPhase 自然衰减避免突跳）
      var bobY = Math.sin(fpBobPhase) * 0.04;
      camera.position.set(fpPos.x, fpPos.y + bobY, fpPos.z);

      // 手模型走路动画：上下轻微晃动 + 前后摆动
      if (handGroup.visible) {
        var handBobY = Math.sin(fpBobPhase) * 0.02;
        var handBobZ = Math.cos(fpBobPhase * 0.5) * 0.015;
        var handBaseX = 0.18, handBaseY = -0.15, handBaseZ = -0.3;
        handGroup.position.set(handBaseX, handBaseY + handBobY, handBaseZ + handBobZ);
        // 轻微旋转模拟摆臂
        handGroup.rotation.x = Math.sin(fpBobPhase * 0.5) * 0.05;
        handGroup.rotation.z = Math.sin(fpBobPhase) * 0.02;
      }

      // 脚步声触发：移动中且在地面上，每隔一定步幅触发一次
      if (isMoving && fpOnGround) {
        var now = performance.now() / 1000;
        var stepInterval = keys['ShiftLeft'] || keys['ShiftRight'] ? 0.28 : 0.42; // 跑步更快
        if (now - lastStepTime > stepInterval) {
          lastStepTime = now;
          if (typeof SFX !== 'undefined' && SFX.playFootstep) {
            SFX.playFootstep(keys['ShiftLeft'] || keys['ShiftRight'] ? 'run' : 'walk');
          }
        }
      }

      // 设置相机朝向
      var lookDir = new THREE.Vector3(
        -Math.sin(fpYaw) * Math.cos(fpPitch),
        Math.sin(fpPitch),
        -Math.cos(fpYaw) * Math.cos(fpPitch)
      );
      camera.lookAt(camera.position.clone().add(lookDir));

      // 第一人称下的射线检测交互（家具 + 交互物品）
      raycaster.set(camera.position, lookDir);
      var fpIntersects = raycaster.intersectObjects(furnitureList, true);
      var fpHitItem = null;
      var fpHitInteractable = null;
      if (fpIntersects.length > 0 && fpIntersects[0].distance < 3.5) {
        var obj = fpIntersects[0].object;
        while (obj && !obj.userData.game && obj.parent) obj = obj.parent;
        if (obj && obj.userData.game) fpHitItem = obj;
      }
      // 检测交互物品
      if (!fpHitItem && interactables.length > 0) {
        var intMeshes = interactables.map(function (i) { return i.mesh; });
        var intIntersects = raycaster.intersectObjects(intMeshes, true);
        if (intIntersects.length > 0 && intIntersects[0].distance < 3.5) {
          var iobj = intIntersects[0].object;
          for (var ii = 0; ii < interactables.length; ii++) {
            var parent = iobj;
            while (parent && parent !== interactables[ii].mesh && parent.parent) parent = parent.parent;
            if (parent === interactables[ii].mesh) {
              fpHitInteractable = interactables[ii];
              break;
            }
          }
        }
      }

      if (hoveredItem !== fpHitItem || hoveredInteractable !== fpHitInteractable) {
        if (hoveredItem) hoveredItem.scale.set(1, 1, 1);
        hoveredItem = fpHitItem;
        hoveredInteractable = fpHitInteractable;
        if (hoveredItem) {
          var sc = hoveredItem.userData.hoverScale || 1.1;
          hoveredItem.scale.set(sc, sc, sc);
          document.body.style.cursor = 'pointer';
          hoverTag.textContent = hoveredItem.userData.game.icon;
          hoverText.textContent = hoveredItem.userData.game.name + ' (点击)';
          hoverLabel.classList.add('show');
          hoverLabel.style.left = '50%';
          hoverLabel.style.top = 'calc(50% + 40px)';
          hoverLabel.style.transform = 'translateX(-50%)';
        } else if (hoveredInteractable) {
          document.body.style.cursor = 'pointer';
          hoverTag.textContent = hoveredInteractable.icon;
          var actionTxt = hoveredInteractable.id === 'frontDoor' ?
            (hoveredInteractable.isOpen ? '关门' : '开门') : '开关';
          hoverText.textContent = hoveredInteractable.name + ' (' + actionTxt + ')';
          hoverLabel.classList.add('show');
          hoverLabel.style.left = '50%';
          hoverLabel.style.top = 'calc(50% + 40px)';
          hoverLabel.style.transform = 'translateX(-50%)';
        } else {
          document.body.style.cursor = 'default';
          hoverLabel.classList.remove('show');
          hoverLabel.style.transform = '';
        }
      }
    }

    // 第一人称下点击：家具进入游戏 / 交互物品触发 / 装饰摆放确认
    // 移动端无指针锁定，条件放宽：桌面端要求指针锁定，移动端只要 fpMode 即可
    canvas.addEventListener('click', function() {
      // G1: 摆放模式优先确认
      if (typeof placementMode !== 'undefined' && placementMode.active) {
        if (typeof confirmPlacement === 'function') confirmPlacement();
        return;
      }
      if (fpMode && (isMobile || document.pointerLockElement === canvas)) {
        if (hoveredInteractable) {
          hoveredInteractable.toggle.call(hoveredInteractable);
        } else if (hoveredItem) {
          var game = hoveredItem.userData.game;
          showGameModal(game);
          if (!isMobile) document.exitPointerLock();
        }
      }
    });

    // E 键交互（第一人称下用键盘交互更自然）
    document.addEventListener('keydown', function(e) {
      if (fpMode && e.code === 'KeyE' && hoveredInteractable) {
        hoveredInteractable.toggle.call(hoveredInteractable);
      }
    });

    // ============ 昼夜切换 + 体积光 ============
    var isNight = false;
    var dayNightBtn = document.getElementById('dayNightBtn');
    var ambientEnabled = false; // 环境音开关状态
    var ambientBtn = document.getElementById('ambientBtn');

    // 保存白天灯光参数
    var dayLightParams = {
      hemi: 0.5, ambient: 0.25, main: 1.0, window: 0.4, fill: 0.25, back: 0.3, door: 0.25,
      tableLamp: 0.35, sconce: 0.3, floorLamp: 0.4
    };
    // 夜晚灯光参数（main 与 animate 的 baseIntensity 一致）
    var nightLightParams = {
      hemi: 0.08, ambient: 0.08, main: 0.5, window: 0.05, fill: 0.05, back: 0.1, door: 0.15,
      tableLamp: 0.6, sconce: 0.5, floorLamp: 0.7
    };
    // 夜晚额外灯光
    var nightExtraLights = [];

    function toggleDayNight() {
      isNight = !isNight;
      var p = isNight ? nightLightParams : dayLightParams;

      hemiLight.intensity = p.hemi;
      ambient.intensity = p.ambient;
      mainLight.intensity = p.main;
      windowLight.intensity = p.window;
      fillLight.intensity = p.fill;
      backLight.intensity = p.back;
      doorLight.intensity = p.door;
      // 台灯/落地灯的强度受手动开关状态影响
      var tableLampItem = interactables.find(function(i) { return i.id === 'tableLamp'; });
      var floorLampItem = interactables.find(function(i) { return i.id === 'floorLamp'; });
      tableLamp.intensity = (tableLampItem && !tableLampItem.isOn) ? 0 : p.tableLamp;
      floorLampLight.intensity = (floorLampItem && !floorLampItem.isOn) ? 0 : p.floorLamp;
      sconceLights.forEach(function(sl) { sl.intensity = p.sconce; });

      // 如果正在下雨，再次应用雨天光线衰减（日夜均需应用）
      if (typeof weatherState !== 'undefined' && weatherState === 'rain') {
        hemiLight.intensity *= 0.4;
        ambient.intensity *= 0.5;
      }

      if (isNight) {
        dayNightBtn.textContent = '☀️ 白天';
        dayNightBtn.classList.add('night');
        // 改变灯光色温（夜晚更暖）
        mainLight.color.setHex(0xffb060);
        ambient.color.setHex(0x4a4060);
        hemiLight.color.setHex(0x334466);
        // 窗玻璃变暗（反光）
        windowGlassMat.color.setHex(0x1a2a44);
        windowGlassMat.opacity = 0.6;
        // 天空变暗（移除白天云朵纹理）
        skyMat.map = null;
        skyMat.color.setHex(0x1a1a2e);
        skyMat.needsUpdate = true;
        // 隐藏体积光（夜晚没有阳光）
        volumetricLight.visible = false;
        volumetricLight2.visible = false;
        // 切换环境音为夜晚
        if (typeof SFX !== 'undefined' && ambientEnabled) {
          SFX.startAmbient(true);
        }
      } else {
        dayNightBtn.textContent = '🌙 夜晚';
        dayNightBtn.classList.remove('night');
        // 恢复白天色温
        mainLight.color.setHex(0xffe0b0);
        ambient.color.setHex(0xfff5e6);
        hemiLight.color.setHex(0xddeeff);
        // 窗玻璃恢复
        windowGlassMat.color.setHex(0xaaccff);
        windowGlassMat.opacity = 0.35;
        // 天空恢复（恢复白天纹理）
        skyMat.map = skyTex;
        skyMat.color.setHex(0xffffff);
        skyMat.needsUpdate = true;
        // 显示体积光
        volumetricLight.visible = true;
        volumetricLight2.visible = true;
        // 移除夜晚额外灯光
        nightExtraLights.forEach(function(l) { scene.remove(l); });
        nightExtraLights = [];
        // 切换环境音为白天
        if (typeof SFX !== 'undefined' && ambientEnabled) {
          SFX.startAmbient(false);
        }
      }
      // C2: 昼夜切换后检查时间相关任务

    // 体积光灰尘粒子（两束光附近各20个）
    function createDustParticles(basePos, count) {
      var geometry = new THREE.BufferGeometry();
      var positions = new Float32Array(count * 3);
      var velocities = new Float32Array(count * 3);
      var opacities = new Float32Array(count);
      for (var i = 0; i < count; i++) {
        positions[i * 3] = basePos.x + (Math.random() - 0.5) * 1.5;
        positions[i * 3 + 1] = basePos.y + (Math.random() - 0.5) * 2.5;
        positions[i * 3 + 2] = basePos.z + (Math.random() - 0.5) * 1.5;
        velocities[i * 3] = (Math.random() - 0.5) * 0.05;
        velocities[i * 3 + 1] = (Math.random() - 0.5) * 0.08;
        velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.05;
        opacities[i] = 0.2 + Math.random() * 0.4;
      }
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      var material = new THREE.PointsMaterial({
        color: 0xfff5d0,
        size: 0.03,
        transparent: true,
        opacity: 0.5,
        depthWrite: false,
        sizeAttenuation: true
      });
      var points = new THREE.Points(geometry, material);
      points.userData.velocities = velocities;
      points.userData.basePos = basePos.clone();
      points.userData.opacities = opacities;
      return points;
    }

          ctx.fillStyle = '#8b2020';
          ctx.beginPath();
          ctx.ellipse(128, 128, 90, 60, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#e0c080';
          ctx.lineWidth = 4;
          ctx.strokeRect(16, 16, 224, 224);
          var rugTex = new THREE.CanvasTexture(canvas);
          rugTex.colorSpace = THREE.SRGBColorSpace;
          var rugMat = new THREE.MeshStandardMaterial({ map: rugTex, roughness: 0.9 });
          var rug = new THREE.Mesh(new THREE.PlaneGeometry(4, 3), rugMat);
          rug.rotation.x = -Math.PI / 2;

    // 应用已拥有的装饰到场景
    function applyOwnedDecor() {
      if (!window.GameUtils) return;
      var owned = GameUtils.getOwnedDecor();
      owned.forEach(function (id) {
        if (appliedDecor[id]) return;
        var def = DECOR_DEFS[id];
        if (!def) return;
        var obj = def.create();
        obj.position.set(def.pos.x, def.pos.y, def.pos.z);
        decorGroup.add(obj);
        appliedDecor[id] = obj;
      });
    }

    function renderShop() {
      if (!window.GameUtils) return;
      updateStarDisplay();
      var items = GameUtils.getShopList();
      shopGrid.innerHTML = '';
      items.forEach(function (item) {
        var el = document.createElement('div');
        el.className = 'shop-item' + (item.owned ? ' owned' : '');
        el.innerHTML =
          '<div class="shop-icon">' + item.icon + '</div>' +
          '<div class="shop-name">' + item.name + '</div>' +
          '<div class="shop-price">' + item.price + ' ⭐</div>' +
          (item.owned
            ? '<div class="owned-label">✓ 已拥有</div>'
            : '<button class="shop-buy" data-id="' + item.id + '">购买</button>') +
          '<button class="shop-preview" data-id="' + item.id + '">预览</button>';
        shopGrid.appendChild(el);
      });

      var buyBtns = shopGrid.querySelectorAll('.shop-buy');
      buyBtns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var id = btn.dataset.id;
          var result = GameUtils.buyDecor(id);
          var msgs = {
            ok: '🎉 购买成功！装饰已放入小屋',
            owned: '已经拥有啦',
            no_stars: '⭐ 星光不足，完成任务获取更多',
            not_found: '商品不存在',
            error: '购买失败'
          };
          GameUtils._toast(msgs[result] || '购买失败', 2000);
          if (result === 'ok') {
            applyOwnedDecor(); // 新购买的装饰立即出现在场景中
            renderShop();
            updateStarDisplay();
          }
        });
      });
      // G3: 预览按钮
      var previewBtns = shopGrid.querySelectorAll('.shop-preview');
      previewBtns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var id = btn.dataset.id;
          var itemList = GameUtils.getShopList();
          var def = itemList.find(function (i) { return i.id === id; });
          if (def && typeof previewDecor === 'function') {
            previewDecor(def);
            GameUtils._toast('👀 预览中（5秒后消失）', 2000);
          }
        });
      });
    }

    // ============ 动画循环 ============
    var clock = new THREE.Clock();
    var time = 0;

    function animate() {
      requestAnimationFrame(animate);
      var delta = clock.getDelta();
      time += delta;

      if (fpMode) {
        updateFPCamera(delta);
      } else {
        controls.update();
        // 鼠标悬停检测合并到动画循环，每帧最多一次 raycast
        processPointerHover();
      }

      // 合并：家具悬停浮动 + 特殊动画（单次遍历）
      for (var i = 0, n = furnitureList.length; i < n; i++) {
        var f = furnitureList[i];
        var ud = f.userData;
        var baseY = ud.baseY || 0;
        // 悬挂/贴墙/贴窗台物件不浮动，避免穿模
        if (!ud.noFloat) {
          f.position.y = baseY + Math.sin(time * 1.2 + i * 0.5) * 0.012;
        }

        if (ud.crystal) ud.crystal.rotation.y += delta * 0.8;
        if (ud.cubeGroup) ud.cubeGroup.rotation.y += delta * 0.3;
        if (ud.platter) ud.platter.rotation.y += delta * 2;
        if (ud.record) ud.record.rotation.y += delta * 2;
        if (ud.planets) {
          for (var pi = 0, pn = ud.planets.length; pi < pn; pi++) {
            var p = ud.planets[pi];
            p.angle += delta * p.speed;
            p.mesh.position.x = Math.cos(p.angle) * p.r;
            p.mesh.position.z = Math.sin(p.angle) * p.r;
          }
        }
        if (ud.fish) {
          ud.fish.position.x = Math.sin(time * 2) * 0.12;
          ud.fish.position.z = Math.cos(time * 2) * 0.08;
          ud.fish.rotation.y = -time * 2 + Math.PI / 2;
        }
        if (ud.barGroup) {
          var bars = ud.barGroup.children;
          for (var bi = 0, bn = bars.length; bi < bn; bi++) {
            var bar = bars[bi];
            var scale = 0.7 + Math.sin(time * bar.userData.speed + bar.userData.phase) * 0.3 + Math.sin(time * bar.userData.speed * 2.3) * 0.15;
            bar.scale.y = scale;
            bar.position.y = bar.userData.baseY + (scale - 1) * bar.userData.baseH / 2;
            var mat = bar.material;
            if (mat && mat.emissiveIntensity !== undefined) {
              mat.emissiveIntensity = 0.2 + scale * 0.5;
            }
          }
        }
        if (ud.lightOrb) {
          ud.lightOrb.scale.setScalar(1 + Math.sin(time * 3) * 0.2);
        }
      }

      // 主光保持稳定（去除每帧闪烁，避免场景明暗抖动）
      // 考虑天气状态：雨天时主光衰减
      if (mainLight) {
        var baseMain = isNight ? 0.5 : 1.0;
        if (typeof weatherState !== 'undefined' && weatherState === 'rain') {
          baseMain *= 0.5;
        }
        mainLight.intensity = baseMain;
      }

      // 可交互物品动画更新
      if (typeof updateInteractables !== 'undefined') {
        updateInteractables(delta);
      }

      // 宠物猫更新
      if (typeof updateCat !== 'undefined') {
        updateCat(delta);
      }
      // C1/C3: 猫行为更新（天气影响、抚摸）
      if (typeof updateCatBehavior !== 'undefined') {
        updateCatBehavior(delta);
      }
      // 猫抚摸跳跃
      if (catState.petJump && catState.petJump > 0) {
        catGroup.position.y = Math.sin((0.3 - catState.petJump) * Math.PI / 0.3) * 0.3;
        catState.petJump -= delta;
        if (catState.petJump <= 0) { catGroup.position.y = 0; catState.petJump = 0; }
      }

      // 天气系统更新
      if (typeof updateRain !== 'undefined') {
        updateRain(delta);
      }

      // 小地图更新
      if (typeof updateMinimap !== 'undefined') {
        updateMinimap();
      }

      // B1: 可收集品更新
      if (typeof updateCollectibles !== 'undefined') {
        updateCollectibles(delta);
      }
      // B2: 彩蛋检测
      if (typeof checkEasterEggs !== 'undefined') {
        checkEasterEggs(delta);
      }
      // B4: 雨天拾取物更新
      if (typeof updateRainStones !== 'undefined') {
        updateRainStones(delta);
      }
      // H1: BGM 渐隐渐显更新
      if (typeof updateBGMFade !== 'undefined') {
        updateBGMFade();
      }
      // G1: 装饰摆放模式更新
      if (typeof updatePlacement === 'function') {
        updatePlacement();
      }

      // 窗外动态：云朵飘动（I1: 减少动效时跳过）
      if (typeof cloudMeshes !== 'undefined' && !isNight && !reduceMotion) {
        for (var ci = 0; ci < cloudMeshes.length; ci++) {
          cloudMeshes[ci].position.z -= cloudSpeeds[ci] * delta;
          if (cloudMeshes[ci].position.z < -12) {
            cloudMeshes[ci].position.z = 12;
            cloudMeshes[ci].position.x = ROOM_W / 2 + 10 + Math.random() * 15;
          }
        }
      } else if (typeof cloudMeshes !== 'undefined' && isNight) {
        for (var ci2 = 0; ci2 < cloudMeshes.length; ci2++) {
          cloudMeshes[ci2].visible = false;
        }
      }
      if (typeof cloudMeshes !== 'undefined' && !isNight) {
        for (var ci3 = 0; ci3 < cloudMeshes.length; ci3++) {
          cloudMeshes[ci3].visible = true;
        }
      }

      // 窗外动态：树叶摇摆（I1: 减少动效时跳过）
      if (typeof treeLeaves !== 'undefined' && !reduceMotion) {
        for (var tli = 0; tli < treeLeaves.length; tli++) {
          treeLeaves[tli].rotation.z = Math.sin(time * 0.8 + treeLeafOffsets[tli]) * 0.05;
        }
      }

      // 窗外动态：飞鸟剪影
      if (typeof birdMeshes !== 'undefined' && !isNight) {
        for (var bi = 0; bi < birdMeshes.length; bi++) {
          birdMeshes[bi].position.z -= birdSpeeds[bi] * delta;
          birdMeshes[bi].position.y += Math.sin(time * 2 + bi) * birdAmplitudes[bi] * delta;
          if (birdMeshes[bi].position.z < -12) {
            birdMeshes[bi].position.z = 12;
            birdMeshes[bi].position.x = ROOM_W / 2 + 10 + Math.random() * 10;
            birdMeshes[bi].position.y = 9 + Math.random() * 3;
          }
          birdMeshes[bi].visible = true;
        }
      } else if (typeof birdMeshes !== 'undefined' && isNight) {
        for (var bi2 = 0; bi2 < birdMeshes.length; bi2++) {
          birdMeshes[bi2].visible = false;
        }
      }

      // 粒子效果：体积光灰尘粒子
      if (typeof dustParticles1 !== 'undefined' && !isNight) {
        dustParticles1.visible = true;
        dustParticles2.visible = true;
        var dustSystems = [dustParticles1, dustParticles2];
        for (var dsi = 0; dsi < dustSystems.length; dsi++) {
          var dp = dustSystems[dsi];
          var dpos = dp.geometry.attributes.position.array;
          var dvel = dp.userData.velocities;
          var dbp = dp.userData.basePos;
          for (var dpi = 0; dpi < dpos.length / 3; dpi++) {
            dpos[dpi * 3] += dvel[dpi * 3] * delta;
            dpos[dpi * 3 + 1] += dvel[dpi * 3 + 1] * delta;
            dpos[dpi * 3 + 2] += dvel[dpi * 3 + 2] * delta;
            var dx = dpos[dpi * 3] - dbp.x;
            var dy = dpos[dpi * 3 + 1] - dbp.y;
            var dz = dpos[dpi * 3 + 2] - dbp.z;
            if (Math.abs(dx) > 1.8 || Math.abs(dy) > 3 || Math.abs(dz) > 1.8) {
              dpos[dpi * 3] = dbp.x + (Math.random() - 0.5) * 1.5;
              dpos[dpi * 3 + 1] = dbp.y + (Math.random() - 0.5) * 2.5;
              dpos[dpi * 3 + 2] = dbp.z + (Math.random() - 0.5) * 1.5;
            }
          }
          dp.geometry.attributes.position.needsUpdate = true;
        }
      } else if (typeof dustParticles1 !== 'undefined' && isNight) {
        dustParticles1.visible = false;
        dustParticles2.visible = false;
      }

      // 粒子效果：咖啡热气粒子
      if (typeof steamParticles !== 'undefined') {
        var spos = steamParticles.geometry.attributes.position.array;
        var svel = steamParticles.userData.velocities;

    // ============ SFX 音效系统（脚步声 + 环境音 + 交互音）============
    var SFX = (function () {

      var masterGain = null;
      var ambGain = null;       // 环境音增益
      var footGain = null;      // 脚步声增益
      var uiGain = null;        // UI/交互音增益
      var ambientNodes = [];    // 当前环境音节点，用于切换时清理
      var isNightAmb = false;

      function ensureCtx() {
        if (ctx) return;
        try {
          var AC = window.AudioContext || window.webkitAudioContext;
          ctx = new AC();
          masterGain = ctx.createGain();
          masterGain.gain.value = 0.6;
          masterGain.connect(ctx.destination);

          ambGain = ctx.createGain();
          ambGain.gain.value = 0.15;
          ambGain.connect(masterGain);

          footGain = ctx.createGain();
          footGain.gain.value = 0.35;
          footGain.connect(masterGain);

          uiGain = ctx.createGain();
          uiGain.gain.value = 0.4;
          uiGain.connect(masterGain);
        } catch (e) {
          ctx = null;
        }
      }

      function resumeCtx() {
        ensureCtx();
        if (ctx && ctx.state === 'suspended') {
          ctx.resume().catch(function () {});
        }
      }

      // 合成脚步声：短促的噪声爆破 + 低通滤波，模拟木地板踩踏
      function playFootstep(type) {
        ensureCtx();
        if (!ctx || !footGain) return;
        resumeCtx();

        var t = ctx.currentTime;
        var dur = type === 'run' ? 0.08 : 0.12;
        var freq = type === 'run' ? 350 : 280;
        var vol = type === 'run' ? 0.9 : 1.0;
        // 每步轻微随机化，避免机械重复
        freq *= 0.85 + Math.random() * 0.3;
        vol *= 0.8 + Math.random() * 0.4;

        // 噪声源
        var bufferSize = Math.floor(ctx.sampleRate * dur);
        var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        var data = buffer.getChannelData(0);
        for (var i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        }
        var noise = ctx.createBufferSource();
        noise.buffer = buffer;

        var filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = freq;
        filter.Q.value = 0.8;

        var g = ctx.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(vol, t + 0.005);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);

        noise.connect(filter);
        filter.connect(g);
        g.connect(footGain);

        noise.onended = function () {
          try { noise.disconnect(); filter.disconnect(); g.disconnect(); } catch (e) {}
        };

        noise.start(t);
        noise.stop(t + dur + 0.02);
      }

      // 播放 UI 点击音
      function playClick() {
        ensureCtx();
        if (!ctx || !uiGain) return;
        resumeCtx();
        var t = ctx.currentTime;
        var osc = ctx.createOscillator();
        var g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, t);
        osc.frequency.exponentialRampToValueAtTime(400, t + 0.08);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.3, t + 0.005);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        osc.connect(g); g.connect(uiGain);
        osc.onended = function () { try { osc.disconnect(); g.disconnect(); } catch (e) {} };
        osc.start(t);
        osc.stop(t + 0.12);
      }

      // 环境音：白天（鸟鸣+微风） / 夜晚（蟋蟀+远处蛙鸣）
      function stopAmbient() {
        for (var i = 0; i < ambientNodes.length; i++) {
          try { ambientNodes[i].stop && ambientNodes[i].stop(0); } catch (e) {}

        ambientNodes = [];
      }

      function startAmbient(night) {
        ensureCtx();
        if (!ctx || !ambGain) return;
        resumeCtx();

        // 基础底噪：微风 / 夜晚空气感

        var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);

        windNoise.buffer = buf;
        windNoise.loop = true;

        var windFilter = ctx.createBiquadFilter();
        windFilter.type = 'lowpass';
        windFilter.frequency.value = night ? 200 : 500;

        var windGain = ctx.createGain();
        windGain.gain.value = night ? 0.08 : 0.12;

        windNoise.connect(windFilter);
        windFilter.connect(windGain);
        windGain.connect(ambGain);
        windNoise.start();
        ambientNodes.push(windNoise, windFilter, windGain);

        // 周期性自然声

            if (!ctx) return;
            var t = ctx.currentTime;
            var trillRate = 18; // 每秒颤音次数
            var trillDur = 0.15 + Math.random() * 0.1;
            var baseFreq = 4000 + Math.random() * 1000;
            var osc = ctx.createOscillator();
            var g = ctx.createGain();
            osc.type = 'square';
            osc.frequency.value = baseFreq;
            // 颤音：用 gain 快速起伏
            var trillOsc = ctx.createOscillator();
            trillOsc.frequency.value = trillRate;
            var trillGain = ctx.createGain();
            trillGain.gain.value = 0.5;
            trillOsc.connect(trillGain);
            trillGain.connect(g.gain);

            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(0.04, t + 0.02);
            g.gain.setValueAtTime(0.04, t + trillDur - 0.02);
            g.gain.linearRampToValueAtTime(0, t + trillDur);

            g.connect(ambGain);
            osc.onended = function () {
              try { osc.disconnect(); g.disconnect(); trillOsc.disconnect(); trillGain.disconnect(); } catch (e) {}

            osc.stop(t + trillDur + 0.02);
            trillOsc.stop(t + trillDur + 0.02);

        } else {
          // 白天：偶尔的鸟鸣
          var birdInterval = setInterval(function () {
            if (!ctx) return;
            if (Math.random() > 0.6) return; // 不是每次都叫
            var t = ctx.currentTime;
            var chirps = 2 + Math.floor(Math.random() * 3);
            for (var c = 0; c < chirps; c++) {
              var ct = t + c * 0.12;
              var osc = ctx.createOscillator();
              var g = ctx.createGain();
              osc.type = 'sine';
              var freq = 2000 + Math.random() * 1500;
              osc.frequency.setValueAtTime(freq, ct);
              osc.frequency.exponentialRampToValueAtTime(freq * 1.3, ct + 0.05);
              osc.frequency.exponentialRampToValueAtTime(freq * 0.9, ct + 0.1);
              g.gain.setValueAtTime(0, ct);
              g.gain.linearRampToValueAtTime(0.06, ct + 0.01);
              g.gain.exponentialRampToValueAtTime(0.001, ct + 0.12);
              osc.connect(g);
              g.connect(ambGain);
              osc.onended = function () { try { osc.disconnect(); g.disconnect(); } catch (e) {} };
              osc.start(ct);
              osc.stop(ct + 0.14);
            }

          ambientNodes.push({ stop: function () { clearInterval(birdInterval); }, disconnect: function () {} });
        }

      // 设置音量（0-1）
      function setVolume(category, val) {
        ensureCtx();
        if (!ctx) return;
        var clamped = Math.max(0, Math.min(1, val));
        if (category === 'master' && masterGain) masterGain.gain.value = clamped * 0.6;
        if (category === 'ambient' && ambGain) ambGain.gain.value = clamped * 0.15;
        if (category === 'footstep' && footGain) footGain.gain.value = clamped * 0.35;
        if (category === 'ui' && uiGain) uiGain.gain.value = clamped * 0.4;
      }

      function playThunder() {
        ensureCtx();
        if (!ctx || !masterGain) return;
        resumeCtx();
        var t = ctx.currentTime;
        var dur = 2.0;
        var bufSize = Math.floor(ctx.sampleRate * dur);
        var buffer = ctx.createBuffer(1, bufSize, ctx.sampleRate);
        var data = buffer.getChannelData(0);
        for (var i = 0; i < bufSize; i++) {
          var env = Math.exp(-i / bufSize * 3);
          data[i] = (Math.random() * 2 - 1) * env;
        }
        var noise = ctx.createBufferSource();
        noise.buffer = buffer;

        var filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(200, t);
        filter.frequency.exponentialRampToValueAtTime(80, t + dur);

        var g = ctx.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.5, t + 0.05);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);

        noise.connect(filter);
        filter.connect(g);
        g.connect(masterGain);
        noise.onended = function () {
          try { noise.disconnect(); filter.disconnect(); g.disconnect(); } catch (e) {}
        };
        noise.start(t);
        noise.stop(t + dur + 0.1);
      }

      minimapCtx.strokeRect(cx - ROOM_W * scale / 2, cy - ROOM_D * scale / 2, ROOM_W * scale, ROOM_D * scale);
      // 走廊
      minimapCtx.strokeRect(cx - 2.5 * scale, cy + ROOM_D * scale / 2, 5 * scale, 3 * scale);
