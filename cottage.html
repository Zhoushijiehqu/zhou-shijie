    function updateCat(delta) {
      if (!catGroup.parent) return;
      // I1: 减少动效模式下猫保持静止，不执行行走逻辑
      if (reduceMotion) return;
      catState.restTime -= delta;

      // C1: 雨天躲雨时不选随机目标，保持待在躲雨点
      if (catState.restTime <= 0 && !catState.walking && !catState.seekingShelter) {

        catState.targetX = (Math.random() - 0.5) * (ROOM_W - 3);
        catState.targetZ = (Math.random() - 0.5) * (ROOM_D - 3);

        var dx = catState.targetX - catGroup.position.x;
        var dz = catState.targetZ - catGroup.position.z;
        var dist = Math.sqrt(dx * dx + dz * dz);
        if (dist < 0.3) {
          catState.walking = false;
          catState.restTime = 3 + Math.random() * 5;
        } else {
          var speed = 0.5 * delta;
          var nextX = catGroup.position.x + (dx / dist) * speed;
          var nextZ = catGroup.position.z + (dz / dist) * speed;
          // 碰撞检测：避免穿墙穿家具
          var blocked = false;
          if (typeof checkCollision === 'function') {
            blocked = checkCollision(nextX, nextZ);

            catState.walking = false;
            catState.restTime = 1 + Math.random() * 3;
          } else {
            catGroup.position.x = nextX;
            catGroup.position.z = nextZ;

          // 朝向目标

        size: 0.04,
        transparent: true,
        opacity: 0.5,
        depthWrite: false
      });
      rainParticles = new THREE.Points(geo, mat);
      rainParticles.userData.velocities = velocities;
      rainParticles.visible = false;
      scene.add(rainParticles);

      // 闪电光源
      thunderLight = new THREE.PointLight(0xffffff, 0, 20, 2);
      thunderLight.position.set(0, ROOM_H - 1, 0);
      scene.add(thunderLight);
    }

    function updateRain(delta) {
      if (!rainParticles) return;
      if (weatherState !== 'rain') return;

      var pos = rainParticles.geometry.attributes.position.array;
      var vel = rainParticles.userData.velocities;
      for (var i = 0; i < rainCount; i++) {
        pos[i * 3 + 1] -= vel[i] * delta;
        if (pos[i * 3 + 1] < 0) {
          pos[i * 3] = (Math.random() - 0.5) * ROOM_W * 1.5;
          pos[i * 3 + 1] = ROOM_H + 2;
          pos[i * 3 + 2] = (Math.random() - 0.5) * ROOM_D * 1.5;
        }
      }
      rainParticles.geometry.attributes.position.needsUpdate = true;

      // 随机闪电
      thunderCooldown -= delta;
      if (thunderCooldown <= 0 && Math.random() < 0.005) {
        thunderLight.intensity = 3;
        thunderTimer = 0.15;
        thunderCooldown = 5 + Math.random() * 10;
        // 播放雷声
        if (typeof SFX !== 'undefined' && SFX.playThunder) {
          SFX.playThunder();
        }
      }
      if (thunderTimer > 0) {
        thunderTimer -= delta;
        thunderLight.intensity = Math.max(0, thunderTimer / 0.15 * 3);
      }
    }

    function toggleWeather() {
      if (weatherState === 'clear') {
        weatherState = 'rain';
        weatherBtn.textContent = '🌧️ 下雨';
        weatherBtn.classList.add('rainy');
        if (rainParticles) rainParticles.visible = true;
        // 天空变暗（使用绝对值避免叠加）
        var rainP = isNight ? nightLightParams : dayLightParams;
        hemiLight.intensity = rainP.hemi * 0.4;
        ambient.intensity = rainP.ambient * 0.5;
      } else {
        weatherState = 'clear';
        weatherBtn.textContent = '☀️ 晴天';
        weatherBtn.classList.remove('rainy');
        if (rainParticles) rainParticles.visible = false;
        if (thunderLight) thunderLight.intensity = 0;
        // 恢复天空亮度（根据昼夜模式恢复）
        var clearP = isNight ? nightLightParams : dayLightParams;
        hemiLight.intensity = clearP.hemi;
        ambient.intensity = clearP.ambient;
      }
      // H3: 天气切换后更新 BGM 曲目
      if (typeof applyBGMTrack === 'function') applyBGMTrack();
    }
    if (weatherBtn) weatherBtn.addEventListener('click', toggleWeather);

      if (!window.GameUtils) return;
      var lampStates = {};
      interactables.forEach(function (it) {
        if (it.id === 'tableLamp' || it.id === 'floorLamp') {
          lampStates[it.id] = !!it.isOn;
        }
      });
      var doorItem = interactables.find(function (i) { return i.id === 'frontDoor'; });
      GameUtils.saveCottageState({
        fpPos: { x: fpPos.x, y: fpPos.y, z: fpPos.z },
        fpYaw: fpYaw, fpPitch: fpPitch,
        isNight: isNight, weatherState: weatherState,
        doorOpen: !!(doorItem && doorItem.isOpen),

    function loadCottageScene() {
      if (!window.GameUtils) return null;
      var s = GameUtils.loadCottageState();
      if (!s) return null;
      // 应用状态（静音 toggle，避免加载时播放音效）
      var _silentOrig = window.SFX;
      window.SFX = null;
      try {
        if (typeof s.isNight === 'boolean' && s.isNight !== isNight) toggleDayNight();
        if (s.weatherState === 'rain' && weatherState === 'clear') toggleWeather();
        if (s.doorOpen) {
          var doorItem = interactables.find(function (i) { return i.id === 'frontDoor'; });
          if (doorItem && !doorItem.isOpen) doorItem.toggle();
        }
        if (s.lampStates) {
          interactables.forEach(function (it) {
            if (s.lampStates.hasOwnProperty(it.id) && it.isOn !== s.lampStates[it.id]) it.toggle();
          });
        }
      } catch (e) {} finally {
        window.SFX = _silentOrig;
      }
      if (s.fpPos) { fpPos.set(s.fpPos.x || 0, s.fpPos.y || 1.65, s.fpPos.z || 3.5); }
      if (typeof s.fpYaw === 'number') fpYaw = s.fpYaw;
      if (typeof s.fpPitch === 'number') fpPitch = s.fpPitch;
      if (s.catPos) { catGroup.position.x = s.catPos.x || 0; catGroup.position.z = s.catPos.z || 0; }

    // 为每个家具体现最高分（屏幕显示分数）
    var scoreCanvases = []; // {canvas, ctx, slug} 用于更新
    function makeScoreTexture(slug, label, score) {
      var c = document.createElement('canvas');
      c.width = 256; c.height = 128;
      var ctx = c.getContext('2d');
      var tex = new THREE.CanvasTexture(c);
      tex.minFilter = THREE.LinearFilter;
      scoreCanvases.push({ canvas: c, ctx: ctx, slug: slug, label: label });
      return tex;
    }
    function drawScoreTexture(entry, score) {
      var ctx = entry.ctx, c = entry.canvas;
      ctx.fillStyle = '#0a0a14';
      ctx.fillRect(0, 0, c.width, c.height);
      ctx.fillStyle = '#d4ab6a';
      ctx.font = '600 16px Manrope, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(entry.label, c.width / 2, 24);
      ctx.fillStyle = '#ffd700';
      ctx.font = '700 36px "Fraunces", serif';
      ctx.fillText(score != null ? String(score) : '---', c.width / 2, 70);
      ctx.fillStyle = '#8a96b8';
      ctx.font = '11px Manrope, sans-serif';
      ctx.fillText('最高分', c.width / 2, 100);
      if (entry.tex) entry.tex.needsUpdate = true;
    }
    // 更新所有家具体现的分数
    function updateFurnitureScores() {
      if (!window.GameUtils) return;
      var scores = GameUtils.getAllHighScores();

      });

    // 给每个家具的 screen 添加分数纹理
    function applyScoreScreens() {
      if (!window.GameUtils) return;
      furnitureList.forEach(function (f) {
        var game = f.userData.game;
        if (!game || !game.slug) return;
        // 找到 screen mesh（emissiveIntensity > 0 的发光平面）
        var screen = null;
        f.traverse(function (child) {
          if (child.isMesh && child.material && child.material.emissive &&
              child.material.emissiveIntensity > 0.2 && !screen) {
            screen = child;
          }
        });
        if (!screen) return;
        screen.userData.scoreScreen = true;
        var tex = makeScoreTexture(game.slug, game.name, null);
        screen.material = new THREE.MeshStandardMaterial({
          color: 0x111111, emissive: 0xffffff, emissiveMap: tex, emissiveIntensity: 0.8, roughness: 0.3
        });
        scoreCanvases[scoreCanvases.length - 1].tex = tex;
      });
      updateFurnitureScores();
    }

    // ============ B1 可收集品（散落星星）============
    var collectibles = []; // {mesh, id, collected}
    function createCollectibles() {
      if (!window.GameUtils) return;
      var collected = GameUtils.getCollected();
      // 在房间各角落放置 5 颗星星
      var positions = [
        { id: 'star_1', x: -ROOM_W / 2 + 1.5, z: -ROOM_D / 2 + 1.5, label: '角落之星' },
        { id: 'star_2', x: ROOM_W / 2 - 1.5, z: -ROOM_D / 2 + 1.5, label: '窗边之星' },
        { id: 'star_3', x: -ROOM_W / 2 + 1.5, z: ROOM_D / 2 - 1.5, label: '门边之星' },
        { id: 'star_4', x: ROOM_W / 2 - 1.5, z: ROOM_D / 2 - 1.5, label: '床边之星' },
        { id: 'star_5', x: 0, z: 0, label: '中央之星' }
      ];
      positions.forEach(function (p) {
        if (collected.indexOf(p.id) !== -1) return; // 已拾取
        var starGeo = new THREE.OctahedronGeometry(0.12, 0);
        var starMat = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffaa00, emissiveIntensity: 0.6, metalness: 0.5, roughness: 0.2 });
        var star = new THREE.Mesh(starGeo, starMat);
        star.position.set(p.x, 1.0, p.z);
        star.userData.collectible = true;
        star.userData.collectId = p.id;
        star.userData.baseY = 1.0;
        scene.add(star);
        collectibles.push({ mesh: star, id: p.id, collected: false });
      });
    }
    function updateCollectibles(delta) {
      var t = performance.now() / 1000;
      for (var i = collectibles.length - 1; i >= 0; i--) {
        var c = collectibles[i];
        if (c.collected) continue;
        // F2: 远距离星星降低更新频率（每4帧旋转一次）
        var dx = c.mesh.position.x - fpPos.x;
        var dz = c.mesh.position.z - fpPos.z;
        var distSq = dx * dx + dz * dz;
        if (distSq > 36 && Math.floor(t * 60) % 4 !== 0) {
          // 远距离且非本帧，只检查拾取
        } else {
          c.mesh.rotation.y += delta * 1.5;
          c.mesh.position.y = c.mesh.userData.baseY + Math.sin(t * 2 + i) * 0.08;
        }
        // 第一人称靠近拾取
        if (fpMode && distSq < 0.36) { // 0.6m 内拾取
          c.collected = true;
          scene.remove(c.mesh);
          if (window.GameUtils) {
            GameUtils.markCollected(c.id);
            GameUtils.addStars(5);
            updateStarDisplay();
            if (typeof SFX !== 'undefined') SFX.playClick();
            GameUtils._toast('✨ 拾取星光 +5⭐', 2000);
          }
        }
      }
    }

    // ============ B2 空间彩蛋 ============
    var eggStates = { mirrorLook: false, cornerStargaze: false, catPet: 0 };
    function checkEasterEggs(delta) {
      if (!window.GameUtils || !fpMode) return;
      var eggs = GameUtils.getEggs();
      // 彩蛋1：面朝镜子（卫生间镜子方向）3秒
      if (eggs.indexOf('egg_mirror') === -1) {
        // 卫生间镜子大约在 (-ROOM_W/2+0.5, 1.5, ROOM_D/2-0.6)
        var mx = -ROOM_W / 2 + 0.5 - fpPos.x;
        var mz = ROOM_D / 2 - 0.6 - fpPos.z;
        var mDist = Math.sqrt(mx * mx + mz * mz);
        if (mDist < 2.5) {
          // 检查是否朝向镜子
          var lookX = -Math.sin(fpYaw), lookZ = -Math.cos(fpYaw);
          var dot = (mx / mDist) * lookX + (mz / mDist) * lookZ;
          if (dot > 0.85) {
            eggStates.mirrorLook = (eggStates.mirrorLook || 0) + delta;
            if (eggStates.mirrorLook > 3) {
              GameUtils.markEgg('egg_mirror');
              GameUtils.addStars(10);
              updateStarDisplay();
              GameUtils._toast('🪞 彩蛋发现：镜中世界 +10⭐', 3000);
            }
          } else { eggStates.mirrorLook = 0; }
        } else { eggStates.mirrorLook = 0; }
      }
      // 彩蛋2：房间中央仰望3秒（夜晚限定）
      if (eggs.indexOf('egg_stargaze') === -1 && isNight) {
        if (fpPitch > 0.6 && Math.abs(fpPos.x) < 2 && Math.abs(fpPos.z) < 2) {
          eggStates.cornerStargaze = (eggStates.cornerStargaze || 0) + delta;
          if (eggStates.cornerStargaze > 3) {

            GameUtils.addStars(15);

          }

      }
    }

    function updateFurnitureVisualStates() {
      if (!window.GameUtils) return;
      var stats = GameUtils.getStats();
      var ach = GameUtils.getAllAchievements();
      furnitureList.forEach(function (f) {
        var game = f.userData.game;
        if (!game || !game.slug) return;
        var playCount = (stats.plays && stats.plays[game.slug]) || 0;
        // 玩过的家具体现轻微发光
        if (playCount > 0 && !f.userData.glowApplied) {
          f.traverse(function (child) {

              child.material.emissive.lerp(new THREE.Color(game.color), 0.15);

          });
          f.userData.glowApplied = true;
        }
        // 通关某游戏（有成就）的家具体现更强发光

          if (k.indexOf(game.slug) === 0) { hasAch = true; break; }
        }
        if (hasAch && !f.userData.strongGlow) {
          f.traverse(function (child) {
            if (child.isMesh && child.material) {
              child.material.emissive = child.material.emissive || new THREE.Color(0x000000);
              child.material.emissiveIntensity = Math.max(child.material.emissiveIntensity || 0, 0.3);

        if (hour >= 22 || hour < 5) {
          GameUtils.markEgg('egg_nightowl');
          GameUtils.addStars(12);
          updateStarDisplay();
          GameUtils._toast('🦉 彩蛋发现：夜行者 +12⭐', 3000);
        }
      }
    }

    // ============ D1-D4 移动端适配 ============
    var isMobile = (function () {
      return /Android|iPhone|iPad|iPod|Mobile|Tablet/i.test(navigator.userAgent) ||
             (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
    })();
    var joystickState = { active: false, dx: 0, dy: 0, baseX: 0, baseY: 0, id: null };
    var lookTouchState = { active: false, lastX: 0, lastY: 0, id: null };

    function createMobileControls() {
      if (!isMobile) return;
      // 虚拟摇杆（左下）
      var stick = document.createElement('div');
      stick.id = 'mobileJoystick';
      stick.style.cssText = 'position:fixed;bottom:80px;left:30px;width:120px;height:120px;border-radius:50%;background:rgba(40,32,24,0.5);border:2px solid rgba(212,171,106,0.4);z-index:100;touch-action:none;display:none';
      var knob = document.createElement('div');
      knob.id = 'joystickKnob';
      knob.style.cssText = 'position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:50px;height:50px;border-radius:50%;background:rgba(212,171,106,0.6);border:2px solid #d4ab6a';
      stick.appendChild(knob);
      document.body.appendChild(stick);

      // 触屏事件
      stick.addEventListener('touchstart', function (e) {
        e.preventDefault();
        var t = e.touches[0];
        joystickState.active = true;
        joystickState.baseX = t.clientX;
        joystickState.baseY = t.clientY;
      }, { passive: false });
      stick.addEventListener('touchmove', function (e) {
        e.preventDefault();
        if (!joystickState.active) return;
        var t = e.touches[0];
        joystickState.dx = Math.max(-50, Math.min(50, t.clientX - joystickState.baseX)) / 50;
        joystickState.dy = Math.max(-50, Math.min(50, t.clientY - joystickState.baseY)) / 50;
        knob.style.transform = 'translate(' + (joystickState.dx * 25) + 'px,' + (joystickState.dy * 25) + 'px) translate(-50%,-50%)';
      }, { passive: false });
      stick.addEventListener('touchend', function (e) {
        e.preventDefault();
        joystickState.active = false;
        joystickState.dx = 0; joystickState.dy = 0;
        knob.style.transform = 'translate(-50%,-50%)';
      }, { passive: false });

      // 触屏转视角（右半屏）
      canvas.addEventListener('touchstart', function (e) {
        if (!fpMode) return;
        var t = e.touches[0];
        var rect = canvas.getBoundingClientRect();
        if (t.clientX > rect.left + rect.width / 2 && !lookTouchState.active) {
          lookTouchState.active = true;
          lookTouchState.lastX = t.clientX;
          lookTouchState.lastY = t.clientY;
          lookTouchState.id = t.identifier;
        }
      }, { passive: true });
      canvas.addEventListener('touchmove', function (e) {
        if (!fpMode || !lookTouchState.active) return;
        for (var i = 0; i < e.touches.length; i++) {
          var t = e.touches[i];
          if (t.identifier === lookTouchState.id) {
            var dx = t.clientX - lookTouchState.lastX;
            var dy = t.clientY - lookTouchState.lastY;
            var sens = mouseSensitivity || 0.004;
            fpYaw -= dx * sens;
            fpPitch -= dy * sens;
            fpPitch = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, fpPitch));
            lookTouchState.lastX = t.clientX;
            lookTouchState.lastY = t.clientY;
          }
        }
      }, { passive: true });
      canvas.addEventListener('touchend', function (e) {
        lookTouchState.active = false;
      }, { passive: true });
    }

    // D2: 移动端靠近即高亮 + 单击交互（已在 updateFPCamera 中实现射线检测）
    // 移动端在 updateFPCamera 中更新移动输入
    function getMobileMoveInput() {
      if (!isMobile || !joystickState.active) return null;
      return { x: joystickState.dx, z: joystickState.dy };
    }

    // D4: 触摸友好 CSS
    function applyMobileCSS() {
      if (!isMobile) return;
      var style = document.createElement('style');
      style.textContent =
        '.hud-btn { min-width:48px !important; min-height:48px !important; padding:8px 12px !important; font-size:16px !important; }' +
        '#minimapContainer { width:130px !important; height:130px !important; }' +
        '.modal-content { max-width:95vw !important; }' +
        '.shop-item { min-width:130px !important; }' +
        '.shop-buy { min-height:40px !important; font-size:14px !important; }' +
        '#mobileJoystick { display:none !important; }';
      document.head.appendChild(style);
    }

    // ============ E1 首次进入强制引导序列 ============
    var guideState = { active: false, step: 0, steps: [] };
    function startGuideSequence() {
      if (!window.GameUtils || !GameUtils.isFirstVisit()) return;
      guideState.active = true;
      guideState.step = 0;
      guideState.steps = [
        { text: '👋 欢迎来到你的游戏小屋！试试点击下方「第一人称漫游」按钮，用 WASD 探索房间。', waitFor: 'fp' },
        { text: '🖱️ 走到任意家具前，准星对准它会高亮，点击或按 E 进入对应游戏。', waitFor: 'game' },
        { text: '🛒 回到小屋后，点击右下「商城」可以购买装饰，用星光支付。', waitFor: 'shop' },
        { text: '✨ 每日任务和散落的星星都能赚星光。享受你的小屋吧！', waitFor: 'auto', autoClose: 4000 }
      ];
      showGuideStep();
    }
    function showGuideStep() {
      if (guideState.step >= guideState.steps.length) { guideState.active = false; return; }
      var s = guideState.steps[guideState.step];
      var existing = document.getElementById('guideTip');
      if (existing) existing.remove();
      var tip = document.createElement('div');
      tip.id = 'guideTip';
      tip.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1a1f2e;border:1px solid #d4ab6a;color:#f5e6c8;padding:12px 20px;border-radius:10px;z-index:9997;max-width:90vw;font:13px/1.5 Manrope,sans-serif;box-shadow:0 10px 30px rgba(0,0,0,.5)';
      tip.textContent = s.text;
      document.body.appendChild(tip);
      // 最后一步自动消失
      if (s.waitFor === 'auto' && s.autoClose) {
        setTimeout(function () { advanceGuide('auto'); }, s.autoClose);
      }
    }
    function advanceGuide(trigger) {
      if (!guideState.active) return;
      var cur = guideState.steps[guideState.step];
      if (cur && cur.waitFor === trigger) {
        guideState.step++;
        if (guideState.step >= guideState.steps.length) {
          var tip = document.getElementById('guideTip');
          if (tip) { tip.style.transition = 'opacity .5s'; tip.style.opacity = '0'; setTimeout(function() { tip.remove(); }, 500); }
          guideState.active = false;
        } else {
          showGuideStep();
        }
      }
    }
    // 在 toggleFPMode 中调用 advanceGuide('fp')，在 showGameModal 中调用 advanceGuide('shop' 前先 'game')
    // 在 openShop 中调用 advanceGuide('shop')

    // ============ E3 目标提示：小地图任务标点 ============
    // 在小地图上标记最近的家具体现（目标）
    function getNearestTaskTarget() {
      if (!fpMode || !furnitureList.length) return null;
      var nearest = null, minDist = Infinity;
      furnitureList.forEach(function (f) {
        if (!f.userData.game) return;
        var dx = f.position.x - fpPos.x;
        var dz = f.position.z - fpPos.z;
        var d = dx * dx + dz * dz;
        if (d < minDist) { minDist = d; nearest = f; }
      });
      return nearest;
    }

    // ============ F1/F2 说明 ============
    // F1 纹理按需生成：所有 CanvasTexture 均在创建家具时一次性生成，
    //   分数纹理通过 drawScoreTexture 原地重绘（不重建纹理对象），无需额外缓存。
    // F2 距离 LOD：可收集品（星星）已在 updateCollectibles 中内联实现远距离降频；
    //   家具为静态网格，无逐帧更新，无需 LOD。

    // ============ F3 分帧初始化 ============
    var initQueue = [];
    function queueInit(name, fn) {
      initQueue.push({ name: name, fn: fn });
    }
    function processInitQueue(done) {
      if (!initQueue.length) { if (done) done(); return; }
      var item = initQueue.shift();
      try { item.fn(); } catch (e) { console.warn('init ' + item.name + ' failed', e); }
      // 下一帧处理下一个
      requestAnimationFrame(function () { processInitQueue(done); });
    }

    // ============ F4 移动端自动降级画质 ============
    function autoDetectQuality() {
      if (!isMobile) return;
      // 移动端默认低画质
      if (qualitySelect) {
        qualitySelect.value = 'low';
        qualitySelect.dispatchEvent(new Event('change'));
      }
      // 限制粒子数
      rainCount = 200;
    }

    // ============ G1 装饰自由摆放模式 ============
    var placementMode = { active: false, item: null, ghost: null };
    function startPlacement(decorId, decorDef) {
      if (placementMode.active) cancelPlacement();
      placementMode.active = true;
      // 创建幽灵预览
      var ghostMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, transparent: true, opacity: 0.5 });
      var ghost;
      if (decorDef.type === 'box') {
        ghost = new THREE.Mesh(new THREE.BoxGeometry(decorDef.w || 0.3, decorDef.h || 0.3, decorDef.d || 0.3), ghostMat);
      } else {
        ghost = new THREE.Mesh(new THREE.SphereGeometry(decorDef.r || 0.15, 12, 12), ghostMat);
      }
      ghost.position.set(0, 0.15, 0);
      scene.add(ghost);
      placementMode.item = { id: decorId, def: decorDef };
      placementMode.ghost = ghost;
      if (window.GameUtils) GameUtils._toast('🖱️ 移动鼠标摆放，点击确认，右键取消，R 键旋转', 4000);
    }
    function updatePlacement() {
      if (!placementMode.active || !placementMode.ghost) return;
      // 跟随玩家前方放置
      if (fpMode) {
        var fx = fpPos.x - Math.sin(fpYaw);
        var fz = fpPos.z - Math.cos(fpYaw);
        placementMode.ghost.position.set(fx, 0.15, fz);
      } else {
        placementMode.ghost.position.set(camera.position.x, 0.15, camera.position.z);
      }
    }
    function confirmPlacement() {
      if (!placementMode.active || !placementMode.ghost) return;
      var pos = placementMode.ghost.position.clone();
      var rot = placementMode.ghost.rotation.y;
      scene.remove(placementMode.ghost);
      // 创建实际装饰
      var def = placementMode.item.def;
      var mat = new THREE.MeshStandardMaterial({ color: def.color || 0xd4ab6a, roughness: 0.6 });
      var real;
      if (def.type === 'box') {
        real = new THREE.Mesh(new THREE.BoxGeometry(def.w || 0.3, def.h || 0.3, def.d || 0.3), mat);
      } else {
        real = new THREE.Mesh(new THREE.SphereGeometry(def.r || 0.15, 12, 12), mat);
      }
      real.position.copy(pos);
      real.rotation.y = rot;
      real.castShadow = true;
      real.userData.placedDecor = placementMode.item.id;
      scene.add(real);
      // 保存位置到 localStorage
      try {
        var key = 'cottage_decor_pos_' + placementMode.item.id;
        safeSetItem(key, JSON.stringify({ x: pos.x, y: pos.y, z: pos.z, ry: rot }));
      } catch (e) {}
      placementMode.active = false;
      placementMode.ghost = null;
      placementMode.item = null;
      if (window.GameUtils) GameUtils._toast('✅ 装饰已摆放', 1500);
    }
    function cancelPlacement() {
      if (placementMode.ghost) scene.remove(placementMode.ghost);
      placementMode.active = false;
      placementMode.ghost = null;
      placementMode.item = null;
    }
    // 摆放模式键盘控制
    document.addEventListener('keydown', function (e) {
      if (placementMode.active) {
        if (e.code === 'KeyR') placementMode.ghost.rotation.y += Math.PI / 8;
        if (e.code === 'Escape') cancelPlacement();
      }
    });
    document.addEventListener('contextmenu', function (e) {
      if (placementMode.active) { e.preventDefault(); cancelPlacement(); }
    });

    // ============ G2 装饰分层（简化：按 y 坐标判断层）============
    // 层级：floor(y<0.5), wall(0.5<y<2), desk(y>2)
    function getDecorLayer(y) {
      if (y < 0.5) return 'floor';
      if (y < 2.0) return 'wall';
      return 'desk';
    }

    // ============ G3 装饰预览（购买前预览）============
    // 在商城点击"预览"时创建临时幽灵，5秒后消失
    function previewDecor(decorDef) {
      var mat = new THREE.MeshStandardMaterial({ color: decorDef.color || 0xd4ab6a, transparent: true, opacity: 0.6 });
      var ghost;
      if (decorDef.type === 'box') {
        ghost = new THREE.Mesh(new THREE.BoxGeometry(decorDef.w || 0.3, decorDef.h || 0.3, decorDef.d || 0.3), mat);
      } else {
        ghost = new THREE.Mesh(new THREE.SphereGeometry(decorDef.r || 0.15, 12, 12), mat);
      }
      ghost.position.set(0, 1.0, -1.5);
      scene.add(ghost);
      setTimeout(function () { scene.remove(ghost); }, 5000);
    }

    // ============ H1 进出游戏 BGM 渐隐渐显 ============
    var bgmFade = { target: 1, current: 1, fading: false };
    function fadeBGM(to, duration) {
      bgmFade.target = to;
      bgmFade.fading = true;
      bgmFade.fadeDuration = duration;
      bgmFade.fadeStart = performance.now();
      bgmFade.fadeFrom = bgmFade.current;
    }
    function updateBGMFade() {
      if (!bgmFade.fading) return;
      var elapsed = (performance.now() - bgmFade.fadeStart) / 1000;
      var t = Math.min(1, elapsed / (bgmFade.fadeDuration || 1));
      bgmFade.current = bgmFade.fadeFrom + (bgmFade.target - bgmFade.fadeFrom) * t;
      if (typeof BGM !== 'undefined' && BGM.setVolume) {
        BGM.setVolume('bgm', bgmFade.current);
      }
      if (t >= 1) bgmFade.fading = false;
    }
    // 在 showGameModal 时渐隐，在 closeModal 时渐显
    var _origShowGameModal = showGameModal;
    showGameModal = function (game) {
      fadeBGM(0.1, 0.5); // 进入游戏前渐隐到10%
      advanceGuide('game');
      return _origShowGameModal.call(this, game);
    };

    // ============ H3 BGM 曲目切换（白天/夜晚/雨天）============
    var bgmTrackSelect = document.getElementById('bgmTrack');
    var bgmMode = 'auto';
    if (bgmTrackSelect) bgmTrackSelect.addEventListener('change', function () {
      bgmMode = bgmTrackSelect.value;
      applyBGMTrack();
    });
    function applyBGMTrack() {
      if (bgmMode === 'off') { if (typeof BGM !== 'undefined' && BGM.stop) BGM.stop(); return; }
      var track = bgmMode;
      if (bgmMode === 'auto') {
        track = weatherState === 'rain' ? 'rain' : (isNight ? 'night' : 'day');
      }
      if (typeof BGM !== 'undefined' && BGM.switchTrack) {
        BGM.switchTrack(track);
      }
    }

    // ============ I3 键盘纯导航（N 键遍历家具）============
    var kbNavIndex = -1;
    document.addEventListener('keydown', function (e) {
      // 用 N 键遍历家具（避免 Alt+Tab 系统快捷键冲突）
      if (e.code === 'KeyN' && !fpMode) {
        e.preventDefault();
        kbNavIndex = (kbNavIndex + 1) % furnitureList.length;
        var f = furnitureList[kbNavIndex];
        if (f) {
          // 相机看向该家具
          if (!fpMode) {
            controls.target.copy(f.position);
            controls.update();
          }
          if (window.GameUtils) GameUtils._toast('🎯 ' + (f.userData.game ? f.userData.game.name : '家具'), 1500);
        }
      }
    });

    // ============ J1 localStorage 写入失败捕获 ============
    // safeSetItem 供 cottage.html 内部所有 localStorage 写入使用
    function safeSetItem(key, value) {
      try {
        localStorage.setItem(key, value);
        return true;
      } catch (e) {
        if (window.GameUtils) GameUtils._toast('⚠️ 存储空间不足，部分数据未保存', 3000);
        return false;
      }
    }

    // ============ J2 存档版本号 + 迁移 ============
    var COTTAGE_SCHEMA_VERSION = 1;
    function migrateCottageState() {
      if (!window.GameUtils) return;
      try {
        var raw = localStorage.getItem(GameUtils.KEY_COTTAGE_STATE);
        if (!raw) return;
        var data = JSON.parse(raw);
        var ver = data._v || 0;
        if (ver < 1) {
          // v0 -> v1: 添加 _v 字段，无需结构变更
          data._v = 1;
          localStorage.setItem(GameUtils.KEY_COTTAGE_STATE, JSON.stringify(data));
        }
      } catch (e) {}
    }

    // ============ I2 色盲友好高亮：地面圆环 ============
    var hoverRing = null;
    function showHoverRing(obj) {
      if (!hoverRing) {
        var geo = new THREE.RingGeometry(0.4, 0.5, 24);
        var mat = new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
        hoverRing = new THREE.Mesh(geo, mat);
        hoverRing.rotation.x = -Math.PI / 2;
        scene.add(hoverRing);
      }
      hoverRing.position.set(obj.position.x, 0.02, obj.position.z);
      hoverRing.visible = true;
    }
    function hideHoverRing() {
      if (hoverRing) hoverRing.visible = false;
    }

    // ============ 初始化 ============
    function init() {
      initInteractables();
      initColliders(); // 初始化碰撞体，供猫 NPC 碰撞检测使用
      autoDetectQuality();    // F4: 移动端自动降级（需在 createRain 前执行）
      applyMobileCSS();      // D4: 移动端CSS
      createMobileControls(); // D1: 移动端摇杆
      animate();

      // F3: 重负载初始化分帧执行，避免首帧卡顿
      queueInit('createRain', createRain);
      queueInit('createCollectibles', createCollectibles);
      queueInit('createTrophyShelf', createTrophyShelf);
      queueInit('createCat', createCat);
      processInitQueue(function () {
        if (window.GameUtils) {
          applyScoreScreens();
          updateTrophyShelf();
          updateFurnitureVisualStates();
        }
      });

      // 显示星光数量
      if (window.GameUtils) {
        updateStarDisplay();
        applyOwnedDecor();   // 加载已购买的装饰
        GameUtils.incVisit(); // 增加访问计数
        migrateCottageState(); // J2: 存档版本迁移
        loadCottageScene();  // A1: 恢复场景状态
        // applyScoreScreens/updateTrophyShelf/updateFurnitureVisualStates 在 processInitQueue 回调中调用
        checkTimeBasedTasks(); // C2: 昼夜任务检查
        showFirstVisitGuide(); // A3: 首次访问引导（关闭后自动启动 E1）
      }

      // A1: 定期保存场景状态（每10秒）
      setInterval(function () { saveCottageScene(); }, 10000);
      // A2/B3: 定期更新分数和家具状态（每30秒）
      setInterval(function () {
        updateFurnitureScores();
        updateTrophyShelf();
        updateFurnitureVisualStates();
      }, 30000);
      // 页面关闭前保存
      window.addEventListener('beforeunload', saveCottageScene);

      // 隐藏加载屏
      setTimeout(function () {
        var loading = document.getElementById('loadingScreen');
        loading.classList.add('hidden');
        setTimeout(function () { loading.style.display = 'none'; }, 500);
      }, 800);
    }

    // 等待 Three.js 加载
    if (typeof THREE !== 'undefined') {
      init();
    } else {
      window.addEventListener('load', init);
    }

  })();
  </script>
</body>
</html>
