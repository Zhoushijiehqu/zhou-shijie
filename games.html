<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="author" content="周世杰 (ZHOU SHIJIE)">
  <meta name="copyright" content="© 2026 周世杰. 代码 MIT, 创意 CC-BY-NC 4.0.">
  <meta name="generator" content="周世杰个人作品集 v7.0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="游戏小屋 - 周世杰用原生 HTML/CSS/JS 编写的小游戏集合，轻量、即开即玩">
  <meta name="keywords" content="周世杰, 游戏小屋, 小游戏, 贪吃蛇, HTML5 游戏, Canvas">
  <title>游戏小屋 · 周世杰</title>

  <!-- 主题预载：读取 localStorage.theme（无则 dark），避免刷新闪烁 -->
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      document.documentElement.setAttribute('data-theme', saved === 'light' ? 'light' : 'dark');
    })();
  </script>

  <!-- 字体：Fraunces 编辑体衬线 + Manrope 几何无衬线（与主页面一致） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,400..700&family=Manrope:wght@300..800&display=swap" rel="stylesheet">

  <!-- 主页面样式 -->
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">

  <!-- 网站图标 -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">

  <!-- PWA：manifest + 主题色 -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#d4ab6a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="游戏小屋">

  <style>
    /* ========== 顶部 sticky 导航条 - 毛玻璃（与主站 navbar 风格一致） ========== */
    .sub-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(251, 247, 240, 0.72);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(176, 130, 62, 0.12);
    }

    [data-theme="dark"] .sub-header {
      background: rgba(26, 21, 16, 0.72);
      border-bottom-color: rgba(212, 171, 106, 0.1);
    }

    .sub-header-inner {
      max-width: var(--container-width);
      margin: 0 auto;
      padding: 0 var(--spacing-lg);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-md);
    }

    /* 返回按钮 - 复用 .theme-toggle 圆形图标按钮风格 */
    .back-btn {
      flex-shrink: 0;
      text-decoration: none;
    }

    .back-btn:hover {
      transform: translateX(-3px);
      background: var(--color-accent-lighter);
      color: var(--color-accent);
      border-color: var(--color-accent-light);
    }

    /* 中间紧凑标题区 */
    .sub-header-center {
      flex: 1;
      text-align: center;
      min-width: 0;
    }

    .sub-header-title {
      font-family: var(--font-family-display);
      font-size: var(--font-size-base);
      font-weight: 500;
      font-variation-settings: 'opsz' 24;
      color: var(--color-text-primary);
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    #themeToggle {
      flex-shrink: 0;
    }

    /* ========== 标题区 - 编辑体大刊头 ========== */
    .sub-hero {
      position: relative;
      padding: var(--spacing-3xl) 0 var(--spacing-xl);
      text-align: center;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 0%, var(--color-accent-lighter) 0%, transparent 60%),
        var(--color-bg-secondary);
    }

    /* 编辑体小帽 — 01 — 金色 */
    .sub-eyebrow {
      display: block;
      font-family: var(--font-family-base);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: var(--spacing-sm);
    }

    /* 大标题 - Fraunces，clamp 32-48px */
    .sub-hero-title {
      font-family: var(--font-family-display);
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 500;
      font-variation-settings: 'opsz' 72, 'SOFT' 50;
      color: var(--color-text-primary);
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: var(--spacing-sm);
      background: linear-gradient(135deg,
        var(--color-text-primary) 0%,
        var(--color-primary) 60%,
        var(--color-accent) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sub-hero-subtitle {
      font-family: var(--font-family-base);
      font-size: var(--font-size-base);
      color: var(--color-text-secondary);
      letter-spacing: 0.04em;
    }

    /* ========== 游戏卡片网格 ========== */
    .games-section {
      padding: var(--spacing-xl) 0 var(--spacing-3xl);
    }

    /* —— 筛选栏 —— */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: var(--spacing-lg);
      padding: 14px 16px;
      background: var(--color-bg-card);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-md);
    }
    .filter-bar .filter-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
      margin-right: 4px;
    }
    .filter-chip {
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-full);
      background: transparent;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-family-base);
    }
    .filter-chip:hover { border-color: var(--color-accent); color: var(--color-accent); }
    .filter-chip.active {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: #fff;
    }
    .filter-chip .count {
      margin-left: 4px;
      opacity: 0.7;
      font-size: 10px;
    }
    .filter-bar .sort-select {
      margin-left: auto;
      padding: 5px 10px;
      font-size: 12px;
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-sm);
      background: var(--color-bg-secondary);
      color: var(--color-text-secondary);
      font-family: var(--font-family-base);
      cursor: pointer;
    }

    /* —— 玩家档案卡 —— */
    .player-card {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 20px;
      padding: 24px;
      background: var(--color-bg-card);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-lg);
      margin-bottom: var(--spacing-xl);
      position: relative;
      overflow: hidden;
    }
    .player-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-accent), transparent);
    }
    @media (max-width: 768px) {
      .player-card { grid-template-columns: 1fr; }
    }
    .player-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .player-stat {
      padding: 12px;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-sm);
      text-align: center;
    }
    .player-stat .v {
      font-family: var(--font-family-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--color-accent);
      line-height: 1.2;
    }
    .player-stat .k {
      font-size: 10px;
      color: var(--color-text-tertiary);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .ach-wall {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-content: flex-start;
      max-height: 160px;
      overflow-y: auto;
    }
    .ach-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      font-size: 11px;
      border-radius: var(--radius-full);
      background: var(--color-bg-secondary);
      color: var(--color-text-tertiary);
      border: 1px solid var(--color-border-light);
      cursor: help;
      transition: all 0.15s;
    }
    .ach-chip.unlocked {
      background: rgba(212, 171, 106, 0.12);
      color: var(--color-accent);
      border-color: rgba(212, 171, 106, 0.4);
    }
    .ach-chip:hover { transform: translateY(-1px); }
    .ach-chip .icon { font-size: 13px; }
    .ach-summary {
      font-size: 11px;
      color: var(--color-text-tertiary);
      margin-bottom: 10px;
    }
    .ach-summary b { color: var(--color-accent); font-weight: 700; }

    /* —— 存档中心 —— */
    .save-center {
      margin-top: 16px;
      padding: 14px 16px;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-sm);
      border: 1px dashed var(--color-border-light);
    }
    .save-center-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
      margin-bottom: 10px;
    }
    .save-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .save-actions button {
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-sm);
      background: var(--color-bg-card);
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-family-base);
    }
    .save-actions button:hover { border-color: var(--color-accent); color: var(--color-accent); }
    .save-actions button.danger:hover { border-color: #d44; color: #d44; }

    /* —— 设备/双人角标 —— */
    .game-device-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 6px;
      border-radius: var(--radius-full);
      background: rgba(255,255,255,0.1);
      color: var(--color-text-secondary);
      z-index: 2;
    }
    [data-theme="light"] .game-device-badge { background: rgba(0,0,0,0.06); }

    /* 4 列桌面 / 平板 3 列 / 手机 2 列 */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    /* ========== 游戏卡片 - 紧凑一览式 ========== */
    .game-card {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      padding: 0;
      position: relative;
      text-decoration: none;
      color: inherit;
      border-radius: var(--radius-lg);
      transition: transform var(--transition-base), box-shadow var(--transition-base), border-color var(--transition-base);
    }

    /* 渐变描边 hover */
    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-lg);
      padding: 1px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity var(--transition-base);
      pointer-events: none;
      z-index: 1;
    }

    .game-card:hover::before {
      opacity: 1;
    }

    .game-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--color-accent-light);
      color: inherit;
    }

    /* 游戏封面 - 紧凑 110px，图标 + 编号 */
    .game-card-cover {
      position: relative;
      width: 100%;
      height: 110px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .game-cover-mark {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background:
        radial-gradient(circle at 30% 20%, var(--color-accent-lighter), transparent 55%),
        radial-gradient(circle at 80% 80%, var(--color-primary-lighter), transparent 55%),
        linear-gradient(135deg, var(--color-bg-tertiary), var(--color-bg-secondary));
      transition: transform var(--transition-slow);
    }

    .game-card:hover .game-cover-mark {
      transform: scale(1.06);
    }

    /* 游戏图标 */
    .game-cover-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-accent);
      opacity: 0.85;
      transition: transform var(--transition-base), opacity var(--transition-base);
    }

    .game-cover-icon svg {
      width: 28px;
      height: 28px;
    }

    .game-card:hover .game-cover-icon {
      transform: scale(1.1) rotate(-6deg);
      opacity: 1;
    }

    /* 编号标签 - 左上小角标 */
    .game-cover-label {
      position: absolute;
      top: 10px;
      left: 10px;
      font-family: var(--font-family-base);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--color-accent);
      padding: 2px 8px;
      border: 1px solid var(--color-accent-light);
      border-radius: var(--radius-full);
      background: var(--color-accent-lighter);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 2;
    }

    /* 卡片正文 - 紧凑 */
    .game-card-body {
      padding: 14px 14px 16px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .game-card-title {
      font-family: var(--font-family-display);
      font-size: var(--font-size-base);
      font-weight: 600;
      color: var(--color-text-primary);
      letter-spacing: -0.01em;
      line-height: 1.3;
      margin: 0;
    }

    .game-card-desc {
      font-size: 12px;
      color: var(--color-text-tertiary);
      line-height: 1.5;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 玩法要点 - 卡片底部一行操作提示 */
    .game-card-howto {
      font-size: 11px;
      color: var(--color-text-tertiary);
      line-height: 1.4;
      margin: 6px 0 0;
      padding: 6px 8px;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-sm);
      border-left: 2px solid var(--color-accent);
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    .game-card:hover .game-card-howto { opacity: 1; }
    .game-card-howto::before {
      content: "玩法 · ";
      color: var(--color-accent);
      font-weight: 600;
    }

    /* 标签组 - 精简，底部一行 */
    .game-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: auto;
    }

    .game-card-tags .tag {
      cursor: default;
      font-size: 10px;
      padding: 2px 7px;
      line-height: 1.4;
    }

    /* 卡片底部：进入游戏按钮 */
    .game-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding-top: 10px;
      margin-top: 4px;
      border-top: 1px solid var(--color-border-light);
    }

    .game-card-tech {
      font-family: var(--font-family-base);
      font-size: 10px;
      color: var(--color-text-tertiary);
      letter-spacing: 0.02em;
      font-weight: 500;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .game-card-play {
      font-family: var(--font-family-base);
      font-size: 11px;
      color: var(--color-accent);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
      transition: transform var(--transition-base);
    }

    .game-card:hover .game-card-play {
      transform: translateX(3px);
    }

    /* 禁用态 */
    .game-card.is-disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .game-card.is-disabled:hover {
      transform: none;
      box-shadow: var(--shadow-sm);
    }

    .game-card.is-disabled .game-cover-icon {
      filter: grayscale(0.5);
    }

    /* ========== 空状态 ========== */
    .games-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: var(--spacing-4xl) var(--spacing-lg);
      color: var(--color-text-tertiary);
    }

    .games-empty-icon {
      display: flex;
      justify-content: center;
      margin-bottom: var(--spacing-lg);
      color: var(--color-accent);
      opacity: 0.6;
    }

    .games-empty-icon svg {
      width: 48px;
      height: 48px;
    }

    .games-empty-title {
      font-family: var(--font-family-display);
      font-size: var(--font-size-xl);
      font-style: italic;
      color: var(--color-text-secondary);
      margin-bottom: var(--spacing-sm);
      letter-spacing: -0.01em;
    }

    .games-empty-desc {
      font-family: var(--font-family-base);
      font-size: var(--font-size-sm);
      color: var(--color-text-tertiary);
    }

    /* ========== 页脚 ========== */
    .sub-footer {
      background: var(--color-bg-primary);
      border-top: 1px solid var(--color-border-light);
      padding: var(--spacing-2xl) 0;
      position: relative;
    }

    .sub-footer::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--color-accent), transparent);
    }

    .sub-footer .container {
      text-align: center;
    }

    .sub-footer-info {
      color: var(--color-text-tertiary);
      font-family: var(--font-family-base);
      font-size: var(--font-size-sm);
      letter-spacing: 0.02em;
    }

    /* ========== 响应式 ========== */
    @media (max-width: 1200px) {
      .games-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
      }
    }

    @media (max-width: 768px) {
      .sub-header-inner {
        height: 56px;
        padding: 0 var(--spacing-md);
        gap: var(--spacing-sm);
      }

      .sub-header-title {
        font-size: var(--font-size-sm);
      }

      .sub-hero {
        padding: var(--spacing-3xl) 0 var(--spacing-2xl);
      }

      .games-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: var(--spacing-md);
      }

      .game-card-cover {
        height: 100px;
      }

      .game-card-body {
        padding: 12px;
      }

      .game-card-desc {
        font-size: 11px;
      }
    }

    @media (max-width: 400px) {
      .games-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- 顶部 sticky 导航条：返回主页 + 中间标题 + 主题切换 -->
  <header class="sub-header">
    <div class="sub-header-inner">
      <a href="index.html" class="theme-toggle back-btn" aria-label="返回主页" title="返回主页">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></svg>
      </a>
      <div class="sub-header-center">
        <span class="sub-header-title">游戏小屋</span>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="切换主题" title="切换深色/浅色模式">
        <!-- 图标由 JS 注入 -->
      </button>
    </div>
  </header>

  <main>
    <!-- 标题区：编辑体小帽 + 大标题 + 副标题 -->
    <section class="sub-hero">
      <div class="container">
        <span class="sub-eyebrow reveal">— 01 —</span>
        <h1 class="sub-hero-title reveal delay-100">游戏小屋</h1>
        <p class="sub-hero-subtitle reveal delay-200">用原生 HTML 编写的小游戏，即开即玩</p>
      </div>
    </section>

    <!-- 游戏卡片网格 -->
    <section class="games-section">
      <div class="container">
        <!-- 玩家档案卡（含成就墙 + 存档中心） -->
        <div class="player-card reveal" id="playerCard"></div>

        <!-- 筛选栏 -->
        <div class="filter-bar reveal" id="filterBar"></div>

        <!-- 卡片由 JS 渲染；空数组时显示占位 -->
        <div class="games-grid" id="gamesGrid"></div>
      </div>
    </section>
  </main>

  <!-- 简单页脚 -->
  <footer class="sub-footer">
    <div class="container">
      <p class="sub-footer-info" id="footerInfo"></p>
      <div id="feedbackSlot"></div>
    </div>
  </footer>

  <!-- 数据层（普通 script，挂载 window.ProfileData） -->
  <script src="data/profile.js"></script>
  <!-- 游戏小屋共享工具：截图/成就/存档/教学 -->
  <script src="assets/js/game-utils.js"></script>

  <script>
    /* ============================================================
     * 游戏小屋页逻辑
     * - 从 window.ProfileData.games 读取游戏列表渲染卡片
     * - 玩家档案卡 + 成就墙 + 存档中心
     * - 分类筛选 / 排序
     * - 入场动画 / 主题切换
     * ============================================================ */
    (function () {
      var data = window.ProfileData || {};
      var games = data.games || [];
      var GU = window.GameUtils;

      // —— 设备图标映射 ——
      var DEVICE_ICON = {
        keyboard: '⌨',
        touch: '📱',
        both: '⌨📱'
      };

      var GAMEPAD_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="6" x2="10" y1="11" y2="11"></line><line x1="8" x2="8" y1="9" y2="13"></line><line x1="15" x2="15.01" y1="12" y2="12"></line><line x1="18" x2="18.01" y1="10" y2="10"></line><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"></path></svg>';
      var SUN_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>';
      var MOON_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>';

      function esc(str) {
        if (str == null) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      /* ---------- 渲染玩家档案卡 ---------- */
      function renderPlayerCard() {
        var card = document.getElementById('playerCard');
        if (!card) return;
        var stats = GU.getStats();
        var playedCount = Object.keys(stats.plays || {}).length;
        var totalRounds = 0;
        for (var k in stats.plays) totalRounds += stats.plays[k];
        var totalMin = Math.floor((stats.totalTime || 0) / 60);
        var lastPlayTs = 0;
        for (var s in stats.lastPlay) {
          if (stats.lastPlay[s] > lastPlayTs) lastPlayTs = stats.lastPlay[s];
        }
        var lastPlayText = lastPlayTs
          ? new Date(lastPlayTs).toLocaleDateString('zh-CN')
          : '—';

        // 成就墙
        var achList = GU.getAchievementList();
        var unlocked = achList.filter(function (a) { return a.unlocked; }).length;
        var achHtml = achList.map(function (a) {
          return '<span class="ach-chip' + (a.unlocked ? ' unlocked' : '') +
            '" title="' + esc(a.name + '：' + a.desc) + '">' +
            '<span class="icon">' + a.icon + '</span>' +
            esc(a.name) + '</span>';
        }).join('');
        // 成就进度条
        var achPct = achList.length ? Math.round(unlocked / achList.length * 100) : 0;
        var achProgressHtml =
          '<div class="ach-progress" style="margin-top:8px">' +
            '<div style="height:6px;background:var(--color-bg-secondary);border-radius:var(--radius-full);overflow:hidden">' +
              '<div style="width:' + achPct + '%;height:100%;background:linear-gradient(90deg,var(--color-primary),var(--color-accent));transition:width .6s ease"></div>' +
            '</div>' +
          '</div>';

        // 各游戏总星数（D 成果：prism/puzzle/sonic/gravity 四款有星级）
        var starSlugs = ['puzzle', 'prism', 'sonic', 'gravity'];
        var starHtml = '';
        var totalStars = 0;
        starSlugs.forEach(function (slug) {
          if (GU.getTotalStars) {
            var s = GU.getTotalStars(slug) || 0;
            totalStars += s;
            var game = games.find(function (g) { return g.slug === slug; });
            if (game) {
              starHtml += '<span class="ach-chip unlocked" title="' + esc(game.name + '：已获 ' + s + ' 星")>' +
                '<span class="icon">⭐</span>' + esc(game.name) + ' ' + s + '</span>';
            }
          }
        });
        var starSectionHtml = starHtml
          ? '<div class="ach-summary" style="margin-top:14px">关卡星数 · 共 <b>' + totalStars + '</b> 星</div>' +
            '<div class="ach-wall">' + starHtml + '</div>'
          : '';

        // 估算存档占用
        var saves = GU.listAllSaves();
        var totalKB = (saves.reduce(function (sum, s) { return sum + s.size; }, 0) / 1024).toFixed(1);

        card.innerHTML =
          '<div>' +
            '<div style="font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">— 玩家档案 —</div>' +
            '<h3 style="margin:0 0 16px;font:600 22px var(--font-family-display);color:var(--color-text-primary)">游戏足迹</h3>' +
            '<div class="player-stats">' +
              '<div class="player-stat"><div class="v">' + playedCount + '/' + games.length + '</div><div class="k">玩过游戏</div></div>' +
              '<div class="player-stat"><div class="v">' + totalRounds + '</div><div class="k">累计局数</div></div>' +
              '<div class="player-stat"><div class="v">' + totalMin + '</div><div class="k">游玩分钟</div></div>' +
              '<div class="player-stat"><div class="v">' + lastPlayText + '</div><div class="k">最近游玩</div></div>' +
            '</div>' +
            '<div class="save-center">' +
              '<div class="save-center-title">存档中心 · 共 ' + saves.length + ' 项 · ' + totalKB + ' KB</div>' +
              '<div class="save-actions">' +
                '<button id="btnExportSaves">导出存档</button>' +
                '<button id="btnImportSaves">导入存档</button>' +
                '<button id="btnClearSaves" class="danger">重置全部</button>' +
                '<input type="file" id="importFileInput" accept="application/json" style="display:none">' +
              '</div>' +
            '</div>' +
          '</div>' +
          '<div>' +
            '<div class="ach-summary">已解锁 <b>' + unlocked + '</b> / ' + achList.length + ' 枚勋章 · ' + achPct + '%</div>' +
            '<div class="ach-wall">' + achHtml + '</div>' +
            achProgressHtml +
            starSectionHtml +
          '</div>';

        // 存档中心按钮绑定
        document.getElementById('btnExportSaves').onclick = function () { GU.exportAllSaves(); };
        document.getElementById('btnImportSaves').onclick = function () {
          document.getElementById('importFileInput').click();
        };
        document.getElementById('importFileInput').onchange = function (e) {
          if (e.target.files[0]) {
            GU.importSaves(e.target.files[0], function () {
              setTimeout(function () { location.reload(); }, 800);
            });
          }
          e.target.value = ''; // 重置 value，允许重复选择同一文件重试
        };
        document.getElementById('btnClearSaves').onclick = function () {
          if (confirm('确定要清除所有游戏存档吗？此操作不可恢复！\n\n建议先点击"导出存档"备份。')) {
            var n = GU.clearAllSaves();
            GU._toast('已清除 ' + n + ' 项存档');
            setTimeout(function () { location.reload(); }, 1000);
          }
        };
      }

      /* ---------- 渲染筛选栏 ---------- */
      var currentFilter = '全部';
      var currentSort = 'default';

      function renderFilterBar() {
        var bar = document.getElementById('filterBar');
        if (!bar) return;
        // 收集所有分类
        var catSet = {};
        games.forEach(function (g) {
          (g.category || []).forEach(function (c) { catSet[c] = (catSet[c] || 0) + 1; });
        });
        var cats = ['全部'].concat(Object.keys(catSet));
        // 校验 currentFilter 是否仍在分类列表中
        if (cats.indexOf(currentFilter) < 0) currentFilter = '全部';
        var chipsHtml = '<span class="filter-label">分类</span>' +
          cats.map(function (c) {
            var count = c === '全部' ? games.length : catSet[c];
            return '<button type="button" class="filter-chip' + (c === currentFilter ? ' active' : '') +
              '" data-cat="' + esc(c) + '">' + esc(c) +
              '<span class="count">' + count + '</span></button>';
          }).join('');

        bar.innerHTML = chipsHtml +
          '<select class="sort-select" id="sortSelect" aria-label="排序方式">' +
            '<option value="default"' + (currentSort === 'default' ? ' selected' : '') + '>默认顺序</option>' +
            '<option value="recent"' + (currentSort === 'recent' ? ' selected' : '') + '>最近游玩</option>' +
            '<option value="name"' + (currentSort === 'name' ? ' selected' : '') + '>按名称</option>' +
            '<option value="rounds"' + (currentSort === 'rounds' ? ' selected' : '') + '>按局数</option>' +
          '</select>';

        // 绑定筛选
        bar.querySelectorAll('.filter-chip').forEach(function (chip) {
          chip.onclick = function () {
            currentFilter = chip.dataset.cat;
            renderFilterBar();
            renderGames();
          };
        });
        document.getElementById('sortSelect').onchange = function (e) {
          currentSort = e.target.value;
          renderGames();
        };
      }

      /* ---------- 渲染单张游戏卡片 ---------- */
      function renderCard(g, index) {
        var num = String(index + 1).padStart(2, '0');
        var available = g.available !== false;

        var tagsHtml = (g.tags || []).slice(0, 2).map(function (t) {
          return '<span class="tag tag-primary">' + esc(t) + '</span>';
        }).join('');

        var techHtml = (g.techStack || []).join(' · ');
        var playText = available ? '进入 →' : '敬请期待';

        // 设备标识
        var deviceBadge = '';
        if (g.device) {
          deviceBadge = '<span class="game-device-badge" title="推荐设备">' +
            (DEVICE_ICON[g.device] || '') + '</span>';
        }

        var openTag = available
          ? '<a href="' + esc(g.file) + '" class="card game-card reveal" target="_self" tabindex="0">'
          : '<div class="card game-card reveal is-disabled" aria-disabled="true" tabindex="-1">';
        var closeTag = available ? '</a>' : '</div>';

        return openTag +
          '<div class="game-card-cover">' +
            '<span class="game-cover-label">GAME ' + num + '</span>' +
            deviceBadge +
            '<div class="game-cover-mark">' +
              '<span class="game-cover-icon" aria-hidden="true">' + GAMEPAD_SVG + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="game-card-body">' +
            '<h3 class="game-card-title">' + esc(g.name) + '</h3>' +
            '<p class="game-card-desc">' + esc(g.desc) + '</p>' +
            (g.howto ? '<p class="game-card-howto">' + esc(g.howto) + '</p>' : '') +
            '<div class="game-card-tags">' + tagsHtml + '</div>' +
            '<div class="game-card-footer">' +
              '<span class="game-card-tech">' + esc(techHtml) + '</span>' +
              '<span class="game-card-play">' + playText + '</span>' +
            '</div>' +
          '</div>' +
        closeTag;
      }

      /* ---------- 渲染空状态 ---------- */
      function renderEmpty() {
        return '<div class="games-empty">' +
          '<div class="games-empty-icon" aria-hidden="true">' + GAMEPAD_SVG + '</div>' +
          '<p class="games-empty-title">游戏开发中...</p>' +
          '<p class="games-empty-desc">新的小游戏正在来的路上，敬请期待</p>' +
        '</div>';
      }

      /* ---------- 渲染游戏网格（带筛选+排序） ---------- */
      function renderGames() {
        var grid = document.getElementById('gamesGrid');
        if (!games.length) { grid.innerHTML = renderEmpty(); return; }

        var filtered = games.filter(function (g) {
          if (currentFilter === '全部') return true;
          return (g.category || []).indexOf(currentFilter) >= 0;
        });

        // 排序
        var stats = GU.getStats();
        if (currentSort === 'recent') {
          filtered.sort(function (a, b) {
            var ta = stats.lastPlay[a.slug] || 0;
            var tb = stats.lastPlay[b.slug] || 0;
            return tb - ta;
          });
        } else if (currentSort === 'name') {
          filtered.sort(function (a, b) { return a.name.localeCompare(b.name, 'zh'); });
        } else if (currentSort === 'rounds') {
          filtered.sort(function (a, b) {
            return (stats.plays[b.slug] || 0) - (stats.plays[a.slug] || 0);
          });
        }

        if (!filtered.length) {
          grid.innerHTML = '<div class="games-empty"><p class="games-empty-desc">该分类下暂无游戏</p></div>';
          return;
        }
        grid.innerHTML = filtered.map(function (g) {
          // 保留原始编号
          var idx = games.indexOf(g);
          return renderCard(g, idx);
        }).join('');
        initReveal();
      }

      /* ---------- 入场动画 ---------- */
      function initReveal() {
        var els = document.querySelectorAll('.reveal:not(.revealed)');
        if (!els.length) return;
        if (!('IntersectionObserver' in window)) {
          els.forEach(function (el) { el.classList.add('revealed'); });
          return;
        }
        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('revealed');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
        els.forEach(function (el) { observer.observe(el); });
      }

      /* ---------- 主题切换 ---------- */
      function initThemeToggle() {
        var toggle = document.getElementById('themeToggle');
        function applyIcon() {
          var theme = document.documentElement.getAttribute('data-theme');
          toggle.innerHTML = theme === 'dark' ? SUN_SVG : MOON_SVG;
        }
        applyIcon();
        toggle.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme') || 'dark';
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          applyIcon();
        });
      }

      /* ---------- 页脚版权 ---------- */
      function renderFooter() {
        var year = new Date().getFullYear();
        var name = (data.basic && data.basic.name) || '周世杰';
        document.getElementById('footerInfo').textContent =
          '© ' + year + ' ' + name + ' · 游戏小屋 · 用原生 HTML 编写';
      }

      /* ---------- 检测探索类成就 ---------- */
      function checkExploreAchievements() {
        var stats = GU.getStats();
        var playedCount = Object.keys(stats.plays || {}).length;
        var totalRounds = 0;
        for (var k in stats.plays) totalRounds += stats.plays[k];

        if (playedCount >= 1) GU.unlock('first_play', '初次到访', '第一次游玩任意游戏');
        if (playedCount >= 3) GU.unlock('play_3_games', '浅尝辄止', '体验 3 款不同游戏');
        if (games.length > 0 && playedCount >= games.length) GU.unlock('play_all_games', '全园通玩', '体验全部 ' + games.length + ' 款游戏');
        if (totalRounds >= 10) GU.unlock('play_10_rounds', '常客', '累计游玩 10 局');
        if (totalRounds >= 50) GU.unlock('play_50_rounds', '游戏达人', '累计游玩 50 局');
        if ((stats.totalTime || 0) >= 3600) GU.unlock('total_1h', '一小时漫游', '累计游玩满 60 分钟');
      }

      /* ---------- 初始化 ---------- */
      // GU 空值防御：game-utils.js 加载失败时直接显示内容，不执行依赖逻辑
      if (!GU) {
        document.querySelectorAll('.reveal').forEach(function (el) { el.classList.add('revealed'); });
        return;
      }
      checkExploreAchievements(); // 先解锁，再渲染档案卡，确保成就墙反映最新状态
      renderPlayerCard();
      renderFilterBar();
      renderGames();
      renderFooter();
      initThemeToggle();
      // initReveal 已在 renderGames 内调用，此处无需重复
      // PWA：注入反馈入口 + 注册 Service Worker
      if (GU) {
        GU.injectFeedback('#feedbackSlot');
        GU.registerSW();
      }
    })();
  </script>
</body>
</html>
