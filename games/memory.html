<style>
/* ===== 瞬逝记忆拼图页面特有样式 =====
   颜色全部走主页面 CSS 变量（由 base.css 定义），
   字体用 Fraunces（标题）+ Manrope（正文）+ Noto Serif SC（游戏内汉字，保留记忆感）
*/

/* 顶部 sticky header */
.memory-header {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 28px;
  background: rgba(var(--color-bg-primary-rgb, 26,21,16), 0.82);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--color-border-light);
}
.memory-header-left { display: flex; align-items: center; gap: 16px; }
.memory-back-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 16px;
  font-family: var(--font-family-base);
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--color-text-secondary);
  text-decoration: none;
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius-full);
  background: var(--color-bg-card);
  transition: all 0.25s;
}
.memory-back-btn:hover {
  color: var(--color-accent);
  border-color: var(--color-accent-light);
  background: var(--color-accent-lighter);
}
.memory-title-area { text-align: center; flex: 1; }
.memory-eyebrow {
  display: block;
  font-family: var(--font-family-base);
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.34em; text-transform: uppercase;
  color: var(--color-accent);
  margin-bottom: 2px;
}
.memory-title-area h1 {
  font-family: var(--font-family-display);
  font-size: clamp(20px, 3vw, 28px);
  font-weight: 400;
  font-variation-settings: 'opsz' 60, 'SOFT' 50;
  color: var(--color-text-primary);
  margin: 0;
  letter-spacing: -0.01em;
}

/* 主题切换按钮 */
.memory-header .theme-toggle { flex-shrink: 0; }

/* 游戏容器：居中 */
#game-root {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 70px);
  padding: 32px 20px;
}

/* ===== 游戏内 :root 变量映射 =====
   原游戏用 --bg-deep/--bg-surface/--gold 等变量，
   这里映射到主页面的 CSS 变量，保持风格统一
*/
:root {
  --bg-deep: var(--color-bg-primary);
  --bg-surface: var(--color-bg-card);
  --bg-hover: var(--color-bg-tertiary);
  --text: var(--color-text-primary);
  --text-muted: var(--color-text-secondary);
  --gold: var(--color-accent);
  --gold-dim: var(--color-accent-light);
  --gold-glow: var(--color-accent-glow);
  --blue: #6b9bd2;
  --blue-dim: #3a5a7a;
  --red: #c4554d;
  --green: #5a9e6f;
  --border: var(--color-border-medium);
  --radius: var(--radius-md);
  --font-display: 'Fraunces', 'Noto Serif SC', serif;
  --font-ui: 'Manrope', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

/* body 用主页面字体 + 纸张纹理（base.css 提供） */
body {
  margin: 0; padding: 0;
  background: var(--color-bg-primary);
  font-family: 'Manrope', 'Noto Serif SC', 'STSong', serif, sans-serif;
  color: var(--color-text-primary);
  min-height: 100vh;
  overflow-x: hidden; overflow-y: auto;
  user-select: none; -webkit-user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* 游戏内汉字用 Noto Serif SC 保持记忆感 */
#scene-menu .title,
#scene-settings h2,
#scene-level-select h2,
.hud-level,
.memory-countdown,
.complete-title,
.auto-text {
  font-family: 'Noto Serif SC', 'Fraunces', serif !important;
}

/* 菜单标题加渐变文字 */
#scene-menu .title {
  background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
}

/* 按钮风格统一为编辑体 */
.menu-btn, .setting-option, .setting-back, .level-back,
.custom-upload-btn, .hud-btn, .complete-btn {
  font-family: 'Manrope', sans-serif;
  border-radius: var(--radius-full);
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
.menu-btn:hover, .setting-option:hover, .level-back:hover,
.custom-upload-btn:hover, .hud-btn:hover {
  box-shadow: var(--shadow-sm);
}

/* 关卡卡片编辑体化 */
.level-cell {
  border-radius: var(--radius-md) !important;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
.level-cell:hover:not(.locked) {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

/* 游戏视口编辑体化 */
#game-viewport {
  border-radius: var(--radius-lg) !important;
  box-shadow: var(--shadow-lg), inset 0 0 60px rgba(0,0,0,0.2) !important;
}

/* 通关覆盖层编辑体化 */
#complete-overlay .complete-title {
  font-variation-settings: 'opsz' 96;
}

/* 响应式 */
@media (max-width: 840px) {
  .memory-header { padding: 10px 16px; }
  #game-root { padding: 16px 12px; }
}

/* ===== 以下为原游戏样式（保留功能，变量已上方映射） ===== */
*, *::before, *::after { box-sizing: border-box; }
img, video { max-width: 100%; height: auto; display: block; }
body { overflow-wrap: break-word; }

#viewport-wrapper {
  position: relative;
  width: 800px;
  height: 450px;
  flex-shrink: 0;
}

#game-viewport {
  width: 800px;
  height: 450px;
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  transform-origin: center center;
  background: var(--bg-deep);
  overflow: hidden;
}

.scene { display: none; position: absolute; inset: 0; }
.scene.active { display: flex; }

/* ===== 主菜单 ===== */
#scene-menu {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  background: radial-gradient(ellipse at 50% 30%, var(--color-accent-lighter) 0%, var(--bg-deep) 70%);
}
#scene-menu .title {
  font-size: 42px;
  font-weight: bold;
  color: var(--gold);
  letter-spacing: 4px;
  text-shadow: 0 0 40px rgba(212,165,116,0.3);
  margin-bottom: 4px;
}
#scene-menu .subtitle {
  font-size: 14px;
  color: var(--text-muted);
  letter-spacing: 6px;
  margin-bottom: 16px;
}
.menu-btn {
  width: 220px;
  padding: 12px 0;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text);
  font-size: 15px;
  cursor: pointer;
  letter-spacing: 2px;
  font-family: var(--font-ui);
}
.menu-btn:hover { background: var(--bg-hover); border-color: var(--gold-dim); color: var(--gold); }
.menu-btn.primary { background: var(--gold); color: var(--color-bg-primary); border-color: var(--gold); font-weight: bold; }
.menu-btn.primary:hover { background: var(--color-accent); filter: brightness(1.08); }
.menu-btn.tutorial { border-color: var(--blue-dim); }
.menu-btn.tutorial:hover { border-color: var(--blue); color: var(--blue); }

/* ===== 设置面板 ===== */
#scene-settings {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  background: var(--bg-deep);
}
#scene-settings h2 {
  font-size: 28px;
  color: var(--gold);
  margin: 0;
  letter-spacing: 2px;
}
.setting-row { display: flex; gap: 12px; align-items: center; }
.setting-option {
  padding: 10px 24px;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text-muted);
  font-size: 14px;
  cursor: pointer;
  font-family: var(--font-ui);
}
.setting-option:hover { border-color: var(--text-muted); color: var(--text); }
.setting-option.selected { border-color: var(--gold); color: var(--gold); background: var(--color-accent-lighter); }
.setting-back {
  margin-top: 8px;
  padding: 8px 28px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  cursor: pointer;
  font-family: var(--font-ui);
}
.setting-back:hover { color: var(--text); border-color: var(--text-muted); }

/* ===== 选关界面 ===== */
#scene-level-select {
  flex-direction: column;
  align-items: center;
  padding: 30px 40px;
  gap: 16px;
  background: var(--bg-deep);
  overflow-y: auto;
}
#scene-level-select h2 {
  font-size: 24px;
  color: var(--gold);
  margin: 0 0 4px;
  letter-spacing: 2px;
}
.level-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  width: 100%;
  max-width: 600px;
}
.level-cell {
  aspect-ratio: 1;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  font-size: 13px;
  color: var(--text-muted);
}
.level-cell:hover:not(.locked) { border-color: var(--gold-dim); color: var(--gold); }
.level-cell.locked { opacity: 0.35; cursor: not-allowed; }
.level-cell .lock-icon { font-size: 18px; margin-bottom: 2px; }
.level-cell .level-num { font-weight: bold; font-size: 16px; color: var(--text); }
.level-cell.locked .level-num { color: var(--text-muted); }
.level-cell .level-name { font-size: 10px; margin-top: 2px; }
.level-cell.completed { border-color: var(--green); }
.level-cell.completed::after {
  content: '✓';
  position: absolute;
  top: 4px;
  right: 6px;
  font-size: 11px;
  color: var(--green);
}

.overall-progress {
  width: 100%;
  max-width: 600px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-ui);
}
.overall-progress-bar {
  flex: 1;
  height: 6px;
  background: var(--bg-surface);
  border-radius: 3px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.overall-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  border-radius: 3px;
  transition: width 0.5s ease;
}
.overall-progress-text {
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
  color: var(--gold);
  font-weight: 600;
}

.level-back {
  padding: 8px 28px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  cursor: pointer;
  font-family: var(--font-ui);
  margin-top: 8px;
}
.level-back:hover { color: var(--text); border-color: var(--text-muted); }
.custom-upload-btn {
  padding: 10px 24px;
  border: 1px dashed var(--blue-dim);
  background: transparent;
  color: var(--blue);
  font-size: 13px;
  cursor: pointer;
  font-family: var(--font-ui);
  letter-spacing: 1px;
}
.custom-upload-btn:hover { border-color: var(--blue); background: rgba(107,155,210,0.08); }

/* ===== 游戏界面 ===== */
#scene-playing {
  flex-direction: column;
  background: var(--bg-deep);
}
.game-hud {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  height: 44px;
  flex-shrink: 0;
}
.game-hud .hud-left { display: flex; align-items: center; gap: 12px; }
.game-hud .hud-level { font-size: 15px; color: var(--gold); letter-spacing: 1px; }
.game-hud .hud-timer { font-size: 14px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
.game-hud .hud-timer.urgent { color: var(--red); animation: pulse 0.5s ease-in-out infinite; }
.game-hud .hud-progress { font-size: 13px; color: var(--text-muted); }
.game-hud .hud-btns { display: flex; gap: 8px; }
.hud-btn {
  padding: 5px 12px;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font-ui);
}
.hud-btn:hover { color: var(--text); border-color: var(--text-muted); }
.hud-btn.auto-btn { border-color: var(--blue-dim); color: var(--blue); }
.hud-btn.auto-btn:hover { border-color: var(--blue); }

.game-main {
  flex: 1;
  position: relative;
  overflow: hidden;
  touch-action: none;
  -webkit-touch-callout: none;
}

/* 拼图容器 */
#puzzle-container {
  position: absolute;
  inset: 0;
}

/* 网格底座 */
#slots-area {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 420px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 1px solid var(--border);
}
#slots-grid {
  display: grid;
  gap: 2px;
}
.slot-cell {
  border: 1px dashed var(--color-border-medium);
  background: rgba(0,0,0,0.18);
  transition: border-color 0.3s, background 0.3s;
  background-size: cover;
  background-repeat: no-repeat;
}
.slot-cell.filled { border-color: var(--green); border-style: solid; background: transparent; }
.slot-cell.highlight {
  border-color: var(--gold);
  border-style: solid;
  background: rgba(212,165,116,0.15);
  box-shadow: 0 0 12px rgba(212,165,116,0.3), inset 0 0 12px rgba(212,165,116,0.1);
  transition: all 0.15s ease;
}

/* 拼图碎片 */
.piece {
  position: absolute;
  border-radius: 3px;
  cursor: grab;
  z-index: 1;
  perspective: 600px;
  will-change: transform, left, top;
}
.piece.dragging {
  cursor: grabbing;
  z-index: 100 !important;
}
.piece.snapped {
  cursor: default;
  pointer-events: none;
  z-index: 2;
}

/* 自动通关飞行过渡 */
.piece.flying {
  transition: left 0.5s cubic-bezier(0.25, 1, 0.5, 1), top 0.5s cubic-bezier(0.25, 1, 0.5, 1);
}

/* 3D 卡片内部 */
.piece-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  -webkit-transform-style: preserve-3d;
  transform: rotateY(180deg);
  transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
}
.piece.flipped .piece-inner {
  transform: rotateY(0deg);
}

.piece-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 3px;
}

/* 正面：图片切片 */
.piece-front {
  background-size: cover;
  background-repeat: no-repeat;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
}

/* 背面：暗金纹理 */
.piece-back {
  background-color: var(--bg-surface);
  background-image:
    linear-gradient(45deg, rgba(212,165,116,0.12) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(212,165,116,0.12) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, rgba(212,165,116,0.12) 75%),
    linear-gradient(-45deg, transparent 75%, rgba(212,165,116,0.12) 75%);
  background-size: 10px 10px;
  background-position: 0 0, 0 5px, 5px -5px, -5px 0px;
  border: 1.5px solid var(--gold-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  transform: rotateY(180deg);
}
.piece-back::after {
  content: '?';
  font-family: var(--font-display);
  font-size: 28px;
  color: var(--gold);
  opacity: 0.7;
  text-shadow: 0 0 12px var(--gold-glow);
}
.piece.small-back .piece-back::after { font-size: 18px; }

/* 拖拽时的高亮 */
.piece.dragging .piece-inner { filter: brightness(1.15); }
.piece.dragging .piece-back {
  border-color: var(--gold);
  box-shadow: 0 0 16px var(--gold-glow);
}

/* 吸附后翻转完成 */
.piece.snapped .piece-back { border-color: var(--green); }
.piece.snapped .piece-front {
  box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.08);
}

/* 记忆阶段覆盖层 */
#memory-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.92);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 50;
  transition: opacity 0.4s;
}
#memory-overlay.hidden { opacity: 0; pointer-events: none; }
#memory-overlay .memory-img {
  width: 280px;
  height: 280px;
  object-fit: cover;
  border-radius: 8px;
  border: 2px solid var(--border);
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
  transition: opacity 0.3s ease;
}
#memory-overlay .memory-countdown {
  font-size: 48px;
  color: var(--gold);
  margin-top: 12px;
  text-shadow: 0 0 20px rgba(212,165,116,0.4);
  font-variant-numeric: tabular-nums;
  transition: transform 0.1s ease, color 0.3s;
}
#memory-overlay .memory-countdown.pulse {
  animation: countdown-pulse 0.3s ease-out;
}
@keyframes countdown-pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
#memory-overlay .memory-hint {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 6px;
  letter-spacing: 1px;
  max-width: 320px;
  text-align: center;
  line-height: 1.5;
}
#memory-overlay .memory-skip-tip {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 14px;
  letter-spacing: 0.5px;
  opacity: 0.55;
  font-family: var(--font-ui);
}
#memory-overlay .memory-img {
  cursor: pointer;
}
#memory-overlay.hidden .memory-img {
  cursor: default;
}

/* 自动通关覆盖层 */
#auto-solve-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 40;
  display: none;
  align-items: center;
  justify-content: center;
}
#auto-solve-overlay.active { display: flex; }
#auto-solve-overlay .auto-text {
  font-size: 20px;
  color: var(--blue);
  letter-spacing: 2px;
}

/* 通关覆盖层 */
#complete-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.78);
  z-index: 60;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
#complete-overlay.active { display: flex; }
#complete-overlay .complete-title {
  font-size: 36px;
  color: var(--gold);
  letter-spacing: 3px;
  text-shadow: 0 0 30px rgba(212,165,116,0.4);
}
#complete-overlay .complete-time { font-size: 16px; color: var(--text); }
#complete-overlay .complete-best { font-size: 13px; color: var(--text-muted); }
.complete-btn {
  padding: 10px 28px;
  border: 1px solid var(--gold);
  background: transparent;
  color: var(--gold);
  font-size: 14px;
  cursor: pointer;
  font-family: var(--font-ui);
  letter-spacing: 1px;
}
.complete-btn:hover { background: var(--gold); color: var(--color-bg-primary); }
.complete-btn.secondary { border-color: var(--border); color: var(--text-muted); }
.complete-btn.secondary:hover { border-color: var(--text-muted); color: var(--text); background: transparent; }

/* 粒子 */
.particle {
  position: absolute;
  pointer-events: none;
  z-index: 70;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  animation: particle-fly 0.7s ease-out forwards;
}
@keyframes particle-fly {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.upload-toast {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 8px 20px;
  border-radius: 20px;
  background: var(--bg-surface);
  color: var(--text);
  font-size: 13px;
  border: 1px solid var(--border);
  z-index: 80;
  animation: fadeInUp 0.3s ease-out;
  pointer-events: none;
}

</style>

<script src="../assets/js/game-utils.js"></script>
<script>
(function() {
  'use strict';

  // ==================== 关卡配置 ====================
  var LEVELS = [
    { id: 0,  name: '新手教学',     cols: 2, rows: 2, picsumId: 10,  hint: '图形将展示3秒，随后打乱。请将右侧碎片拖回左侧正确格子', category: '风景' },
    { id: 1,  name: '初窥门径',     cols: 2, rows: 2, picsumId: 20,  hint: '', category: '风景' },
    { id: 2,  name: '略有小成',     cols: 3, rows: 3, picsumId: 30,  hint: '', category: '建筑' },
    { id: 3,  name: '渐入佳境',     cols: 3, rows: 3, picsumId: 40,  hint: '', category: '动物' },
    { id: 4,  name: '更上层楼',     cols: 3, rows: 3, picsumId: 50,  hint: '', category: '星空' },
    { id: 5,  name: '心明眼亮',     cols: 4, rows: 4, picsumId: 60,  hint: '', category: '极简几何' },
    { id: 6,  name: '耳聪目明',     cols: 4, rows: 4, picsumId: 70,  hint: '', category: '自然风景' },
    { id: 7,  name: '脑力全开',     cols: 4, rows: 4, picsumId: 80,  hint: '', category: '城市夜景' },
    { id: 8,  name: '过目不忘',     cols: 5, rows: 5, picsumId: 90,  hint: '', category: '艺术图案' },
    { id: 9,  name: '超凡入圣',     cols: 5, rows: 5, picsumId: 100, hint: '', category: '抽象画' },
    { id: 10, name: '记忆之神',     cols: 6, rows: 6, picsumId: 110, hint: '', category: '复杂纹理' }
  ];

  // ==================== DOM 引用 ====================
  var gameViewport = document.getElementById('game-viewport');
  var puzzleContainer = document.getElementById('puzzle-container');
  var scenes = {
    menu:        document.getElementById('scene-menu'),
    settings:    document.getElementById('scene-settings'),
    levelSelect: document.getElementById('scene-level-select'),
    playing:     document.getElementById('scene-playing')
  };
  var memoryOverlay   = document.getElementById('memory-overlay');
  var memoryImg       = document.getElementById('memory-img');
  var memoryCountdown = document.getElementById('memory-countdown');
  var memoryHint      = document.getElementById('memory-hint');
  var slotsGrid       = document.getElementById('slots-grid');
  var autoSolveOverlay = document.getElementById('auto-solve-overlay');
  var completeOverlay = document.getElementById('complete-overlay');
  var hudLevel    = document.getElementById('hud-level');
  var hudTimer    = document.getElementById('hud-timer');
  var hudProgress = document.getElementById('hud-progress');
  var levelGrid   = document.getElementById('level-grid');
  var overallProgressFill = document.getElementById('overall-progress-fill');
  var overallProgressText = document.getElementById('overall-progress-text');
  var modeSelector = document.getElementById('mode-selector');
  var modeDesc     = document.getElementById('mode-desc');
  var customFile   = document.getElementById('custom-file');
  var highlightedSlot = null;

  // ==================== 全局状态 ====================
  var gameMode = 'linear';
  var currentLevel = null;
  var isCustomImage = false;
  var customImageData = null;
  var pieces = [];
  var slots = [];
  var cellSize = 0;
  var totalGridSize = 0;
  var cols = 0, rows = 0;
  var totalPieces = 0;
  var snappedCount = 0;
  var gameStartTime = 0;
  var pausedElapsed = 0;
  var timerInterval = null;
  var memoryTimer = null;
  var isPlaying = false;
  var isAutoSolving = false;
  var dragInfo = null;
  var allTimers = [];
  var allAnimFrames = [];
  var cleanupFns = [];

  // ==================== 持久化 ====================
  function safeLSGet(key, fallback) {
    try { var v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; }
    catch(e) { return fallback; }
  }
  function safeLSSet(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
  }
  function getLinearProgress() { return safeLSGet('mp_linearProgress', 1); }
  function setLinearProgress(v) { safeLSSet('mp_linearProgress', v); }
  function getBestScores() { return safeLSGet('mp_bestScores', {}); }
  function setBestScore(levelId, time) {
    var scores = getBestScores();
    if (!scores[levelId] || time < scores[levelId]) {
      scores[levelId] = time;
      safeLSSet('mp_bestScores', scores);
    }
  }
  function getBestScore(levelId) {
    var scores = getBestScores();
    return scores[levelId] || null;
  }
  function getSavedMode() { return safeLSGet('mp_mode', 'linear'); }

  // ==================== 场景切换 ====================
  function showScene(name) {
    Object.values(scenes).forEach(function(s) { s.classList.remove('active'); });
    if (scenes[name]) scenes[name].classList.add('active');
  }

  // ==================== 视口缩放 ====================
  function updateViewportScale() {
    var ww = window.innerWidth;
    var wh = window.innerHeight - 70; // 减去 header 高度
    var scale = Math.min(ww / 820, wh / 470, 1.5);
    gameViewport.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
  }

  // 获取当前视口缩放比例
  function getCurrentScale() {
    return gameViewport.getBoundingClientRect().width / 800;
  }

  // ==================== 清理函数 ====================
  function registerTimer(id) { allTimers.push(id); return id; }
  function registerAnimFrame(id) { allAnimFrames.push(id); return id; }
  function registerCleanup(fn) { cleanupFns.push(fn); }

  function _cleanup() {
    // 清除所有定时器
    allTimers.forEach(function(id) { clearTimeout(id); clearInterval(id); });
    allTimers = [];
    // 清除所有动画帧
    allAnimFrames.forEach(function(id) { cancelAnimationFrame(id); });
    allAnimFrames = [];
    // 执行清理回调
    cleanupFns.forEach(function(fn) { try { fn(); } catch(e) {} });
    cleanupFns = [];
    // 清除计时器
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    if (memoryTimer) { clearInterval(memoryTimer); memoryTimer = null; }
    // 清除残留粒子 DOM
    var allParticles = document.querySelectorAll('.particle');
    for (var i = 0; i < allParticles.length; i++) { allParticles[i].remove(); }
    // 清除碎片 DOM
    var allPieces = puzzleContainer.querySelectorAll('.piece');
    for (var j = 0; j < allPieces.length; j++) { allPieces[j].remove(); }
    // 解绑 document 上的拖拽事件
    document.removeEventListener('pointermove', onDocPointerMove);
    document.removeEventListener('pointerup', onDocPointerUp);
    document.removeEventListener('pointercancel', onDocPointerUp);
    // 清除吸附高亮
    if (highlightedSlot) {
      highlightedSlot.el.classList.remove('highlight');
      highlightedSlot = null;
    }
    // 重置状态
    dragInfo = null;
    isPlaying = false;
    isAutoSolving = false;
    pieces = [];
    slots = [];
    snappedCount = 0;
    pausedElapsed = 0;
  }

  // ==================== 粒子特效 ====================
  function spawnParticles(x, y, count) {
    for (var i = 0; i < count; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      var angle = Math.random() * Math.PI * 2;
      var dist = 20 + Math.random() * 40;
      p.style.cssText =
        'left:' + x + 'px;' +
        'top:' + y + 'px;' +
        '--px:' + (Math.cos(angle) * dist) + 'px;' +
        '--py:' + (Math.sin(angle) * dist) + 'px;' +
        'background:hsl(' + (38 + Math.random()*20) + ',' + (80 + Math.random()*20) + '%,' + (50 + Math.random()*20) + '%);' +
        'width:' + (3 + Math.random()*5) + 'px;' +
        'height:' + (3 + Math.random()*5) + 'px;';
      puzzleContainer.appendChild(p);
      var tid = setTimeout(function() { if (p.parentNode) p.parentNode.removeChild(p); }, 700);
      registerTimer(tid);
    }
  }

  // ==================== 计时器 ====================
  function startTimer() {
    gameStartTime = Date.now() - pausedElapsed * 1000;
    updateTimerDisplay();
    timerInterval = setInterval(updateTimerDisplay, 200);
    allTimers.push(timerInterval);
  }
  function updateTimerDisplay() {
    if (!isPlaying && !isAutoSolving) return;
    var elapsed = getElapsed();
    var m = Math.floor(elapsed / 60);
    var s = elapsed % 60;
    hudTimer.textContent = '\u23F1 ' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }
  function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    pausedElapsed = getElapsed();
  }
  function getElapsed() {
    return Math.floor((Date.now() - gameStartTime) / 1000);
  }

  // ==================== 图片 URL ====================
  function getLevelImageUrl(level) {
    return 'https://picsum.photos/id/' + level.picsumId + '/600/600';
  }

  // ==================== 自定义图片中心裁剪 ====================
  function centerCropImage(dataUrl, callback) {
    var img = new Image();
    img.onload = function() {
      var size = Math.min(img.width, img.height);
      var ox = (img.width - size) / 2;
      var oy = (img.height - size) / 2;
      var canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, ox, oy, size, size, 0, 0, size, size);
      callback(canvas.toDataURL('image/jpeg', 0.92));
    };
    img.src = dataUrl;
  }

  // ==================== 构建选关界面 ====================
  function buildLevelGrid() {
    levelGrid.innerHTML = '';
    var progress = getLinearProgress();
    var completedCount = 0;
    LEVELS.forEach(function(lv) {
      var cell = document.createElement('div');
      cell.className = 'level-cell';
      var unlocked = gameMode === 'free' || lv.id <= progress;
      if (!unlocked) cell.classList.add('locked');
      var best = getBestScore(lv.id);
      if (best !== null) {
        cell.classList.add('completed');
        completedCount++;
      }

      var iconHtml = unlocked ? '' : '<span class="lock-icon">\uD83D\uDD12</span>';
      var numText = lv.id === 0 ? '\u6559' : String(lv.id);
      cell.innerHTML = iconHtml + '<span class="level-num">' + numText + '</span><span class="level-name">' + lv.name + '</span>';

      if (unlocked) {
        cell.addEventListener('click', (function(lvId) {
          return function() {
            if (window.GameUtils) GameUtils.recordPlay('memory', 0);
            startLevel(lvId, false);
          };
        })(lv.id));
      }
      levelGrid.appendChild(cell);
    });

    var percent = Math.floor((completedCount / LEVELS.length) * 100);
    overallProgressFill.style.width = percent + '%';
    overallProgressText.textContent = percent + '%';
  }

  // ==================== 开始关卡 ====================
  function startLevel(levelId, isCustom) {
    _cleanup();

    if (!isCustom) {
      for (var i = 0; i < LEVELS.length; i++) {
        if (LEVELS[i].id === levelId) { currentLevel = LEVELS[i]; break; }
      }
      isCustomImage = false;
      customImageData = null;
    }

    cols = currentLevel.cols;
    rows = currentLevel.rows;
    totalPieces = cols * rows;
    cellSize = Math.floor(320 / Math.max(cols, rows));
    totalGridSize = cellSize * Math.max(cols, rows);
    snappedCount = 0;

    showScene('playing');
    hudLevel.textContent = 'Level ' + (currentLevel.id === 0 ? '\u6559\u7A0B' : currentLevel.id);
    hudTimer.textContent = '\u23F1 00:00';
    hudProgress.textContent = '0/' + totalPieces;
    hudTimer.classList.remove('urgent');
    autoSolveOverlay.classList.remove('active');
    completeOverlay.classList.remove('active');
    memoryOverlay.classList.remove('hidden');

    // 构建 slots 网格
    slotsGrid.innerHTML = '';
    slotsGrid.style.gridTemplateColumns = 'repeat(' + cols + ', ' + cellSize + 'px)';
    slotsGrid.style.gridTemplateRows = 'repeat(' + rows + ', ' + cellSize + 'px)';
    slots = [];
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var cell = document.createElement('div');
        cell.className = 'slot-cell';
        cell.style.width = cellSize + 'px';
        cell.style.height = cellSize + 'px';
        slotsGrid.appendChild(cell);
        slots.push({ el: cell, row: r, col: c });
      }
    }

    // 加载图片
    var imgUrl = isCustomImage ? customImageData : getLevelImageUrl(currentLevel);

    // 记忆倒计时配置（教程关给 5 秒，其他 3 秒）
    var countdownSecs = currentLevel.id === 0 ? 5 : 3;
    memoryHint.textContent = currentLevel.hint || '';
    memoryCountdown.textContent = '加载中…';
    memoryCountdown.style.color = 'var(--text-muted)';
    memoryImg.style.opacity = '0'; // 加载完成前隐藏，避免看到旧图

    var memoryStarted = false; // 防止重复启动
    var memoryEndTime = 0;
    var memoryRafId = null;
    var lastDisplayedSec = -1;

    function updateMemoryCountdown() {
      var now = Date.now();
      var remaining = Math.max(0, (memoryEndTime - now) / 1000);
      var sec = Math.ceil(remaining);

      if (sec !== lastDisplayedSec) {
        lastDisplayedSec = sec;
        memoryCountdown.textContent = String(sec);
        if (sec <= 1) {
          memoryCountdown.style.color = 'var(--red)';
        }
        memoryCountdown.classList.remove('pulse');
        void memoryCountdown.offsetWidth;
        memoryCountdown.classList.add('pulse');
      }

      if (remaining <= 0) {
        memoryRafId = null;
        memoryOverlay.classList.add('hidden');
        clearGridPreview();
        startPuzzlePhase(imgUrl);
        return;
      }
      memoryRafId = requestAnimationFrame(updateMemoryCountdown);
      registerAnimFrame(memoryRafId);
    }

    function beginMemoryCountdown() {
      if (memoryStarted) return;
      memoryStarted = true;

      memoryImg.style.opacity = '1';
      memoryCountdown.textContent = String(countdownSecs);
      memoryCountdown.style.color = 'var(--gold)';
      lastDisplayedSec = countdownSecs;
      // 预览阶段：网格显示完整大图
      showGridPreview(imgUrl);

      memoryEndTime = Date.now() + countdownSecs * 1000;
      memoryRafId = requestAnimationFrame(updateMemoryCountdown);
      registerAnimFrame(memoryRafId);
    }

    memoryImg.onload = beginMemoryCountdown;
    // 若加载失败（如离线），1.2 秒后兜底启动，避免卡死
    var fallbackTid = setTimeout(function() {
      if (!memoryStarted && scenes.playing.classList.contains('active')) {
        beginMemoryCountdown();
      }
    }, 1200);
    registerTimer(fallbackTid);

    // 点击图片可跳过记忆阶段，直接开始拼图
    var skipHandler = function() {
      if (memoryStarted && memoryRafId) {
        cancelAnimationFrame(memoryRafId);
        memoryRafId = null;
        memoryOverlay.classList.add('hidden');
        clearGridPreview();
        startPuzzlePhase(imgUrl);
      }
    };
    memoryImg.addEventListener('click', skipHandler);
    registerCleanup(function() { memoryImg.removeEventListener('click', skipHandler); });

    memoryImg.src = imgUrl;
  }

  function showGridPreview(imgUrl) {
    slots.forEach(function(slot) {
      slot.el.style.backgroundImage = 'url(' + imgUrl + ')';
      slot.el.style.backgroundSize = totalGridSize + 'px ' + totalGridSize + 'px';
      slot.el.style.backgroundPosition = '-' + (slot.col * cellSize) + 'px -' + (slot.row * cellSize) + 'px';
    });
  }

  function clearGridPreview() {
    slots.forEach(function(slot) {
      slot.el.style.backgroundImage = '';
      slot.el.style.backgroundSize = '';
      slot.el.style.backgroundPosition = '';
    });
  }

  // ==================== 拼图阶段 ====================
  function startPuzzlePhase(imgUrl) {
    isPlaying = true;
    startTimer();
    createPieces(imgUrl);
  }

  function createPieces(imgUrl) {
    // 生成位置列表并打乱
    var positions = [];
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        positions.push({ row: r, col: c });
      }
    }
    for (var i = positions.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = positions[i]; positions[i] = positions[j]; positions[j] = tmp;
    }

    // 计算右侧放置区域
    var containerW = puzzleContainer.clientWidth || 800;
    var containerH = puzzleContainer.clientHeight || 406;
    var rightX = 430;
    var rightW = containerW - rightX - 8;
    var rightH = containerH - 8;
    var pieceW = cellSize;
    var pieceH = cellSize;

    var placeCols = Math.max(2, Math.floor(rightW / (pieceW + 14)));
    var placeRows = Math.ceil(totalPieces / placeCols);
    var placeCellW = rightW / placeCols;
    var placeCellH = Math.min(rightH / placeRows, pieceH + 30);

    var isSmall = cellSize < 70;
    var placedPositions = [];

    positions.forEach(function(pos, idx) {
      var gCol = idx % placeCols;
      var gRow = Math.floor(idx / placeCols);
      var baseX = rightX + gCol * placeCellW + 4;
      var baseY = gRow * placeCellH + 4;
      var maxJitterX = Math.max(0, (placeCellW - pieceW - 6) / 2);
      var maxJitterY = Math.max(0, (placeCellH - pieceH - 6) / 2);
      var jitterX = (Math.random() - 0.5) * 2 * maxJitterX;
      var jitterY = (Math.random() - 0.5) * 2 * maxJitterY;
      var left = baseX + jitterX;
      var top = baseY + jitterY;

      left = Math.max(rightX, Math.min(containerW - pieceW - 4, left));
      top = Math.max(4, Math.min(containerH - pieceH - 4, top));

      placedPositions.push({ left: left, top: top });

      // 创建碎片 DOM
      var el = document.createElement('div');
      el.className = 'piece';
      if (isSmall) el.classList.add('small-back');
      el.style.width = pieceW + 'px';
      el.style.height = pieceH + 'px';
      el.style.left = left + 'px';
      el.style.top = top + 'px';

      // 内部 3D 结构
      var inner = document.createElement('div');
      inner.className = 'piece-inner';

      var front = document.createElement('div');
      front.className = 'piece-face piece-front';
      front.style.backgroundImage = 'url(' + imgUrl + ')';
      front.style.backgroundSize = totalGridSize + 'px ' + totalGridSize + 'px';
      front.style.backgroundPosition = '-' + (pos.col * cellSize) + 'px -' + (pos.row * cellSize) + 'px';

      var back = document.createElement('div');
      back.className = 'piece-face piece-back';

      inner.appendChild(front);
      inner.appendChild(back);
      el.appendChild(inner);

      el.addEventListener('pointerdown', onPiecePointerDown);
      puzzleContainer.appendChild(el);

      pieces.push({
        el: el,
        inner: inner,
        row: pos.row,
        col: pos.col,
        correctRow: pos.row,
        correctCol: pos.col,
        snapped: false
      });
    });

    updateProgress();
  }

  // ==================== 坐标工具 ====================
  function getPuzzleContainerRect() {
    return puzzleContainer.getBoundingClientRect();
  }

  // 将 slot 中心转为 puzzle-container 内的虚拟坐标（已除以 currentScale）
  function getSlotCenterInContainer(slot) {
    var currentScale = getCurrentScale();
    var slotRect = slot.el.getBoundingClientRect();
    var containerRect = getPuzzleContainerRect();
    return {
      x: (slotRect.left + slotRect.width / 2 - containerRect.left) / currentScale,
      y: (slotRect.top + slotRect.height / 2 - containerRect.top) / currentScale
    };
  }

  // 获取碎片对应的正确 slot
  function getCorrectSlotForPiece(pieceData) {
    for (var i = 0; i < slots.length; i++) {
      if (slots[i].row === pieceData.correctRow && slots[i].col === pieceData.correctCol) {
        return slots[i];
      }
    }
    return null;
  }

  // 检测碎片是否在吸附范围内，用于实时高亮
  function updateSnapHighlight(pieceData, pieceLeft, pieceTop) {
    var targetSlot = getCorrectSlotForPiece(pieceData);
    if (!targetSlot) {
      clearSnapHighlight();
      return;
    }

    var pieceCenterX = pieceLeft + cellSize / 2;
    var pieceCenterY = pieceTop + cellSize / 2;
    var slotCenter = getSlotCenterInContainer(targetSlot);
    var slotLeft = slotCenter.x - cellSize / 2;
    var slotTop = slotCenter.y - cellSize / 2;

    var dx = pieceCenterX - slotCenter.x;
    var dy = pieceCenterY - slotCenter.y;
    var dist = Math.sqrt(dx * dx + dy * dy);

    var overlapX = Math.min(pieceLeft + cellSize, slotLeft + cellSize) - Math.max(pieceLeft, slotLeft);
    var overlapY = Math.min(pieceTop + cellSize, slotTop + cellSize) - Math.max(pieceTop, slotTop);
    var intersect = overlapX > 0 && overlapY > 0;

    var proximityThreshold = Math.max(cellSize * 0.6, 55);

    if (intersect || dist <= proximityThreshold) {
      if (highlightedSlot !== targetSlot) {
        clearSnapHighlight();
        targetSlot.el.classList.add('highlight');
        highlightedSlot = targetSlot;
      }
    } else {
      clearSnapHighlight();
    }
  }

  function clearSnapHighlight() {
    if (highlightedSlot) {
      highlightedSlot.el.classList.remove('highlight');
      highlightedSlot = null;
    }
  }

  // ==================== 拖拽逻辑（事件绑定到 document） ====================
  function onPiecePointerDown(e) {
    if (dragInfo) return;
    if (!isPlaying || isAutoSolving) return;
    e.preventDefault();

    var el = e.currentTarget;
    var pieceData = null;
    for (var i = 0; i < pieces.length; i++) {
      if (pieces[i].el === el) { pieceData = pieces[i]; break; }
    }
    if (!pieceData || pieceData.snapped) return;

    if (window.MemoryBGM && typeof window.MemoryBGM.playPick === 'function') {
      window.MemoryBGM.playPick();
    }

    try { el.setPointerCapture(e.pointerId); } catch(ex) {}

    el.classList.add('dragging');

    var currentScale = getCurrentScale();
    var containerRect = getPuzzleContainerRect();
    var pieceLeft = parseFloat(el.style.left);
    var pieceTop = parseFloat(el.style.top);

    // 物理坐标 → 虚拟坐标
    var clientXInContainer = (e.clientX - containerRect.left) / currentScale;
    var clientYInContainer = (e.clientY - containerRect.top) / currentScale;

    dragInfo = {
      el: el,
      pieceData: pieceData,
      pointerId: e.pointerId,
      offsetX: clientXInContainer - pieceLeft,
      offsetY: clientYInContainer - pieceTop,
      startLeft: pieceLeft,
      startTop: pieceTop
    };

    document.addEventListener('pointermove', onDocPointerMove);
    document.addEventListener('pointerup', onDocPointerUp);
    document.addEventListener('pointercancel', onDocPointerUp);
  }

  function onDocPointerMove(e) {
    if (!dragInfo || dragInfo.pointerId !== e.pointerId) return;
    e.preventDefault();

    var currentScale = getCurrentScale();
    var containerRect = getPuzzleContainerRect();
    var clientXInContainer = (e.clientX - containerRect.left) / currentScale;
    var clientYInContainer = (e.clientY - containerRect.top) / currentScale;

    var newLeft = clientXInContainer - dragInfo.offsetX;
    var newTop = clientYInContainer - dragInfo.offsetY;

    var containerW = puzzleContainer.clientWidth || 800;
    var containerH = puzzleContainer.clientHeight || 406;
    newLeft = Math.max(0, Math.min(containerW - cellSize, newLeft));
    newTop = Math.max(0, Math.min(containerH - cellSize, newTop));

    var dx = newLeft - dragInfo.startLeft;
    var dy = newTop - dragInfo.startTop;
    dragInfo.el.style.transform = 'translate3d(' + dx + 'px, ' + dy + 'px, 0)';

    updateSnapHighlight(dragInfo.pieceData, newLeft, newTop);
  }

  function onDocPointerUp(e) {
    if (!dragInfo || dragInfo.pointerId !== e.pointerId) return;
    e.preventDefault();

    var el = dragInfo.el;
    var pieceData = dragInfo.pieceData;

    document.removeEventListener('pointermove', onDocPointerMove);
    document.removeEventListener('pointerup', onDocPointerUp);
    document.removeEventListener('pointercancel', onDocPointerUp);

    try { el.releasePointerCapture(dragInfo.pointerId); } catch(ex) {}

    el.classList.remove('dragging');

    var currentScale = getCurrentScale();
    var containerRect = getPuzzleContainerRect();
    var clientXInContainer = (e.clientX - containerRect.left) / currentScale;
    var clientYInContainer = (e.clientY - containerRect.top) / currentScale;

    var newLeft = clientXInContainer - dragInfo.offsetX;
    var newTop = clientYInContainer - dragInfo.offsetY;

    // 限制在 puzzle-container 范围内
    var containerW = puzzleContainer.clientWidth || 800;
    var containerH = puzzleContainer.clientHeight || 406;
    newLeft = Math.max(0, Math.min(containerW - cellSize, newLeft));
    newTop = Math.max(0, Math.min(containerH - cellSize, newTop));

    // 写回 left/top，清除 translate3d，立即提交位置
    el.style.transition = 'none';
    el.style.left = newLeft + 'px';
    el.style.top = newTop + 'px';
    el.style.transform = '';
    void el.offsetWidth; // 强制重排，确保位置立即生效

    // 清除吸附高亮
    clearSnapHighlight();

    // 吸附判定
    checkSnap(pieceData, newLeft, newTop);

    dragInfo = null;
  }

  // ==================== 吸附判定（已修复：扩大判定范围） ====================
  function checkSnap(pieceData, pieceLeft, pieceTop) {
    var pieceCenterX = pieceLeft + cellSize / 2;
    var pieceCenterY = pieceTop + cellSize / 2;

    var targetSlot = null;
    for (var i = 0; i < slots.length; i++) {
      if (slots[i].row === pieceData.correctRow && slots[i].col === pieceData.correctCol) {
        targetSlot = slots[i];
        break;
      }
    }
    if (!targetSlot) return;

    var slotCenter = getSlotCenterInContainer(targetSlot);
    var slotLeft = slotCenter.x - cellSize / 2;
    var slotTop = slotCenter.y - cellSize / 2;

    // 中心距离
    var dx = pieceCenterX - slotCenter.x;
    var dy = pieceCenterY - slotCenter.y;
    var dist = Math.sqrt(dx * dx + dy * dy);

    // 条件 1：边界框相交（视觉重叠即判定成功）
    var overlapX = Math.min(pieceLeft + cellSize, slotLeft + cellSize) - Math.max(pieceLeft, slotLeft);
    var overlapY = Math.min(pieceTop + cellSize, slotTop + cellSize) - Math.max(pieceTop, slotTop);
    var intersect = overlapX > 0 && overlapY > 0;

    // 条件 2：中心距离 ≤ 邻近阈值（随碎片尺寸放大，最小 55px）
    //   2x2 碎片 160px → 阈值 96px；6x6 碎片 53px → 阈值 55px
    var proximityThreshold = Math.max(cellSize * 0.6, 55);

    if (intersect || dist <= proximityThreshold) {
      snapPiece(pieceData, slotLeft, slotTop);
    }
  }

  // ==================== 吸附执行 ====================
  function snapPiece(pieceData, targetLeft, targetTop) {
    if (pieceData.snapped) return;
    pieceData.snapped = true;

    var el = pieceData.el;

    el.style.left = targetLeft + 'px';
    el.style.top = targetTop + 'px';
    el.style.transform = '';

    // 标记 slot
    var slot = null;
    for (var i = 0; i < slots.length; i++) {
      if (slots[i].row === pieceData.correctRow && slots[i].col === pieceData.correctCol) {
        slot = slots[i];
        break;
      }
    }
    if (slot) slot.el.classList.add('filled');

    // 通过 CSS 类触发 3D 翻面
    el.classList.add('snapped');
    var rafId = requestAnimationFrame(function() {
      el.classList.add('flipped');
    });
    registerAnimFrame(rafId);

    snappedCount++;
    updateProgress();

    if (window.MemoryBGM && typeof window.MemoryBGM.playSnap === 'function') {
      window.MemoryBGM.playSnap();
    }

    spawnParticles(targetLeft + cellSize / 2, targetTop + cellSize / 2, 12);

    if (snappedCount >= totalPieces) {
      var tid = setTimeout(function() { onLevelComplete(); }, 600);
      registerTimer(tid);
    }
  }

  function updateProgress() {
    hudProgress.textContent = snappedCount + '/' + totalPieces;
  }

  // ==================== 通关 ====================
  function onLevelComplete() {
    // 防御：若已退出（currentLevel 被清空或不在游戏场景），不触发通关
    if (!currentLevel || !scenes.playing.classList.contains('active')) return;
    isPlaying = false;
    stopTimer();
    var elapsed = getElapsed();
    hudTimer.textContent = '\u23F1 ' + String(Math.floor(elapsed/60)).padStart(2,'0') + ':' + String(elapsed%60).padStart(2,'0');

    if (window.MemoryBGM && typeof window.MemoryBGM.playWin === 'function') {
      window.MemoryBGM.playWin();
    }

    if (!isCustomImage && currentLevel) {
      setBestScore(currentLevel.id, elapsed);
      if (gameMode === 'linear') {
        var progress = getLinearProgress();
        if (currentLevel.id >= progress) {
          setLinearProgress(currentLevel.id + 1);
        }
      }
      // 成就系统
      if (window.GameUtils) {
        var bestScores = getBestScores();
        var completedMain = 0;
        for (var lid = 1; lid <= 10; lid++) {
          if (bestScores[lid] !== undefined) completedMain++;
        }
        if (completedMain >= 5 && !GameUtils.isUnlocked('memory_lv5')) {
          GameUtils.unlock('memory_lv5', '过目不忘', '记忆拼图通关 5 关');
        }
        if (completedMain >= 10 && !GameUtils.isUnlocked('memory_all')) {
          GameUtils.unlock('memory_all', '记忆大师', '记忆拼图全关卡通关');
        }
      }
      // 排行榜接入：记录每关用时（越短越好）
      if (window.GameUtils) {
        GameUtils.saveLeaderboard('memory', elapsed, { level: currentLevel.id }, { lowerBetter: true });
        GameUtils.recordScore('memory', elapsed);
        var lbEl = document.getElementById('lbList');
        if (lbEl) lbEl.innerHTML = GameUtils.renderLeaderboard('memory', {
          lowerBetter: true,
          meta: function(r) {
            var d = new Date(r.date);
            var lv = (r.extra && r.extra.level !== undefined) ? r.extra.level : '?';
            return '第 ' + lv + ' 关 · ' + (d.getMonth() + 1) + '/' + d.getDate();
          }
        });
      }
    }

    completeOverlay.classList.add('active');
    if (window.GameUtils) GameUtils.celebrate();
    document.getElementById('complete-time').textContent =
      '\u7528\u65F6 ' + String(Math.floor(elapsed/60)).padStart(2,'0') + ':' + String(elapsed%60).padStart(2,'0');

    var best = isCustomImage ? null : getBestScore(currentLevel.id);
    var bestEl = document.getElementById('complete-best');
    if (best !== null && best === elapsed) {
      bestEl.textContent = '\uD83C\uDFC6 \u65B0\u7EAA\u5F55\uFF01';
      bestEl.style.color = 'var(--gold)';
    } else if (best !== null) {
      bestEl.textContent = '\u6700\u4F73\u6210\u7EE9 ' + String(Math.floor(best/60)).padStart(2,'0') + ':' + String(best%60).padStart(2,'0');
      bestEl.style.color = 'var(--text-muted)';
    } else {
      bestEl.textContent = '';
    }

    // 下一关按钮：仅预设关卡且非最后一关才显示
    var nextBtn = document.getElementById('btn-next-level');
    var canNext = !isCustomImage && currentLevel && currentLevel.id >= 0 && currentLevel.id < 10;
    nextBtn.style.display = canNext ? '' : 'none';
  }

  // ==================== 自动通关 ====================
  function autoSolve() {
    if (!isPlaying || isAutoSolving) return;
    isAutoSolving = true;
    isPlaying = false;
    stopTimer();
    autoSolveOverlay.classList.add('active');

    var unsnapped = pieces.filter(function(p) { return !p.snapped; });
    if (unsnapped.length === 0) {
      finishAutoSolve();
      return;
    }

    var idx = 0;
    function flyNext() {
      if (idx >= unsnapped.length) {
        finishAutoSolve();
        return;
      }

      var pieceData = unsnapped[idx];
      var targetSlot = null;
      for (var i = 0; i < slots.length; i++) {
        if (slots[i].row === pieceData.correctRow && slots[i].col === pieceData.correctCol) {
          targetSlot = slots[i];
          break;
        }
      }
      if (!targetSlot) { idx++; flyNext(); return; }

      var slotCenter = getSlotCenterInContainer(targetSlot);
      var targetLeft = slotCenter.x - cellSize / 2;
      var targetTop = slotCenter.y - cellSize / 2;

      var el = pieceData.el;
      el.classList.add('flying');
      el.style.left = targetLeft + 'px';
      el.style.top = targetTop + 'px';
      el.style.transform = '';

      var tid = setTimeout(function() {
        el.classList.remove('flying');
        snapPieceSilent(pieceData, targetLeft, targetTop);
        idx++;
        flyNext();
      }, 520);
      registerTimer(tid);
    }

    flyNext();
  }

  function finishAutoSolve() {
    isAutoSolving = false;
    autoSolveOverlay.classList.remove('active');
    if (snappedCount >= totalPieces) {
      onLevelComplete();
    } else {
      isPlaying = true;
      startTimer();
    }
  }

  function snapPieceSilent(pieceData, targetLeft, targetTop) {
    if (pieceData.snapped) return;
    pieceData.snapped = true;

    var el = pieceData.el;
    el.style.left = targetLeft + 'px';
    el.style.top = targetTop + 'px';
    el.style.transform = '';

    var slot = null;
    for (var i = 0; i < slots.length; i++) {
      if (slots[i].row === pieceData.correctRow && slots[i].col === pieceData.correctCol) {
        slot = slots[i];
        break;
      }
    }
    if (slot) slot.el.classList.add('filled');

    el.classList.add('snapped');
    var rafId = requestAnimationFrame(function() {
      el.classList.add('flipped');
    });
    registerAnimFrame(rafId);

    snappedCount++;
    updateProgress();
    spawnParticles(targetLeft + cellSize / 2, targetTop + cellSize / 2, 8);
  }

      });
    };
    reader.readAsDataURL(file);
  }

  function initThemeToggle() {

  // ==================== 提示功能（闪烁正确位置） ====================
  function flashOneHint() {
    var unsnapped = pieces.filter(function(p) { return !p.snapped; });
    if (unsnapped.length === 0) {
      if (window.GameUtils) GameUtils._toast('所有碎片都已归位');
      return;
    }
    var pieceData = unsnapped[0];
    var targetSlot = getCorrectSlotForPiece(pieceData);
    if (!targetSlot) return;

          '<foreignObject width="100%" height="100%">' +
          '<div xmlns="http://www.w3.org/1999/xhtml" style="width:' + rect.width + 'px;height:' + rect.height + 'px">' +
          new XMLSerializer().serializeToString(stage) +

        };
        img.onerror = function() {
          URL.revokeObjectURL(url);

        };
        img.src = url;

        GameUtils._toast('截图失败：' + e.message);
      }

  function init() {

  // 全屏按钮

  // 页面初始化时渲染排行榜
  if (window.GameUtils) {

        return '第 ' + lv + ' 关 · ' + (d.getMonth() + 1) + '/' + d.getDate();
      }
    });
  }

  // PWA Service Worker 注册
  if (window.GameUtils) {
    document.documentElement.setAttribute('data-sw-root', '../');
    GameUtils.registerSW();
  }
})();

<script>

(function bgmSystem() {
  // ---------- 配置 ----------

  var NOTE_FREQS = {

    [['G4', 1], ['B4', 1], ['D5', 1], ['G5', 1]],
    // A'段
    [['E5', 1], ['G5', 0.5], ['C6', 0.5], ['E5', 0.5], ['D5', 0.5], ['C5', 1]],
    [['A4', 0.5], ['C5', 0.5], ['E5', 1], ['A5', 0.5], ['G5', 0.5], ['E5', 1]],
    [['F4', 0.5], ['A4', 0.5], ['C5', 1], ['F5', 0.5], ['E5', 0.5], ['C5', 1]],

    [['E5', 0.5], ['G5', 0.5], ['C6', 1], ['D6', 0.5], ['C6', 0.5], ['A5', 1]],

    ['C2', 4], ['C2', 4],

  var masterGain = null;
  var isUserEnabled = false;
  var isPlaying = false;

  var beatInBar = 0;
  var lastEighthIndex = -1;
  var lastBeatNum = -1;
  var arpPatternIndex = 0;
  var melodyStep = 0;
  var melodyTimeInBar = 0;
  var bassStep = 0;
  var bassTimeInBar = 0;
  var nextNoteTime = 0;
  var schedulerTimer = null;

  // 音色：温暖钢琴（三角波 + 低通滤波）
  function playPianoNote(freq, startTime, duration, gain) {
    if (!audioCtx || !masterGain) return;
    var osc1 = audioCtx.createOscillator();
    var osc2 = audioCtx.createOscillator();
    var noteGain = audioCtx.createGain();

    osc1.frequency.value = freq;
    osc2.type = 'sine';
    osc2.frequency.value = freq * 2;

    filter.frequency.value = freq * 2.5;
    filter.Q.value = 0.3;

    var t = startTime;
    var attack = 0.01;
    var decay = duration * 0.2;
    var sustain = duration * 0.6;
    var release = duration * 0.2;

    noteGain.gain.setValueAtTime(0.0001, t);
    noteGain.gain.linearRampToValueAtTime(0.35 * gain, t + attack);
    noteGain.gain.exponentialRampToValueAtTime(0.15 * gain, t + attack + decay);
    noteGain.gain.setValueAtTime(0.15 * gain, t + duration - release);
    noteGain.gain.linearRampToValueAtTime(0.0001, t + duration);

    osc1.connect(filter);
    osc2.connect(filter);
    filter.connect(noteGain);
    noteGain.connect(masterGain);

    osc1.start(t);
    osc2.start(t);
    osc1.stop(t + duration + 0.05);
    osc2.stop(t + duration + 0.05);
  }

  // 音色：风铃（高频正弦 + 慢衰减）

    if (!audioCtx || !masterGain) return;
    var osc1 = audioCtx.createOscillator();
    var osc2 = audioCtx.createOscillator();
    var noteGain = audioCtx.createGain();
    var filter = audioCtx.createBiquadFilter();

    osc1.type = 'sine';
    osc1.frequency.value = freq;
    osc2.type = 'sine';
    osc2.frequency.value = freq * 2.005;

    filter.type = 'highpass';
    filter.frequency.value = freq * 0.5;
    filter.Q.value = 0.5;

    var t = startTime;
    var attack = 0.005;
    var release = duration * 0.6;

    noteGain.gain.setValueAtTime(0.0001, t);
    noteGain.gain.linearRampToValueAtTime(0.3 * gain, t + attack);
    noteGain.gain.exponentialRampToValueAtTime(0.0001, t + duration);

    osc1.connect(filter);
    osc2.connect(filter);
    filter.connect(noteGain);
    noteGain.connect(masterGain);

    osc1.start(t);
    osc2.start(t);
    osc1.stop(t + duration + 0.1);
    osc2.stop(t + duration + 0.1);
  }

  // 音色：Pad 铺垫（温暖梦幻）
  function playPadNote(freq, startTime, duration, gain) {
    if (!audioCtx || !masterGain) return;
    var osc1 = audioCtx.createOscillator();
    var osc2 = audioCtx.createOscillator();
    var noteGain = audioCtx.createGain();
    var filter = audioCtx.createBiquadFilter();

    osc1.type = 'sine';
    osc1.frequency.value = freq;
    osc2.type = 'triangle';
    osc2.frequency.value = freq * 1.5;

    var lfo = audioCtx.createOscillator();
    var lfoGain = audioCtx.createGain();
    lfo.type = 'sine';
    lfo.frequency.value = 0.1;
    lfoGain.gain.value = freq * 0.002;
    lfo.connect(lfoGain);
    lfoGain.connect(osc1.frequency);

    filter.type = 'lowpass';
    filter.frequency.value = freq * 2;
    filter.Q.value = 0.2;

    var t = startTime;
    var attack = duration * 0.2;
    var release = duration * 0.25;

    noteGain.gain.setValueAtTime(0.0001, t);
    noteGain.gain.linearRampToValueAtTime(0.15 * gain, t + attack);
    noteGain.gain.setValueAtTime(0.15 * gain, t + duration - release);
    noteGain.gain.linearRampToValueAtTime(0.0001, t + duration);

    osc1.connect(filter);
    osc2.connect(filter);
    filter.connect(noteGain);
    noteGain.connect(masterGain);

    osc1.start(t);
    osc2.start(t);
    lfo.start(t);
    osc1.stop(t + duration + 0.1);
    osc2.stop(t + duration + 0.1);
    lfo.stop(t + duration + 0.1);
  }

  function playBassNote(freq, startTime, duration, gain) {
    if (!audioCtx || !masterGain) return;
    var osc = audioCtx.createOscillator();
    var noteGain = audioCtx.createGain();
    var filter = audioCtx.createBiquadFilter();

    osc.type = 'sine';
    osc.frequency.value = freq;

    filter.type = 'lowpass';
    filter.frequency.value = freq * 3;
    filter.Q.value = 0.3;

    var t = startTime;
    var attack = 0.02;
    var release = duration * 0.2;

    noteGain.gain.setValueAtTime(0.0001, t);

    if (!audioCtx || !masterGain) return;

  function scheduleTick(t) {

    var arpPattern = ARP_PATTERNS[arpPatternIndex % ARP_PATTERNS.length];

    // === 钢琴分解（每拍2个八分音符）===

      bassTimeInBar = bassNote[1];
      bassStep++;
      if (bassStep >= BASSLINE.length) {
        bassStep = 0;
      }
    }

    if (bassTimeInBar < 0) bassTimeInBar = 0;

          var padFreq = freqOf(chord.tones[i]);
          playPadNote(padFreq, t, BEAT * 3.8, 0.2);
        }
      }
      if (Math.random() < 0.25) {
        playMemorySparkle(t + Math.random() * BEAT * 0.6, 0.15);
      }
      lastBeatNum = beatNum;
    }

    // 推进节拍
    beatInBar += TICK / BEAT;
    if (beatInBar >= 4) {
      beatInBar -= 4;
      barIndex++;
      arpPatternIndex++;
      if (barIndex >= CHORDS.length) {
        barIndex = 0;
      }
      melodyStep = 0;
      melodyTimeInBar = 0;
    }
  }

  function initAudio() {

      if (!Ctx) return false;

      masterGain.connect(audioCtx.destination);
      return true;
    } catch (e) {
      return false;
    }
  }

    if (!isUserEnabled) return;
    if (!initAudio()) return;
    if (isPlaying) return;
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(function () {});

    barIndex = 0;
    beatInBar = 0;
    lastEighthIndex = -1;
    lastBeatNum = -1;
    arpPatternIndex = 0;
    melodyStep = 0;
    melodyTimeInBar = 0;
    bassStep = 0;
    bassTimeInBar = 0;
    nextNoteTime = audioCtx.currentTime + 0.1;
    isPlaying = true;
    scheduler();
  }

  function stop() {
    isPlaying = false;
    if (schedulerTimer) {
      clearTimeout(schedulerTimer);
      schedulerTimer = null;
    }
    if (masterGain && audioCtx) {
      masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3);
    }
  }

  function toggle() {
    if (isPlaying) {
      stop();
    } else {
      play();
    }
    return isPlaying;
  }

  function setVolume(v) {
    userVolume = Math.max(0, Math.min(1, v));
    if (masterGain && audioCtx) {
      masterGain.gain.setTargetAtTime(isUserEnabled ? userVolume : 0, audioCtx.currentTime, 0.05);
    }
    saveSettings();
  }

  function setEnabled(enabled) {
    isUserEnabled = enabled;
    if (enabled && window.GameUtils) {
      GameUtils.unlock('enable_bgm', '奏响旋律', '开启任意游戏的 BGM');
    }
    if (masterGain && audioCtx) {
      masterGain.gain.setTargetAtTime(enabled ? userVolume : 0, audioCtx.currentTime, 0.05);
    }
    if (enabled) {
      play();
    } else {
      stop();
    }
    saveSettings();
  }

  // ---------- 存档 ----------
  function loadSettings() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        var obj = JSON.parse(saved);
        if (typeof obj.enabled === 'boolean') isUserEnabled = obj.enabled;
        if (typeof obj.volume === 'number') userVolume = Math.max(0, Math.min(1, obj.volume));
      }
    } catch (e) {}
  }

  function saveSettings() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        enabled: isUserEnabled,
        volume: userVolume
      }));
    } catch (e) {}
  }

  // ---------- 音效 ----------
  // 拾取/点击碎片
  function playPick() {
    if (!isUserEnabled) return;
    if (!initAudio()) return;
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(function () {});
    var t = audioCtx.currentTime;
    playChimeNote(freqOf('E5'), t, 0.25, 0.3);
  }

  // 碎片吸附正确位置
  function playSnap() {
    if (!isUserEnabled) return;
    if (!initAudio()) return;
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(function () {});
    var t = audioCtx.currentTime;
    playPianoNote(freqOf('C5'), t, 0.3, 0.4);
    playChimeNote(freqOf('G5'), t + 0.02, 0.4, 0.3);
    playMemorySparkle(t + 0.05, 0.2);
  }

  // 通关胜利
  function playWin() {
    if (!isUserEnabled) return;
    if (!initAudio()) return;
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(function () {});
    var t = audioCtx.currentTime;
    var notes = [
      ['C5', 0.2], ['E5', 0.2], ['G5', 0.2], ['C6', 0.3],
      ['B5', 0.15], ['G5', 0.15], ['E5', 0.15], ['C5', 0.4]
    ];
    var time = t;
    for (var i = 0; i < notes.length; i++) {
      playChimeNote(freqOf(notes[i][0]), time, notes[i][1] * 0.9, 0.45);
      playPianoNote(freqOf(notes[i][0]), time, notes[i][1] * 0.8, 0.3);
      time += notes[i][1];
    }
    playBassNote(freqOf('C3'), t + 0.2, 1.5, 0.4);
  }

  // 重置关卡
  function playReset() {
    if (!isUserEnabled) return;
    if (!initAudio()) return;
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(function () {});
    var t = audioCtx.currentTime;
    playPianoNote(freqOf('G4'), t, 0.2, 0.3);
    playPianoNote(freqOf('C4'), t + 0.08, 0.25, 0.25);
  }

  // ---------- UI 绑定 ----------
  function initUI() {
    var settingsScene = document.getElementById('scene-settings');
    if (!settingsScene) return;

    var backBtn = document.getElementById('btn-settings-back');
    if (!backBtn || !backBtn.parentNode) return;

    var group = document.createElement('div');
    group.className = 'setting-row';

    var label = document.createElement('div');
    label.style.fontSize = '13px';
    label.style.color = 'var(--text-secondary)';
    label.style.letterSpacing = '0.1em';
    label.textContent = '背景音乐';

    var controls = document.createElement('div');
    controls.style.display = 'flex';
    controls.style.flexDirection = 'column';
    controls.style.gap = '8px';
    controls.style.marginTop = '6px';

    var toggleRow = document.createElement('div');
    toggleRow.style.display = 'flex';
    toggleRow.style.gap = '8px';

    var btnOn = document.createElement('button');
    btnOn.className = 'setting-option';
    btnOn.textContent = '开启';
    if (isUserEnabled) btnOn.classList.add('selected');

    var btnOff = document.createElement('button');
    btnOff.className = 'setting-option';
    btnOff.textContent = '关闭';
    if (!isUserEnabled) btnOff.classList.add('selected');

    toggleRow.appendChild(btnOn);
    toggleRow.appendChild(btnOff);

    var volRow = document.createElement('div');
    volRow.style.display = 'flex';
    volRow.style.alignItems = 'center';
    volRow.style.gap = '10px';

    var volLabel = document.createElement('span');
    volLabel.style.fontSize = '12px';
    volLabel.style.color = 'var(--text-muted)';
    volLabel.textContent = '音量';

    var volSlider = document.createElement('input');
    volSlider.type = 'range';
    volSlider.min = '0';
    volSlider.max = '100';
    volSlider.value = Math.round(userVolume * 100);
    volSlider.style.flex = '1';

    volRow.appendChild(volLabel);
    volRow.appendChild(volSlider);

    controls.appendChild(toggleRow);
    controls.appendChild(volRow);

    group.appendChild(label);
    group.appendChild(controls);

    backBtn.parentNode.insertBefore(group, backBtn);

    btnOn.addEventListener('click', function () {
      setEnabled(true);
      btnOn.classList.add('selected');
      btnOff.classList.remove('selected');
    });

    btnOff.addEventListener('click', function () {
      setEnabled(false);
      btnOff.classList.add('selected');
      btnOn.classList.remove('selected');
    });

    volSlider.addEventListener('input', function (e) {
      setVolume(parseInt(e.target.value) / 100);
    });
  }

  // ---------- 暴露给外部 ----------
  window.MemoryBGM = {
    play: play,
    stop: stop,
    toggle: toggle,
    setVolume: setVolume,
    setEnabled: setEnabled,
    playPick: playPick,
    playSnap: playSnap,
    playWin: playWin,
    playReset: playReset,
    isPlaying: function () { return isPlaying; },
    isEnabled: function () { return isUserEnabled; }
  };

  // ---------- 初始化 ----------
  loadSettings();

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () {
      initUI();
      if (isUserEnabled) play();
    });
  } else {
    initUI();
    if (isUserEnabled) play();
  }
})();
</script>

<!-- 反馈入口 -->
<div id="feedbackSlot" style="text-align:center;padding:12px 0;border-top:1px solid var(--color-border-light);margin-top:24px"></div>
</body>
