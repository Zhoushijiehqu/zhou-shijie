/* ===== 光影棱镜页面特有样式 =====

/* 顶部 sticky header */
.prism-header {

  z-index: 50;

  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 28px;
  background: rgba(var(--color-bg-primary-rgb, 26,21,16), 0.82);

}
.prism-header-left { display: flex; align-items: center; gap: 16px; }
.prism-back-btn {
  display: inline-flex; align-items: center; gap: 8px;

  font-family: var(--font-family-base);
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--color-text-secondary);
  text-decoration: none;
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius-full);
  background: var(--color-bg-card);
  transition: all 0.25s;
}
.prism-back-btn:hover {
  color: var(--color-accent);

}
.prism-title-area { text-align: center; flex: 1; }
.prism-eyebrow {

  margin-bottom: 2px;
}
.prism-title-area h1 {
  font-family: var(--font-family-display);
  font-size: clamp(20px, 3vw, 28px);
  font-weight: 400;
  font-variation-settings: 'opsz' 60, 'SOFT' 50;
  color: var(--color-text-primary);
  margin: 0;
  letter-spacing: -0.01em;
}

/* 主题切换按钮 */
.prism-header .theme-toggle { flex-shrink: 0; }

/* 游戏容器：居中 */
#game-root {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 70px);

/* ===== 游戏内 :root 变量映射 =====
   --accent 保留 #00e5ff（光学游戏特色，光线/分光器配色）
*/
:root {
  --bg: var(--color-bg-primary);
  --surface: var(--color-bg-card);
  --surface2: var(--color-bg-tertiary);
  --text: var(--color-text-primary);
  --text-muted: var(--color-text-secondary);
  --accent: #00e5ff;
  --accent2: #ff4081;
  --gold: var(--color-accent);
  --red: #ff4444;
  --green: #44ff44;
  --blue: #4488ff;
  --border: var(--color-border-medium);
}

/* body 用主页面字体 */
body {
  margin: 0; padding: 0;
  background: var(--color-bg-primary);
  font-family: 'Manrope', 'Noto Serif SC', 'STSong', serif, sans-serif;
  color: var(--color-text-primary);
  min-height: 100vh;
  overflow-x: hidden; overflow-y: auto;
  user-select: none; -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* 游戏内汉字用 Noto Serif SC */
#menu-screen .title, #settings-screen h2, #level-select-screen h2,
.hud-level, .hud-hint, #win-modal h2, #auto-solve-indicator {
  font-family: 'Noto Serif SC', 'Fraunces', serif;
}

/* 菜单标题渐变文字（var(--color-primary) 到 var(--color-accent)） */

  background-clip: text;

  text-shadow: none;
}

}

/* 关卡卡片 border-radius: var(--radius-md) */

#settings-screen {

.level-grid::-webkit-scrollbar { width: 4px; }
.level-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.level-cell {

  cursor: pointer; transition: all 0.25s ease;
  color: var(--text); font-size: 16px; font-weight: 600; position: relative;

.level-cell:hover:not(.locked) {
  border-color: var(--accent); box-shadow: 0 0 14px rgba(0,229,255,0.12);
  transform: translateY(-2px);
}
.level-cell.locked { opacity: 0.35; cursor: not-allowed; filter: grayscale(0.6); }
.level-cell.locked .lock-icon { font-size: 18px; }
.level-cell .level-num { font-size: 18px; font-weight: 700; }

#game-hud {

}
.hud-progress {

  border: 1px solid var(--border); border-radius: var(--radius-full); backdrop-filter: blur(8px);
}
.hud-hint {
  position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
  padding: 8px 18px; background: rgba(0,229,255,0.1);
  border: 1px solid rgba(0,229,255,0.25); border-radius: var(--radius-full);
  color: var(--accent); font-size: 12px; letter-spacing: 1px;
  pointer-events: none; transition: opacity 0.3s ease; white-space: nowrap;
  z-index: 6;
}

#win-modal {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  z-index: 20; background: var(--surface);
  border: 1px solid var(--accent);

  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
#win-modal.active {

.win-btns { display: flex; gap: 10px; justify-content: center; }
.win-btn {

  font-size: 13px; letter-spacing: 1px; cursor: pointer;
  transition: all 0.2s ease; font-family: inherit;
}
.win-btn:hover { border-color: var(--accent); box-shadow: 0 0 16px rgba(0,229,255,0.15); }
.win-btn.next { border-color: var(--accent); background: rgba(0,229,255,0.1); }

#auto-solve-indicator {

  padding: 6px 16px; background: rgba(255,64,129,0.15);
  border: 1px solid rgba(255,64,129,0.3); border-radius: var(--radius-full);
  color: var(--accent2); font-size: 11px; letter-spacing: 2px;

}

@media (max-width: 850px) {

  .level-grid { grid-template-columns: repeat(5, 1fr); gap: 6px; max-width: 500px; }
}
</style>

<script>
(function() {
  'use strict';

  // ============ DOM refs ============
  const gameViewport = document.getElementById('game-viewport');
  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  const menuScreen = document.getElementById('menu-screen');
  const settingsScreen = document.getElementById('settings-screen');
  const levelSelectScreen = document.getElementById('level-select-screen');
  const gameHUD = document.getElementById('game-hud');
  const hudHint = document.getElementById('hud-hint');
  const hudLevelText = document.getElementById('hud-level-text');
  const hudProgressText = document.getElementById('hud-progress-text');
  const winModal = document.getElementById('win-modal');
  const winMsg = document.getElementById('win-msg');
  const autoSolveIndicator = document.getElementById('auto-solve-indicator');
  const levelGrid = document.getElementById('level-grid');
  const levelSelectModeLabel = document.getElementById('level-select-mode-label');
  const settingMode = document.getElementById('setting-mode');

  // ============ Constants ============
  const VW = 800, VH = 450;
  const MAX_RAY_DEPTH = 20;
  const TARGET_RADIUS = 14;
  const EPSILON = 0.001;
  const DEFAULT_MIRROR_WIDTH = 160;
  const AUTO_SOLVE_DURATION = 1500;

  // ============ Settings ============
  let gameMode = 'linear';
  function loadSettings() {
    try { const s = localStorage.getItem('prism_puzzle_mode'); if (s === 'free' || s === 'linear') gameMode = s; settingMode.value = gameMode; } catch(e) {}
  }
  function saveSettings() { try { localStorage.setItem('prism_puzzle_mode', gameMode); } catch(e) {} }
  function loadProgress() {
    try { const r = localStorage.getItem('prism_puzzle_progress'); return r ? JSON.parse(r) : { cleared: {}, highestUnlocked: 0 }; } catch(e) { return { cleared: {}, highestUnlocked: 0 }; }
  }
  function saveProgress(p) { try { localStorage.setItem('prism_puzzle_progress', JSON.stringify(p)); } catch(e) {} }
  let progress = loadProgress();

  // ============ Level Names ============
  const LEVEL_NAMES = [
    '新手教学','初试折射','光的解离','双重反射','分光试验',
    '色彩矩阵','交叉火力','迷宫矩阵','三棱复合','精密变轨',
    '十全十美','光波回音','红绿双生','三角星阵','多级分流',
    '缝隙穿行','轴对称学','北斗七星','高精宽窄','色彩滤波',
    '双重极光','光之织网','回马枪阵','逆向复合','正五边形',
    '极长深渊','三色协奏','分流枢纽','暗物质迷宫','极光剧场'
  ];

  // ============ 30 Levels ============
  const levels = [
    // Level 0: 新手教学
    {
      emitters: [{ x: 80, y: 320, angle: -0.15, color: 'white' }],
      components: [
        { id: 'm0', type: 'MIRROR', x: 400, y: 265, angle: 0, targetAngle: 2.8036 }
      ],
      targets: [{ x: 680, y: 110, color: '#ffffff' }],
      hint: '按住中央平面镜并绕圈拖动，将白光反射至上方靶点'
    },
    // Level 1: 初试折射
    {

  // ============ Math Helpers ============
  function vec2(x, y) { return { x, y }; }
  function vadd(a, b) { return { x: a.x + b.x, y: a.y + b.y }; }
  function vsub(a, b) { return { x: a.x - b.x, y: a.y - b.y }; }
  function vscale(v, s) { return { x: v.x * s, y: v.y * s }; }
  function vlen(v) { return Math.sqrt(v.x * v.x + v.y * v.y); }
  function vnorm(v) { const l = vlen(v); return l > EPSILON ? { x: v.x / l, y: v.y / l } : { x: 0, y: 0 }; }
  function vdot(a, b) { return a.x * b.x + a.y * b.y; }
  function vperp(v) { return { x: -v.y, y: v.x }; }
  function vangle(v) { return Math.atan2(v.y, v.x); }

  function normalizeAngle(a) {
    while (a > Math.PI) a -= Math.PI * 2;
    while (a < -Math.PI) a += Math.PI * 2;
    return a;
  }

  function shortestAngularDelta(target, start) {
    let delta = target - start;
    while (delta > Math.PI) delta -= Math.PI * 2;
    while (delta < -Math.PI) delta += Math.PI * 2;
    return delta;
  }

  // ============ Ray-Segment Intersection ============
  function raySegmentIntersect(origin, dir, a, b) {
    const d = vsub(b, a);
    const oa = vsub(origin, a);
    const denom = vperp(d);
    const denomDot = vdot(dir, denom);
    if (Math.abs(denomDot) < EPSILON) return null;
    const t = -vdot(oa, denom) / denomDot;
    if (t < EPSILON) return null;
    const u = (dir.y * (origin.x - a.x) - dir.x * (origin.y - a.y)) / (d.x * dir.y - d.y * dir.x);
    if (u < -EPSILON || u > 1 + EPSILON) return null;
    const point = vadd(origin, vscale(dir, t));
    const normal = vnorm(vperp(d));
    if (vdot(normal, dir) > 0) { normal.x = -normal.x; normal.y = -normal.y; }
    return { point, dist: t, normal, u };
  }

  // ============ Component Geometry ============
  function getPrismVerts(comp) {
    const cx = comp.x, cy = comp.y;
    const size = comp.size || 44;
    const R = size / Math.sqrt(3);
    const verts = [];
    for (let i = 0; i < 3; i++) {
      const a = comp.angle + i * Math.PI * 2 / 3;
      verts.push({ x: cx + R * Math.cos(a), y: cy + R * Math.sin(a) });
    }
    return verts;
  }

  function getMirrorEndpoints(comp) {
    const hw = (comp.width || DEFAULT_MIRROR_WIDTH) / 2;
    const dx = Math.cos(comp.angle) * hw;
    const dy = Math.sin(comp.angle) * hw;
    return {
      a: { x: comp.x - dx, y: comp.y - dy },
      b: { x: comp.x + dx, y: comp.y + dy }
    };
  }

  function reflect(dir, normal) {
    const d = vdot(dir, normal);
    return { x: dir.x - 2 * d * normal.x, y: dir.y - 2 * d * normal.y };
  }

  function refractSimple(dir, normal, n) {
    const cosI = -vdot(dir, normal);
    const sinT2 = (1 / (n * n)) * (1 - cosI * cosI);
    if (sinT2 > 1) return reflect(dir, normal);
    const cosT = Math.sqrt(1 - sinT2);
    return vnorm(vadd(vscale(dir, 1 / n), vscale(normal, cosI / n - cosT)));
  }

  // ============ Ray Tracing (NO visitedIds — allows repeated hits) ============
  function castRay(origin, direction, color, depth, segments) {
    if (depth > MAX_RAY_DEPTH) return;

    let closestHit = null;
    let closestDist = Infinity;
    let hitComp = null;
    let hitNormal = null;
    let hitPoint = null;
    let hitEdgeIdx = -1;

    for (const comp of components) {
      if (comp.type === 'MIRROR' || comp.type === 'SPLITTER') {
        const ep = getMirrorEndpoints(comp);
        const hit = raySegmentIntersect(origin, direction, ep.a, ep.b);
        if (hit && hit.dist < closestDist && hit.dist > EPSILON) {
          closestDist = hit.dist;
          closestHit = hit;
          hitComp = comp;
          hitNormal = hit.normal;
          hitPoint = hit.point;
        }
      } else if (comp.type === 'PRISM') {
        const verts = getPrismVerts(comp);
        for (let i = 0; i < 3; i++) {
          const a = verts[i], b = verts[(i + 1) % 3];
          const hit = raySegmentIntersect(origin, direction, a, b);
          if (hit && hit.dist < closestDist && hit.dist > EPSILON) {
            closestDist = hit.dist;
            closestHit = hit;
            hitComp = comp;
            hitNormal = hit.normal;
            hitPoint = hit.point;
            hitEdgeIdx = i;
          }
        }
      }
    }

    const boundsChecks = [
      { a: vec2(0, 0), b: vec2(VW, 0) },
      { a: vec2(VW, 0), b: vec2(VW, VH) },
      { a: vec2(VW, VH), b: vec2(0, VH) },
      { a: vec2(0, VH), b: vec2(0, 0) }
    ];
    for (const bc of boundsChecks) {
      const hit = raySegmentIntersect(origin, direction, bc.a, bc.b);
      if (hit && hit.dist < closestDist && hit.dist > EPSILON) {
        closestDist = hit.dist;
        closestHit = hit;
        hitComp = null;
        hitPoint = hit.point;
      }
    }

    if (!closestHit) return;

    segments.push({
      from: { x: origin.x, y: origin.y },
      to: { x: hitPoint.x, y: hitPoint.y },
      color: color
    });

    if (!hitComp) return;

    const offsetDist = 2.5;

    switch (hitComp.type) {
      case 'MIRROR': {
        const refl = reflect(direction, hitNormal);
        const reflOrigin = { x: hitPoint.x + refl.x * offsetDist, y: hitPoint.y + refl.y * offsetDist };
        castRay(reflOrigin, refl, color, depth + 1, segments);
        break;
      }
      case 'SPLITTER': {
        const transOrigin = { x: hitPoint.x + direction.x * offsetDist, y: hitPoint.y + direction.y * offsetDist };
        castRay(transOrigin, direction, color, depth + 1, segments);
        const refl = reflect(direction, hitNormal);
        const reflOrigin = { x: hitPoint.x + refl.x * offsetDist, y: hitPoint.y + refl.y * offsetDist };
        castRay(reflOrigin, refl, color, depth + 1, segments);
        break;
      }
      case 'PRISM': {
        const verts = getPrismVerts(hitComp);
        const internalDir = refractSimple(direction, hitNormal, 1.5);
        const internalStart = { x: hitPoint.x + internalDir.x * offsetDist, y: hitPoint.y + internalDir.y * offsetDist };
        let exitPoint = null;
        let exitNormal = null;
        let exitDist = Infinity;
        for (let i = 0; i < 3; i++) {
          if (i === hitEdgeIdx) continue;
          const a = verts[i], b = verts[(i + 1) % 3];
          const exitHit = raySegmentIntersect(internalStart, internalDir, a, b);
          if (exitHit && exitHit.dist > EPSILON && exitHit.dist < exitDist) {
            exitDist = exitHit.dist;
            exitPoint = exitHit.point;
            exitNormal = exitHit.normal;
          }
        }
        if (!exitPoint) {
          const size = hitComp.size || 44;
          exitPoint = { x: internalStart.x + internalDir.x * size * 0.7, y: internalStart.y + internalDir.y * size * 0.7 };
          exitNormal = { x: -internalDir.x, y: -internalDir.y };
        }
        const exitDir = refractSimple(internalDir, exitNormal, 1 / 1.5);
        const exitOrigin = { x: exitPoint.x + exitDir.x * offsetDist, y: exitPoint.y + exitDir.y * offsetDist };

        if (color === 'white') {
          const baseAngle = vangle(exitDir);
          const spread = 0.04;
          const colorDefs = [
            { color: '#ff4444', angle: baseAngle - spread },
            { color: '#44ff44', angle: baseAngle },
            { color: '#4444ff', angle: baseAngle + spread }
          ];
          for (const c of colorDefs) {
            const d = { x: Math.cos(c.angle), y: Math.sin(c.angle) };
            castRay(exitOrigin, d, c.color, depth + 1, segments);
          }
        } else {
          castRay(exitOrigin, exitDir, color, depth + 1, segments);
        }
        break;
      }
    }
  }

  // ============ Particle System ============
  function spawnWinParticles() {
    const lv = levels[currentLevel];
    for (const t of lv.targets) {
      for (let i = 0; i < 20; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        particles.push({
          x: t.x, y: t.y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          decay: 0.01 + Math.random() * 0.015,
          size: 2 + Math.random() * 3,
          color: t.color
        });
      }
    }
    for (let i = 0; i < 40; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 4;
      particles.push({
        x: VW / 2, y: VH / 2,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.008 + Math.random() * 0.01,
        size: 3 + Math.random() * 4,
        color: ['#ffffff', '#00e5ff', '#ffd700'][Math.floor(Math.random() * 3)]
      });
    }
    winParticlesActive = true;
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.life -= p.decay;
      if (p.life <= 0) {
        particles.splice(i, 1);
      }
    }
    if (particles.length === 0 && winParticlesActive) {
      winParticlesActive = false;
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function getComponentsAngleSignature() {
    return components.map(c => c.angle.toFixed(5)).join(',');
  }

  // ============ Rendering ============
  function drawGrid() {
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 0.5;
    const step = 40;
    for (let x = step; x < VW; x += step) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, VH); ctx.stroke();
    }
    for (let y = step; y < VH; y += step) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(VW, y); ctx.stroke();
    }
  }

  function drawBeams(segments) {
    if (segments.length === 0) return;
    const groups = {};
    for (const seg of segments) {
      if (!groups[seg.color]) groups[seg.color] = [];
      groups[seg.color].push(seg);
    }
    const colorMap = {
      'white': 'rgba(255,255,255,0.9)',
      '#ffffff': 'rgba(255,255,255,0.9)',
      '#ff4444': 'rgba(255,68,68,0.9)',
      '#44ff44': 'rgba(68,255,68,0.9)',
      '#4444ff': 'rgba(68,68,255,0.9)'
    };
    const glowMap = {
      'white': 'rgba(255,255,255,0.5)',
      '#ffffff': 'rgba(255,255,255,0.5)',
      '#ff4444': 'rgba(255,68,68,0.5)',
      '#44ff44': 'rgba(68,255,68,0.5)',
      '#4444ff': 'rgba(68,68,255,0.5)'
    };
    for (const [color, segs] of Object.entries(groups)) {
      const c = colorMap[color] || 'rgba(255,255,255,0.7)';
      const g = glowMap[color] || 'rgba(255,255,255,0.3)';
      const path = new Path2D();
      for (const seg of segs) {
        path.moveTo(seg.from.x, seg.from.y);
        path.lineTo(seg.to.x, seg.to.y);
      }
      ctx.save();
      ctx.shadowColor = g;
      ctx.shadowBlur = 10;
      ctx.strokeStyle = c;
      ctx.lineWidth = 2.5;
      ctx.stroke(path);
      ctx.restore();
      ctx.strokeStyle = c;
      ctx.lineWidth = 1.2;
      ctx.stroke(path);
    }
  }

  function drawEmitter(em) {
    const x = em.x, y = em.y;
    const colorMap = {
      'white': '#ffffff', '#ffffff': '#ffffff',
      '#ff4444': '#ff4444', '#44ff44': '#44ff44', '#4444ff': '#4488ff'
    };
    const c = colorMap[em.color] || '#ffffff';
    ctx.save();
    ctx.shadowColor = c;
    ctx.shadowBlur = 14;
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
    const dx = Math.cos(em.angle) * 16, dy = Math.sin(em.angle) * 16;
    ctx.strokeStyle = c; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + dx, y + dy); ctx.stroke();
  }

  function drawTarget(t, lit) {
    const x = t.x, y = t.y;
    const colorMap = {
      'white': '#ffffff', '#ffffff': '#ffffff',
      '#ff4444': '#ff4444', '#44ff44': '#44ff44', '#4444ff': '#4488ff'
    };
    const c = colorMap[t.color] || '#ffffff';
    ctx.strokeStyle = lit ? c : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = lit ? 2 : 1;
    ctx.beginPath(); ctx.arc(x, y, TARGET_RADIUS, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = lit ? c : 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.arc(x, y, lit ? 5 : 3, 0, Math.PI * 2); ctx.fill();
    if (lit) {
      ctx.save();
      ctx.shadowColor = c; ctx.shadowBlur = 16;
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
  }

  function drawComponent(comp) {
    const isStatic = comp.static === true;
    const isDragging = dragging === comp;
    ctx.save();
    if (comp.type === 'MIRROR' || comp.type === 'SPLITTER') {
      const ep = getMirrorEndpoints(comp);
      const isSplitter = comp.type === 'SPLITTER';
      const baseColor = isStatic ? '#555555' : (isSplitter ? '#00e5ff' : '#cccccc');
      const glowColor = isStatic ? 'rgba(85,85,85,0.3)' : (isSplitter ? 'rgba(0,229,255,0.5)' : 'rgba(255,255,255,0.4)');
      const coreColor = isStatic ? '#666666' : (isSplitter ? '#80ffff' : '#ffffff');
      const dotColor = isStatic ? '#555555' : (isSplitter ? '#00e5ff' : '#ffffff');
      const labelColor = isStatic ? 'rgba(120,120,120,0.4)' : (isSplitter ? 'rgba(0,229,255,0.6)' : 'rgba(255,255,255,0.5)');

      if (isDragging) {
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 16;
      } else {
        ctx.shadowColor = glowColor;
        ctx.shadowBlur = isStatic ? 3 : 8;
      }
      ctx.strokeStyle = baseColor;
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(ep.a.x, ep.a.y); ctx.lineTo(ep.b.x, ep.b.y); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = coreColor;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(ep.a.x, ep.a.y); ctx.lineTo(ep.b.x, ep.b.y); ctx.stroke();
      ctx.fillStyle = dotColor;
      ctx.beginPath(); ctx.arc(comp.x, comp.y, 4, 0, Math.PI * 2); ctx.fill();

      if (!isStatic) {
        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(comp.x, comp.y, ((comp.width || DEFAULT_MIRROR_WIDTH) / 2 + 4), 0, Math.PI * 2); ctx.stroke();
      }
      ctx.fillStyle = labelColor;
      ctx.font = '9px "Segoe UI","PingFang SC",sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(isStatic ? '固定' : (isSplitter ? '分光' : '镜'), comp.x, comp.y - 20);

    } else if (comp.type === 'PRISM') {
      const verts = getPrismVerts(comp);
      const isStaticPrism = isStatic;
      const fillC = isStaticPrism ? 'rgba(60,60,60,0.2)' : 'rgba(124,77,255,0.15)';
      const strokeC = isStaticPrism ? 'rgba(100,100,100,0.5)' : 'rgba(179,136,255,0.8)';
      const glowC = isStaticPrism ? 'rgba(60,60,60,0.2)' : 'rgba(124,77,255,0.5)';
      const dotC = isStaticPrism ? '#777777' : '#b388ff';
      const labelC = isStaticPrism ? 'rgba(120,120,120,0.4)' : 'rgba(179,136,255,0.6)';

      if (isDragging) {
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 18;
      } else {
        ctx.shadowColor = glowC;
        ctx.shadowBlur = isStaticPrism ? 3 : 10;
      }
      ctx.fillStyle = fillC;
      ctx.beginPath();
      ctx.moveTo(verts[0].x, verts[0].y);
      ctx.lineTo(verts[1].x, verts[1].y);
      ctx.lineTo(verts[2].x, verts[2].y);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = strokeC; ctx.lineWidth = 2; ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = isStaticPrism ? 'rgba(120,120,120,0.2)' : 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(verts[0].x, verts[0].y);
      ctx.lineTo(verts[1].x, verts[1].y);
      ctx.lineTo(verts[2].x, verts[2].y);
      ctx.closePath(); ctx.stroke();
      ctx.fillStyle = dotC;
      ctx.beginPath(); ctx.arc(comp.x, comp.y, 4, 0, Math.PI * 2); ctx.fill();

      if (!isStaticPrism) {
        ctx.strokeStyle = 'rgba(179,136,255,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(comp.x, comp.y, ((comp.size || 44) * 0.8), 0, Math.PI * 2); ctx.stroke();
      }
      ctx.fillStyle = labelC;
      ctx.font = '9px "Segoe UI","PingFang SC",sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(isStaticPrism ? '固定' : '棱镜', comp.x, comp.y - 28);
    }
    ctx.restore();
  }

  function render() {
    ctx.clearRect(0, 0, VW, VH);
    ctx.fillStyle = '#121218';
    ctx.fillRect(0, 0, VW, VH);
    drawGrid();

    const lv = levels[currentLevel];
    const angleSig = getComponentsAngleSignature();
    let allSegments;
    if (cachedSegments && cachedAngles === angleSig) {
      allSegments = cachedSegments;
    } else {
      allSegments = [];
      for (const em of lv.emitters) {
        const dir = { x: Math.cos(em.angle), y: Math.sin(em.angle) };
        castRay({ x: em.x, y: em.y }, dir, em.color, 0, allSegments);
      }
      cachedSegments = allSegments;
      cachedAngles = angleSig;
    }

    drawBeams(allSegments);

    const litTargets = new Set();
    const TOLERANCE = TARGET_RADIUS + 3;
    for (const seg of allSegments) {
      for (let ti = 0; ti < lv.targets.length; ti++) {
        if (litTargets.has(ti)) continue;
        const t = lv.targets[ti];
        // 兼容过滤白光的不同字符串表现形式
        const matchColor = (c1, c2) => (c1 === 'white' || c1 === '#ffffff') ? (c2 === 'white' || c2 === '#ffffff') : c1 === c2;
        if (!matchColor(seg.color, t.color)) continue;
        const ax = seg.to.x - seg.from.x;
        const ay = seg.to.y - seg.from.y;
        const segLen2 = ax * ax + ay * ay;
        let proj = segLen2 > 0.001 ? ((t.x - seg.from.x) * ax + (t.y - seg.from.y) * ay) / segLen2 : 0;
        proj = Math.max(0, Math.min(1, proj));
        const cx = seg.from.x + proj * ax;
        const cy = seg.from.y + proj * ay;
        const dist = Math.sqrt((t.x - cx) * (t.x - cx) + (t.y - cy) * (t.y - cy));
        if (dist < TOLERANCE) litTargets.add(ti);
      }
    }

    for (let ti = 0; ti < lv.targets.length; ti++) {
      drawTarget(lv.targets[ti], litTargets.has(ti));
    }
    for (const em of lv.emitters) drawEmitter(em);
    for (const comp of components) drawComponent(comp);

    drawParticles();
    updateParticles();

    if (gameState === 'playing' && litTargets.size === lv.targets.length && lv.targets.length > 0) {
      handleWin();
    }
    return litTargets;
  }

  // ============ Win Handling ============
  function handleWin() {
    gameState = 'won';
    progress.cleared[currentLevel] = true;
    if (currentLevel + 1 > progress.highestUnlocked) {
      progress.highestUnlocked = currentLevel + 1;
    }
    saveProgress(progress);
    spawnWinParticles();
    winMsg.textContent = currentLevel < 29
      ? `第 ${currentLevel + 1} 关 · ${LEVEL_NAMES[currentLevel]} 完成`
      : '恭喜！你已完成全部 30 个关卡！';
    winModal.classList.add('active');
    const btnNext = document.getElementById('btn-win-next');
    if (currentLevel >= 29) {
      btnNext.textContent = '返回选关';
      btnNext.onclick = () => { winModal.classList.remove('active'); showLevelSelect(); };
    } else {
      btnNext.textContent = '下一关 →';
      btnNext.onclick = () => { winModal.classList.remove('active'); startLevel(currentLevel + 1); };
    }
  }

  // ============ Input Handling (document-level for move/up/cancel) ============
  function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const currentScale = rect.width / VW;
    return {
      x: (e.clientX - rect.left) / currentScale,
      y: (e.clientY - rect.top) / currentScale
    };
  }

  function findComponentAt(pos) {
    for (const comp of components) {
      if (comp.static) continue;
      if (comp.type === 'PRISM') {
        const verts = getPrismVerts(comp);
        let inside = true;
        for (let i = 0; i < 3; i++) {
          const a = verts[i], b = verts[(i + 1) % 3];
          const edge = { x: b.x - a.x, y: b.y - a.y };
          const vp = { x: pos.x - a.x, y: pos.y - a.y };
          const cross = edge.x * vp.y - edge.y * vp.x;
          if (cross > 0) { inside = false; break; }
        }
        if (inside) return comp;
        const dx = pos.x - comp.x;
        const dy = pos.y - comp.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < (comp.size || 44) * 0.8) return comp;
      } else {
        const ep = getMirrorEndpoints(comp);
        const ax = ep.b.x - ep.a.x;
        const ay = ep.b.y - ep.a.y;
        const px = pos.x - ep.a.x;
        const py = pos.y - ep.a.y;
        const segLen2 = ax * ax + ay * ay;
        let proj = segLen2 > 0.001 ? (px * ax + py * ay) / segLen2 : 0;
        proj = Math.max(0, Math.min(1, proj));
        const cx = ep.a.x + proj * ax;
        const cy = ep.a.y + proj * ay;
        const dist = Math.sqrt((pos.x - cx) * (pos.x - cx) + (pos.y - cy) * (pos.y - cy));
        if (dist < 14) return comp;
        const dx = pos.x - comp.x;
        const dy = pos.y - comp.y;
        const distCenter = Math.sqrt(dx * dx + dy * dy);
        if (distCenter < 20) return comp;
      }
    }
    return null;
  }

  function onPointerMove(e) {
    if (!dragging || gameState !== 'playing') return;
    const pos = getCanvasPos(e);
    const currentAngle = Math.atan2(pos.y - dragging.y, pos.x - dragging.x);
    const delta = currentAngle - dragStartAngle;
    dragging.angle = normalizeAngle(dragCompStartAngle + delta);
    e.preventDefault();
  }

  // [Bug 修复] dragging 为 null 时提前 return，避免执行无效逻辑
  function onPointerUp(e) {
    if (!dragging) return;
    try { canvas.releasePointerCapture(e.pointerId); } catch(ex) {}
    dragging = null;
    canvas.style.cursor = 'default';
    document.removeEventListener('pointermove', onPointerMove);
    document.removeEventListener('pointerup', onPointerUp);
    document.removeEventListener('pointercancel', onPointerUp);
    cachedSegments = null;
    cachedAngles = null;
  }

  canvas.addEventListener('pointerdown', function(e) {
    if (dragging) return;
    if (gameState !== 'playing') return;
    const pos = getCanvasPos(e);
    const comp = findComponentAt(pos);
    if (comp) {
      dragging = comp;
      dragStartAngle = Math.atan2(pos.y - comp.y, pos.x - comp.x);
      dragCompStartAngle = comp.angle;
      canvas.style.cursor = 'grabbing';
      canvas.setPointerCapture(e.pointerId);
      document.addEventListener('pointermove', onPointerMove);
      document.addEventListener('pointerup', onPointerUp);
      document.addEventListener('pointercancel', onPointerUp);
      cachedSegments = null;
      cachedAngles = null;
      e.preventDefault();
    }
  });

  canvas.addEventListener('pointermove', function(e) {
    if (gameState !== 'playing' || dragging) return;
    const pos = getCanvasPos(e);
    const comp = findComponentAt(pos);
    canvas.style.cursor = comp ? 'grab' : 'default';
  });

  canvas.addEventListener('touchmove', function(e) {
    if (dragging) e.preventDefault();
  }, { passive: false });

  // [Bug 修复] 阻止 canvas 上的右键菜单（contextmenu）
  canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); }, false);

  // [Bug 修复] 阻止 canvas 上的双击选中文字
  canvas.addEventListener('dblclick', function(e) { e.preventDefault(); }, false);
  canvas.addEventListener('selectstart', function(e) { e.preventDefault(); }, false);
  canvas.addEventListener('mousedown', function(e) { if (e.detail > 1) e.preventDefault(); }, false);

  // ============ Auto-Solve (shortest angular path) ============
  function startAutoSolve() {
    if (gameState !== 'playing') return;
    gameState = 'autoSolving';
    autoSolveStartTime = performance.now();
    autoSolveStartAngles = [];
    autoSolveDeltas = [];
    for (const comp of components) {
      if (comp.static || comp.targetAngle === undefined) continue;
      const start = comp.angle;
      const target = comp.targetAngle;
      const delta = shortestAngularDelta(target, start);
      autoSolveStartAngles.push({ id: comp.id, start });
      autoSolveDeltas.push({ id: comp.id, delta });
    }
    autoSolveIndicator.classList.add('active');
  }

  function updateAutoSolve(now) {
    if (gameState !== 'autoSolving') return;
    const elapsed = now - autoSolveStartTime;
    const progress = Math.min(elapsed / AUTO_SOLVE_DURATION, 1);
    const t = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;

    for (const comp of components) {
      if (comp.static || comp.targetAngle === undefined) continue;
      const sd = autoSolveStartAngles.find(s => s.id === comp.id);
      const dd = autoSolveDeltas.find(d => d.id === comp.id);
      if (sd && dd) {
        comp.angle = normalizeAngle(sd.start + dd.delta * t);
      }
    }

    if (progress >= 1) {
      gameState = 'playing';
      autoSolveIndicator.classList.remove('active');
      render();
    }
  }

  // ============ Level Management ============
  function stopAutoSolve() {
    if (gameState === 'autoSolving') {
      gameState = 'playing';
      autoSolveIndicator.classList.remove('active');
    }
  }

  function startLevel(idx) {
    stopAutoSolve();
    currentLevel = idx;
    const lv = levels[idx];
    components = lv.components.map(c => {
      const clone = { ...c };
      if (clone.width === undefined && (clone.type === 'MIRROR' || clone.type === 'SPLITTER')) {
        clone.width = DEFAULT_MIRROR_WIDTH;
      }
      return clone;
    });
    dragging = null;
    menuScreen.classList.remove('active');
    settingsScreen.classList.remove('active');
    levelSelectScreen.classList.remove('active');
    winModal.classList.remove('active');
    gameHUD.style.display = 'flex';
    hudLevelText.textContent = `第 ${idx + 1} 关 · ${LEVEL_NAMES[idx]}`;
    const clearedCount = Object.keys(progress.cleared).length;
    hudProgressText.textContent = `进度 ${clearedCount}/${levels.length}`;
    cachedSegments = null;
    cachedAngles = null;
    particles = [];
    winParticlesActive = false;
    if (lv.hint) {
      hudHint.style.display = 'block';
      hudHint.textContent = lv.hint;
    } else {
      hudHint.style.display = 'none';
    }
    autoSolveIndicator.classList.remove('active');
    gameState = 'playing';
    if (animationId) cancelAnimationFrame(animationId);
    function loop(now) {
      if (gameState === 'autoSolving') updateAutoSolve(now);
      render();
      animationId = requestAnimationFrame(loop);
    }
    animationId = requestAnimationFrame(loop);
  }

  function showMenu() {
    stopAutoSolve();
    gameState = 'menu';
    if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
    gameHUD.style.display = 'none';
    hudHint.style.display = 'none';
    winModal.classList.remove('active');
    autoSolveIndicator.classList.remove('active');
    settingsScreen.classList.remove('active');
    levelSelectScreen.classList.remove('active');
    menuScreen.classList.add('active');
  }

  function showSettings() {
    gameState = 'settings';
    settingMode.value = gameMode;
    menuScreen.classList.remove('active');
    settingsScreen.classList.add('active');
  }

  function showLevelSelect() {
    stopAutoSolve();
    gameState = 'levelSelect';
    if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
    gameHUD.style.display = 'none';
    hudHint.style.display = 'none';
    winModal.classList.remove('active');
    autoSolveIndicator.classList.remove('active');
    menuScreen.classList.remove('active');
    settingsScreen.classList.remove('active');
    levelSelectScreen.classList.add('active');
    levelSelectModeLabel.textContent = gameMode === 'linear' ? '线性挑战模式（需按顺序解锁）' : '自由探索模式（可任意选关）';
    levelGrid.innerHTML = '';
    for (let i = 0; i < levels.length; i++) {
      const cell = document.createElement('div');
      cell.className = 'level-cell';
      if (progress.cleared[i]) cell.classList.add('cleared');
      const isLocked = gameMode === 'linear' && i > progress.highestUnlocked;
      if (isLocked) {
        cell.classList.add('locked');
        cell.innerHTML = `<span class="lock-icon">🔒</span><span class="level-name">${LEVEL_NAMES[i]}</span>`;
      } else {
        cell.innerHTML = `<span class="level-num">${i === 0 ? '教' : i}</span><span class="level-name">${LEVEL_NAMES[i]}</span>`;
        cell.addEventListener('click', () => {
          levelSelectScreen.classList.remove('active');
          startLevel(i);
        });
      }
      levelGrid.appendChild(cell);
    }
  }

  // ============ Button Handlers ============
  document.getElementById('btn-start').addEventListener('click', () => showLevelSelect());
  document.getElementById('btn-tutorial').addEventListener('click', () => { menuScreen.classList.remove('active'); startLevel(0); });
  document.getElementById('btn-settings').addEventListener('click', () => showSettings());
  document.getElementById('btn-settings-back').addEventListener('click', () => showMenu());
  document.getElementById('btn-level-select-back').addEventListener('click', () => showMenu());
  document.getElementById('btn-back-menu').addEventListener('click', () => showMenu());
  document.getElementById('btn-reset').addEventListener('click', () => {
    if (gameState === 'playing' || gameState === 'autoSolving') startLevel(currentLevel);
  });
  document.getElementById('btn-auto-solve').addEventListener('click', () => startAutoSolve());
  document.getElementById('btn-win-retry').addEventListener('click', () => { winModal.classList.remove('active'); startLevel(currentLevel); });
  document.getElementById('btn-reset-progress').addEventListener('click', function() {
    progress = { cleared: {}, highestUnlocked: 0 };
    saveProgress(progress);
    const btn = this;
    const orig = btn.textContent;
    btn.textContent = '✓ 已重置';
    btn.style.borderColor = 'var(--accent)';
    setTimeout(() => { btn.textContent = orig; btn.style.borderColor = ''; }, 1500);
  });
  settingMode.addEventListener('change', () => { gameMode = settingMode.value; saveSettings(); });

  // ============ Keyboard Shortcuts ============
  document.addEventListener('keydown', function(e) {
    if (gameState === 'playing' || gameState === 'won' || gameState === 'autoSolving') {
      if (e.key === 'r' || e.key === 'R') {
        e.preventDefault();
        startLevel(currentLevel);
      } else if (e.key === 'Escape') {
        e.preventDefault();
        if (winModal.classList.contains('active')) {
          winModal.classList.remove('active');
        }
        showMenu();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        if (currentLevel > 0) {
          if (gameMode === 'free' || currentLevel <= progress.highestUnlocked) {
            startLevel(currentLevel - 1);
          }
        }
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        if (currentLevel < levels.length - 1) {
          if (gameMode === 'free' || currentLevel + 1 <= progress.highestUnlocked) {
            startLevel(currentLevel + 1);
          }
        }
      }
    } else if (gameState === 'levelSelect') {
      if (e.key === 'Escape') {
        e.preventDefault();
        showMenu();
      }
    } else if (gameState === 'settings') {
      if (e.key === 'Escape') {
        e.preventDefault();
        showMenu();
      }
    } else if (gameState === 'menu') {
      if (e.key === 'Escape') {
        e.preventDefault();
      }
    }
  });

  // ============ Viewport Scaling (适配顶部 sticky header) ============
  function resizeViewport() {
    const maxW = window.innerWidth - 40;
    const maxH = window.innerHeight - 70 - 64; // header(70) + 上下 padding(64)
    const scaleX = maxW / VW;
    const scaleY = maxH / VH;
    const scale = Math.min(scaleX, scaleY, 1.2);
    gameViewport.style.transform = `translate(-50%, -50%) scale(${scale})`;
  }
  window.addEventListener('resize', resizeViewport);
  resizeViewport();

  // ============ Cleanup ============
  window.addEventListener('beforeunload', function() {
    if (animationId) {
      cancelAnimationFrame(animationId);
      animationId = null;
    }
  });

  // ============ Init ============
  loadSettings();
  progress = loadProgress();
  showMenu();
  console.log('光影棱镜解谜 v2 · 30关 · Light & Prism Puzzle · Ready');
})();

// ===== 主题切换按钮（与 memory.html 一致，游戏运行时也可用） =====
(function() {
  var toggle = document.getElementById('themeToggle');
  var iconSpan = document.getElementById('themeIcon');
  var SUN_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>';
  var MOON_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>';

  function applyIcon() {
    var theme = document.documentElement.getAttribute('data-theme') || 'dark';
    iconSpan.innerHTML = theme === 'dark' ? SUN_SVG : MOON_SVG;
  }
  applyIcon();

  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme') || 'dark';
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    applyIcon();
  });
})();
</script>
