  <!-- 网站图标 -->

  <!-- 主题预载：避免刷新闪烁，读取 localStorage 的 theme（默认 dark） -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        document.documentElement.setAttribute('data-theme', saved === 'light' ? 'light' : 'dark');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <style>
    /* ========== 游戏页特有样式 ========== */

    /* 顶部固定导航条 - 与主站 navbar 风格一致的毛玻璃 */
    .game-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(251, 247, 240, 0.78);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(176, 130, 62, 0.12);
    }

    [data-theme="dark"] .game-header {
      background: rgba(26, 21, 16, 0.78);
      border-bottom-color: rgba(212, 171, 106, 0.1);
    }

    .header-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: var(--spacing-md) var(--spacing-lg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-md);
    }

    /* 返回链接 - 编辑体小字风格 */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-xs);
      font-family: var(--font-family-base);
      font-size: var(--font-size-xs);
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-text-secondary);
      padding: 8px 14px;
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-full);
      transition: all var(--transition-base);
      white-space: nowrap;
    }

    .back-link:hover {
      color: var(--color-accent);
      border-color: var(--color-accent-light);
      background: var(--color-accent-lighter);
      transform: translateX(-3px);
    }

    .back-link .arrow {
      color: var(--color-accent);
      font-weight: 700;
    }

    /* 标题块 - 居中 */
    .header-title-block {
      text-align: center;
      flex: 1;
      min-width: 0;
    }

    /* 标题上方编辑体小帽编号 */
    .game-title {
      font-family: var(--font-family-display);
      font-size: clamp(22px, 3.4vw, 30px);
      font-weight: 500;
      font-variation-settings: 'opsz' 48, 'SOFT' 50;
      color: var(--color-text-primary);
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .game-title::before {
      content: '— 01 —';
      display: block;
      font-family: var(--font-family-base);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 6px;
    }

    /* 主题切换按钮占位（.theme-toggle 已由 base.css 定义） */
    .theme-toggle {
      flex-shrink: 0;
    }

    /* ========== 主内容区 ========== */
    .game-main {
      padding: var(--spacing-3xl) var(--spacing-lg) var(--spacing-4xl);
    }

    .game-container {
      max-width: 580px;
      margin: 0 auto;
      padding: var(--spacing-2xl);
    }

    /* 信息条 - 编辑体小标签横排 */
    .game-info {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: var(--spacing-sm);
      padding: var(--spacing-lg) var(--spacing-xl);
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-md);
      margin-bottom: var(--spacing-xl);
    }

    .info-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
      position: relative;
    }

    .info-item + .info-item::before {
      content: '';
      position: absolute;
      left: calc(var(--spacing-sm) * -0.5);
      top: 10%;
      bottom: 10%;
      width: 1px;
      background: var(--color-border-light);
    }

    .info-label {
      font-family: var(--font-family-base);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
    }

    .info-value {
      font-family: var(--font-family-display);
      font-size: var(--font-size-2xl);
      font-weight: 500;
      font-variation-settings: 'opsz' 48;
      color: var(--color-text-primary);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
      line-height: 1;
    }

    .info-value.status-text {
      font-size: var(--font-size-base);
      font-family: var(--font-family-base);
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--color-accent);
    }

    .info-value.status-text.is-over {
      color: var(--color-primary);
    }

    /* ========== 游戏画布 ========== */
    .canvas-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: var(--spacing-xl);
    }

    #gameCanvas {
      width: 100%;
      max-width: 500px;
      height: auto;
      aspect-ratio: 1 / 1;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border-light);
      box-shadow: var(--shadow-md);
      background: var(--color-bg-secondary);
      display: block;
      touch-action: none;
    }

    /* ========== 控制区 ========== */
    .game-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-lg);
    }

    .control-buttons {
      display: flex;
      justify-content: center;
      gap: var(--spacing-md);
      flex-wrap: wrap;
    }

    .control-buttons .btn {
      min-width: 132px;
    }

    /* 操作说明 - 编辑体字框 */
    .controls-hint {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--spacing-lg);
      padding-top: var(--spacing-lg);
      border-top: 1px solid var(--color-border-light);
      width: 100%;
    }

    .hint-item {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
      font-family: var(--font-family-base);
      font-size: var(--font-size-xs);
      color: var(--color-text-secondary);
      letter-spacing: 0.02em;
    }

    .hint-keys {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .key-cap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 26px;
      padding: 0 7px;
      font-family: var(--font-family-base);
      font-size: 11px;
      font-weight: 700;
      color: var(--color-text-secondary);
      background: var(--color-bg-tertiary);
      border: 1px solid var(--color-border-medium);
      border-radius: var(--radius-sm);
      box-shadow: 0 1px 0 var(--color-border-medium);
      letter-spacing: 0;
    }

    @media (max-width: 560px) {
      .header-inner {
        padding: var(--spacing-sm) var(--spacing-md);
      }

      .back-link {
        padding: 6px 10px;
        font-size: 10px;
        letter-spacing: 0.14em;
      }

      .game-title {
        font-size: 20px;
      }

      .game-container {
        padding: var(--spacing-xl) var(--spacing-md);
      }

      .game-info {
        padding: var(--spacing-md);
        gap: var(--spacing-xs);
      }

      .info-value {
        font-size: var(--font-size-xl);
      }

      .control-buttons .btn {
        min-width: 0;
        flex: 1;
      }

      .controls-hint {
        gap: var(--spacing-md);
      }
    }

    /* ========== 背景音乐控制 ========== */
    .audio-controls {
      display: flex;
      justify-content: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
    }

    .audio-toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-full);
      cursor: pointer;
      font-family: var(--font-family-base);
      font-size: var(--font-size-xs);
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--color-text-secondary);
      transition: all var(--transition-base);
      user-select: none;
    }

    .audio-toggle:hover {
      border-color: var(--color-accent-light);
      color: var(--color-text-primary);
      transform: translateY(-1px);
    }

    .audio-toggle:active {
      transform: scale(0.97);
    }

    .audio-toggle.is-on {
      color: var(--color-accent);
      border-color: var(--color-accent-light);
      background: var(--color-accent-lighter);
    }

    .audio-ico {
      font-size: 16px;
      line-height: 1;
    }

    .audio-toggle .audio-ico-on { display: none; }
    .audio-toggle .audio-ico-off { display: inline; }
    .audio-toggle.is-on .audio-ico-on { display: inline; }
    .audio-toggle.is-on .audio-ico-off { display: none; }

    .audio-vol {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-full);
    }

    .audio-vol-label {
      font-family: var(--font-family-base);
      font-size: var(--font-size-xs);
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--color-text-tertiary);
    }

    .audio-vol input[type="range"] {
      width: 80px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--color-border-medium);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .audio-vol input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--color-accent);
      cursor: pointer;
      transition: transform var(--transition-fast);
    }

    .audio-vol input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .audio-vol input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--color-accent);
      cursor: pointer;
      border: none;
    }

    /* ========== 挑战模式选择 ========== */
    .challenge-selector {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
    }

    .challenge-btn {
      padding: 8px 18px;
      font-size: var(--font-size-xs);
      font-weight: 600;
      letter-spacing: 0.06em;
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border-medium);
      background: var(--color-bg-secondary);
      color: var(--color-text-secondary);
      cursor: pointer;
      font-family: var(--font-family-base);
      transition: all var(--transition-fast);
      user-select: none;
    }

    .challenge-btn:hover {
      border-color: var(--color-accent-light);
      color: var(--color-accent);
      transform: translateY(-1px);
    }

    .challenge-btn:active {
      transform: scale(0.97);
    }

    .challenge-btn.is-active {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: #fff;
    }

    .challenge-btn .ico {
      margin-right: 4px;
    }

    /* 限时模式 HUD 倒计时 */
    .timer-display {
      color: var(--color-danger, #e74c3c);
      font-weight: 700;
    }

    .timer-display.warning {
      animation: snakeTimerPulse 0.8s ease-in-out infinite;
    }

    @keyframes snakeTimerPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* 双人模式玩家 2 的蛇（用不同颜色 */
    .p2-snake {
      filter: hue-rotate(180deg);
    }

    /* 本地排行榜 */
    .lb-list { font-size: 12px; max-height: 180px; overflow-y: auto; }
    .lb-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px dashed var(--color-border-light); }
    .lb-item:last-child { border-bottom: none; }
    .lb-item .rank { font-family: var(--font-family-display); font-weight: 700; color: var(--color-accent); min-width: 24px; }
    .lb-item .score { font-family: var(--font-family-display); font-weight: 700; color: var(--color-text-primary); }
    .lb-item .meta { font-size: 10px; color: var(--color-text-tertiary); }
    .lb-empty { text-align: center; color: var(--color-text-tertiary); font-size: 12px; padding: 16px 0; }
  </style>

<body>
  <!-- 顶部导航条：返回链接 + 标题 + 主题切换 -->
  <header class="game-header">
    <div class="header-inner">
      <a href="../games.html" class="back-link">
        <span class="arrow">←</span>
        <span>游戏小屋</span>
      </a>
      <div class="header-title-block">
        <h1 class="game-title">贪吃蛇</h1>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="切换主题" title="切换深色/浅色模式">
        <!-- 图标由 JS 注入 -->
      </button>
    </div>
  </header>

  <main class="game-main">
    <div class="card game-container">
      <!-- 分数 / 最高分 / 状态 -->
      <div class="game-info">
        <div class="info-item">
          <span class="info-label">分数</span>
          <span class="info-value" id="score">0</span>
        </div>
        <div class="info-item">
          <span class="info-label">最高分</span>
          <span class="info-value" id="highScore">0</span>
        </div>
        <div class="info-item">
          <span class="info-label">奖励球</span>
          <span class="info-value" id="bonus">0</span>
        </div>
        <div class="info-item" id="timeItem" style="display:none">
          <span class="info-label">时间</span>
          <span class="info-value" id="timeLeft">60</span>
        </div>
        <div class="info-item" id="p2Item" style="display:none">
          <span class="info-label">P2 分数</span>
          <span class="info-value" id="score2">0</span>
        </div>
        <div class="info-item">
          <span class="info-label">状态</span>
          <span class="info-value status-text" id="status">就绪</span>
        </div>
      </div>

      <!-- 背景音乐控制 -->
      <div class="audio-controls">
        <button class="audio-toggle" id="audioToggle" aria-label="背景音乐开关" title="背景音乐">
          <span class="audio-ico audio-ico-on">🔊</span>
          <span class="audio-ico audio-ico-off">🔇</span>
          <span class="audio-label">背景音乐</span>
        </button>
        <div class="audio-vol" id="audioVolWrap">
          <span class="audio-vol-label">音量</span>
          <input type="range" id="audioVol" min="0" max="100" value="35" aria-label="音量调节">
        </div>
      </div>

      <!-- 挑战模式选择 -->
      <div class="challenge-selector" id="challengeSelector">
        <button class="challenge-btn is-active" data-challenge="classic"><span class="ico">🐍</span>经典</button>
        <button class="challenge-btn" data-challenge="time"><span class="ico">⏱️</span>限时</button>
        <button class="challenge-btn" data-challenge="wrap"><span class="ico">🌀</span>穿墙</button>
        <button class="challenge-btn" data-challenge="duo"><span class="ico">👥</span>双人</button>
      </div>

      <!-- 游戏画布 -->
      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
      </div>

      <!-- 控制按钮 + 操作说明 -->
      <div class="game-controls">
        <div class="control-buttons">
          <button class="btn btn-primary" id="startBtn">开始游戏</button>
          <button class="btn btn-secondary" id="restartBtn">重新开始</button>
          <button class="btn" id="btnDaily" title="每日挑战（同一天所有人关卡相同，仅一次）">🏆 今日</button>
          <button class="btn" id="btnShot" title="截图" aria-label="截图">📷</button>
          <button class="btn" id="btnFs" title="全屏" aria-label="全屏" onclick="if(window.GameUtils)GameUtils.toggleFullscreen()">⛶ 全屏</button>
        </div>

        <div class="controls-hint">
          <span class="hint-item">
            <span class="hint-keys">
              <span class="key-cap">W</span>
              <span class="key-cap">A</span>
              <span class="key-cap">S</span>
              <span class="key-cap">D</span>
            </span>
            <span>/</span>
            <span class="hint-keys">
              <span class="key-cap">↑</span>
              <span class="key-cap">↓</span>
              <span class="key-cap">←</span>
              <span class="key-cap">→</span>
            </span>
            <span>控制方向</span>
          </span>
          <span class="hint-item">
            <span class="key-cap">Space</span>
            <span>暂停 / 继续</span>
          </span>
          <span class="hint-item">
            <span class="key-cap">R</span>
            <span>重新开始</span>
          </span>
        </div>
      </div>

      <!-- 成绩历史趋势 -->
      <div class="trend-panel" id="trendPanel" style="margin-top:var(--spacing-md);padding:var(--spacing-md);background:var(--color-bg-secondary);border:1px solid var(--color-border-light);border-radius:var(--radius-md)">
        <div style="font-family:var(--font-family-base);font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">成绩历史</div>
        <div id="trendChart"></div>
      </div>

      <!-- 本地排行榜 -->
      <div class="panel-card" style="margin-top:var(--spacing-md);padding:var(--spacing-md);background:var(--color-bg-secondary);border:1px solid var(--color-border-light);border-radius:var(--radius-md)">
        <h3 style="margin:0 0 6px;font-family:var(--font-family-display);font-size:14px;color:var(--color-text-primary)">排行榜</h3>
        <div class="lb-list" id="lbList"></div>
      </div>
    </div>
  </main>

  <!-- 反馈入口 -->
  <div id="feedbackSlot" style="text-align:center;padding:12px 0;border-top:1px solid var(--color-border-light);margin-top:24px"></div>

  <script src="../assets/js/game-utils.js"></script>
  <script>
    /* ============================================================
     * 主题切换（与主页面一致：localStorage key='theme'，默认 dark）
     * ============================================================ */
    (function initThemeToggle() {
      var toggle = document.getElementById('themeToggle');
      var SUN_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>';
      var MOON_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>';

      function applyIcon() {
        var theme = document.documentElement.getAttribute('data-theme');
        toggle.innerHTML = theme === 'dark' ? SUN_SVG : MOON_SVG;
      }
      applyIcon();

      toggle.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme') || 'dark';
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        applyIcon();
        if (window.GameUtils) GameUtils.unlock('try_skin', '换个皮肤', '切换过一次游戏皮肤');
      });
    })();

    /* ============================================================
     * 贪吃蛇游戏逻辑
     * ============================================================ */
    (function snakeGame() {
      // ----- 画布与网格参数 -----
      var canvas = document.getElementById('gameCanvas');
      var ctx = canvas.getContext('2d');
      var GRID = 25;            // 25 x 25 网格
      var CELL = canvas.width / GRID;  // 每格 20px
      var PAD = 1;              // 单元格内缩进，留出网格缝隙感

      // ----- DOM 元素 -----
      var scoreEl = document.getElementById('score');
      var highScoreEl = document.getElementById('highScore');
      var statusEl = document.getElementById('status');
      var startBtn = document.getElementById('startBtn');
      var restartBtn = document.getElementById('restartBtn');
      var bonusEl = document.getElementById('bonus');
      var timeLeftEl = document.getElementById('timeLeft');
      var timeItemEl = document.getElementById('timeItem');
      var score2El = document.getElementById('score2');
      var p2ItemEl = document.getElementById('p2Item');

      // ----- 速度参数：初始 140ms，每吃 5 个食物加速 8ms，最快 70ms -----
      var INITIAL_SPEED = 140;
      var MIN_SPEED = 70;
      var SPEED_STEP = 8;
      var SPEED_UP_EVERY = 5;

      // ----- 奖励球（大球）参数 -----
      var BONUS_INTERVAL = 8000;        // 上一个消失后 8 秒生成下一个
      var BONUS_TTL = 5000;             // 大球存活 5 秒，期间持续缩小
      var BONUS_SCORE = 5;              // 吃到 +5 分（普通食物 +1）
      var BONUS_MAX_SIZE = CELL * 1.6;  // 大球最大直径，比普通食物明显更大
      var BONUS_POP_IN_MS = 300;        // 出现时 0.3 秒弹出动画
      var BONUS_BLINK_MS = 1500;        // 剩余 1.5 秒开始闪烁

      // ----- 挑战模式配置 -----
      var CHALLENGE_STORAGE_KEY = 'snake_challenge_v1';
      var challengeMode = 'classic'; // classic | time | wrap | duo
      var TIME_ATTACK_DURATION = 60; // 限时模式 60 秒
      var TIME_ATTACK_FOOD_COUNT = 5; // 限时模式同时出现 5 个食物
      var TIME_ATTACK_BONUS_INTERVAL = 3000; // 限时模式奖励球 3 秒一个

      // ----- 每日挑战（种子化食物生成）-----
      var dailySeed = null;        // 非 null 时启用种子化食物生成
      var _seedState = 0;          // 种子化伪随机内部状态
      function setDailySeed(seed) {
        dailySeed = seed;
        _seedState = (seed >>> 0) || 1;
      }
      function clearDailySeed() { dailySeed = null; }
      // mulberry32：同种子生成相同序列
      function seededRand() {
        _seedState = (_seedState + 0x6D2B79F5) | 0;
        var t = Math.imul(_seedState ^ (_seedState >>> 15), 1 | _seedState);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      }
      function pickRand() { return dailySeed ? seededRand() : Math.random(); }

      // 双人模式 P2 状态
      var snake2 = [];
      var dir2 = { x: -1, y: 0 };
      var nextDir2 = { x: -1, y: 0 };
      var score2 = 0;
      var winner = 0; // 0=无, 1=P1, 2=P2

      // 限时模式多食物
      var foods = []; // [{x, y}, ...]
      var timeLeft = 0;
      var timeUp = false; // 限时模式时间用尽标志

      // ----- 游戏状态 -----
      // state: 'ready' | 'playing' | 'paused' | 'over'
      var state = 'ready';
      var snake = [];          // 蛇身：数组元素 {x, y}，索引 0 为蛇头
      var dir = { x: 1, y: 0 };      // 当前移动方向
      var nextDir = { x: 1, y: 0 };  // 下一帧将要应用的方向
      var food = { x: 0, y: 0 };
      var score = 0;
      var foodEaten = 0;       // 累计吃到食物数（用于加速判定）
      var currentSpeed = INITIAL_SPEED;
      var timer = null;        // 游戏循环定时器

      // ----- 奖励球状态 -----
      // bonusBall: null 或 { x, y, maxSize, remaining, maxRemaining }
      //   remaining 用毫秒计数，仅在 state==='playing' 时递减，暂停 / 结束自动冻结
      var bonusBall = null;
      var bonusCountdown = BONUS_INTERVAL;  // 下次生成倒计时（毫秒）
      var bonusEaten = 0;                    // 已吃大球计数
      var floatTexts = [];                   // 飘字动画队列 { x, y, text, color, bornTime, ttl }
      var particles = [];                    // 粒子效果队列 { x, y, vx, vy, life, maxLife, color, size }
      var lastFrameTs = 0;                   // 上一帧时间戳，用于计算 dt
      var rafId = null;                      // requestAnimationFrame 句柄

      // ----- 读取最高分 -----
      var HIGH_SCORE_KEY = 'snakeHighScore';
      function loadHighScore() {
        try {
          var v = parseInt(localStorage.getItem(HIGH_SCORE_KEY), 10);
          return isNaN(v) ? 0 : v;
        } catch (e) {
          return 0;
        }
      }
      function saveHighScore(v) {
        try {
          localStorage.setItem(HIGH_SCORE_KEY, String(v));
        } catch (e) {}
      }
      var highScore = loadHighScore();

      // ----- 主题感知颜色（实时读取 CSS 变量，主题切换后生效） -----
      function cssVar(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
      }
      // 颜色缓存：rAF 每帧都会调用 draw → colors()，缓存避免每秒数百次 getComputedStyle
      // 主题切换时由 MutationObserver 置空重建
      var _colorCache = null;
      function colors() {
        if (_colorCache) return _colorCache;
        _colorCache = {
          bg: cssVar('--color-bg-secondary'),
          primary: cssVar('--color-primary'),
          primaryLight: cssVar('--color-primary-light'),
          accent: cssVar('--color-accent'),
          accentGlow: cssVar('--color-accent-glow'),
          grid: cssVar('--color-border-light'),
          text: cssVar('--color-text-primary'),
          textSecondary: cssVar('--color-text-secondary')
        };
        return _colorCache;
      }

      // ----- 初始化一局新游戏 -----
      function resetGame() {
        if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
        if (timer) { clearTimeout(timer); timer = null; }
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        lastFrameTs = 0;
        clearDailySeed(); // 常规重开不保留每日种子（每日挑战会在重开后重新注入）
        var mid = Math.floor(GRID / 2);
        snake = [
          { x: mid, y: mid },
          { x: mid - 1, y: mid },
          { x: mid - 2, y: mid }
        ];
        dir = { x: 1, y: 0 };
        nextDir = { x: 1, y: 0 };
        score = 0;
        foodEaten = 0;
        currentSpeed = INITIAL_SPEED;
        winner = 0;

        if (challengeMode === 'duo') {
          snake2 = [
            { x: mid, y: mid + 4 },
            { x: mid + 1, y: mid + 4 },
            { x: mid + 2, y: mid + 4 }
          ];
          dir2 = { x: -1, y: 0 };
          nextDir2 = { x: -1, y: 0 };
          score2 = 0;
        } else {
          snake2 = [];
          score2 = 0;
        }

        bonusBall = null;
        bonusCountdown = challengeMode === 'time' ? TIME_ATTACK_BONUS_INTERVAL : BONUS_INTERVAL;
        bonusEaten = 0;
        floatTexts = [];
        particles = [];

        if (challengeMode === 'time') {
          timeLeft = TIME_ATTACK_DURATION;
          timeUp = false;
          foods = [];
          placeFood();
          for (var fi = 0; fi < TIME_ATTACK_FOOD_COUNT; fi++) {
            placeFoodMulti();
          }
        } else {
          timeLeft = 0;
          timeUp = false;
          foods = [];
          placeFood();
        }

        updateHUD();
        state = 'ready';
        setStatus('就绪');
        startBtn.textContent = '开始游戏';
        draw();
        // 记录游玩次数
        if (window.GameUtils) {
          GameUtils.recordPlay('snake', 0);
          // 成就：首次启动游戏
          try {
            if (!GameUtils.isUnlocked('first_play')) {
              GameUtils.unlock('first_play', '初次到访', '第一次游玩任意游戏');
            }
          } catch (e) {}
        }
      }

      // ----- 获取所有被占用的格子（蛇身 + 大球 + 其他食物） -----
      function getOccupied(excludeFoodIdx) {
        var occupied = {};
        for (var i = 0; i < snake.length; i++) {
          occupied[snake[i].x + ',' + snake[i].y] = true;
        }
        if (challengeMode === 'duo') {
          for (var j = 0; j < snake2.length; j++) {
            occupied[snake2[j].x + ',' + snake2[j].y] = true;
          }
        }
        if (bonusBall) {
          occupied[bonusBall.x + ',' + bonusBall.y] = true;
        }
        if (challengeMode === 'time') {
          for (var k = 0; k < foods.length; k++) {
            if (k !== excludeFoodIdx) {
              occupied[foods[k].x + ',' + foods[k].y] = true;
            }
          }
        }
        return occupied;
      }

      // ----- 随机生成食物（不能落在蛇身或大球上） -----
      function placeFood() {
        var occupied = getOccupied();
        var candidates = [];
        for (var x = 0; x < GRID; x++) {
          for (var y = 0; y < GRID; y++) {
            if (!occupied[x + ',' + y]) candidates.push({ x: x, y: y });
          }
        }
        if (candidates.length === 0) {
          food = { x: -1, y: -1 };
          return;
        }
        food = candidates[Math.floor(pickRand() * candidates.length)];
      }

      // ----- 限时模式：往 foods 数组追加一个随机食物 -----
      function placeFoodMulti() {
        var occupied = getOccupied();
        occupied[food.x + ',' + food.y] = true;
        var candidates = [];
        for (var x = 0; x < GRID; x++) {
          for (var y = 0; y < GRID; y++) {
            if (!occupied[x + ',' + y]) candidates.push({ x: x, y: y });
          }
        }
        if (candidates.length === 0) return;
        foods.push(candidates[Math.floor(pickRand() * candidates.length)]);
      }

      // ----- 更新 HUD（分数 / 最高分 / 状态 / 时间 / P2分数） -----
      function updateHUD() {
        scoreEl.textContent = score;
        highScoreEl.textContent = highScore;
        bonusEl.textContent = bonusEaten;

        // 限时模式显示时间
        if (timeItemEl) {
          timeItemEl.style.display = challengeMode === 'time' ? '' : 'none';
          if (challengeMode === 'time') {
            timeLeftEl.textContent = Math.ceil(timeLeft);
          }
        }

        // 双人模式显示 P2 分数
        if (p2ItemEl) {
          p2ItemEl.style.display = challengeMode === 'duo' ? '' : 'none';
          if (challengeMode === 'duo') {
            score2El.textContent = score2;
          }
        }

        // 成就：单局分数首次≥50/100（在分数更新处检测）
        if (window.GameUtils) {
          try {
            if (score >= 50 && !GameUtils.isUnlocked('snake_score_50')) {
              GameUtils.unlock('snake_score_50', '小蛇出山', '贪吃蛇单局达 50 分');
            }
            if (score >= 100 && !GameUtils.isUnlocked('snake_score_100')) {
              GameUtils.unlock('snake_score_100', '蛇王', '贪吃蛇单局达 100 分');
            }
          } catch (e) {}
        }
      }

      function setStatus(text, isOver) {
        statusEl.textContent = text;
        statusEl.classList.toggle('is-over', !!isOver);
      }

      // ----- 设置方向（支持 WASD 与方向键，禁止反向掉头） -----
      function setDirection(nx, ny) {
        if (nx === -dir.x && ny === -dir.y) return;
        nextDir = { x: nx, y: ny };
      }

      // ----- 玩家2方向控制 -----
      function setDirection2(nx, ny) {
        if (nx === -dir2.x && ny === -dir2.y) return;
        nextDir2 = { x: nx, y: ny };
      }

      // ----- 单帧更新 -----
      function update() {
        if (challengeMode === 'duo') {
          updateDuo();
          return;
        }

        dir = nextDir;
        var head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        // 穿墙模式：出界后从对面出来
        if (challengeMode === 'wrap') {
          if (head.x < 0) head.x = GRID - 1;
          else if (head.x >= GRID) head.x = 0;
          if (head.y < 0) head.y = GRID - 1;
          else if (head.y >= GRID) head.y = 0;
        } else {
          // 撞墙判定
          if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
            gameOver();
            return;
          }
        }

        // 撞自己判定
        for (var i = 0; i < snake.length; i++) {
          if (snake[i].x === head.x && snake[i].y === head.y) {
            gameOver();
            return;
          }
        }

        snake.unshift(head);

        // 吃到普通食物（经典模式只有 1 个）
        var ateFood = (head.x === food.x && head.y === food.y);
        if (ateFood) {
          score += 1;
          foodEaten += 1;
          spawnParticles(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, colors().accent, 10);
          if (window.SnakeBGM) { try { window.SnakeBGM.playEat(); } catch (e) {} }
          if (foodEaten % SPEED_UP_EVERY === 0 && currentSpeed > MIN_SPEED) {
            currentSpeed = Math.max(MIN_SPEED, currentSpeed - SPEED_STEP);
          }
          updateHUD();
          placeFood();
        }

        // 限时模式：检查额外的食物
        if (challengeMode === 'time') {
          for (var fi = foods.length - 1; fi >= 0; fi--) {
            if (head.x === foods[fi].x && head.y === foods[fi].y) {
              score += 1;
              foodEaten += 1;
              spawnParticles(foods[fi].x * CELL + CELL / 2, foods[fi].y * CELL + CELL / 2, colors().accent, 10);
              if (window.SnakeBGM) { try { window.SnakeBGM.playEat(); } catch (e) {} }
              if (foodEaten % SPEED_UP_EVERY === 0 && currentSpeed > MIN_SPEED) {
                currentSpeed = Math.max(MIN_SPEED, currentSpeed - SPEED_STEP);
              }
              foods.splice(fi, 1);
              placeFoodMulti();
              updateHUD();
              ateFood = true;
            }
          }
        }

        // 吃到奖励球
        if (bonusBall && head.x === bonusBall.x && head.y === bonusBall.y) {
          score += BONUS_SCORE;
          bonusEaten += 1;
          spawnFloatText(
            bonusBall.x * CELL + CELL / 2,
            bonusBall.y * CELL + CELL / 2,
            '+' + BONUS_SCORE,
            cssVar('--color-accent')
          );
          if (window.SnakeBGM) { try { window.SnakeBGM.playBonus(); } catch (e) {} }
          bonusBall = null;
          bonusCountdown = challengeMode === 'time' ? TIME_ATTACK_BONUS_INTERVAL : BONUS_INTERVAL;
          updateHUD();
        }

        if (!ateFood) {
          snake.pop();
        }
      }

      // ----- 双人模式更新 -----
      function updateDuo() {
        dir = nextDir;
        dir2 = nextDir2;

        var head1 = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
        var head2 = { x: snake2[0].x + dir2.x, y: snake2[0].y + dir2.y };

        var p1Dead = false;
        var p2Dead = false;

        // 撞墙判定
        if (head1.x < 0 || head1.x >= GRID || head1.y < 0 || head1.y >= GRID) p1Dead = true;
        if (head2.x < 0 || head2.x >= GRID || head2.y < 0 || head2.y >= GRID) p2Dead = true;

        // 撞自己判定
        if (!p1Dead) {
          for (var i = 0; i < snake.length; i++) {
            if (snake[i].x === head1.x && snake[i].y === head1.y) { p1Dead = true; break; }
          }
        }
        if (!p2Dead) {
          for (var j = 0; j < snake2.length; j++) {
            if (snake2[j].x === head2.x && snake2[j].y === head2.y) { p2Dead = true; break; }
          }
        }

        // 撞对方判定
        if (!p1Dead) {
          for (var k = 0; k < snake2.length; k++) {
            if (snake2[k].x === head1.x && snake2[k].y === head1.y) { p1Dead = true; break; }
          }
        }
        if (!p2Dead) {
          for (var m = 0; m < snake.length; m++) {
            if (snake[m].x === head2.x && snake[m].y === head2.y) { p2Dead = true; break; }
          }
        }

        // 头对头相撞
        if (!p1Dead && !p2Dead && head1.x === head2.x && head1.y === head2.y) {
          p1Dead = true;
          p2Dead = true;
        }

        if (p1Dead || p2Dead) {
          if (p1Dead && !p2Dead) winner = 2;
          else if (!p1Dead && p2Dead) winner = 1;
          else winner = 0;
          gameOver();
          return;
        }

        snake.unshift(head1);
        snake2.unshift(head2);

        var ate1 = (head1.x === food.x && head1.y === food.y);
        var ate2 = (head2.x === food.x && head2.y === food.y);

        if (ate1) {
          score += 1;
          foodEaten += 1;
          spawnParticles(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, colors().accent, 10);
          if (window.SnakeBGM) { try { window.SnakeBGM.playEat(); } catch (e) {} }
          placeFood();
          updateHUD();
        }
        if (ate2) {
          score2 += 1;
          foodEaten += 1;
          spawnParticles(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, '#3498db', 10);
          if (window.SnakeBGM) { try { window.SnakeBGM.playEat(); } catch (e) {} }
          placeFood();
          updateHUD();
        }

        // 双人模式下加速
        if ((ate1 || ate2) && foodEaten % SPEED_UP_EVERY === 0 && currentSpeed > MIN_SPEED) {
          currentSpeed = Math.max(MIN_SPEED, currentSpeed - SPEED_STEP);
        }

        // 奖励球两人都可以吃
        if (bonusBall && head1.x === bonusBall.x && head1.y === bonusBall.y) {
          score += BONUS_SCORE;
          bonusEaten += 1;
          spawnFloatText(bonusBall.x * CELL + CELL / 2, bonusBall.y * CELL + CELL / 2, '+' + BONUS_SCORE, cssVar('--color-accent'));
          if (window.SnakeBGM) { try { window.SnakeBGM.playBonus(); } catch (e) {} }
          bonusBall = null;
          bonusCountdown = BONUS_INTERVAL;
          updateHUD();
        }
        if (bonusBall && head2.x === bonusBall.x && head2.y === bonusBall.y) {
          score2 += BONUS_SCORE;
          bonusEaten += 1;
          spawnFloatText(bonusBall.x * CELL + CELL / 2, bonusBall.y * CELL + CELL / 2, '+' + BONUS_SCORE, '#3498db');
          if (window.SnakeBGM) { try { window.SnakeBGM.playBonus(); } catch (e) {} }
          bonusBall = null;
          bonusCountdown = BONUS_INTERVAL;
          updateHUD();
        }

        if (!ate1) snake.pop();
        if (!ate2) snake2.pop();
      }

      // ----- 奖励球（大球）相关函数 -----

      // 随机生成大球位置（不能落在蛇身或普通食物上）
      function spawnBonusBall() {
        var occupied = getOccupied();
        occupied[food.x + ',' + food.y] = true;
        var candidates = [];
        for (var x = 0; x < GRID; x++) {
          for (var y = 0; y < GRID; y++) {
            if (!occupied[x + ',' + y]) candidates.push({ x: x, y: y });
          }
        }
        if (candidates.length === 0) return;
        var pos = candidates[Math.floor(Math.random() * candidates.length)];
        bonusBall = {
          x: pos.x,
          y: pos.y,
          maxSize: BONUS_MAX_SIZE,
          maxRemaining: BONUS_TTL,
          remaining: BONUS_TTL
        };
      }

      // 绘制大球：金色 + 光晕 + 呼吸脉动 + 弹出 + 末期闪烁
      function drawBonusBall() {
        if (!bonusBall) return;
        var c = colors();
        var elapsed = bonusBall.maxRemaining - bonusBall.remaining;  // 已存在时长(ms)
        var cx = bonusBall.x * CELL + CELL / 2;
        var cy = bonusBall.y * CELL + CELL / 2;

        // 线性缩小：remaining/maxRemaining 从 1 → 0
        var shrink = bonusBall.remaining / bonusBall.maxRemaining;

        // 弹出动画（0~300ms，easeOutCubic 从小到完整大小）
        var popP = Math.min(1, elapsed / BONUS_POP_IN_MS);
        var popIn = 1 - Math.pow(1 - popP, 3);

        // 呼吸脉动（基于已存在时长，±8%）
        var pulse = 1 + 0.08 * Math.sin(elapsed / 150);

        // 末期闪烁（剩余 < 1.5s，越接近消失频率越快）
        var visible = true;
        if (bonusBall.remaining < BONUS_BLINK_MS) {
          var urgency = 1 - bonusBall.remaining / BONUS_BLINK_MS;  // 0→1
          var freq = 0.015 + urgency * 0.025;
          visible = Math.sin(elapsed * freq) > -0.3;
        }
        if (!visible) return;

        var size = bonusBall.maxSize * shrink * popIn * pulse;
        if (size < 2) return;

        // 外层光晕 + 金色主体
        ctx.save();
        ctx.shadowColor = c.accent;
        ctx.shadowBlur = 24;
        ctx.fillStyle = c.accent;
        ctx.beginPath();
        ctx.arc(cx, cy, size / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // 内部高光，增加立体感
        ctx.save();
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.arc(cx - size / 6, cy - size / 6, Math.max(1, size / 9), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // 飘字动画（吃到大球时显示 "+5"）
      function spawnFloatText(x, y, text, color) {
        floatTexts.push({
          x: x, y: y, text: text, color: color,
          bornTime: performance.now(), ttl: 1000
        });
      }

      // 粒子效果（吃到食物时迸发）
      function spawnParticles(x, y, color, count) {
        for (var i = 0; i < count; i++) {
          var angle = Math.random() * Math.PI * 2;
          var speed = 1 + Math.random() * 3;
          particles.push({
            x: x, y: y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1, maxLife: 1,
            color: color,
            size: 2 + Math.random() * 3
          });
        }
      }

      function updateParticles(dt) {
        for (var i = particles.length - 1; i >= 0; i--) {
          var p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.05;
          p.life -= dt / 600;
          if (p.life <= 0) particles.splice(i, 1);
        }
      }

      function drawParticles() {
        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          ctx.save();
          ctx.globalAlpha = Math.max(0, p.life);
          ctx.fillStyle = p.color;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      // 清理过期飘字
      function updateFloatTexts() {
        var now = performance.now();
        floatTexts = floatTexts.filter(function (ft) {
          return (now - ft.bornTime) < ft.ttl;
        });
      }

      // 绘制飘字（向上飘 30px 并淡出）
      function drawFloatTexts() {
        if (floatTexts.length === 0) return;
        var now = performance.now();
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '700 22px ' + getComputedStyle(document.body).fontFamily;
        for (var i = 0; i < floatTexts.length; i++) {
          var ft = floatTexts[i];
          var p = (now - ft.bornTime) / ft.ttl;  // 进度 0→1
          var alpha = Math.max(0, 1 - p);
          var yOffset = -30 * p;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = ft.color;
          ctx.fillText(ft.text, ft.x, ft.y + yOffset);
        }
        ctx.restore();
      }

      // ----- 绘制 -----
      function draw() {
        var c = colors();
        // 背景
        ctx.fillStyle = c.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 极淡网格线
        ctx.strokeStyle = c.grid;
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        for (var i = 1; i < GRID; i++) {
          var p = i * CELL;
          ctx.moveTo(p, 0); ctx.lineTo(p, canvas.height);
          ctx.moveTo(0, p); ctx.lineTo(canvas.width, p);
        }
        ctx.stroke();
        ctx.globalAlpha = 1;

        // 食物（沙弗朗金圆点 + 微光晕）
        if (food.x >= 0) {
          drawFood(food.x, food.y, c.accent);
        }

        // 限时模式额外食物
        if (challengeMode === 'time') {
          for (var fi = 0; fi < foods.length; fi++) {
            drawFood(foods[fi].x, foods[fi].y, c.accent);
          }
        }

        // 奖励球（大球）
        drawBonusBall();

        // 蛇身（梅紫圆角方块，头部稍亮）
        for (var s = 0; s < snake.length; s++) {
          var seg = snake[s];
          var isHead = s === 0;
          var rx = seg.x * CELL + PAD;
          var ry = seg.y * CELL + PAD;
          var rw = CELL - PAD * 2;
          var radius = Math.max(3, CELL / 4);
          ctx.fillStyle = isHead ? c.primaryLight : c.primary;
          roundRect(ctx, rx, ry, rw, rw, radius);
          ctx.fill();
        }

        // 蛇头眼睛
        if (snake.length > 0) {
          drawEyes(snake[0], dir);
        }

        // 双人模式：第二条蛇（蓝色系）
        if (challengeMode === 'duo' && snake2.length > 0) {
          var p2Color = '#3498db';
          var p2ColorLight = '#5dade2';
          for (var s2 = 0; s2 < snake2.length; s2++) {
            var seg2 = snake2[s2];
            var isHead2 = s2 === 0;
            var rx2 = seg2.x * CELL + PAD;
            var ry2 = seg2.y * CELL + PAD;
            var rw2 = CELL - PAD * 2;
            var radius2 = Math.max(3, CELL / 4);
            ctx.fillStyle = isHead2 ? p2ColorLight : p2Color;
            roundRect(ctx, rx2, ry2, rw2, rw2, radius2);
            ctx.fill();
          }
          // P2 蛇头眼睛
          if (snake2.length > 0) {
            drawEyes(snake2[0], dir2);
          }
        }

        // 覆盖层：暂停 / 结束
        if (state === 'paused' || state === 'over') {
          ctx.fillStyle = state === 'over'
            ? 'rgba(0,0,0,0.45)'
            : 'rgba(0,0,0,0.35)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = c.text;
          ctx.font = '600 30px ' + getComputedStyle(document.body).fontFamily;
          var title = '游戏结束';
          var hint = '';
          if (state === 'paused') {
            title = '已暂停';
            hint = '按 Space 继续';
          } else {
            if (challengeMode === 'duo') {
              if (winner === 1) {
                title = '🏆 玩家 1 胜利';
                hint = 'P1 ' + score + ' 分 · P2 ' + score2 + ' 分 · 按 R 重开';
              } else if (winner === 2) {
                title = '🏆 玩家 2 胜利';
                hint = 'P1 ' + score + ' 分 · P2 ' + score2 + ' 分 · 按 R 重开';
              } else {
                title = '平局';
                hint = 'P1 ' + score + ' 分 · P2 ' + score2 + ' 分 · 按 R 重开';
              }
            } else if (challengeMode === 'time') {
              if (timeUp) {
                title = '时间到';
              } else {
                title = '游戏结束';
              }
              hint = '最终分数 ' + score + ' · 按 R 或点击「重新开始」';
            } else {
              title = '游戏结束';
              hint = '最终分数 ' + score + ' · 按 R 或点击「重新开始」';
            }
          }
          ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 22);

          ctx.font = '500 15px ' + getComputedStyle(document.body).fontFamily;
          ctx.fillStyle = c.textSecondary;
          ctx.fillText(hint, canvas.width / 2, canvas.height / 2 + 16);
        }

        // 飘字动画（始终绘制于覆盖层之上）
        drawFloatTexts();

        // 粒子效果
        drawParticles();
      }

      // 圆角矩形辅助函数（兼容老 API）
      function roundRect(ctx, x, y, w, h, r) {
        var rr = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + w, y, x + w, y + h, rr);
        ctx.arcTo(x + w, y + h, x, y + h, rr);
        ctx.arcTo(x, y + h, x, y, rr);
        ctx.arcTo(x, y, x + w, y, rr);
        ctx.closePath();
      }

      // 蛇头眼睛 - 根据方向定位
      // ----- 绘制单个食物 -----
      function drawFood(x, y, color) {
        var fx = x * CELL + CELL / 2;
        var fy = y * CELL + CELL / 2;
        ctx.save();
        ctx.shadowColor = color;
        ctx.shadowBlur = 12;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(fx, fy, CELL / 2 - PAD - 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.beginPath();
        ctx.arc(fx - CELL / 8, fy - CELL / 8, CELL / 7, 0, Math.PI * 2);
        ctx.fill();
      }

      // ----- 绘制蛇头眼睛 -----
      function drawEyes(head, d) {
        if (!d) d = dir;
        var hx = head.x * CELL;
        var hy = head.y * CELL;
        var cx = hx + CELL / 2;
        var cy = hy + CELL / 2;
        var off = CELL / 5;
        var r = CELL / 12;

        // 垂直方向移动时眼睛左右分布，水平方向时上下分布
        var e1, e2;
        if (d.x !== 0) {
          var fwd = d.x * off / 2;
          e1 = { x: cx + fwd, y: cy - off };
          e2 = { x: cx + fwd, y: cy + off };
        } else {
          var fwd2 = d.y * off / 2;
          e1 = { x: cx - off, y: cy + fwd2 };
          e2 = { x: cx + off, y: cy + fwd2 };
        }

        ctx.fillStyle = '#FBF7F0';
        ctx.beginPath(); ctx.arc(e1.x, e1.y, r, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(e2.x, e2.y, r, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#1A1510';
        ctx.beginPath(); ctx.arc(e1.x, e1.y, r / 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(e2.x, e2.y, r / 2, 0, Math.PI * 2); ctx.fill();
      }

      // ----- 游戏循环（可变速度） -----
      function loop() {
        update();
        draw();
        if (state === 'playing') {
          timer = setTimeout(loop, currentSpeed);
        }
      }

      // ----- 游戏结束 -----
      function gameOver() {
        state = 'over';
        if (timer) { clearTimeout(timer); timer = null; }
        if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
        // 取消 rAF 主循环：游戏结束后不再重绘，节省 CPU
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        var bestScore = score;
        if (challengeMode === 'duo' && score2 > bestScore) {
          bestScore = score2;
        }
        if (bestScore > highScore) {
          highScore = bestScore;
          saveHighScore(highScore);
        }
        // ----- 成就解锁 -----
        if (window.GameUtils) {
          if (challengeMode === 'duo' && !GameUtils.isUnlocked('snake_dual_win')) GameUtils.unlock('snake_dual_win', '双雄对决', '完成一局双人模式');
          // 成绩历史曲线（项13）
          GameUtils.recordScore('snake', bestScore);
          renderTrend();
          // 本地排行榜（分数越高越好，记录挑战模式）
          GameUtils.saveLeaderboard('snake', bestScore, { mode: challengeMode });
          renderLb();
          // 每日挑战成绩记录（项11）
          if (dailySeed) {
            var ok = GameUtils.recordDaily('snake', bestScore);
            if (ok) GameUtils._toast('🏆 今日挑战成绩已记录：' + bestScore + ' 分', 2500);
            clearDailySeed();
          }
        }
        if (window.SnakeBGM) { try { window.SnakeBGM.playGameOver(); } catch (e) {} }
        if (challengeMode === 'duo' && winner > 0 && window.GameUtils) GameUtils.celebrate();
        updateHUD();
        setStatus('结束', true);
        startBtn.textContent = '再来一局';
        draw();
      }

      // ----- 渲染成绩历史趋势曲线 -----
      function renderTrend() {
        var el = document.getElementById('trendChart');
        if (el && window.GameUtils) el.innerHTML = GameUtils.renderTrendChart('snake');
      }

      // ----- 渲染本地排行榜（meta 显示挑战模式 + 日期）-----
      function renderLb() {
        var el = document.getElementById('lbList');
        if (el && window.GameUtils) {
          el.innerHTML = GameUtils.renderLeaderboard('snake', {
            meta: function (r) {
              var modeMap = { classic: '经典', time: '限时', wrap: '穿墙', duo: '双人' };
              var m = (r.extra && r.extra.mode && modeMap[r.extra.mode]) ? modeMap[r.extra.mode] : '经典';
              var d = new Date(r.date);
              return m + ' · ' + (d.getMonth() + 1) + '/' + d.getDate();
            }
          });
        }
      }

      // ----- 每日挑战 -----
      function startDailyChallenge() {
        if (!window.GameUtils) return;
        var seed = GameUtils.getDailySeed();
        var st = GameUtils.getDailyStatus('snake');
        if (st.played) {
          GameUtils._toast('今日已挑战过，成绩 ' + st.score + ' 分，明天再来', 2800);
          return;
        }
        // 切到经典模式（setChallengeMode 会 resetGame，此时无种子）
        if (challengeMode !== 'classic') setChallengeMode('classic');
        else resetGame();
        // 注入每日种子并重新布置食物，保证全员关卡一致
        setDailySeed(seed);
        foods = [];
        placeFood();
        if (challengeMode === 'time') {
          for (var fi = 0; fi < TIME_ATTACK_FOOD_COUNT; fi++) placeFoodMulti();
        }
        updateHUD();
        draw();
        renderTrend();
        GameUtils._toast('🏆 每日挑战开始！今日所有玩家关卡相同，仅一次机会', 3000);
        // 自动开始倒计时
        startCountdown(function () {
          state = 'playing';
          setStatus('进行中');
          startBtn.textContent = '暂停';
          if (timer) clearTimeout(timer);
          timer = setTimeout(loop, currentSpeed);
          if (!rafId) rafId = requestAnimationFrame(animLoop);
        });
      }

      // ----- 开始 / 继续 / 暂停 控制 -----
      function startOrToggle() {
        if (state === 'ready' || state === 'over') {
          // 开始新一局
          resetGame();
          startCountdown(function () {
            state = 'playing';
            setStatus('进行中');
            startBtn.textContent = '暂停';
            if (timer) clearTimeout(timer);
            timer = setTimeout(loop, currentSpeed);
            if (!rafId) rafId = requestAnimationFrame(animLoop);
          });
        } else if (state === 'playing') {
          // 暂停
          state = 'paused';
          if (timer) { clearTimeout(timer); timer = null; }
          setStatus('已暂停');
          startBtn.textContent = '继续';
          draw();
        } else if (state === 'paused') {
          // 继续
          state = 'playing';
          setStatus('进行中');
          startBtn.textContent = '暂停';
          timer = setTimeout(loop, currentSpeed);
        }
      }

      function restart() {
        if (timer) { clearTimeout(timer); timer = null; }
        resetGame();
        startCountdown(function () {
          state = 'playing';
          setStatus('进行中');
          startBtn.textContent = '暂停';
          timer = setTimeout(loop, currentSpeed);
          if (!rafId) rafId = requestAnimationFrame(animLoop);
        });
      }

      var countdownVal = 0;
      var countdownTimer = null;
      function startCountdown(callback) {
        countdownVal = 3;
        drawCountdown();
        countdownTimer = setInterval(function () {
          countdownVal--;
          if (countdownVal <= 0) {
            clearInterval(countdownTimer);
            countdownTimer = null;
            draw();
            callback();
          } else {
            drawCountdown();
          }
        }, 700);
      }
      function drawCountdown() {
        var c = colors();
        ctx.fillStyle = c.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = c.grid;
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        for (var i = 1; i < GRID; i++) {
          var p = i * CELL;
          ctx.moveTo(p, 0); ctx.lineTo(p, canvas.height);
          ctx.moveTo(0, p); ctx.lineTo(canvas.width, p);
        }
        ctx.stroke();
        ctx.globalAlpha = 1;
        for (var s = 0; s < snake.length; s++) {
          var seg = snake[s];
          var isHead = s === 0;
          var rx = seg.x * CELL + PAD;
          var ry = seg.y * CELL + PAD;
          var rw = CELL - PAD * 2;
          var radius = Math.max(3, CELL / 4);
          ctx.fillStyle = isHead ? c.primaryLight : c.primary;
          roundRect(ctx, rx, ry, rw, rw, radius);
          ctx.fill();
        }
        if (snake.length > 0) drawEyes(snake[0]);

        // 双人模式：第二条蛇
        if (challengeMode === 'duo' && snake2.length > 0) {
          var p2Color = '#3498db';
          var p2ColorLight = '#5dade2';
          for (var s2 = 0; s2 < snake2.length; s2++) {
            var seg2 = snake2[s2];
            var isHead2 = s2 === 0;
            var rx2 = seg2.x * CELL + PAD;
            var ry2 = seg2.y * CELL + PAD;
            var rw2 = CELL - PAD * 2;
            var radius2 = Math.max(3, CELL / 4);
            ctx.fillStyle = isHead2 ? p2ColorLight : p2Color;
            roundRect(ctx, rx2, ry2, rw2, rw2, radius2);
            ctx.fill();
          }
          if (snake2.length > 0) drawEyes(snake2[0], dir2);
        }

        if (food.x >= 0) {
          drawFood(food.x, food.y, c.accent);
        }

        // 限时模式额外食物
        if (challengeMode === 'time') {
          for (var fi = 0; fi < foods.length; fi++) {
            drawFood(foods[fi].x, foods[fi].y, c.accent);
          }
        }
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = c.accent;
        ctx.font = '700 72px ' + getComputedStyle(document.body).fontFamily;
        ctx.shadowColor = c.accent;
        ctx.shadowBlur = 30;
        ctx.fillText(countdownVal, canvas.width / 2, canvas.height / 2);
        ctx.shadowBlur = 0;
        ctx.fillStyle = c.textSecondary;
        ctx.font = '500 16px ' + getComputedStyle(document.body).fontFamily;
        ctx.fillText('准备开始', canvas.width / 2, canvas.height / 2 + 60);
      }

      // ----- 键盘控制 -----
      document.addEventListener('keydown', function (e) {
        var key = e.key;

        var handled = true;

        // 双人模式：WASD 玩家1，方向键 玩家2
        if (challengeMode === 'duo') {
          switch (key) {
            case 'w': case 'W': setDirection(0, -1); break;
            case 's': case 'S': setDirection(0, 1); break;
            case 'a': case 'A': setDirection(-1, 0); break;
            case 'd': case 'D': setDirection(1, 0); break;
            case 'ArrowUp': setDirection2(0, -1); break;
            case 'ArrowDown': setDirection2(0, 1); break;
            case 'ArrowLeft': setDirection2(-1, 0); break;
            case 'ArrowRight': setDirection2(1, 0); break;
            case ' ':
              if (state === 'over') { handled = false; }
              else { startOrToggle(); }
              break;
            case 'r': case 'R':
              restart();
              break;
            default:
              handled = false;
          }
        } else {
          // 单人模式：WASD 和方向键都控制玩家1
          switch (key) {
            case 'ArrowUp': case 'w': case 'W': setDirection(0, -1); break;
            case 'ArrowDown': case 's': case 'S': setDirection(0, 1); break;
            case 'ArrowLeft': case 'a': case 'A': setDirection(-1, 0); break;
            case 'ArrowRight': case 'd': case 'D': setDirection(1, 0); break;
            case ' ':
              if (state === 'over') { handled = false; }
              else { startOrToggle(); }
              break;
            case 'r': case 'R':
              restart();
              break;
            default:
              handled = false;
          }
        }

        if (handled) {
          e.preventDefault();
        }
      }, { passive: false });

      // ----- 按钮事件 -----
      startBtn.addEventListener('click', startOrToggle);
      restartBtn.addEventListener('click', restart);

      // ----- 截图按钮 -----
      var btnShot = document.getElementById('btnShot');
      if (btnShot) {
        btnShot.addEventListener('click', function () {
          if (window.GameUtils) {
            GameUtils.screenshotCanvas(canvas, '贪吃蛇', '得分 ' + score);
            GameUtils.unlock('use_screenshot', '定格瞬间', '使用截图功能分享一次');
          }
        });
      }

      // ----- 每日挑战按钮 -----
      var btnDaily = document.getElementById('btnDaily');
      if (btnDaily) {
        btnDaily.addEventListener('click', function () {
          if (state === 'playing' || state === 'paused') {
            if (window.GameUtils) GameUtils._toast('请先结束当前一局再开始每日挑战', 2000);
            return;
          }
          startDailyChallenge();
        });
      }

      // ----- 挑战模式选择 -----
      function setChallengeMode(mode) {
        challengeMode = mode;
        try { localStorage.setItem(CHALLENGE_STORAGE_KEY, mode); } catch (e) {}

        // 更新按钮激活状态
        var btns = document.querySelectorAll('.challenge-btn');
        for (var i = 0; i < btns.length; i++) {
          btns[i].classList.toggle('is-active', btns[i].getAttribute('data-challenge') === mode);
        }

        // 移动端双人模式提示（双人模式需要键盘）
        if (mode === 'duo' && window.matchMedia && window.matchMedia('(max-width: 768px)').matches) {
          if (window.GameUtils) GameUtils._toast('💡 双人模式需要键盘，建议在电脑上游玩', 3000);
        }

        // 重置游戏以应用新模式
        resetGame();
        draw();
        updateHUD();
      }

      var challengeBtns = document.querySelectorAll('.challenge-btn');
      for (var ci = 0; ci < challengeBtns.length; ci++) {
        challengeBtns[ci].addEventListener('click', function (e) {
          var mode = e.currentTarget.getAttribute('data-challenge');
          if (mode) setChallengeMode(mode);
        });
      }

      // 从 localStorage 加载挑战模式
      try {
        var saved = localStorage.getItem(CHALLENGE_STORAGE_KEY);
        if (saved && (saved === 'classic' || saved === 'time' || saved === 'wrap' || saved === 'duo')) {
          challengeMode = saved;
        }
      } catch (e) {}

      // 初始化按钮状态
      var initBtns = document.querySelectorAll('.challenge-btn');
      for (var ii = 0; ii < initBtns.length; ii++) {
        initBtns[ii].classList.toggle('is-active', initBtns[ii].getAttribute('data-challenge') === challengeMode);
      }

      // ----- 移动端滑动控制 -----
      var touchStartX = 0, touchStartY = 0;
      var touchMinSwipe = 30;
      canvas.addEventListener('touchstart', function (e) {
        if (e.touches.length > 0) {
          touchStartX = e.touches[0].clientX;
          touchStartY = e.touches[0].clientY;
        }
      }, { passive: true });
      canvas.addEventListener('touchmove', function (e) {
        e.preventDefault();
      }, { passive: false });
      canvas.addEventListener('touchend', function (e) {
        if (e.changedTouches.length > 0) {
          var dx = e.changedTouches[0].clientX - touchStartX;
          var dy = e.changedTouches[0].clientY - touchStartY;
          var absX = Math.abs(dx), absY = Math.abs(dy);
          if (Math.max(absX, absY) < touchMinSwipe) return;
          if (absX > absY) {
            setDirection(dx > 0 ? 1 : -1, 0);
          } else {
            setDirection(0, dy > 0 ? 1 : -1);
          }
        }
      });

      // ----- 动画循环（requestAnimationFrame）：负责奖励球计时与平滑绘制 -----
      // 蛇身位移仍由 setTimeout(loop) 驱动；rAF 只负责大球动画、飘字、每帧重绘
      function animLoop(ts) {
        if (!lastFrameTs) lastFrameTs = ts;
        var dt = ts - lastFrameTs;
        lastFrameTs = ts;
        // 防止标签页隐藏后恢复时 dt 过大导致大球瞬间消失
        if (dt > 200) dt = 200;

              if (bassNote) {
                var bfreq = freqOf(bassNote[0]);
                playNote(bfreq, t, BEAT * bassNote[1] * 0.8, 'square', bassGain, 0.01, 0.1, 1);
              }
              bassTimeInBar = bassNote[1];
              bassStep++;
              if (bassStep >= BASSLINE.length) bassStep = 0;
            }
            bassTimeInBar -= TICK / BEAT;
            if (bassTimeInBar < 0) bassTimeInBar = 0;
          }

          // ----- 每拍触发 -----
          if (tickInBeat === 0) {
            // 底鼓
            var kickIntensity = KICK_PATTERN[barBeat % KICK_PATTERN.length];
            if (kickIntensity > 0.05) {
              playKick(t, kickIntensity);
            }
            // 踩镲
            var hatIntensity = HAT_PATTERN[barBeat % HAT_PATTERN.length];
            if (hatIntensity > 0.05) {
              playHat(t, hatIntensity);
            }

            // 每小节换和弦
            if (barBeat === 0) {
              currentChordIdx = barIdx % CHORDS.length;
              updateDroneChord();
            }
          }

          // ----- 8分音符触发：踩镲反拍 + 琶音 -----
          if (tickInBeat === 2) {
            // 反拍踩镲（轻一点）
            playHat(t, 0.2);

            // 琶音
            var chord = CHORDS[currentChordIdx];
            var patIdx = currentChordIdx % ARP_PATTERNS.length;
            var pattern = ARP_PATTERNS[patIdx];
            var noteIdx = pattern[arpStep % pattern.length];
            var noteName = chord[noteIdx];
            var arpFreq = freqOf(noteName) * 2;
            playNote(arpFreq, t, BEAT * 0.3, 'square', arpGain, 0.005, 0.06, 1);
            arpStep++;
          }

          // ----- 旋律调度 -----
          if (melodyIdx < MELODY.length) {
            var mNote = MELODY[melodyIdx];
            if (melodyTimeInBar <= 0.001) {
              if (mNote[0]) {
                var mFreq = freqOf(mNote[0]);
                var mDur = BEAT * mNote[1];
                playNote(mFreq, t, mDur * 0.9, 'square', melodyGain, 0.01, 0.12, 1);
              }
              melodyTimeInBar = mNote[1];
            }
            melodyTimeInBar -= TICK / BEAT;
            if (melodyTimeInBar <= 0.001) {
              melodyTimeInBar = 0;
              melodyIdx++;
              if (melodyIdx >= MELODY.length) {
                melodyIdx = 0;
                melodyTimeInBar = 0;
              }
            }
          }

          // 推进时间
          nextNoteTime += TICK;
          totalBeats += TICK / BEAT;
        }

        schedulerTimer = setTimeout(scheduler, LOOKAHEAD);
      }

      // ---------- 播放 / 停止 ----------
      function play() {
        if (isPlaying) return;
        if (!initAudio()) return;

        if (audioCtx.state === 'suspended') {
          audioCtx.resume().catch(function () {});
        }

        isPlaying = true;
        wasPlaying = true;

        currentChordIdx = 0;
        arpStep = 0;
        bassStep = 0;
        bassTimeInBar = 0;
        melodyIdx = 0;
        melodyTimeInBar = 0;
        totalBeats = 0;
        nextNoteTime = now() + 0.1;

        startDrone();

        var t = now();
        masterGain.gain.cancelScheduledValues(t);
        masterGain.gain.setValueAtTime(0, t);
        masterGain.gain.linearRampToValueAtTime(volume, t + 1.0);

        scheduler();
      }

      function stop(preserveWasPlaying) {
        if (!isPlaying) return;
        isPlaying = false;
        if (!preserveWasPlaying) {
          wasPlaying = false;
        }

        if (schedulerTimer) {
          clearTimeout(schedulerTimer);
          schedulerTimer = null;
        }

        stopDrone();

        if (audioCtx && masterGain) {
          var t = now();
          var cur = masterGain.gain.value;
          masterGain.gain.cancelScheduledValues(t);
          masterGain.gain.setValueAtTime(cur, t);
          masterGain.gain.linearRampToValueAtTime(0, t + 0.6);
        }
      }

      function setVolume(v) {
        volume = clamp(v, 0, 1);
        if (masterGain && audioCtx && isPlaying) {
          var t = now();
          masterGain.gain.cancelScheduledValues(t);
          masterGain.gain.linearRampToValueAtTime(volume, t + 0.1);
        }
      }

      // ---------- 吃食物音效 ----------
      function playEat() {
        if (!isUserEnabled) return;
        if (!initAudio()) return;
        if (audioCtx.state === 'suspended') audioCtx.resume().catch(function () {});

        var t = now();
        var fxGain = audioCtx.createGain();
        fxGain.gain.value = 0.5;
        fxGain.connect(masterGain);

        playNote(freqOf('C5'), t, 0.08, 'square', fxGain, 0.005, 0.05, 1);
        playNote(freqOf('E5'), t + 0.06, 0.1, 'square', fxGain, 0.005, 0.06, 0.8);

        setTimeout(function () {
          try { fxGain.disconnect(); } catch (e) {}
        }, 300);
      }

      // ---------- 奖励球音效 ----------
      function playBonus() {
        if (!isUserEnabled) return;
        if (!initAudio()) return;
        if (audioCtx.state === 'suspended') audioCtx.resume().catch(function () {});

        var t = now();
        var fxGain = audioCtx.createGain();
        fxGain.gain.value = 0.6;
        fxGain.connect(masterGain);

        var notes = ['C5', 'E5', 'G5', 'C6'];
        for (var i = 0; i < notes.length; i++) {
          playNote(freqOf(notes[i]), t + i * 0.07, 0.15, 'square', fxGain, 0.005, 0.08, 1);
        }

        setTimeout(function () {
          try { fxGain.disconnect(); } catch (e) {}
        }, 500);
      }

      // ---------- 游戏结束音效 ----------
      function playGameOver() {
        if (!isUserEnabled) return;
        if (!initAudio()) return;
        if (audioCtx.state === 'suspended') audioCtx.resume().catch(function () {});

        var t = now();
        var fxGain = audioCtx.createGain();
        fxGain.gain.value = 0.6;
        fxGain.connect(masterGain);

        var notes = ['G4', 'E4', 'C4', 'A3'];
        for (var i = 0; i < notes.length; i++) {
          playNote(freqOf(notes[i]), t + i * 0.15, 0.3, 'sawtooth', fxGain, 0.01, 0.15, 0.7);
        }

        setTimeout(function () {
          try { fxGain.disconnect(); } catch (e) {}
        }, 800);
      }

      // ---------- 存储 ----------
      function saveSettings() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            v: 1,
            enabled: isUserEnabled,
            volume: Math.round(volume * 100)
          }));
        } catch (e) {}
      }

      function loadSettings() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            var data = JSON.parse(raw);
            isUserEnabled = !!data.enabled;
            if (typeof data.volume === 'number') {
              volume = clamp(data.volume / 100, 0, 1);
            }
          }
        } catch (e) {
          try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
        }
      }

      // ---------- UI 绑定 ----------
      function initUI() {
        var toggleBtn = document.getElementById('audioToggle');
        var volSlider = document.getElementById('audioVol');
        if (!toggleBtn || !volSlider) return;

        function updateUI() {
          toggleBtn.classList.toggle('is-on', isUserEnabled);
          volSlider.value = Math.round(volume * 100);
        }

        toggleBtn.addEventListener('click', function () {
          hasInteracted = true;
          isUserEnabled = !isUserEnabled;

          if (isUserEnabled) {
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') {
              audioCtx.resume().catch(function () {});
            }
            play();
            if (window.GameUtils) GameUtils.unlock('enable_bgm', '奏响旋律', '开启任意游戏的 BGM');
          } else {
            stop();
          }

          saveSettings();
          updateUI();
        });

        volSlider.addEventListener('input', function (e) {
          var val = parseInt(e.target.value, 10) / 100;
          setVolume(val);
          saveSettings();
        });

        // 首次用户交互自动播放
        function onFirstInteraction() {
          if (hasInteracted) return;
          hasInteracted = true;
          if (isUserEnabled) {
            initAudio();
            play();
          }
          document.removeEventListener('pointerdown', onFirstInteraction);
          document.removeEventListener('keydown', onFirstInteraction);
        }
        document.addEventListener('pointerdown', onFirstInteraction);
        document.addEventListener('keydown', onFirstInteraction);

        // 页面可见性变化
        document.addEventListener('visibilitychange', function () {
          if (document.hidden) {
            if (isPlaying) {
              stop(true);
            }
          } else {
            if (isUserEnabled && wasPlaying && !isPlaying) {
              play();
            }
          }
        });

        // 页面卸载
        window.addEventListener('beforeunload', function () {
          stop();
        });

        loadSettings();
        updateUI();
      }

      // ---------- 公共 API ----------
      window.SnakeBGM = {
        play: play,
        stop: stop,
        toggle: function () { if (isPlaying) stop(); else play(); },
        setVolume: setVolume,
        setEnabled: function (v) {
          isUserEnabled = !!v;
          if (isUserEnabled) play(); else stop();
          try { localStorage.setItem('snake_bgm_v1', JSON.stringify({ enabled: isUserEnabled, volume: volume })); } catch (e) {}
        },
        playEat: playEat,
        playBonus: playBonus,
        playGameOver: playGameOver,
        isPlaying: function () { return isPlaying; },
        isEnabled: function () { return isUserEnabled; }
      };

      // 自动初始化
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initUI);
      } else {
        initUI();
      }
    })();

    // 弹窗 Esc 关闭 + 焦点管理
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        var openModal = document.querySelector('.modal-mask.show, .modal.show');
        if (openModal) {
          var closeBtn = openModal.querySelector('[data-close], .modal-close, .btn-close, button[aria-label="关闭"]');
          if (closeBtn) closeBtn.click();
          else openModal.classList.remove('show');
        }
      }
    });

    // PWA：注册 Service Worker + 注入反馈入口
    if (window.GameUtils) {
      document.documentElement.setAttribute('data-sw-root', '../');
      GameUtils.registerSW();
      var fbSlot = document.getElementById('feedbackSlot');
      if (fbSlot) GameUtils.injectFeedback('#feedbackSlot');
    }
  </script>
</body>
</html>
