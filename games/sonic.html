  body { overflow-wrap: break-word; }

  /* ========== 全局样式 ========== */
  :root {

    --color-border-light: rgba(0, 255, 255, 0.15);
    --color-accent: #d4ab6a;
    --color-text-primary: var(--white);

    --font-family-display: 'Fraunces', 'Songti SC', 'STSong', Georgia, serif;
  }

  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: #000;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;

  }

  /* Canvas 逻辑尺寸 800×600，CSS 固定显示尺寸，Retina 由 JS 内部 scale 处理 */
  #game-canvas {
    display: block; width: 800px; height: 600px;

  .ui-overlay {

  .menu-btn:hover {

  .menu-btn:active { transform: scale(0.97); transition: transform 0.1s ease; }

  .modal-close-btn:hover { background: rgba(0, 255, 255, 0.18); box-shadow: var(--glow-cyan); }

    position: relative; width: 48px; height: 26px;

  .toggle-switch.on { background: rgba(0, 255, 255, 0.3); border-color: rgba(0, 255, 255, 0.5); }
  .toggle-switch::after {
    content: ''; position: absolute; top: 3px; left: 3px;

    transition: transform 0.3s ease;
  }
  .toggle-switch.on::after { transform: translateX(22px); }

  /* ========== 关卡完成提示 ========== */
  .level-complete-toast {

  .hud {

  .sonic-btn {
    position: absolute; bottom: 40px; right: 24px;

    transition: all 0.15s ease;

    user-select: none;

  .sonic-btn:active, .sonic-btn.pressed {
    background: rgba(255, 0, 255, 0.3);
    box-shadow: 0 0 30px rgba(255, 0, 255, 0.6);
    transform: scale(0.92);

  .goal-flash {
    position: absolute; top: 0; left: 0;

    pointer-events: none; z-index: 8;

    background: radial-gradient(circle at center, rgba(255, 215, 0, 0.4) 0%, rgba(255, 215, 0, 0) 70%);
    animation: goalFlash 0.8s ease-out forwards;
  }
  @keyframes goalFlash {
    0%   { opacity: 0; transform: scale(0.5); }

    100% { opacity: 0; transform: scale(2); }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }

  @keyframes pulseGlow {

  @media (max-width: 768px) {

  .lb-item .score { font-family: var(--font-family-display); font-weight: 700; color: var(--color-text-primary); }

  .lb-empty { text-align: center; color: var(--color-text-tertiary); font-size: 12px; padding: 16px 0; }

<!-- ==================== 游戏容器 ==================== -->
<div id="game-container">

  <!-- 主菜单 -->

<script>
// =============================================================================
//  声波盲境探路 (Sonic Blind Maze)  v3.0
//  赛博朋克霓虹风格 · 2D 光线追踪 · 真实反射 · deltaTime · Retina · 贴墙滑动
//  完整 10 关 · Canvas 2D 渲染 · 面向对象架构
// =============================================================================

// ==================== 常量定义 ====================
const CANVAS_W        = 800;      // 逻辑宽度
const CANVAS_H        = 600;      // 逻辑高度
const PLAYER_R        = 8;        // 玩家碰撞半径
const PLAYER_SPD      = 180;      // 玩家移动速度（px/s，deltaTime 驱动）
const RAY_COUNT       = 360;      // 声波射线数量（可调：240/180 降低性能消耗）
const RAY_MAX_DIST    = 800;      // 射线最大传播距离（px）
const RAY_MAX_BOUNCES = 2;        // 最大反射次数（0=不反射）
const RAY_INTENSITY_DECAY = 0.7;  // 每次反射强度衰减系数
const RAY_OFFSET      = 0.5;      // 反射起点偏移量（避免自相交）
const GOAL_R          = 18;       // 终点半径
const SHADOW_BLUR     = 18;       // 霓虹发光模糊半径
const AFTERGLOW_S     = 0.8;      // 墙壁余晖持续时间（秒）
const SPOT_SEG_LEN    = 20;       // 光斑照亮段长度（px）
const DELTA_MAX       = 1 / 30;   // deltaTime 上限（防止跳帧后瞬移）

// 反弹颜色表：0=青色, 1=粉紫, 2=品红
const BOUNCE_COLORS = [
  { r: 0,   g: 255, b: 255 },  // 原始声波：青色
  { r: 180, g: 60,  b: 255 },  // 第 1 次反弹：粉紫
  { r: 255, g: 30,  b: 180 }   // 第 2 次反弹：品红
];

// =============================================================================
//  关卡数据 — 完整 10 关（保持不变）
// =============================================================================
const LEVELS = [
  // ===== 第 1 关：新手教学 — 中间一堵墙 =====
  {
    levelId: 1,
    playerStart: { x: 80, y: 300 },
    goal: { x: 720, y: 300, radius: GOAL_R },
    walls: [
      { x1: 400, y1: 120, x2: 400, y2: 480 }
    ]
  },
  // ===== 第 2 关：简单折线 — 4 堵墙 =====
  {
    levelId: 2,
    playerStart: { x: 80, y: 100 },
    goal: { x: 720, y: 500, radius: GOAL_R },
    walls: [
      { x1: 220, y1: 100, x2: 220, y2: 320 },
      { x1: 220, y1: 320, x2: 500, y2: 320 },
      { x1: 500, y1: 200, x2: 500, y2: 500 },
      { x1: 600, y1: 200, x2: 600, y2: 420 }
    ]
  },
  // ===== 第 3 关：回廊迷宫 — 5 堵墙 =====
  {
    levelId: 3,
    playerStart: { x: 80, y: 300 },
    goal: { x: 720, y: 300, radius: GOAL_R },
    walls: [
      { x1: 180, y1: 100, x2: 180, y2: 380 },
      { x1: 180, y1: 380, x2: 380, y2: 380 },
      { x1: 380, y1: 220, x2: 380, y2: 500 },
      { x1: 520, y1: 100, x2: 520, y2: 350 },
      { x1: 520, y1: 350, x2: 680, y2: 350 }
    ]
  },
  // ===== 第 4 关：死胡同迷宫 — 10 堵墙 =====
  {
    levelId: 4,
    playerStart: { x: 60, y: 540 },
    goal: { x: 740, y: 60, radius: GOAL_R },
    walls: [
      { x1: 140, y1: 460, x2: 140, y2: 140 },
      { x1: 140, y1: 140, x2: 300, y2: 140 },
      { x1: 300, y1: 140, x2: 300, y2: 340 },
      { x1: 300, y1: 460, x2: 460, y2: 460 },
      { x1: 460, y1: 340, x2: 460, y2: 140 },
      { x1: 460, y1: 140, x2: 620, y2: 140 },
      { x1: 620, y1: 140, x2: 620, y2: 380 },
      { x1: 460, y1: 460, x2: 460, y2: 540 },
      { x1: 300, y1: 340, x2: 460, y2: 340 },
      { x1: 140, y1: 460, x2: 300, y2: 460 }
    ]
  },

// =============================================================================
//  工具函数
// =============================================================================

/** 两点欧氏距离 */
function dist(x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  return Math.sqrt(dx * dx + dy * dy);
}

/** 2D 叉积：cross(a, b) = a.x * b.y - a.y * b.x */
function cross2D(ax, ay, bx, by) {
  return ax * by - ay * bx;
}

/** 向量点积 */
function dot2D(ax, ay, bx, by) {
  return ax * bx + ay * by;
}

/** 向量归一化，返回 {x, y}，零向量返回 {1, 0} */
function normalize(x, y) {
  const len = Math.sqrt(x * x + y * y);
  if (len < 1e-10) return { x: 1, y: 0 };
  return { x: x / len, y: y / len };
}

/**
 * 射线与线段相交检测（标准参数化算法）
 * 射线: P = O + t*D, t > 0
 * 线段: Q = A + u*E, 0 <= u <= 1, E = B - A
 *
 * @param {number} ox 射线起点 X
 * @param {number} oy 射线起点 Y
 * @param {number} dx 射线方向 X（单位向量）
 * @param {number} dy 射线方向 Y（单位向量）
 * @param {number} ax 线段起点 X
 * @param {number} ay 线段起点 Y
 * @param {number} bx 线段终点 X
 * @param {number} by 线段终点 Y
 * @returns {{t:number, u:number, x:number, y:number}|null} 交点信息或 null
 */
function raySegmentIntersection(ox, oy, dx, dy, ax, ay, bx, by) {
  const ex = bx - ax, ey = by - ay;           // E = B - A（线段方向）
  const denom = cross2D(dx, dy, ex, ey);       // denom = D × E

  // 平行或接近平行（|denom| < epsilon），无交点
  if (Math.abs(denom) < 1e-8) return null;

  const fx = ox - ax, fy = oy - ay;            // F = O - A

  // t = -cross(F, E) / cross(D, E)
  const t = -cross2D(fx, fy, ex, ey) / denom;
  if (t <= 0) return null;                     // 交点在射线后方

  // u = cross(F, D) / cross(E, D)
  const u = cross2D(fx, fy, dx, dy) / cross2D(ex, ey, dx, dy);
  if (u < 0 || u > 1) return null;             // 交点不在线段上

  return {
    t: t,
    u: u,
    x: ox + t * dx,
    y: oy + t * dy
  };
}

/**
 * 计算反射方向向量
 * 反射公式: R = D - 2 * dot(D, N) * N
 *
 * @param {number} dx 入射方向 X
 * @param {number} dy 入射方向 Y
 * @param {number} ex 墙壁线段方向 X（B - A）
 * @param {number} ey 墙壁线段方向 Y
 * @returns {{x:number, y:number}} 反射方向（单位向量）
 */
function reflectDirection(dx, dy, ex, ey) {
  // 墙壁法线：(-ey, ex)，即 E 逆时针旋转 90°
  let nx = -ey, ny = ex;
  // 归一化法线为单位向量（关键修复：墙壁线段长度不同时法线长度不同，会导致反射角度错乱）
  const nlen = Math.sqrt(nx * nx + ny * ny);
  if (nlen > 1e-10) { nx /= nlen; ny /= nlen; }
  // 确保法线朝向入射方向（dot(D, N) < 0）
  const dotDN = dot2D(dx, dy, nx, ny);
  if (dotDN > 0) { nx = -nx; ny = -ny; }
  // R = D - 2 * dot(D, N) * N
  const dotVal = dot2D(dx, dy, nx, ny);
  const rx = dx - 2 * dotVal * nx;
  const ry = dy - 2 * dotVal * ny;
  return normalize(rx, ry);
}

// =============================================================================
//  InputManager — 输入管理（键盘 + 鼠标 + 触摸）
// =============================================================================
class InputManager {
  /**
   * @param {HTMLCanvasElement} canvas
   */
  constructor(canvas) {
    this.canvas = canvas;
    /** @type {Set<string>} 当前按下的键 */
    this.keys = new Set();
    /** 鼠标/触摸点击事件队列（每帧消费） */
    this.clickQueue = [];
    /** 键盘发射声波事件队列（每帧消费） */
    this.sonicQueue = [];
    /** 是否允许处理点击（由 Game 状态控制） */
    this.clickEnabled = false;
    /** 上一次空格键按下的时间戳（用于防抖） */
    this._lastSpaceTime = 0;

    this._onKeyDown = this._onKeyDown.bind(this);
    this._onKeyUp   = this._onKeyUp.bind(this);
    this._onClick   = this._onClick.bind(this);
    this._onTouch   = this._onTouch.bind(this);

    window.addEventListener('keydown', this._onKeyDown);
    window.addEventListener('keyup',   this._onKeyUp);
    canvas.addEventListener('click',   this._onClick);
    canvas.addEventListener('touchstart', this._onTouch, { passive: false });
  }

  _onKeyDown(e) {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
      e.preventDefault();
    }
    if (e.key === ' ' && !e.repeat && this.clickEnabled) {
      const now = performance.now();
      if (now - this._lastSpaceTime > 150) {
        this._lastSpaceTime = now;
        this.sonicQueue.push({});
      }
    }
    if (!e.repeat) {
      if (!this._keyPressQueue) this._keyPressQueue = [];
      this._keyPressQueue.push(e.key);
    }
    this.keys.add(e.key);
  }

  _onKeyUp(e) {
    this.keys.delete(e.key);
  }

  _onClick(e) {
    if (!this.clickEnabled) return;
    const rect = this.canvas.getBoundingClientRect();
    const scaleX = CANVAS_W / rect.width;
    const scaleY = CANVAS_H / rect.height;
    this.clickQueue.push({
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top)  * scaleY
    });
  }

  _onTouch(e) {
    if (!this.clickEnabled) return;
    e.preventDefault();
    if (e.touches.length === 0) return;
    const rect = this.canvas.getBoundingClientRect();
    const scaleX = CANVAS_W / rect.width;
    const scaleY = CANVAS_H / rect.height;
    const t = e.touches[0];
    const now = performance.now();
    if (now - (this._lastTouchTime || 0) > 150) {
      this._lastTouchTime = now;
      this.clickQueue.push({
        x: (t.clientX - rect.left) * scaleX,
        y: (t.clientY - rect.top)  * scaleY
      });
    }
  }

  /** 消费所有点击事件 */
  consumeClicks() {
    const clicks = this.clickQueue.slice();
    this.clickQueue = [];
    return clicks;
  }

  /** 消费所有键盘声波发射事件 */
  consumeSonic() {
    const sonics = this.sonicQueue.slice();
    this.sonicQueue = [];
    return sonics;
  }

  /**
   * 检测按键是否刚被按下（用于一次性触发的按键，如 R、ESC）
   * 注意：这是边缘触发检测，需要配合 keyPressQueue 使用
   */
  consumeKeyPresses() {
    const presses = this._keyPressQueue || [];
    this._keyPressQueue = [];
    return presses;
  }

  /** 获取归一化移动方向 {dx, dy} */
  getMoveDir() {
    let dx = 0, dy = 0;
    if (this.keys.has('ArrowUp')    || this.keys.has('w') || this.keys.has('W')) dy -= 1;
    if (this.keys.has('ArrowDown')  || this.keys.has('s') || this.keys.has('S')) dy += 1;
    if (this.keys.has('ArrowLeft')  || this.keys.has('a') || this.keys.has('A')) dx -= 1;
    if (this.keys.has('ArrowRight') || this.keys.has('d') || this.keys.has('D')) dx += 1;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len > 0) { dx /= len; dy /= len; }
    return { dx, dy };
  }

  destroy() {
    window.removeEventListener('keydown', this._onKeyDown);
    window.removeEventListener('keyup',   this._onKeyUp);
    this.canvas.removeEventListener('click', this._onClick);
    this.canvas.removeEventListener('touchstart', this._onTouch);
  }
}

// =============================================================================
//  Player — 玩家类（deltaTime 驱动 + 分轴碰撞 + 贴墙滑动）
// =============================================================================
class Player {
  /**
   * @param {number} x 初始 X
   * @param {number} y 初始 Y
   * @param {number} radius 碰撞半径
   * @param {number} speed 移动速度 px/s
   */
  constructor(x, y, radius, speed) {
    this.x = x;
    this.y = y;
    this.radius = radius;
    this.speed = speed; // px/s
  }

  /**
   * 分轴移动 + 碰撞检测，实现自然的贴墙滑动
   *
   * 算法：先沿 X 轴移动，检测碰撞 → 二分法精确定位；再沿 Y 轴移动，检测碰撞 → 二分法精确定位。
   * 这样斜向撞墙时，被阻挡的轴精确贴墙、未阻挡的轴继续滑动，手感丝滑。
   *
   * @param {number} dx 归一化方向 X
   * @param {number} dy 归一化方向 Y
   * @param {number} dt deltaTime（秒）
   * @param {Array} walls 墙壁数组 [{x1,y1,x2,y2}]
   */
  move(dx, dy, dt, walls) {
    if (dx === 0 && dy === 0) return;

    const moveX = dx * this.speed * dt;
    const moveY = dy * this.speed * dt;

    // === 第 1 步：X 轴移动（二分法精确贴墙）===
    if (moveX !== 0) {
      const oldX = this.x;
      this.x += moveX;
      this.x = Math.max(this.radius, Math.min(CANVAS_W - this.radius, this.x));
      if (this._collidesWithAny(walls)) {
        let lo = 0, hi = 1;
        for (let i = 0; i < 8; i++) {
          const mid = (lo + hi) / 2;
          this.x = oldX + moveX * mid;
          this.x = Math.max(this.radius, Math.min(CANVAS_W - this.radius, this.x));
          if (this._collidesWithAny(walls)) {
            hi = mid;
          } else {
            lo = mid;
          }
        }
        this.x = oldX + moveX * lo;
        this.x = Math.max(this.radius, Math.min(CANVAS_W - this.radius, this.x));
      }
    }

    // === 第 2 步：Y 轴移动（二分法精确贴墙）===
    if (moveY !== 0) {
      const oldY = this.y;
      this.y += moveY;
      this.y = Math.max(this.radius, Math.min(CANVAS_H - this.radius, this.y));
      if (this._collidesWithAny(walls)) {
        let lo = 0, hi = 1;
        for (let i = 0; i < 8; i++) {
          const mid = (lo + hi) / 2;
          this.y = oldY + moveY * mid;
          this.y = Math.max(this.radius, Math.min(CANVAS_H - this.radius, this.y));
          if (this._collidesWithAny(walls)) {
            hi = mid;
          } else {
            lo = mid;
          }
        }
        this.y = oldY + moveY * lo;
        this.y = Math.max(this.radius, Math.min(CANVAS_H - this.radius, this.y));
      }
    }
  }

  /**
   * 检测玩家圆形是否与任意墙壁碰撞
   * @param {Array} walls
   * @returns {boolean}
   */
  _collidesWithAny(walls) {
    for (const w of walls) {
      if (this._circleSegmentCollision(w)) return true;
    }
    return false;
  }

  /**
   * 圆形与线段碰撞检测
   * 计算圆心到线段的最短距离，若 < 半径则碰撞
   * @param {{x1:number,y1:number,x2:number,y2:number}} wall
   * @returns {boolean}
   */
  _circleSegmentCollision(wall) {
    const dx = wall.x2 - wall.x1, dy = wall.y2 - wall.y1;
    const lenSq = dx * dx + dy * dy;
    // 零长度线段：退化为点-圆检测
    if (lenSq === 0) return dist(this.x, this.y, wall.x1, wall.y1) < this.radius;

    // 投影参数 t，clamp 到 [0, 1]
    let t = ((this.x - wall.x1) * dx + (this.y - wall.y1) * dy) / lenSq;
    t = Math.max(0, Math.min(1, t));

    const closestX = wall.x1 + t * dx;
    const closestY = wall.y1 + t * dy;
    return dist(this.x, this.y, closestX, closestY) < this.radius;
  }

  /** 检测玩家是否碰到终点 */
  hitGoal(goal) {
    return dist(this.x, this.y, goal.x, goal.y) < this.radius + goal.radius;
  }
}

// =============================================================================
//  RayCaster — 2D 光线追踪引擎
//  核心算法：从玩家位置向四周发射 N 条射线，每条射线与墙壁求交，
//  在交点处反射，记录所有碰撞点用于墙壁照亮渲染。
// =============================================================================
class RayCaster {
  /**
   * 从指定位置发射声波射线，返回所有墙壁碰撞点
   *
   * @param {number} originX 声源 X
   * @param {number} originY 声源 Y
   * @param {Array} walls 墙壁数组 [{x1,y1,x2,y2}]
   * @param {number} rayCount 射线数量（默认 RAY_COUNT）
   * @param {number} maxDist 最大传播距离
   * @param {number} maxBounces 最大反射次数
   * @returns {Array<{wallIndex:number, u:number, x:number, y:number, intensity:number, bounce:number}>}
   */
  static cast(originX, originY, walls, rayCount, maxDist, maxBounces) {
    /** @type {Array} 所有碰撞点 */
    const allHits = [];

    // 生成均匀分布的射线方向
    for (let i = 0; i < rayCount; i++) {
      const angle = (Math.PI * 2 * i) / rayCount;
      const dx = Math.cos(angle);
      const dy = Math.sin(angle);

      // 追踪单条射线（含反射）
      RayCaster._traceRay(
        originX, originY, dx, dy,
        0,           // 当前已传播距离
        1.0,         // 初始强度
        0,           // 当前反弹次数
        walls, maxDist, maxBounces,
        allHits
      );
    }

    return allHits;
  }

  /**
   * 递归追踪单条射线
   * @param {number} ox 当前起点 X
   * @param {number} oy 当前起点 Y
   * @param {number} dx 方向 X
   * @param {number} dy 方向 Y
   * @param {number} traveled 已传播距离
   * @param {number} intensity 当前强度
   * @param {number} bounce 当前反弹次数
   * @param {Array} walls
   * @param {number} maxDist
   * @param {number} maxBounces
   * @param {Array} outHits 输出碰撞点数组
   */
  static _traceRay(ox, oy, dx, dy, traveled, intensity, bounce, walls, maxDist, maxBounces, outHits) {
    if (bounce > maxBounces || intensity < 0.05) return;

    let nearestT = Infinity;
    let nearestWallIdx = -1;
    let nearestU = 0;
    let nearestX = 0, nearestY = 0;

    // 遍历所有墙壁，找最近交点
    for (let wi = 0; wi < walls.length; wi++) {
      const w = walls[wi];
      const hit = raySegmentIntersection(ox, oy, dx, dy, w.x1, w.y1, w.x2, w.y2);
      if (hit && hit.t < nearestT) {
        nearestT = hit.t;
        nearestWallIdx = wi;
        nearestU = hit.u;
        nearestX = hit.x;
        nearestY = hit.y;
      }
    }

    // 无交点或超出最大距离
    if (nearestWallIdx < 0 || traveled + nearestT > maxDist) return;

    // 记录碰撞点（含累计总距离和本次射线起点，用于扩散动画和正确连线）
    outHits.push({
      wallIndex: nearestWallIdx,
      u: nearestU,                    // 在线段上的归一化位置 0~1
      x: nearestX,
      y: nearestY,
      intensity: intensity,
      bounce: bounce,
      totalDistance: traveled + nearestT,  // 从玩家出发的累计总像素长度（用于扩散动画）
      fromX: ox,                            // 本次射线起点 X（用于正确画锯齿形反射路线）
      fromY: oy                             // 本次射线起点 Y
    });

    // 如果还能反弹，计算反射方向并继续追踪
    if (bounce < maxBounces) {
      const w = walls[nearestWallIdx];
      const ex = w.x2 - w.x1, ey = w.y2 - w.y1;
      const ref = reflectDirection(dx, dy, ex, ey);

      // 从交点沿反射方向偏移微小距离，避免自相交
      const newOx = nearestX + ref.x * RAY_OFFSET;
      const newOy = nearestY + ref.y * RAY_OFFSET;
      const newTraveled = traveled + nearestT + RAY_OFFSET;

      RayCaster._traceRay(
        newOx, newOy, ref.x, ref.y,
        newTraveled,
        intensity * RAY_INTENSITY_DECAY,
        bounce + 1,
        walls, maxDist, maxBounces,
        outHits
      );
    }
  }
}

// =============================================================================
//  LevelManager — 关卡管理（不变）
// =============================================================================
class LevelManager {
  constructor() {
    this.levels = LEVELS;
    this.currentIndex = 0;
  }

  getCurrent() { return this.levels[this.currentIndex]; }

  nextLevel() {
    this.currentIndex++;
    return this.currentIndex < this.levels.length;
  }

  reset() { this.currentIndex = 0; }

  get currentLevelId() { return this.currentIndex + 1; }
  get totalLevels() { return this.levels.length; }
}

// =============================================================================
//  Renderer — 渲染管理（Retina 适配 + 墙壁光斑渲染 + 射线可视化）
// =============================================================================
class Renderer {
  /**
   * @param {HTMLCanvasElement} canvas
   */
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.time = 0;

    // === Retina 适配 ===
    this.dpr = window.devicePixelRatio || 1;
    this._setupRetina();

    // 监听 devicePixelRatio 变化（外接显示器切换等）
    this._onDPRChange = this._onDPRChange.bind(this);
    this._dprMql = matchMedia(`(resolution: ${this.dpr}dppx)`);
    this._dprMql.addEventListener('change', this._onDPRChange);
  }

  /** 设置 Canvas 物理像素并应用缩放 */
  _setupRetina() {
    this.dpr = window.devicePixelRatio || 1;
    this.canvas.width  = CANVAS_W * this.dpr;
    this.canvas.height = CANVAS_H * this.dpr;
    // CSS 尺寸已在样式表中固定为 800×600
    this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    // 注意：shadowBlur 等属性不受 scale 影响，无需额外调整
  }

  _onDPRChange() {
    // 移除旧的监听器
    try { this._dprMql.removeEventListener('change', this._onDPRChange); } catch (e) {}
    this._setupRetina();
    // DPR 变化后创建新的 media query 监听器
    this._dprMql = matchMedia(`(resolution: ${this.dpr}dppx)`);
    this._dprMql.addEventListener('change', this._onDPRChange);
  }

  destroy() {
    try {
      if (this._dprMql) this._dprMql.removeEventListener('change', this._onDPRChange);
    } catch (e) { /* 忽略 */ }
  }

  /** 清屏为纯黑 */
  clear() {
    const ctx = this.ctx;
    ctx.save();
    ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.restore();
  }

  /**
   * 渲染终点（始终可见，脉冲发光）
   * @param {{x:number, y:number, radius:number}} goal
   * @param {number} dt deltaTime（秒）
   */
  renderGoal(goal, dt) {
    const ctx = this.ctx;
    this.time += dt;

    const pulse = 1 + 0.25 * Math.sin(this.time * 3.0);
    const r = goal.radius * pulse;
    const alpha = 0.7 + 0.3 * Math.sin(this.time * 3.0);

    ctx.save();

    // 外层大光晕
    const grd = ctx.createRadialGradient(goal.x, goal.y, r * 0.2, goal.x, goal.y, r * 3);
    grd.addColorStop(0, `rgba(255, 215, 0, ${alpha * 0.9})`);
    grd.addColorStop(0.35, `rgba(255, 180, 0, ${alpha * 0.5})`);
    grd.addColorStop(0.7, `rgba(255, 140, 0, ${alpha * 0.12})`);
    grd.addColorStop(1, 'rgba(255, 100, 0, 0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(goal.x, goal.y, r * 3, 0, Math.PI * 2);
    ctx.fill();

    // 核心发光圆
    ctx.shadowColor = `rgba(255, 215, 0, ${alpha})`;
    ctx.shadowBlur = 30;
    ctx.fillStyle = `rgba(255, 215, 0, ${alpha})`;
    ctx.beginPath();
    ctx.arc(goal.x, goal.y, r, 0, Math.PI * 2);
    ctx.fill();

    // 内核白点
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
    ctx.beginPath();
    ctx.arc(goal.x, goal.y, r * 0.3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  /**
   * 渲染玩家（始终可见，发光）
   * @param {Player} player
   */
  renderPlayer(player) {
    const ctx = this.ctx;
    ctx.save();

    const grd = ctx.createRadialGradient(
      player.x, player.y, player.radius * 0.3,
      player.x, player.y, player.radius * 3.5
    );
    grd.addColorStop(0, 'rgba(180, 240, 255, 0.85)');
    grd.addColorStop(0.5, 'rgba(0, 220, 255, 0.3)');
    grd.addColorStop(1, 'rgba(0, 180, 255, 0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius * 3.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowColor = 'rgba(180, 240, 255, 0.9)';
    ctx.shadowBlur = 14;
    ctx.fillStyle = 'rgba(220, 245, 255, 0.95)';
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  /**
   * 渲染墙壁光斑（余晖系统）
   *
   * 每堵墙维护一个光斑数组，每个光斑有位置(u)、强度、时间戳。
   * 渲染时根据时间衰减亮度，在墙壁上绘制短发光线段。
   *
   * @param {Array} walls 墙壁数组
   * @param {Array<Array<{u:number, intensity:number, bounce:number, time:number}>>} wallSpots
   * @param {number} now 当前时间戳（performance.now）
   */
  renderWallSpots(walls, wallSpots, now) {
    const ctx = this.ctx;
    const afterglowMs = AFTERGLOW_S * 1000;

    for (let wi = 0; wi < walls.length; wi++) {
      const spots = wallSpots[wi];
      if (!spots || spots.length === 0) continue;

      const wall = walls[wi];
      const wx = wall.x2 - wall.x1;
      const wy = wall.y2 - wall.y1;
      const wallLen = Math.sqrt(wx * wx + wy * wy);
      if (wallLen < 1) continue;

      // 墙壁单位方向向量
      const ux = wx / wallLen;
      const uy = wy / wallLen;

      // 合并相邻光斑：按 u 排序，合并间距 < 阈值的光斑
      const merged = Renderer._mergeSpots(spots, now, afterglowMs);

      for (const spot of merged) {
        if (spot.intensity < 0.02) continue;

        // 光斑在墙壁上的实际坐标
        const sx = wall.x1 + spot.u * wx;
        const sy = wall.y1 + spot.u * wy;

        // 光斑照亮段长度（随强度缩放）
        const segHalf = (SPOT_SEG_LEN / 2) * spot.intensity;
        const x1 = sx - ux * segHalf;
        const y1 = sy - uy * segHalf;
        const x2 = sx + ux * segHalf;
        const y2 = sy + uy * segHalf;

        // 根据反弹次数选择颜色
        const col = BOUNCE_COLORS[Math.min(spot.bounce, BOUNCE_COLORS.length - 1)];
        const alpha = 0.2 + spot.intensity * 0.8;

        ctx.save();

        // 霓虹发光
        ctx.shadowColor = `rgba(${col.r}, ${col.g}, ${col.b}, ${alpha})`;
        ctx.shadowBlur = SHADOW_BLUR * spot.intensity;

        ctx.strokeStyle = `rgba(${col.r}, ${col.g}, ${col.b}, ${alpha})`;
        ctx.lineWidth = 1.5 + spot.intensity * 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();

        // 高亮二次描边
        if (spot.intensity > 0.4) {
          ctx.shadowBlur = SHADOW_BLUR * spot.intensity * 1.5;
          ctx.strokeStyle = `rgba(${col.r}, ${col.g}, ${col.b}, ${alpha * 0.5})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        ctx.restore();
      }
    }
  }

  /**
   * 合并相邻光斑：按 u 排序，合并间距 < 阈值的相邻光斑
   * @returns {Array<{u:number, intensity:number, bounce:number}>}
   */
  static _mergeSpots(spots, now, afterglowMs) {
    // 先衰减并过滤过期光斑
    const active = [];
    for (const s of spots) {
      const elapsed = (now - s.time) / 1000; // 秒
      if (elapsed > AFTERGLOW_S) continue;
      const fade = Math.max(0, 1 - elapsed / AFTERGLOW_S);
      active.push({ u: s.u, intensity: s.intensity * fade, bounce: s.bounce });
    }
    if (active.length === 0) return [];

    // 按 u 排序
    active.sort((a, b) => a.u - b.u);

    // 合并间距 < 0.08 的光斑
    const merged = [active[0]];
    for (let i = 1; i < active.length; i++) {
      const prev = merged[merged.length - 1];
      if (active[i].u - prev.u < 0.08 && active[i].bounce === prev.bounce) {
        // 合并：取平均位置，叠加强度（上限 1.0）
        prev.u = (prev.u * prev.intensity + active[i].u * active[i].intensity)
                / (prev.intensity + active[i].intensity + 0.001);
        prev.intensity = Math.min(1, prev.intensity + active[i].intensity * 0.5);
      } else {
        merged.push(active[i]);
      }
    }

    return merged;
  }

  /**
   * 渲染声波扩散波纹（同心圆扩散效果）
   * @param {Array} activeWaves 活跃声波数组
   * @param {number} now 当前时间戳
   */
  renderWaveRings(activeWaves, now) {
    if (!activeWaves || activeWaves.length === 0) return;
    const ctx = this.ctx;

    for (const wave of activeWaves) {
      const elapsed = (now - wave.startTime) / 1000;
      const currentRadius = elapsed * wave.speed;
      if (currentRadius <= 0) continue;

      const maxRadius = RAY_MAX_DIST + 100;
      const fade = Math.max(0, 1 - currentRadius / maxRadius);
      if (fade <= 0) continue;

      for (let i = 0; i < 3; i++) {
        const r = currentRadius - i * 25;
        if (r <= 0) continue;
        const alpha = fade * (0.25 - i * 0.07);
        if (alpha <= 0) continue;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = `rgba(0, 255, 255, ${alpha * 2})`;
        ctx.lineWidth = 1.5 - i * 0.4;
        ctx.shadowColor = 'rgba(0, 255, 255, 0.6)';
        ctx.shadowBlur = 12 * fade;
        ctx.beginPath();
        ctx.arc(wave.x, wave.y, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }
  }

  /**
   * 渲染声波射线（调试/视觉反馈：从玩家位置到各碰撞点的细线）
   * @param {Array} rayHits 碰撞点数组
   * @param {number} originX 声源 X
   * @param {number} originY 声源 Y
   * @param {number} now 当前时间戳
   */
  renderRayLines(rayHits, originX, originY, now) {
    if (!rayHits || rayHits.length === 0) return;
    const ctx = this.ctx;
    const elapsed = (now - rayHits._time) / 1000;
    if (elapsed > AFTERGLOW_S * 1.2) return;

    const fade = Math.max(0, 1 - elapsed / (AFTERGLOW_S * 1.2));
    ctx.save();
    ctx.globalAlpha = fade * 0.15;
    ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
    ctx.lineWidth = 0.5;

    for (const hit of rayHits) {
      const col = BOUNCE_COLORS[Math.min(hit.bounce, BOUNCE_COLORS.length - 1)];
      ctx.strokeStyle = `rgba(${col.r}, ${col.g}, ${col.b}, ${fade * 0.25})`;
      ctx.beginPath();
      ctx.moveTo(hit.fromX, hit.fromY);
      ctx.lineTo(hit.x, hit.y);
      ctx.stroke();
    }

    ctx.restore();
  }
}

// =============================================================================
//  Game — 游戏主类（deltaTime 主循环 + 光线追踪 + 墙壁余晖）
// =============================================================================
class Game {
  /** 状态枚举 */
  static State = Object.freeze({
    MENU:           'MENU',
    PLAYING:        'PLAYING',
    LEVEL_COMPLETE: 'LEVEL_COMPLETE',
    ALL_COMPLETE:   'ALL_COMPLETE',
    TUTORIAL:       'TUTORIAL',
    SETTINGS:       'SETTINGS'
  });

  constructor() {
    // DOM 元素
    this.canvas               = document.getElementById('game-canvas');
    this.menuOverlay          = document.getElementById('menu-overlay');
    this.menuPanel            = document.getElementById('menu-panel');
    this.tutorialOverlay      = document.getElementById('tutorial-overlay');
    this.settingsOverlay      = document.getElementById('settings-overlay');
    this.levelCompleteOverlay = document.getElementById('level-complete-overlay');
    this.levelCompleteToast   = document.getElementById('level-complete-toast');
    this.levelCompleteText    = document.getElementById('level-complete-text');
    this.mobileControls       = document.getElementById('mobile-controls');
    this.hud                  = document.getElementById('hud');
    this.hudLevelNum          = document.getElementById('hud-level-num');
    this.hudTotal             = document.getElementById('hud-total');
    this.sonicBtn             = document.getElementById('sonic-btn');

    // 核心模块
    this.input    = new InputManager(this.canvas);
    this.renderer = new Renderer(this.canvas);
    this.levels   = new LevelManager();

    /** @type {Player|null} */
    this.player = null;

    /**
     * 墙壁光斑数组，与当前关卡 walls 一一对应
     * 每个元素是一个数组：[{u, intensity, bounce, time}]
     */
    this.wallSpots = [];

    /**
     * 最近一次射线追踪的碰撞点（用于射线可视化）
     * @type {Array|null}
     */
    this.lastRayHits = null;

    /**
     * 活跃的声波数组（扩散动画系统）
     * 每个 ActiveWave: { x, y, startTime, speed, hits, activatedCount }
     * @type {Array}
     */
    this.activeWaves = [];

    /**
     * 当前关卡的墙壁数组（含屏幕边界墙）
     * @type {Array}
     */
    this.currentWalls = [];

    /** @type {string} 当前状态 */
    this.state = Game.State.MENU;
    /** @type {number|null} rAF ID */
    this.rafId = null;
    /** @type {number} 上一帧时间戳 */
    this._lastTime = 0;
    /** 最高通关关卡 */
    this.bestLevel = this._loadBestLevel();

    // Web Audio 上下文（延迟初始化）
    this._audioCtx = null;

    this._loop = this._loop.bind(this);
    this._initUI();
    this._detectMobile();
  }

  // ==================== 持久化 ====================

  _loadBestLevel() {
    try { return parseInt(localStorage.getItem('sonic_maze_best') || '0', 10); }
    catch (e) { return 0; }
  }

  _saveBestLevel(level) {
    try {
      if (level > this.bestLevel) {
        this.bestLevel = level;
        localStorage.setItem('sonic_maze_best', String(level));
      }
    } catch (e) { /* 隐私模式忽略 */ }
  }

  // ==================== 音频 ====================

  _playBeep(freq = 880, duration = 0.12, type = 'sine') {
    try {
      if (!this._audioCtx) this._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = this._audioCtx.createOscillator();
      const gain = this._audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.15, this._audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this._audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(this._audioCtx.destination);
      osc.start(this._audioCtx.currentTime);
      osc.stop(this._audioCtx.currentTime + duration);
    } catch (e) { /* 静默 */ }
  }

  // ==================== 移动端检测 ====================

  _detectMobile() {
    const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent)
                     || ('ontouchstart' in window && window.innerWidth < 1024);
    if (isMobile && this.state === Game.State.PLAYING) {
      this.mobileControls.style.display = 'block';
      if (this.sonicBtn) this.sonicBtn.style.display = 'flex';
      this._initMobileControls();
    }
  }

  _initMobileControls() {
    const map = {
      'dpad-up':    'ArrowUp',
      'dpad-down':  'ArrowDown',
      'dpad-left':  'ArrowLeft',
      'dpad-right': 'ArrowRight'
    };
    for (const [id, key] of Object.entries(map)) {
      const btn = document.getElementById(id);
      if (!btn) continue;
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        this.input.keys.add(key);
        btn.classList.add('pressed');
      });
      btn.addEventListener('pointerup', (e) => {
        e.preventDefault();
        this.input.keys.delete(key);
        btn.classList.remove('pressed');
      });
      btn.addEventListener('pointerleave', () => {
        this.input.keys.delete(key);
        btn.classList.remove('pressed');
      });
      btn.addEventListener('pointercancel', () => {
        this.input.keys.delete(key);
        btn.classList.remove('pressed');
      });
      btn.addEventListener('contextmenu', (e) => e.preventDefault());
    }

    if (this.sonicBtn && !this._sonicBtnInited) {
      this._sonicBtnInited = true;
      this.sonicBtn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (this.state !== Game.State.PLAYING) return;
        this.sonicBtn.classList.add('pressed');
        const now = performance.now();
        if (now - (this._lastSonicBtnTime || 0) > 150) {
          this._lastSonicBtnTime = now;
          this.input.sonicQueue.push({});
        }
      });
      this.sonicBtn.addEventListener('pointerup', (e) => {
        e.preventDefault();
        this.sonicBtn.classList.remove('pressed');
      });
      this.sonicBtn.addEventListener('pointerleave', () => {
        this.sonicBtn.classList.remove('pressed');
      });
      this.sonicBtn.addEventListener('pointercancel', () => {
        this.sonicBtn.classList.remove('pressed');
      });
      this.sonicBtn.addEventListener('contextmenu', (e) => e.preventDefault());
    }
  }

  // ==================== UI 初始化 ====================

  _initUI() {
    document.getElementById('btn-start').addEventListener('click', () => this.startGame());
    document.getElementById('btn-tutorial').addEventListener('click', () => this.showTutorial());
    document.getElementById('btn-settings').addEventListener('click', () => this.showSettings());
    document.getElementById('btn-tutorial-close').addEventListener('click', () => this.hideTutorial());
    document.getElementById('btn-settings-close').addEventListener('click', () => this.hideSettings());

    this._initToggle('toggle-sound');
    this._initToggle('toggle-vibration');

    // 设置项切换视为"换肤/换偏好"，触发 try_skin 成就（本游戏无主题切换，以此替代）
    var soundToggleEl = document.getElementById('toggle-sound');
    if (soundToggleEl) {
      soundToggleEl.addEventListener('click', function () {
        if (window.GameUtils) GameUtils.unlock('try_skin', '换个皮肤', '切换过一次游戏皮肤');
      });
    }

    // 关卡完成：空格键或点击继续
    const onContinue = (e) => {
      if (this.state !== Game.State.LEVEL_COMPLETE && this.state !== Game.State.ALL_COMPLETE) return;
      if (e.type === 'keydown' && e.key !== ' ') return;
      e.preventDefault();
      this._continueFromLevelComplete();
    };
    window.addEventListener('keydown', onContinue);
    this.levelCompleteOverlay.addEventListener('click', onContinue);
  }

  _initToggle(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('click', () => el.classList.toggle('on'));
  }

  // ==================== 状态切换 ====================

  showMenu() {
    this.state = Game.State.MENU;
    this._stopLoop();
    this.input.clickEnabled = false;
    this.menuOverlay.classList.add('active');
    this.menuPanel.classList.add('visible');
    this.levelCompleteOverlay.classList.remove('active');
    this.levelCompleteToast.classList.remove('visible');
    this.mobileControls.style.display = 'none';
    if (this.hud) this.hud.style.display = 'none';
    if (this.sonicBtn) this.sonicBtn.style.display = 'none';
    this._detectMobile();
    this.renderer.clear();
  }

  startGame() {
    this.levels.reset();
    if (window.GameUtils) GameUtils.recordPlay('sonic', 0);
    this._startLevel();
  }

  _restartLevel() {
    if (window.SonicBGM && typeof window.SonicBGM.playReset === 'function') {
      window.SonicBGM.playReset();
    }
    this._startLevel();
  }

  _startLevel() {
    const level = this.levels.getCurrent();

    // 补全屏幕四周边界墙，使游戏空间闭合，射线不再飞入虚空
    this.currentWalls = level.walls.concat([
      { x1: 0,            y1: 0,            x2: CANVAS_W, y2: 0            },  // 上边界
      { x1: CANVAS_W,     y1: 0,            x2: CANVAS_W, y2: CANVAS_H     },  // 右边界
      { x1: CANVAS_W,     y1: CANVAS_H,     x2: 0,        y2: CANVAS_H      },  // 下边界
      { x1: 0,            y1: CANVAS_H,     x2: 0,        y2: 0             }   // 左边界
    ]);

    // 隐藏所有 UI
    this.menuOverlay.classList.remove('active');
    this.menuPanel.classList.remove('visible');
    this.tutorialOverlay.classList.remove('visible');
    this.settingsOverlay.classList.remove('visible');
    this.levelCompleteOverlay.classList.remove('active');
    this.levelCompleteToast.classList.remove('visible');

    // 初始化玩家
    this.player = new Player(level.playerStart.x, level.playerStart.y, PLAYER_R, PLAYER_SPD);

    // 初始化墙壁光斑数组（每堵墙一个空数组，含边界墙）
    this.wallSpots = this.currentWalls.map(() => []);
    this.lastRayHits = null;
    this.activeWaves = [];  // 重置活跃声波

    // 更新 HUD
    if (this.hud) {
      this.hud.style.display = 'flex';
      this.hudLevelNum.textContent = this.levels.currentLevelId;
      this.hudTotal.textContent = this.levels.totalLevels;
    }

    // 切换到游戏状态，启用点击
    this.state = Game.State.PLAYING;
    this.input.clickEnabled = true;

    // 重置时间戳（避免第一帧 deltaTime 跳变）
    this._lastTime = 0;
    // 记录关卡开始时间，用于通关时星级评价
    this._levelStartTime = performance.now();

    this._detectMobile();
    this._startLoop();
  }

  _onLevelComplete() {
    this._stopLoop();
    this.input.clickEnabled = false;

    const levelId = this.levels.currentLevelId;
    this._saveBestLevel(levelId);

    // 排行榜接入：记录最远通关数
    if (window.GameUtils) {
      GameUtils.saveLeaderboard('sonic', this.bestLevel);
      GameUtils.recordScore('sonic', this.bestLevel);
      var lbEl = document.getElementById('lbList');
      if (lbEl) lbEl.innerHTML = GameUtils.renderLeaderboard('sonic', { meta: function(r){ return '通关 ' + r.score + ' / 10 关'; } });
    }

    this.levelCompleteOverlay.classList.add('active');
    this.levelCompleteToast.classList.add('visible');
    if (window.GameUtils) GameUtils.celebrate();

    this._triggerGoalFlash();

    if (levelId >= this.levels.totalLevels) {
      this.state = Game.State.ALL_COMPLETE;
      this.levelCompleteText.textContent = '🎉 恭喜通关全部关卡！';
      this._playBeep(660, 0.15, 'sine');
      setTimeout(() => this._playBeep(880, 0.15, 'sine'), 150);
      setTimeout(() => this._playBeep(1100, 0.2, 'sine'), 300);
    } else {
      this.state = Game.State.LEVEL_COMPLETE;
      this.levelCompleteText.textContent = `第 ${levelId} 关完成！`;
      this._playBeep(880, 0.12, 'sine');
      setTimeout(() => this._playBeep(1100, 0.15, 'sine'), 120);
    }

    if (window.SonicBGM && typeof window.SonicBGM.playWin === 'function') {
      window.SonicBGM.playWin();
    }

    // —— 关卡星级评价 + 渐进解锁（同步至 GameUtils 全局进度）——
    try {
      if (window.GameUtils) {
        // 用时阈值（秒）：随关卡递增，未超时 = 3 星，超时但通关 = 2 星
        const elapsed = this._levelStartTime ? (performance.now() - this._levelStartTime) / 1000 : 0;
        const threshold = 30 + levelId * 5;
        const stars = elapsed < threshold ? 3 : 2;
        GameUtils.saveLevelStars('sonic', levelId, stars, levelId + 1);
      }
    } catch (e) { console.warn('星级保存失败', e); }

    // —— 成就接入 ——
    try {
      if (window.GameUtils) {
        // bestLevel 已是当前通关数（_saveBestLevel 已更新）
        if (!GameUtils.isUnlocked('sonic_lv5') && this.bestLevel >= 5) {
          GameUtils.unlock('sonic_lv5', '回声定位', '声波探路通关 5 关');
        }
        if (!GameUtils.isUnlocked('sonic_all') && this.bestLevel >= this.levels.totalLevels) {
          GameUtils.unlock('sonic_all', '暗夜行者', '声波探路全 10 关通关');
        }
      }
    } catch (e) { console.warn('成就解锁失败', e); }

    this._render(0);
  }

  _triggerGoalFlash() {
    const existing = document.getElementById('goal-flash');
    if (existing) existing.remove();
    const flash = document.createElement('div');
    flash.id = 'goal-flash';
    flash.className = 'goal-flash';
    document.getElementById('game-container').appendChild(flash);
    setTimeout(() => {
      if (flash.parentNode) flash.parentNode.removeChild(flash);
    }, 1000);
  }

  _continueFromLevelComplete() {
    if (this.state === Game.State.ALL_COMPLETE) {
      this.showMenu();
      return;
    }
    if (this.levels.nextLevel()) {
      this._startLevel();
    } else {
      this.showMenu();
    }
  }

  showTutorial() {
    this.state = Game.State.TUTORIAL;
    this.tutorialOverlay.classList.add('visible');
  }

  hideTutorial() {
    this.tutorialOverlay.classList.remove('visible');
    this.state = Game.State.MENU;
  }

  showSettings() {
    this.state = Game.State.SETTINGS;
    this.settingsOverlay.classList.add('visible');
  }

  hideSettings() {
    this.settingsOverlay.classList.remove('visible');
    this.state = Game.State.MENU;
  }

  // ==================== 主循环（deltaTime 驱动） ====================

  _startLoop() {
    if (this.rafId !== null) return;
    this._lastTime = 0; // 重置，让第一帧 dt=0
    this.rafId = requestAnimationFrame(this._loop);
  }

  _stopLoop() {
    if (this.rafId !== null) {
      cancelAnimationFrame(this.rafId);
      this.rafId = null;
    }
  }

  /**
   * 主循环回调
   * @param {number} timestamp requestAnimationFrame 传入的高精度时间戳（ms）
   */
  _loop(timestamp) {
    if (this.state !== Game.State.PLAYING) {
      this._stopLoop();
      return;
    }

    // 计算 deltaTime（秒），第一帧为 0
    let dt = 0;
    if (this._lastTime > 0) {
      dt = (timestamp - this._lastTime) / 1000;
      // Clamp 上限防止跳帧后瞬移（例如切 Tab 回来后第一帧）
      if (dt > DELTA_MAX) dt = DELTA_MAX;
    }
    this._lastTime = timestamp;

    this._update(dt);
    this._render(dt);
    this.rafId = requestAnimationFrame(this._loop);
  }

  // ==================== 更新逻辑 ====================

  /**
   * @param {number} dt deltaTime（秒）
   */
  _update(dt) {
    if (this.state !== Game.State.PLAYING || !this.player) return;

    const level = this.levels.getCurrent();
    const walls = this.currentWalls;

    // 0. 处理一次性按键（R 重置、ESC 退出）
    const keyPresses = this.input.consumeKeyPresses();
    for (const key of keyPresses) {
      if (key === 'r' || key === 'R') {
        this._restartLevel();
        return;
      }
      if (key === 'Escape') {
        this.showMenu();
        return;
      }
    }

    // 1. 玩家移动（deltaTime 驱动）
    const { dx, dy } = this.input.getMoveDir();
    this.player.move(dx, dy, dt, walls);

    // 2. 声波发射：点击或空格键时创建 ActiveWave，不立即点亮墙壁
    const clicks = this.input.consumeClicks();
    const sonics = this.input.consumeSonic();
    const now = performance.now();

    const fireSonic = () => {
      // 执行光线追踪（hit 已含 totalDistance 和 fromX/fromY）
      const hits = RayCaster.cast(
        this.player.x, this.player.y,
        walls,
        RAY_COUNT, RAY_MAX_DIST, RAY_MAX_BOUNCES
      );

      // 按 totalDistance 升序排序，使扩散动画由近及远依次激活
      hits.sort((a, b) => a.totalDistance - b.totalDistance);

      // 创建活跃声波对象，记录发射信息，等待扩散激活
      const wave = {
        x: this.player.x,
        y: this.player.y,
        startTime: now,
        speed: 450,        // 声波扩散速度 px/s
        hits: hits,
        activatedCount: 0   // 已激活的碰撞点数
      };
      this.activeWaves.push(wave);

      // 保存射线数据用于可视化
      hits._time = now;
      this.lastRayHits = hits;

      // 播放音效
      this._playBeep(660, 0.08, 'sine');
      if (window.SonicBGM && typeof window.SonicBGM.playSonicPing === 'function') {
        window.SonicBGM.playSonicPing();
      }
    };

    for (const click of clicks) {
      fireSonic();
    }
    for (const _ of sonics) {
      fireSonic();
    }

    // 3. 处理活跃声波的扩散激活：声波随时间一圈圈荡漾出去
    const stillActive = [];
    for (const wave of this.activeWaves) {
      const elapsed = (now - wave.startTime) / 1000;  // 秒
      const currentRadius = elapsed * wave.speed;     // 当前扩散半径 px

      // 激活已达扩散半径的碰撞点（hits 已按 totalDistance 排序）
      for (let i = wave.activatedCount; i < wave.hits.length; i++) {
        const hit = wave.hits[i];
        if (currentRadius >= hit.totalDistance) {
          // 激活该碰撞点：加入墙壁光斑数组
          this.wallSpots[hit.wallIndex].push({
            u: hit.u,
            intensity: hit.intensity,
            bounce: hit.bounce,
            time: now
          });
          wave.activatedCount++;
        } else {
          break;  // 后面的 totalDistance 更大，尚未到达，跳出
        }
      }

      // 若仍有未激活的碰撞点且扩散半径未超最大值，保留该声波
      const maxRadius = RAY_MAX_DIST + 200;
      if (wave.activatedCount < wave.hits.length && currentRadius < maxRadius) {
        stillActive.push(wave);
      }
    }
    this.activeWaves = stillActive;

    // 4. 清理过期光斑（每 60 帧清理一次，减少 GC 压力）
    if (!this._cleanFrameCounter) this._cleanFrameCounter = 0;
    this._cleanFrameCounter++;
    if (this._cleanFrameCounter > 60) {
      this._cleanFrameCounter = 0;
      const expireTime = performance.now() - AFTERGLOW_S * 1000;
      for (let i = 0; i < this.wallSpots.length; i++) {
        this.wallSpots[i] = this.wallSpots[i].filter(s => s.time > expireTime);
      }
    }

    // 5. 检测终点
    if (this.player.hitGoal(level.goal)) {
      this._onLevelComplete();
    }
  }

  // ==================== 渲染逻辑 ====================

  /**
   * @param {number} dt deltaTime（秒）
   */
  _render(dt) {
    const renderer = this.renderer;
    const level = this.levels.getCurrent();
    const now = performance.now();

    renderer.clear();
    if (!this.player) return;

    // 1. 声波扩散波纹（最底层）
    renderer.renderWaveRings(this.activeWaves, now);

    // 2. 墙壁光斑（余晖系统）— 使用含边界墙的 currentWalls
    renderer.renderWallSpots(this.currentWalls, this.wallSpots, now);

    // 3. 射线可视化（锯齿形反射路线，用 hit.fromX/fromY）
    if (this.lastRayHits) {
      renderer.renderRayLines(this.lastRayHits, this.player.x, this.player.y, now);
    }

    // 4. 终点（脉冲动画，deltaTime 驱动）
    renderer.renderGoal(level.goal, dt);

    // 5. 玩家
    renderer.renderPlayer(this.player);
  }
}

// =============================================================================
//  启动游戏
// =============================================================================
document.addEventListener('DOMContentLoaded', () => {
  const game = new Game();
  game.renderer.clear();
  window.__game = game;

  // ============ 新手引导 / 提示 / 截图 / 成就接入 ============
  function updateHintCount() {
    var el = document.getElementById('hint-count');
    if (el && window.GameUtils) el.textContent = GameUtils.getHintCount();
  }
  updateHintCount();

  // —— 成就：首次游玩 + 全局快捷键 ——
  if (window.GameUtils) {
    if (!GameUtils.isUnlocked('first_play')) {
      GameUtils.unlock('first_play', '初次到访', '第一次游玩任意游戏');
    }
    GameUtils.registerGlobalShortcuts({
      onHelp: function () {
        GameUtils.showHowtoPopup('发射声波探路 · 声波遇墙反射短暂照亮路径 · 找到金色终点通关 · 10 关递进');
      },
      onLeaderboard: function () {
        var lb = document.getElementById('lbList');
        if (lb) { lb.scrollIntoView({behavior:'smooth'}); lb.style.transition='box-shadow .3s'; lb.style.boxShadow='0 0 0 2px var(--color-accent)'; setTimeout(function(){lb.style.boxShadow='';},800); }
      },
      onEsc: function () {
        if (game.state === Game.State.PLAYING ||
            game.state === Game.State.LEVEL_COMPLETE ||
            game.state === Game.State.ALL_COMPLETE) {
          game.showMenu();
        }
      }
    });
  }

  // 新手教学弹层（首次进入自动弹出，仅一次）
  if (window.GameUtils) {
    GameUtils.showTutorial('sonic', '声波盲境 · 玩法指南', [
      { step: '目标', desc: '在漆黑迷宫中找到金色终点。你只能靠声波探路，看不见墙壁。' },
      { step: '移动', desc: 'WASD 或方向键移动；手机端可用屏幕左下虚拟方向键。' },
      { step: '声波', desc: '空格键 / 鼠标点击 / 触摸屏幕发射声波，声波遇墙真实反射（最多 2 次）。' },
      { step: '快捷键', desc: 'R 重置当前关卡，ESC 返回菜单。声波回声越近 = 墙越近。' },
      { step: '提示', desc: '卡关时点 💡提示（每日 3 次免费）；📷截图可保存分享当前画面。' }
    ]);
  }

  // 每日提示按钮
  var btnHintDaily = document.getElementById('btn-hint-daily');
  if (btnHintDaily) {
    btnHintDaily.addEventListener('click', function () {
      if (!window.GameUtils) return;
      if (!GameUtils.useHint()) {
        GameUtils._toast('今日提示次数已用完，明天再来');
        return;
      }
      updateHintCount();
      GameUtils.unlock('use_hint', '不耻下问', '使用一次提示功能');
      // 声波游戏提示：朝终点方向的相对方位
      var lvl = game.levels.getCurrent();
      if (lvl && lvl.goal && game.player) {
        var dx = lvl.goal.x - game.player.x;
        var dy = lvl.goal.y - game.player.y;
        var dist = Math.round(Math.sqrt(dx * dx + dy * dy));
        var dir = '';
        if (Math.abs(dx) > Math.abs(dy)) dir = dx > 0 ? '东' : '西';
        else dir = dy > 0 ? '南' : '北';
        GameUtils._toast('💡 终点在' + dir + '方向，约 ' + dist + ' 像素距离', 4500);
      } else {
        GameUtils._toast('💡 多发射声波，根据回声密度判断墙壁方位', 4500);
      }
    });
  }

  // 截图按钮
  var btnShot = document.getElementById('btn-screenshot');
  if (btnShot) {
    btnShot.addEventListener('click', function () {
      if (!window.GameUtils) return;
      var canvasEl = document.getElementById('game-canvas');
      var levelId = game.levels.currentLevelId;
      GameUtils.screenshotCanvas(canvasEl, '声波盲境探路', '第 ' + levelId + ' 关 · 最高 ' + game.bestLevel + '/' + game.levels.totalLevels);
      GameUtils.unlock('use_screenshot', '定格瞬间', '使用截图功能分享一次');
    });
  }

  // 全屏按钮
  var btnFs = document.getElementById('btn-fullscreen');
  if (btnFs) {
    btnFs.addEventListener('click', function () {
      if (window.GameUtils) GameUtils.toggleFullscreen(document.getElementById('game-container'));
    });
  }

  // 反馈入口注入
  if (window.GameUtils) {
    GameUtils.injectFeedback('#feedbackSlot');
  }

  // 页面初始化时渲染排行榜
  if (window.GameUtils) {
    var lbEl = document.getElementById('lbList');
    if (lbEl) lbEl.innerHTML = GameUtils.renderLeaderboard('sonic', { meta: function(r){ return '通关 ' + r.score + ' / 10 关'; } });
  }
});

// PWA Service Worker 注册
if (window.GameUtils) {
  document.documentElement.setAttribute('data-sw-root', '../');
  GameUtils.registerSW();
}
</script>

    { name: 'Em', root: 'E2', tones: ['E3', 'G3', 'B3'], bar: 13 },
    { name: 'G',  root: 'G2', tones: ['G3', 'B3', 'D4'], bar: 14 },
    { name: 'C',  root: 'C2', tones: ['C3', 'E3', 'G3'], bar: 15 },
    { name: 'D',  root: 'D2', tones: ['D3', 'F#3', 'A3'], bar: 16 }
  ];

  // 合成器琶音模式（赛博朋克风格，每拍2个八分音符）
  var ARP_PATTERNS = [
    [1, 0, 2, 3, 0, 2, 1, 0],
    [0, 1, 3, 0, 2, 0, 1, 2],
    [1, 2, 0, 3, 1, 0, 2, 3],
    [0, 2, 1, 3, 0, 1, 2, 3]
  ];

  // 主旋律（合成器主音）
  var MELODY = [
    // A段
    [['E4', 0.5], ['G4', 0.5], ['B4', 1], ['E5', 0.5], ['D5', 0.5], ['B4', 1]],
    [['G4', 0.5], ['A4', 0.5], ['B4', 1], ['D5', 0.5], ['E5', 0.5], ['G4', 1]],
    [['E4', 0.5], ['G4', 0.5], ['C5', 1], ['E5', 0.5], ['G5', 0.5], ['E5', 1]],
    [['G4', 1], ['B4', 1], ['D5', 1], ['G5', 1]],
    // B段
    [['D4', 0.5], ['F#4', 0.5], ['A4', 1], ['D5', 0.5], ['F#5', 0.5], ['E5', 1]],
    [['E4', 0.5], ['G4', 0.5], ['B4', 1], ['E5', 1], ['G4', 1]],
    [['C4', 0.5], ['E4', 0.5], ['G4', 1], ['C5', 0.5], ['B4', 0.5], ['A4', 1]],
    [['G4', 0.5], ['B4', 0.5], ['D5', 1], ['G5', 1], ['D5', 1]],
    // A'段
    [['E4', 1], ['G4', 0.5], ['B4', 0.5], ['E5', 0.5], ['D5', 0.5], ['B4', 1]],
    [['C4', 0.5], ['E4', 0.5], ['G4', 1], ['C5', 0.5], ['E5', 0.5], ['G4', 1]],
    [['G4', 0.5], ['B4', 0.5], ['D5', 1], ['G5', 0.5], ['B5', 0.5], ['D5', 1]],
    [['D4', 1], ['F#4', 1], ['A4', 1], ['D5', 1]],
    // B'段
    [['E5', 1], ['B4', 1], ['G4', 0.5], ['A4', 0.5], ['B4', 1]],
    [['G4', 0.5], ['B4', 0.5], ['D5', 1], ['G5', 0.5], ['E5', 0.5], ['D5', 1]],
    [['C4', 0.5], ['E4', 0.5], ['G4', 0.5], ['B4', 0.5], ['A4', 0.5], ['G4', 0.5], ['F#4', 0.5], ['E4', 0.5]],
    [['E4', 2], ['G4', 1], ['B4', 1]]
  ];

  // 低音线（808风格贝斯）
  var BASSLINE = [
    ['E1', 4], ['E1', 4],
    ['C1', 4], ['G1', 4],
    ['D1', 4], ['E1', 4],
    ['C1', 4], ['G1', 4],
    ['E1', 4], ['C1', 4],
    ['G1', 4], ['D1', 4],
    ['E1', 4], ['G1', 4],
    ['C1', 4], ['D1', 4]
  ];

  // ---------- 状态 ----------
  var audioCtx = null;
  var masterGain = null;
  var isUserEnabled = false;
  var isPlaying = false;
  var userVolume = 0.3;

  var barIndex = 0;
  var beatInBar = 0;
  var lastEighthIndex = -1;
  var lastBeatNum = -1;
  var arpPatternIndex = 0;
  var melodyStep = 0;
  var melodyTimeInBar = 0;
  var bassStep = 0;
  var bassTimeInBar = 0;
  var nextNoteTime = 0;
  var schedulerTimer = null;
  var TICK = 0.05;

  // 音色：赛博合成器主音（锯齿波 + 低通滤波）
  function playSynthLead(freq, startTime, duration, gain) {
    if (!audioCtx || !masterGain) return;
    var osc1 = audioCtx.createOscillator();
    var osc2 = audioCtx.createOscillator();
    var noteGain = audioCtx.createGain();
    var filter = audioCtx.createBiquadFilter();

    osc1.type = 'sawtooth';
    osc1.frequency.value = freq;
    osc2.type = 'square';
    osc2.frequency.value = freq * 0.5;

    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(freq * 3, startTime);
    filter.frequency.exponentialRampToValueAtTime(freq * 1.5, startTime + duration * 0.3);
    filter.Q.value = 2;

    var t = startTime;
    var attack = 0.01;
    var decay = duration * 0.2;
    var sustain = duration * 0.6;
    var release = duration * 0.2;

    noteGain.gain.setValueAtTime(0.0001, t);
    noteGain.gain.linearRampToValueAtTime(0.3 * gain, t + attack);
    noteGain.gain.exponentialRampToValueAtTime(0.15 * gain, t + attack + decay);
    noteGain.gain.setValueAtTime(0.15 * gain, t + duration - release);
    noteGain.gain.linearRampToValueAtTime(0.0001, t + duration);

    osc1.connect(filter);
    osc2.connect(filter);
    filter.connect(noteGain);
    noteGain.connect(masterGain);

    osc1.start(t);
    osc2.start(t);
    osc1.stop(t + duration + 0.05);
    osc2.stop(t + duration + 0.05);
  }

  // 音色：赛博琶音（方波 + 高通滤波）
  function playArpNote(freq, startTime, duration, gain) {
    if (!audioCtx || !masterGain) return;
    var osc = audioCtx.createOscillator();
    var noteGain = audioCtx.createGain();
    var filter = audioCtx.createBiquadFilter();

    osc.type = 'square';
    osc.frequency.value = freq;

    filter.type = 'highpass';
    filter.frequency.value = freq * 0.8;
    filter.Q.value = 1;

    var t = startTime;
    var attack = 0.005;
    var release = duration * 0.4;

    noteGain.gain.setValueAtTime(0.0001, t);
    noteGain.gain.linearRampToValueAtTime(0.2 * gain, t + attack);
    noteGain.gain.exponentialRampToValueAtTime(0.0001, t + duration);

    osc.connect(filter);
    filter.connect(noteGain);
    noteGain.connect(masterGain);

    osc.start(t);
    osc.stop(t + duration + 0.05);
  }

  // 音色：暗黑Pad（三角波 + 缓慢LFO）
  function playPadNote(freq, startTime, duration, gain) {
    if (!audioCtx || !masterGain) return;
    var osc1 = audioCtx.createOscillator();
    var osc2 = audioCtx.createOscillator();
    var noteGain = audioCtx.createGain();
    var filter = audioCtx.createBiquadFilter();

    osc1.type = 'triangle';
    osc1.frequency.value = freq;
    osc2.type = 'sine';
    osc2.frequency.value = freq * 1.005;

    var lfo = audioCtx.createOscillator();
    var lfoGain = audioCtx.createGain();
    lfo.type = 'sine';
    lfo.frequency.value = 0.08;
    lfoGain.gain.value = freq * 0.005;
    lfo.connect(lfoGain);
    lfoGain.connect(osc1.frequency);

    filter.type = 'lowpass';
    filter.frequency.value = freq * 2;
    filter.Q.value = 0.5;

    var t = startTime;
    var attack = duration * 0.2;
    var release = duration * 0.25;

    noteGain.gain.setValueAtTime(0.0001, t);
    noteGain.gain.linearRampToValueAtTime(0.2 * gain, t + attack);
    noteGain.gain.setValueAtTime(0.2 * gain, t + duration - release);
    noteGain.gain.linearRampToValueAtTime(0.0001, t + duration);

    osc1.connect(filter);
    osc2.connect(filter);
    filter.connect(noteGain);
    noteGain.connect(masterGain);

    osc1.start(t);
    osc2.start(t);
    lfo.start(t);
    osc1.stop(t + duration + 0.1);
    osc2.stop(t + duration + 0.1);
    lfo.stop(t + duration + 0.1);
  }

  // 音色：808风格低音（正弦 + 轻微失真）
  function playBassNote(freq, startTime, duration, gain) {
    if (!audioCtx || !masterGain) return;
    var osc = audioCtx.createOscillator();
    var osc2 = audioCtx.createOscillator();
    var noteGain = audioCtx.createGain();
    var filter = audioCtx.createBiquadFilter();

    osc.type = 'sine';
    osc.frequency.value = freq;
    osc2.type = 'triangle';
    osc2.frequency.value = freq * 2;

    filter.type = 'lowpass';
    filter.frequency.value = freq * 3;
    filter.Q.value = 1;

    var t = startTime;
    var attack = 0.01;
    var release = duration * 0.2;

    noteGain.gain.setValueAtTime(0.0001, t);
    noteGain.gain.linearRampToValueAtTime(0.45 * gain, t + attack);
    noteGain.gain.exponentialRampToValueAtTime(0.3 * gain, t + attack + 0.05);
    noteGain.gain.setValueAtTime(0.3 * gain, t + duration - release);
    noteGain.gain.linearRampToValueAtTime(0.0001, t + duration);

    osc.connect(filter);
    osc2.connect(filter);
    filter.connect(noteGain);
    noteGain.connect(masterGain);

    osc.start(t);
    osc2.start(t);
    osc.stop(t + duration + 0.05);
    osc2.stop(t + duration + 0.05);
  }

  // 音色：数据脉冲（赛博朋克音效）
  function playDataPulse(startTime, gain) {
    if (!audioCtx || !masterGain) return;
    var osc = audioCtx.createOscillator();
    var noteGain = audioCtx.createGain();
    osc.type = 'square';
    var baseFreq = 800 + Math.random() * 600;
    osc.frequency.setValueAtTime(baseFreq, startTime);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.5, startTime + 0.08);

    noteGain.gain.setValueAtTime(0.0001, startTime);
    noteGain.gain.linearRampToValueAtTime(0.08 * gain, startTime + 0.003);
    noteGain.gain.exponentialRampToValueAtTime(0.0001, startTime + 0.1);

    osc.connect(noteGain);
    noteGain.connect(masterGain);
    osc.start(startTime);
    osc.stop(startTime + 0.12);
  }

  // ---------- 调度 ----------
  function scheduler() {
    if (!isPlaying || !audioCtx) return;
    var now = audioCtx.currentTime;
    while (nextNoteTime < now + 0.3) {
      scheduleTick(nextNoteTime);
      nextNoteTime += TICK;
    }
    schedulerTimer = setTimeout(scheduler, 30);
  }

  function scheduleTick(t) {
    var chord = CHORDS[barIndex];
    var arpPattern = ARP_PATTERNS[arpPatternIndex % ARP_PATTERNS.length];

    // === 合成器琶音（每拍2个八分音符）===
    var eighthIndex = Math.floor(beatInBar * 2);
    if (eighthIndex !== lastEighthIndex) {
      var eighthPos = eighthIndex % 8;
      var arpNoteIdx = arpPattern[eighthPos];
      if (arpNoteIdx > 0) {
        var noteName = chord.tones[arpNoteIdx - 1];
        if (noteName) {
          var afreq = freqOf(noteName) * 2;
          var offset = Math.random() * 0.002;
          playArpNote(afreq, t + offset, BEAT * 0.6, 0.25);
        }
      }
      lastEighthIndex = eighthIndex;
    }

    // === 合成器主音（按时长推进）===
    if (melodyTimeInBar <= 0.001) {
      var barMelody = MELODY[barIndex];
      if (barMelody && melodyStep < barMelody.length) {
        var mNote = barMelody[melodyStep];
        if (mNote[0] !== 0 && mNote[0]) {
          var mfreq = freqOf(mNote[0]);
          playSynthLead(mfreq, t, BEAT * mNote[1] * 0.85, 0.35);
        }
        melodyTimeInBar = mNote[1];
        melodyStep++;
        if (melodyStep >= barMelody.length) {
          melodyStep = 0;
        }
      }
    }
    melodyTimeInBar -= TICK / BEAT;
    if (melodyTimeInBar < 0) melodyTimeInBar = 0;

    // === 低音（按时长推进）===
    if (bassTimeInBar <= 0.001) {
      var bassNote = BASSLINE[bassStep];
      if (bassNote) {
        var bfreq = freqOf(bassNote[0]);
        playBassNote(bfreq, t, BEAT * bassNote[1] * 0.9, 0.5);
      }
      bassTimeInBar = bassNote[1];
      bassStep++;
      if (bassStep >= BASSLINE.length) {
        bassStep = 0;
      }
    }
    bassTimeInBar -= TICK / BEAT;
    if (bassTimeInBar < 0) bassTimeInBar = 0;

    // === Pad 长音（每小节换和弦时触发）===
    var beatNum = Math.floor(beatInBar);
    if (beatNum !== lastBeatNum) {
      if (beatNum === 0) {
        for (var i = 0; i < chord.tones.length; i++) {
          var padFreq = freqOf(chord.tones[i]);
          playPadNote(padFreq, t, BEAT * 3.8, 0.22);
        }
      }
      // 数据脉冲（赛博朋克氛围）
      if (Math.random() < 0.35) {
        playDataPulse(t + Math.random() * BEAT * 0.4, 0.15);
      }
      lastBeatNum = beatNum;
    }

    // 推进节拍
    beatInBar += TICK / BEAT;
    if (beatInBar >= 4) {
      beatInBar -= 4;
      barIndex++;
      arpPatternIndex++;
      if (barIndex >= CHORDS.length) {
        barIndex = 0;
      }
      melodyStep = 0;
      melodyTimeInBar = 0;
    }
  }

  // ---------- 控制 ----------
  function initAudio() {
    if (audioCtx) return true;
    try {
      var Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return false;
      audioCtx = new Ctx();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = isUserEnabled ? userVolume : 0;
      masterGain.connect(audioCtx.destination);
      return true;
    } catch (e) {
      return false;
    }
  }

  function play() {
    if (!isUserEnabled) return;
    if (!initAudio()) return;
    if (isPlaying) return;
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(function () {});

    masterGain.gain.setTargetAtTime(userVolume, audioCtx.currentTime, 0.3);

    barIndex = 0;
    beatInBar = 0;
    lastEighthIndex = -1;
    lastBeatNum = -1;
    arpPatternIndex = 0;
    melodyStep = 0;
    melodyTimeInBar = 0;
    bassStep = 0;
    bassTimeInBar = 0;
    nextNoteTime = audioCtx.currentTime + 0.1;
    isPlaying = true;
    scheduler();
  }

  function stop() {
    isPlaying = false;
    if (schedulerTimer) {
      clearTimeout(schedulerTimer);
      schedulerTimer = null;
    }
    if (masterGain && audioCtx) {
      masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3);
    }
  }

  function toggle() {
    if (isPlaying) {
      stop();
    } else {
      play();
    }
    return isPlaying;
  }

  function setVolume(v) {
    userVolume = Math.max(0, Math.min(1, v));
    if (masterGain && audioCtx) {
      masterGain.gain.setTargetAtTime(isUserEnabled ? userVolume : 0, audioCtx.currentTime, 0.05);
    }
    saveSettings();
  }

  function setEnabled(enabled) {
    isUserEnabled = enabled;
    if (masterGain && audioCtx) {
      masterGain.gain.setTargetAtTime(enabled ? userVolume : 0, audioCtx.currentTime, 0.05);
    }
    if (enabled) {
      play();
    } else {
      stop();
    }
    saveSettings();
  }

  // ---------- 存档 ----------
  function loadSettings() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        var obj = JSON.parse(saved);
        if (typeof obj.enabled === 'boolean') isUserEnabled = obj.enabled;
        if (typeof obj.volume === 'number') userVolume = Math.max(0, Math.min(1, obj.volume));
      }
    } catch (e) {}
  }

  function saveSettings() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        enabled: isUserEnabled,
        volume: userVolume
      }));
    } catch (e) {}
  }

  // ---------- 音效 ----------
  // 发射声波
  function playSonicPing() {
    if (!isUserEnabled) return;
    if (!initAudio()) return;
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(function () {});
    var t = audioCtx.currentTime;
    var osc = audioCtx.createOscillator();
    var noteGain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, t);
    osc.frequency.exponentialRampToValueAtTime(220, t + 0.15);
    noteGain.gain.setValueAtTime(0.0001, t);
    noteGain.gain.linearRampToValueAtTime(0.25, t + 0.005);
    noteGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
    osc.connect(noteGain);
    noteGain.connect(masterGain);
    osc.start(t);
    osc.stop(t + 0.2);
  }

  // 过关胜利
  function playWin() {
    if (!isUserEnabled) return;
    if (!initAudio()) return;
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(function () {});
    var t = audioCtx.currentTime;
    var notes = [
      ['E4', 0.15], ['G4', 0.15], ['B4', 0.15], ['E5', 0.25],
      ['D5', 0.12], ['B4', 0.12], ['G4', 0.12], ['E4', 0.3]
    ];
    var time = t;
    for (var i = 0; i < notes.length; i++) {
      playSynthLead(freqOf(notes[i][0]), time, notes[i][1] * 0.8, 0.4);
      playArpNote(freqOf(notes[i][0]) * 2, time, notes[i][1] * 0.7, 0.25);
      time += notes[i][1];
    }
    playBassNote(freqOf('E2'), t + 0.2, 1.2, 0.5);
  }

  // 重置关卡
  function playReset() {
    if (!isUserEnabled) return;
    if (!initAudio()) return;
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(function () {});
    var t = audioCtx.currentTime;
    playArpNote(freqOf('E4'), t, 0.15, 0.3);
    playArpNote(freqOf('B3'), t + 0.08, 0.2, 0.25);
  }

  // ---------- UI 绑定 ----------
  function initUI() {
    var settingsOverlay = document.getElementById('settings-overlay');
    if (!settingsOverlay) return;

    var soundRow = document.getElementById('toggle-sound');
    if (!soundRow || !soundRow.parentNode) return;

    // 创建 BGM 设置行
    var bgmRow = document.createElement('div');
    bgmRow.className = 'setting-row';

    var bgmLabel = document.createElement('span');
    bgmLabel.textContent = '背景音乐';

    var bgmControls = document.createElement('div');
    bgmControls.style.display = 'flex';
    bgmControls.style.flexDirection = 'column';
    bgmControls.style.gap = '6px';
    bgmControls.style.alignItems = 'flex-end';

    var toggleRow = document.createElement('div');
    toggleRow.style.display = 'flex';
    toggleRow.style.gap = '8px';

    var btnOn = document.createElement('button');
    btnOn.className = 'menu-btn';
    btnOn.style.padding = '4px 12px';
    btnOn.style.fontSize = '12px';
    btnOn.style.width = 'auto';
    btnOn.textContent = '开启';
    if (isUserEnabled) {
      btnOn.style.borderColor = 'var(--cyan)';
      btnOn.style.color = 'var(--cyan)';
      btnOn.style.boxShadow = '0 0 10px rgba(0,255,255,0.3)';
    }

    var btnOff = document.createElement('button');
    btnOff.className = 'menu-btn';
    btnOff.style.padding = '4px 12px';
    btnOff.style.fontSize = '12px';
    btnOff.style.width = 'auto';
    btnOff.textContent = '关闭';
    if (!isUserEnabled) {
      btnOff.style.borderColor = 'var(--cyan)';
      btnOff.style.color = 'var(--cyan)';
      btnOff.style.boxShadow = '0 0 10px rgba(0,255,255,0.3)';
    }

    toggleRow.appendChild(btnOn);
    toggleRow.appendChild(btnOff);

    var volRow = document.createElement('div');
    volRow.style.display = 'flex';
    volRow.style.alignItems = 'center';
    volRow.style.gap = '8px';

    var volLabel = document.createElement('span');
    volLabel.style.fontSize = '11px';
    volLabel.style.color = 'rgba(224,247,250,0.5)';
    volLabel.textContent = '音量';

    var volSlider = document.createElement('input');
    volSlider.type = 'range';
    volSlider.min = '0';
    volSlider.max = '100';
    volSlider.value = Math.round(userVolume * 100);
    volSlider.style.width = '100px';

    volRow.appendChild(volLabel);
    volRow.appendChild(volSlider);

    bgmControls.appendChild(toggleRow);
    bgmControls.appendChild(volRow);

    bgmRow.appendChild(bgmLabel);
    bgmRow.appendChild(bgmControls);

    soundRow.parentNode.insertBefore(bgmRow, soundRow.parentNode.children[0]);

    btnOn.addEventListener('click', function () {
      setEnabled(true);
      btnOn.style.borderColor = 'var(--cyan)';
      btnOn.style.color = 'var(--cyan)';
      btnOn.style.boxShadow = '0 0 10px rgba(0,255,255,0.3)';
      btnOff.style.borderColor = '';
      btnOff.style.color = '';
      btnOff.style.boxShadow = '';
      // BGM 开启成就
      if (window.GameUtils) GameUtils.unlock('enable_bgm', '奏响旋律', '开启任意游戏的 BGM');
    });

    btnOff.addEventListener('click', function () {
      setEnabled(false);
      btnOff.style.borderColor = 'var(--cyan)';
      btnOff.style.color = 'var(--cyan)';
      btnOff.style.boxShadow = '0 0 10px rgba(0,255,255,0.3)';
      btnOn.style.borderColor = '';
      btnOn.style.color = '';
      btnOn.style.boxShadow = '';
    });

    volSlider.addEventListener('input', function (e) {
      setVolume(parseInt(e.target.value) / 100);
    });
  }

  // ---------- 暴露给外部 ----------
  window.SonicBGM = {
    play: play,
    stop: stop,
    toggle: toggle,
    setVolume: setVolume,
    setEnabled: setEnabled,
    playSonicPing: playSonicPing,
    playWin: playWin,
    playReset: playReset,
    isPlaying: function () { return isPlaying; },
    isEnabled: function () { return isUserEnabled; }
  };

  // ---------- 初始化 ----------
  loadSettings();

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () {
      initUI();
      if (isUserEnabled) play();
    });
  } else {
    initUI();
    if (isUserEnabled) play();
  }
})();
</script>
<script src="../assets/js/game-utils.js"></script>

<!-- 反馈入口 -->
<div id="feedbackSlot" style="text-align:center;padding:12px 0;border-top:1px solid var(--color-border-light);margin-top:24px"></div>
