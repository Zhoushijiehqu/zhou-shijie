<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="author" content="周世杰 (ZHOU SHIJIE)">
  <meta name="copyright" content="© 2026 周世杰. 代码 MIT, 创意 CC-BY-NC 4.0.">
  <meta name="generator" content="周世杰个人作品集 v7.0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="全部作品 - 周世杰的 GitHub 仓库项目全集，网站开发 / 数据分析 / 学术资料分类展示">
  <meta name="keywords" content="周世杰, 作品集, 全部项目, GitHub, 网站开发, 数据分析, 学术资料">
  <title>全部作品 · 周世杰</title>

  <!-- 主题预载：读取 localStorage.theme（无则 dark），避免刷新闪烁 -->
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      document.documentElement.setAttribute('data-theme', saved === 'light' ? 'light' : 'dark');
    })();
  </script>

  <!-- 字体：Fraunces 编辑体衬线 + Manrope 几何无衬线（与主页面一致） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,400..700&family=Manrope:wght@300..800&display=swap" rel="stylesheet">

  <!-- 主页面样式 -->
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">

  <!-- 网站图标 -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📂</text></svg>">

  <style>
    /* ========== 子页面特有样式 ========== */

    /* 顶部 sticky 导航条 - 毛玻璃（与主站 navbar 风格一致） */
    .sub-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(251, 247, 240, 0.72);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(176, 130, 62, 0.12);
    }

    [data-theme="dark"] .sub-header {
      background: rgba(26, 21, 16, 0.72);
      border-bottom-color: rgba(212, 171, 106, 0.1);
    }

    .sub-header-inner {
      max-width: var(--container-width);
      margin: 0 auto;
      padding: 0 var(--spacing-lg);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-md);
    }

    /* 返回按钮 - 复用 .theme-toggle 圆形图标按钮风格 */
    .back-btn {
      flex-shrink: 0;
      text-decoration: none;
    }

    .back-btn:hover {
      transform: translateX(-3px);
      background: var(--color-accent-lighter);
      color: var(--color-accent);
      border-color: var(--color-accent-light);
    }

    /* 中间紧凑标题区 */
    .sub-header-center {
      flex: 1;
      text-align: center;
      min-width: 0;
    }

    .sub-header-title {
      font-family: var(--font-family-display);
      font-size: var(--font-size-base);
      font-weight: 500;
      font-variation-settings: 'opsz' 24;
      color: var(--color-text-primary);
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    #themeToggle {
      flex-shrink: 0;
    }

    /* ========== 标题区 - 编辑体大刊头 ========== */
    .sub-hero {
      position: relative;
      padding: var(--spacing-4xl) 0 var(--spacing-3xl);
      text-align: center;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 0%, var(--color-accent-lighter) 0%, transparent 60%),
        var(--color-bg-secondary);
    }

    .sub-eyebrow {
      display: block;
      font-family: var(--font-family-base);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: var(--spacing-md);
    }

    .sub-hero-title {
      font-family: var(--font-family-display);
      font-size: clamp(36px, 5vw, 52px);
      font-weight: 500;
      font-variation-settings: 'opsz' 96, 'SOFT' 50;
      color: var(--color-text-primary);
      letter-spacing: -0.02em;
      line-height: 1.05;
      margin-bottom: var(--spacing-md);
      background: linear-gradient(135deg,
        var(--color-text-primary) 0%,
        var(--color-primary) 60%,
        var(--color-accent) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sub-hero-subtitle {
      font-family: var(--font-family-base);
      font-size: var(--font-size-lg);
      color: var(--color-text-secondary);
      letter-spacing: 0.04em;
    }

    /* ========== 项目区 ========== */
    .projects-section {
      padding: var(--spacing-2xl) 0 var(--spacing-4xl);
    }

    /* 覆盖 components.css 的 2 列布局，改为自适应 3/2/1 列 */
    .projects-section .projects-grid {
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
    }

    /* 分类筛选条左对齐，更具编辑体气质 */
    .projects-section .project-categories {
      justify-content: flex-start;
      margin-bottom: var(--spacing-2xl);
    }

    /* 空状态提示（当某分类无项目时） */
    .projects-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: var(--spacing-4xl) var(--spacing-lg);
      color: var(--color-text-tertiary);
      font-family: var(--font-family-display);
      font-size: var(--font-size-lg);
      font-style: italic;
    }

    /* ========== 页脚 ========== */
    .sub-footer {
      background: var(--color-bg-primary);
      border-top: 1px solid var(--color-border-light);
      padding: var(--spacing-2xl) 0;
      position: relative;
    }

    .sub-footer::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--color-accent), transparent);
    }

    .sub-footer .container {
      text-align: center;
    }

    .sub-footer-info {
      color: var(--color-text-tertiary);
      font-family: var(--font-family-base);
      font-size: var(--font-size-sm);
      letter-spacing: 0.02em;
    }

    /* ========== 响应式 ========== */
    @media (max-width: 768px) {
      .sub-header-inner {
        height: 56px;
        padding: 0 var(--spacing-md);
        gap: var(--spacing-sm);
      }

      .sub-header-title {
        font-size: var(--font-size-sm);
      }

      .sub-hero {
        padding: var(--spacing-3xl) 0 var(--spacing-2xl);
      }

      .projects-section .projects-grid {
        grid-template-columns: 1fr;
        gap: var(--spacing-lg);
      }

      .projects-section .project-categories {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <!-- 顶部 sticky 导航条：返回主页 + 中间标题 + 主题切换 -->
  <header class="sub-header">
    <div class="sub-header-inner">
      <a href="index.html" class="theme-toggle back-btn" aria-label="返回主页" title="返回主页">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></svg>
      </a>
      <div class="sub-header-center">
        <span class="sub-header-title">全部作品</span>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="切换主题" title="切换深色/浅色模式">
        <!-- 图标由 JS 注入 -->
      </button>
    </div>
  </header>

  <main>
    <!-- 标题区：编辑体小帽 + 大标题 + 副标题 -->
    <section class="sub-hero">
      <div class="container">
        <span class="sub-eyebrow reveal">— 01 —</span>
        <h1 class="sub-hero-title reveal delay-100">全部作品</h1>
        <p class="sub-hero-subtitle reveal delay-200">GitHub 仓库同步 · 持续更新</p>
      </div>
    </section>

    <!-- 项目卡片网格 -->
    <section class="projects-section">
      <div class="container">
        <!-- 分类筛选条 -->
        <div class="project-categories reveal" id="projectCategories">
          <!-- 分类按钮由 JS 渲染 -->
        </div>

        <!-- 卡片网格 -->
        <div class="projects-grid" id="projectsGrid">
          <!-- 项目卡片由 JS 渲染 -->
        </div>
      </div>
    </section>
  </main>

  <!-- 简单页脚 -->
  <footer class="sub-footer">
    <div class="container">
      <p class="sub-footer-info" id="footerInfo"></p>
    </div>
  </footer>

  <!-- 数据层与工具函数（普通 script，挂载 window.ProfileData 与全局 Utils） -->
  <script src="data/profile.js"></script>
  <script src="assets/js/utils.js"></script>

  <script>
    /* ============================================================
     * 全部作品页逻辑
     * - 从 window.ProfileData 读取 8 个仓库项目并渲染卡片网格
     * - 分类筛选 / 入场动画 / 主题切换 全部内联实现
     * ============================================================ */
    (function () {
      var data = window.ProfileData || {};

      // Lucide 风格图标 SVG
      var GITHUB_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path><path d="M9 18c-4.51 2-5-2-7-2"></path></svg>';
      var EXTERNAL_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"></path><path d="M10 14 21 3"></path><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path></svg>';
      var SUN_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>';
      var MOON_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>';

      // HTML 转义，避免描述里的特殊字符破坏结构
      function esc(str) {
        if (str == null) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      /* ---------- 渲染分类筛选条 ---------- */
      function renderCategories() {
        var cats = data.projectCategories || ['全部'];
        var html = cats.map(function (cat, i) {
          return '<button class="project-cat-btn ' + (i === 0 ? 'active' : '') +
            '" data-category="' + esc(cat) + '">' + esc(cat) + '</button>';
        }).join('');
        document.getElementById('projectCategories').innerHTML = html;
      }

      /* ---------- 渲染单张项目卡片（复用主页面编辑体结构） ---------- */
      function renderCard(p) {
        // 取标题首字符作为占位封面字标（中英文兼容）
        var initial = ((p.title || '').trim().charAt(0)) || '·';
        var category = p.category || 'WORK';

        // 技术栈标签
        var techHtml = '';
        if (p.techStack && p.techStack.length) {
          techHtml = '<div class="project-tech-stack">' +
            p.techStack.map(function (t) {
              return '<span class="tech-tag">' + esc(t) + '</span>';
            }).join('') +
            '</div>';
        }

        // 标签（最多展示 3 个）
        var tagsHtml = (p.tags || []).slice(0, 3).map(function (t) {
          return '<span class="tag tag-primary">' + esc(t) + '</span>';
        }).join('');

        // 链接按钮（GitHub + Demo）
        var linksHtml = '';
        if (p.github && p.github !== '#') {
          linksHtml += '<a href="' + esc(p.github) + '" class="project-link-btn" target="_blank" rel="noopener noreferrer" title="GitHub" aria-label="GitHub 仓库"><span class="icon">' + GITHUB_SVG + '</span></a>';
        }
        if (p.demo && p.demo !== '#') {
          linksHtml += '<a href="' + esc(p.demo) + '" class="project-link-btn" target="_blank" rel="noopener noreferrer" title="在线预览" aria-label="在线预览"><span class="icon">' + EXTERNAL_SVG + '</span></a>';
        }

        // 仓库元数据行
        var repoHtml = '';
        if (p.repo) {
          repoHtml = '<div class="project-repo-meta">' +
            '<span class="repo-meta-item"><span class="icon">★</span><span class="repo-meta-value">' + esc(p.repo.stars) + '</span><span class="repo-meta-label">stars</span></span>' +
            '<span class="repo-meta-divider"></span>' +
            '<span class="repo-meta-item"><span class="repo-lang-dot"></span><span class="repo-meta-value">' + esc(p.repo.language) + '</span></span>' +
            '<span class="repo-meta-divider"></span>' +
            '<span class="repo-meta-item repo-meta-updated"><span class="repo-meta-label">updated</span><span class="repo-meta-value">' + esc(p.repo.updated) + '</span></span>' +
            '</div>';
        }

        return '<div class="card project-card ' + (p.featured ? 'card-featured' : '') +
          ' reveal" data-category="' + esc(p.category || '全部') + '">' +
          '<div class="project-card-cover">' +
            '<div class="project-cover-mark" aria-hidden="true">' +
              '<span class="project-cover-initial">' + esc(initial) + '</span>' +
              '<span class="project-cover-label">' + esc(category) + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="project-card-body">' +
            '<div class="project-card-header">' +
              '<h3 class="project-card-title">' + esc(p.title) + '</h3>' +
              '<div class="project-card-meta">' +
                '<span>' + esc(p.role) + '</span>' +
                '<span class="meta-divider">·</span>' +
                '<span>' + esc(p.period) + '</span>' +
              '</div>' +
            '</div>' +
            '<p class="project-card-desc">' + esc(p.description) + '</p>' +
            techHtml +
            '<div class="project-card-footer">' +
              '<div class="project-tags">' + tagsHtml + '</div>' +
              '<div class="project-links">' + linksHtml + '</div>' +
            '</div>' +
            repoHtml +
          '</div>' +
        '</div>';
      }

      /* ---------- 渲染全部项目 ---------- */
      function renderProjects() {
        var grid = document.getElementById('projectsGrid');
        var projects = data.projects || [];
        grid.innerHTML = projects.map(renderCard).join('');
      }

      /* ---------- 分类筛选 ---------- */
      function initFilter() {
        var buttons = document.querySelectorAll('.project-cat-btn');
        var cards = document.querySelectorAll('.project-card');
        var grid = document.getElementById('projectsGrid');

        buttons.forEach(function (btn) {
          btn.addEventListener('click', function () {
            // 更新按钮激活态
            buttons.forEach(function (b) { b.classList.remove('active'); });
            btn.classList.add('active');

            var cat = btn.dataset.category;
            var visibleCount = 0;

            // 筛选卡片
            cards.forEach(function (card) {
              if (cat === '全部' || card.dataset.category === cat) {
                card.style.display = '';
                visibleCount++;
              } else {
                card.style.display = 'none';
              }
            });

            // 空状态提示
            var empty = grid.querySelector('.projects-empty');
            if (visibleCount === 0) {
              if (!empty) {
                empty = document.createElement('div');
                empty.className = 'projects-empty';
                empty.textContent = '该分类暂无项目';
                grid.appendChild(empty);
              }
            } else if (empty) {
              empty.remove();
            }
          });
        });
      }

      /* ---------- 入场动画（IntersectionObserver 添加 .revealed） ---------- */
      function initReveal() {
        var els = document.querySelectorAll('.reveal');
        if (!els.length) return;

        // 不支持 IntersectionObserver 时直接显示
        if (!('IntersectionObserver' in window)) {
          els.forEach(function (el) { el.classList.add('revealed'); });
          return;
        }

        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('revealed');
              observer.unobserve(entry.target);
            }
          });
        }, {
          threshold: 0.1,
          rootMargin: '0px 0px -50px 0px'
        });

        els.forEach(function (el) { observer.observe(el); });
      }

      /* ---------- 主题切换（localStorage key='theme'，默认 dark） ---------- */
      function initThemeToggle() {
        var toggle = document.getElementById('themeToggle');

        function applyIcon() {
          var theme = document.documentElement.getAttribute('data-theme');
          toggle.innerHTML = theme === 'dark' ? SUN_SVG : MOON_SVG;
        }

        applyIcon();

        toggle.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme') || 'dark';
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          applyIcon();
        });
      }

      /* ---------- 页脚版权 ---------- */
      function renderFooter() {
        var year = new Date().getFullYear();
        var name = (data.basic && data.basic.name) || '周世杰';
        document.getElementById('footerInfo').textContent =
          '© ' + year + ' ' + name + ' · GitHub 仓库同步 · 持续更新';
      }

      /* ---------- 初始化 ---------- */
      renderCategories();
      renderProjects();
      renderFooter();
      initFilter();
      initThemeToggle();
      initReveal();
    })();
  </script>
</body>
</html>
